async function loadAllData(){
  const [{data:corpsRaw},{data:brandsRaw},{data:storesRaw},{data:svcRaw}]=await Promise.all([
    sb.from('merchants').select('*'),
    sb.from('brands').select('*, corporations:merchants!brands_merchant_id_fkey(display_id)'),
    sb.from('venues').select('*, corp_id:merchant_id, brands(display_id)'),
    sb.from('service_subscriptions').select('*').eq('is_active',true),
  ]);
  // Map corporations
  MERCHANTS=(corpsRaw||[]).map(r=>({
    _uuid:r.id, id:r.display_id, name:r.name, rep:r.representative||'',
    status:r.status||'active', created:(r.created_at||'').split('T')[0],
    stripe_account_id:r.stripe_account_id, rep_email:r.rep_email||'',
    website_url:r.website_url||'', recruit_url:r.recruit_url||''
  }));
  // Map brands (DB: primary_color not main_color, no slug, no is_active)
  BRANDS=(brandsRaw||[]).map(r=>({
    _uuid:r.id, id:r.display_id, corpId:r.corporations?.display_id||'',
    name:r.name, slug:r.slug||r.display_id||'', status:'active',
    mainColor:r.primary_color||'#6c5ce7',
    secondaryColor:r.secondary_color||'#1A1A1A',
    fontFamilies:r.font_families||['Noto Sans JP'],
    socialLinks:r.social_links||{},
    serviceSettings:r.service_settings||{},
    designSettings:r.design_settings||{},
    hpSettings:r.hp_settings||{},
    cancelPolicy:r.cancel_policy||{no_show:100,same_day:100,'3_days_before':50},
    pii_access_settings:r.pii_access_settings||{...PII_ACCESS_DEFAULTS}
  }));
  // Map stores (DB: status column exists, delivery_radius_km not delivery_radius)
  VENUES=(storesRaw||[]).map(r=>({
    _uuid:r.id, id:r.display_id, brandId:r.brands?.display_id||'',
    name:r.name, slug:r.slug||'', status:r.status||'active',
    addr:r.address||'', tel:r.phone||'', orders:0, revenue:0,
    deliveryRadius:r.delivery_radius_km||5, deliveryFee:r.delivery_fee||0,
    minOrder:r.min_order_amount||0, minOrderPolicy:r.min_order_policy||'surcharge',
    surchargeMax:r.small_order_surcharge_max||0, prepTime:r.prep_time_minutes||30,
    minOrderApplyTypes:r.min_order_apply_types||{dinein:false,takeout:true,delivery:true},
    reservationEnabled:r.reservation_enabled, resConfMode:r.reservation_confirmation_mode,
    resRequireCard:r.reservation_require_card, resCancelFee:r.reservation_cancellation_fee,
    resCancelDeadline:r.reservation_cancel_deadline_hours,
    seats:r.seats||6, smoking:r.smoking_policy||'no_smoking',
    children:r.children_policy||'not_allowed',
    serviceChargeType:r.service_charge_type||'percent',
    serviceChargeValue:r.service_charge_value||10,
    corpUuid:r.corp_id||'',
    corpId:r.corp_id?(MERCHANTS.find(c=>c._uuid===r.corp_id)?.id||''):''
  }));
  // brands.status計算: activeなvenueが1件以上あればactive、なければsuspended
  BRANDS.forEach(function(b){
    var hasActiveVenue = VENUES.some(function(v){
      return v.brandId === b.id && v.status === 'active';
    });
    b.status = hasActiveVenue ? 'active' : 'suspended';
  });
  // Load corporation_brand_relations
  const {data:cbrRaw}=await sb.from('merchant_brand_relations').select('corp_id:merchant_id,brand_id,role');
  CBR=cbrRaw||[];
  // Load staff accounts
  const {data:accRaw}=await sb.from('staff_accounts').select('id,display_id,display_name,email,role,corp_id:merchant_id,status,last_login,created_at');

      corpId:corpDid?corpDid.id:'', status:r.status||'active',
      lastLogin:r.last_login?(new Date(r.last_login).toISOString().split('T')[0]):'—'

  // Load service subscriptions into svcState

  (svcRaw||[]).forEach(r=>{
    const did=uuidToDisplayId[r.entity_id];
    if(did)setSvc(did,r.service_key,true);
  });
}

// ===== BULK VERIFICATION EMAIL (Phase 3) =====
async function checkUnverifiedCount() {
  try {
    const { count, error } = await sb.from('members')
      .select('id', { count: 'exact', head: true })
      .is('verification_grace_sent_at', null);
    const statusEl = document.getElementById('bulkVerifyStatus');
    if (statusEl) {
      statusEl.innerHTML = '未通知の未認証会員: <strong>' + (count || 0) + '件</strong>';
    }
  } catch (e) {}
}
async function sendBulkVerificationEmails() {
  const btn = document.getElementById('bulkVerifyBtn');
  const resultEl = document.getElementById('bulkVerifyResult');
  if (!btn) return;
  if (!confirm('未認証の既存会員に認証メールを一括送信します。よろしいですか？')) return;
  btn.disabled = true;
  btn.textContent = '送信中...';
  resultEl.style.display = 'none';
  try {
    const resp = await fetch('/api/members/bulk-send-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ batch_size: 100 }),
    });
    const data = await resp.json();
    resultEl.style.display = 'block';
    if (data.success) {
      resultEl.style.background = '#e8f5e9';
      resultEl.style.color = '#2e7d32';
      resultEl.innerHTML = '✅ ' + data.data.message + (data.data.total_remaining > 0 ? '<br>残り: ' + data.data.total_remaining + '件' : '');
      showToast('✅ 認証メール送信完了');
      checkUnverifiedCount();
    } else {
      resultEl.style.background = '#fce4ec';
      resultEl.style.color = '#c62828';
      resultEl.textContent = '❌ ' + (data.error || '送信に失敗しました');
    }
  } catch (e) {
    resultEl.style.display = 'block';
    resultEl.style.background = '#fce4ec';
    resultEl.style.color = '#c62828';
    resultEl.textContent = '❌ エラー: ' + e.message;
  }
  btn.disabled = false;

}

async function createStripeAccount(corpId){
  const c=MERCHANTS.find(x=>x.id===corpId);
  if(!c){showToast('⚠️ 法人が見つかりません');return;}
  if(c.stripe_account_id){showToast('ℹ️ 既にStripe連携済みです');return;}

  // 確認ダイアログ
  if(!confirm('Stripe Connect Expressアカウントを作成します。\n\n法人名: '+c.name+'\nメール: '+c.rep_email+'\n\n続行しますか？')) return;

  var btn=document.querySelector('button[onclick*="createStripeAccount"]');
  if(btn){btn.disabled=true;btn.textContent='作成中...';}
  showToast('⏳ Stripe アカウント作成中...');

  try{
    // Supabase Edge Function を呼び出して Express アカウントを作成
    const res=await fetch(SUPABASE_URL+'/functions/v1/stripe-connect-create',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+(await getToken())
      },
      body:JSON.stringify({
        corp_id:corpId,
        business_name:c.name,
        email:c.rep_email
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:'不明なエラー'}));
      throw new Error(err.error||'アカウント作成に失敗しました');
    }

    const data=await res.json();
    // account_id をローカルデータに反映
    c.stripe_account_id=data.account_id;

    showToast('✅ Stripeアカウントを作成しました');
    renderPage();

    // オンボーディングURLがある場合は新しいタブで開く
    if(data.onboarding_url){
      if(confirm('Stripeのオンボーディング画面を開きますか？\n（テスト環境では本人確認はスキップ可能です）')){
        window.open(data.onboarding_url,'_blank');
      }
    }
  }catch(e){
    console.error('Stripe Connect error:',e);
    showToast('❌ '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Stripe Connect 連携';}
  }
}

async function loadDashKPIs(){
  try{
    // Fetch orders for date range
    var q=sb.from('orders').select('id,store_id:venue_id,total_amount,payment_status,customer_id,created_at,application_fee_amount,order_type').gte('created_at',dateRange.from+'T00:00:00').lte('created_at',dateRange.to+'T23:59:59');
    var res=await q;
    var orders=res.data||[];

    var kpiLabels=['法人数','ブランド数','店舗数','月間注文数','月間GMV','手数料収入','MRR'];

    // Update each active category
    KPI_CATS.forEach(function(cat){
      if(!cat.orderType)return; // skip additional
      var filtered=orders.filter(function(o){return o.order_type===cat.orderType;});
      var storeIds=[...new Set(filtered.map(function(o){return o.store_id;}))];
      var matchedStores=VENUES.filter(function(s){return storeIds.includes(s._uuid);});
      var brandIds=[...new Set(matchedStores.map(function(s){return s.brandId;}))];
      var matchedBrands=BRANDS.filter(function(b){return brandIds.includes(b.id);});
      var corpIds=[...new Set(matchedBrands.map(function(b){return b.corpId;}))];
      var matchedCorps=MERCHANTS.filter(function(c){return corpIds.includes(c.id);});

      var orderCount=filtered.length;
      var gmv=filtered.reduce(function(s,o){return s+(o.total_amount||0);},0);
      var fee=Math.round(gmv*cat.feeRate);
      var mrr=fee;

      var values=[matchedCorps.length,matchedBrands.length,matchedStores.length,orderCount.toLocaleString(),Y(gmv),Y(fee),Y(mrr)];

      var el=document.getElementById('dashKpi-'+cat.key);
      if(el){
        var cards=el.children;
        for(var i=0;i<cards.length&&i<values.length;i++){
          var valDiv=cards[i].querySelector('div:last-child');
          if(valDiv)valDiv.textContent=values[i];
        }
      }
    });

    // Product KPIs
    var uniqueCustomers=[...new Set(orders.filter(function(o){return o.customer_id;}).map(function(o){return o.customer_id;}))];
    if(uniqueCustomers.length>0){
      var customerOrderCounts={};
      orders.forEach(function(o){if(o.customer_id){customerOrderCounts[o.customer_id]=(customerOrderCounts[o.customer_id]||0)+1;}});
      var repeatCustomers=Object.values(customerOrderCounts).filter(function(c){return c>=2;}).length;
      var repeatRate=uniqueCustomers.length>0?((repeatCustomers/uniqueCustomers.length)*100).toFixed(1)+'%':'—';
      var rEl=document.getElementById('kpiRepeatRate');
      if(rEl)rEl.textContent=repeatRate;
    }

    // AI adoption
    try{
      var aiRes=await sb.from('ai_interactions').select('id',{count:'exact',head:true}).gte('created_at',dateRange.from+'T00:00:00').lte('created_at',dateRange.to+'T23:59:59');
      var aiCount=aiRes.count||0;
      var totalStores=VENUES.length;
      var aiRate=totalStores>0?((aiCount/totalStores)*100).toFixed(1)+'%':'—';
      var aEl=document.getElementById('kpiAIAdoption');
      if(aEl)aEl.textContent=aiRate+' ('+aiCount+'件)';
    }catch(e){/* ai_interactions table may not exist */}

    // Tech KPI: payment success rate
    var totalOrders=orders.length;
    var paidOrders=orders.filter(function(o){return o.payment_status==='paid';}).length;
    var paymentRate=totalOrders>0?((paidOrders/totalOrders)*100).toFixed(1)+'%':'—';
    var pEl=document.getElementById('kpiPaymentSuccess');
    if(pEl)pEl.textContent=paymentRate;

  }catch(e){/* loadDashKPIs error silenced */}
}

async function loadDashActivity(){

    var levelColors={INFO:{bg:'#e6f9f0',fg:'#00b894'},WARN:{bg:'#ffeaa7',fg:'#d68910'},ERR:{bg:'#fab1a0',fg:'#d63031'}};

      var lv=log.log_level||'INFO';
      var lc=levelColors[lv]||levelColors.INFO;
      var desc=escHtml(log.action||'');
      if(log.entity_type)desc+=' — '+escHtml(log.entity_type);
      h+='<div class="log-row"><span class="log-time">'+escHtml(dt)+'</span><span class="log-badge" style="background:'+lc.bg+';color:'+lc.fg+'">'+escHtml(lv)+'</span>'+desc+'</div>';
    }
    el.innerHTML=h;
  }catch(e){
    el.innerHTML='<div style="color:var(--danger);padding:12px;font-size:12px">読み込みエラー: '+escHtml(e.message)+'</div>';
  }
}

    // Build store_uuid→corp mapping
    var storeCorpMap={};
    VENUES.forEach(function(s){var br=getBrandForVenue(s);var cp=br?getMerchantForBrand(br):null;if(cp)storeCorpMap[s._uuid]=cp.id;});
    // Aggregate GMV by corp
    var corpGMV={};
    MERCHANTS.forEach(function(c){corpGMV[c.id]=0;});
    orders.forEach(function(o){var cid=storeCorpMap[o.store_id];if(cid)corpGMV[cid]+=(o.total_amount||0);});
    var d=MERCHANTS.map(function(c){return{n:c.name.replace(/株式会社|有限会社/g,''),v:corpGMV[c.id]||0};});
    d.sort(function(a,b){return b.v-a.v;});
    var mx=Math.max.apply(null,d.map(function(x){return x.v;}));if(mx===0)mx=1;
    el.innerHTML=d.map(function(x){return '<div class="chart-bar-row"><div class="chart-bar-label">'+x.n.substring(0,8)+'</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+(x.v/mx*100).toFixed(0)+'%;background:var(--accent)"><span class="chart-bar-val">'+Y(x.v)+'</span></div></div></div>';}).join('')||'<div class="empty-state">データなし</div>';
  }catch(e){el.innerHTML='<div class="empty-state">読み込みエラー</div>';}
}

function renderStoresRows(stores){
  return stores.map(s=>{
    var br=getBrandForVenue(s),cp=getMerchantForVenue(s);
    var svcLabels=[];
    if(br && br.hpSettings && br.hpSettings.published) svcLabels.push('BP');
    if(getSvc(s.id,'mo_takeout')) svcLabels.push('TO');
    if(getSvc(s.id,'mo_dinein')) svcLabels.push('DI');
    if(getSvc(s.id,'mo_delivery')) svcLabels.push('Deli');
    var svcs=svcLabels.length
      ? svcLabels.map(function(l){
          return '<span style="display:inline-block;padding:1px 5px;border-radius:3px;'
            +'background:#f0f0f0;color:#555;font-size:10px;font-weight:600;margin-right:2px">'+l+'</span>';
        }).join('')
      : '<span style="color:var(--text-light);font-size:11px">—</span>';
    return '<tr><td><code style="font-size:11px;background:#f5f6fa;padding:2px 6px;border-radius:4px">'+escHtml(s.id)+'</code></td><td style="font-weight:600">'+escHtml(s.name)+'</td><td>'+escHtml(br?br.name:'')+'</td><td>'+escHtml(cp?cp.name:'')+'</td><td>'+svcs+'</td><td>'+statusBadge(s.status)+'</td><td>'+(s.slug?'<a href="https://aiden-jp.net/aiden-order-store.html?store='+escHtml(s.slug)+'" target="_blank" rel="noopener noreferrer" class="btn btn-secondary btn-sm" style="text-decoration:none">🛒 MO</a>':'<span style="color:var(--text-light);font-size:11px">未設定</span>')+'</td><td style="display:flex;gap:4px;justify-content:flex-end"><button class="btn btn-secondary btn-sm" onclick="openVenueModal(\''+s.id+'\')">詳細</button><button class="btn btn-sm" style="background:#d63031;color:#fff" onclick="deleteVenue(\''+s._uuid+'\',\''+escHtml(s.id)+'\')">削除</button></td></tr>';
  }).join('');
}
function filterStoresList(){
  var q=(document.getElementById('storeListSearch').value||'').toLowerCase();
  var filtered=VENUES.filter(function(s){
    if(!q)return true;
    var br=getBrandForVenue(s);
    var cp=getMerchantForVenue(s);
    return s.name.toLowerCase().includes(q)||(br&&br.name.toLowerCase().includes(q))||(cp&&cp.name.toLowerCase().includes(q))||s.id.toLowerCase().includes(q);
  });
  var body=document.getElementById('storeListBody');
  if(body)body.innerHTML=renderStoresRows(filtered);
}

async function menusSelectBrand(brandUuid,brandDisplayId){
  menusState.selectedBrandUuid=brandUuid;
  menusState.selectedBrandDisplayId=brandDisplayId;
  menusState.selectedPatternId=null;
  menusState.patterns=[];
  menusState.products=[];
  menusState.productSizesMap={};
  menusState.categories=[];
  menusRenderBrandList();
  var addPatternBtn=document.getElementById('menusBtnAddPattern');
  if(addPatternBtn)addPatternBtn.disabled=false;
  var addProductBtn=document.getElementById('menusBtnAddProduct');
  if(addProductBtn)addProductBtn.disabled=true;
  try{
    var [pRes,cRes]=await Promise.all([
      sb.from('menu_patterns').select('*').eq('brand_id',brandUuid).order('code'),
      sb.from('categories').select('*').eq('brand_id',brandUuid).order('sort_order').order('name')
    ]);
    if(pRes.error)throw pRes.error;
    if(cRes.error)throw cRes.error;
    menusState.patterns=pRes.data||[];
    menusState.categories=cRes.data||[];
  }catch(e){
    showToast('❌ 読み込みエラー: '+(e.message||e));
    menusState.patterns=[];
    menusState.categories=[];
  }
  menusRenderPatternList();
  menusRenderProductList();
}

function menusRenderPatternList(){
  var el=document.getElementById('menusPatternList');
  if(!el)return;
  if(!menusState.selectedBrandUuid){el.innerHTML='<div class="empty-state">ブランドを選択してください</div>';return;}
  if(!menusState.patterns.length){el.innerHTML='<div class="empty-state">パターンがありません<br><span style="font-size:11px">右上の「＋新規作成」から追加</span></div>';return;}
  el.innerHTML=menusState.patterns.map(function(p){
    var isActive=menusState.selectedPatternId===p.id;
    var bg=isActive?'#f3efff':'#fff';
    var border=isActive?'var(--accent)':'var(--border)';
    var dimmed=p.is_active===false?'opacity:0.55;':'';
    var inactiveTag=p.is_active===false?' <span style="font-size:9px;background:#dfe6e9;color:#636e72;padding:1px 6px;border-radius:4px">無効</span>':'';
    return '<div style="padding:10px 12px;border:1px solid '+border+';border-radius:6px;margin-bottom:6px;background:'+bg+';'+dimmed+'display:flex;align-items:center;gap:8px">'+
      '<div style="flex:1;min-width:0;cursor:pointer" onclick="menusSelectPattern(\''+p.id+'\')">'+
        '<div style="font-weight:700;font-size:12px">'+escHtml(p.name||'')+inactiveTag+'</div>'+
        '<div style="font-size:10px;color:var(--text-light);font-family:monospace;margin-top:2px">'+escHtml(p.code||'')+'</div>'+
      '</div>'+
      '<button class="btn-outline btn-sm" title="編集" onclick="openMenusEditPatternModal(\''+p.id+'\')">✏️</button>'+
      '<button class="btn-outline btn-sm" title="削除" onclick="deleteMenusPattern(\''+p.id+'\')">🗑️</button>'+
    '</div>';
  }).join('');
}

async function menusSelectPattern(patternId){
  menusState.selectedPatternId=patternId;
  menusState.products=[];
  menusState.productSizesMap={};
  menusRenderPatternList();
  var addProductBtn=document.getElementById('menusBtnAddProduct');
  if(addProductBtn)addProductBtn.disabled=false;
  var el=document.getElementById('menusProductList');
  if(el)el.innerHTML='<div class="empty-state">読み込み中...</div>';
  try{
    var pRes=await sb.from('products').select('id,name,description,image_url,category_id,menu_pattern_id,brand_id').eq('menu_pattern_id',patternId).order('name');
    if(pRes.error)throw pRes.error;
    menusState.products=pRes.data||[];
    if(menusState.products.length){
      var prodIds=menusState.products.map(function(p){return p.id;});
      var sRes=await sb.from('product_sizes').select('*').in('product_id',prodIds).order('sort_order');
      if(sRes.error)throw sRes.error;
      var map={};
      (sRes.data||[]).forEach(function(s){
        if(!map[s.product_id])map[s.product_id]=[];
        map[s.product_id].push(s);
      });
      menusState.productSizesMap=map;
    }
  }catch(e){
    showToast('❌ 商品読み込みエラー: '+(e.message||e));
    menusState.products=[];
    menusState.productSizesMap={};
  }
  menusRenderProductList();
}

function menusRenderProductList(){
  var el=document.getElementById('menusProductList');
  if(!el)return;
  if(!menusState.selectedPatternId){el.innerHTML='<div class="empty-state">パターンを選択してください</div>';return;}
  if(!menusState.products.length){el.innerHTML='<div class="empty-state">商品がありません<br><span style="font-size:11px">右上の「＋商品追加」から追加</span></div>';return;}
  var html='<div style="display:flex;flex-direction:column;gap:8px">';
  menusState.products.forEach(function(p){
    var sizes=menusState.productSizesMap[p.id]||[];
    var cat=menusState.categories.find(function(c){return c.id===p.category_id;});
    var catName=cat?cat.name:'—';
    var imgHtml;
    if(p.image_url){
      imgHtml='<div style="width:56px;height:56px;border-radius:6px;background-color:#f5f5f5;background-image:url('+JSON.stringify(p.image_url)+');background-size:cover;background-position:center;flex-shrink:0"></div>';
    }else{
      imgHtml='<div style="width:56px;height:56px;border-radius:6px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🍽</div>';
    }
    var priceInfo;
    if(sizes.length===0){
      priceInfo='<span style="font-size:10px;color:var(--danger)">価格未設定</span>';
    }else if(sizes.length===1){
      priceInfo='<span style="font-size:13px;font-weight:800;color:var(--accent)">'+Y(sizes[0].price)+'</span>';
    }else{
      priceInfo='<span style="font-size:11px;font-weight:600;color:var(--text-light)">サイズあり ('+sizes.length+'件)</span>';
    }
    var sizeDetail='';
    if(sizes.length>1){
      sizeDetail='<div style="font-size:10px;color:var(--text-light);margin-top:4px">'+
        sizes.map(function(s){return escHtml(s.name)+':'+Y(s.price);}).join(' / ')+
      '</div>';
    }
    html+='<div style="display:flex;align-items:center;gap:12px;padding:10px;border:1px solid var(--border);border-radius:8px;background:#fff">'+
      imgHtml+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-weight:700;font-size:13px">'+escHtml(p.name||'')+'</div>'+
        '<div style="font-size:10px;color:var(--text-light);margin-top:2px">'+escHtml(catName)+'</div>'+
        sizeDetail+
      '</div>'+
      '<div style="text-align:right;min-width:80px">'+priceInfo+'</div>'+
      '<div style="display:flex;gap:4px;flex-shrink:0">'+
        '<button class="btn-outline btn-sm" title="編集" onclick="openMenusEditProductModal(\''+p.id+'\')">✏️</button>'+
        '<button class="btn-outline btn-sm" title="削除" onclick="deleteMenusProduct(\''+p.id+'\')">🗑️</button>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

// ----- Pattern CRUD -----
async function openMenusAddPatternModal(){
  if(!menusState.selectedBrandUuid){showToast('⚠️ ブランドを選択してください');return;}
  var nextCode='MP-001';
  try{
    var d=await sb.from('menu_patterns').select('code').eq('brand_id',menusState.selectedBrandUuid).order('code',{ascending:false}).limit(1);
    if(d.data&&d.data.length){
      var m=/MP-(\d+)/.exec(d.data[0].code||'');
      if(m){var num=parseInt(m[1],10)||0;nextCode='MP-'+String(num+1).padStart(3,'0');}
    }
  }catch(e){}
  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>メニューパターン追加</h3>'+
    '<div class="form-grid">'+
      '<div class="form-group"><label>コード</label><input type="text" id="menusNewPatternCode" value="'+escHtml(nextCode)+'" readonly style="background:#f5f6fa"></div>'+
      '<div class="form-group"><label>パターン名 <span style="color:var(--danger)">*</span></label><input type="text" id="menusNewPatternName" placeholder="例: ランチメニュー"></div>'+
    '</div>'+
    '<div class="btn-group">'+
      '<button class="btn btn-primary" onclick="saveMenusNewPattern()">追加</button>'+
      '<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>'+
    '</div>'
  );
  setTimeout(function(){var el=document.getElementById('menusNewPatternName');if(el)el.focus();},50);
}

async function saveMenusNewPattern(){
  if(!menusState.selectedBrandUuid){showToast('⚠️ ブランドが選択されていません');return;}
  var name=((document.getElementById('menusNewPatternName')||{}).value||'').trim();
  var code=((document.getElementById('menusNewPatternCode')||{}).value||'').trim();
  if(!name){showToast('⚠️ パターン名は必須です');return;}
  try{
    var r=await sb.from('menu_patterns').insert({brand_id:menusState.selectedBrandUuid,code:code,name:name,is_active:true}).select().single();
    if(r.error)throw r.error;
    logAudit('create_menu_pattern','menu_patterns',r.data?r.data.id:null,{code:code,name:name,brand_id:menusState.selectedBrandUuid});
    closeModal();
    showToast('✅ メニューパターンを追加しました');
    var p=await sb.from('menu_patterns').select('*').eq('brand_id',menusState.selectedBrandUuid).order('code');
    menusState.patterns=p.data||[];
    menusRenderPatternList();
  }catch(e){
    showToast('❌ 保存に失敗しました: '+(e.message||e));
  }
}

function openMenusEditPatternModal(patternId){
  var p=menusState.patterns.find(function(x){return x.id===patternId;});

  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>メニューパターン編集</h3>'+
    '<div class="form-grid">'+

async function saveMenusEditPattern(patternId){
  var name=((document.getElementById('menusEditPatternName')||{}).value||'').trim();
  if(!name){showToast('⚠️ パターン名は必須です');return;}
  var isActive=document.getElementById('menusEditPatternActive')?document.getElementById('menusEditPatternActive').checked:true;
  try{
    var r=await sb.from('menu_patterns').update({name:name,is_active:isActive}).eq('id',patternId).select();
    if(r.error)throw r.error;
    if(!r.data||!r.data.length)throw new Error('更新権限がないか対象が見つかりません');
    logAudit('update_menu_pattern','menu_patterns',patternId,{name:name,is_active:isActive});
    closeModal();
    showToast('✅ メニューパターンを更新しました');
    var idx=menusState.patterns.findIndex(function(x){return x.id===patternId;});
    if(idx>=0)menusState.patterns[idx]=Object.assign({},menusState.patterns[idx],r.data[0]);
    menusRenderPatternList();
  }catch(e){
    showToast('❌ 更新に失敗しました: '+(e.message||e));
  }
}

async function deleteMenusPattern(patternId){
  var p=menusState.patterns.find(function(x){return x.id===patternId;});
  if(!p){showToast('⚠️ パターンが見つかりません');return;}
  if(!confirm('パターン「'+p.name+'」を削除します。\nこのパターンと紐づく商品をすべて削除します。よろしいですか？'))return;
  try{
    var pr=await sb.from('products').select('id').eq('menu_pattern_id',patternId);
    if(pr.error)throw pr.error;
    var pids=(pr.data||[]).map(function(x){return x.id;});
    if(pids.length){
      var sDel=await sb.from('product_sizes').delete().in('product_id',pids);
      if(sDel.error)throw sDel.error;
      var pDel=await sb.from('products').delete().in('id',pids);
      if(pDel.error)throw pDel.error;
    }
    var mpDel=await sb.from('menu_patterns').delete().eq('id',patternId).select();
    if(mpDel.error)throw mpDel.error;
    if(!mpDel.data||!mpDel.data.length)throw new Error('削除権限がないか対象が見つかりません');
    logAudit('delete_menu_pattern','menu_patterns',patternId,{products_deleted:pids.length});
    showToast('✅ メニューパターンを削除しました');
    menusState.patterns=menusState.patterns.filter(function(x){return x.id!==patternId;});
    if(menusState.selectedPatternId===patternId){
      menusState.selectedPatternId=null;
      menusState.products=[];
      menusState.productSizesMap={};
      var btn=document.getElementById('menusBtnAddProduct');
      if(btn)btn.disabled=true;
    }
    menusRenderPatternList();
    menusRenderProductList();
  }catch(e){
    showToast('❌ 削除に失敗しました: '+(e.message||e));
  }
}

function _renderMenusProductModal(product){

  var pdesc=isEdit?(product.description||''):'';
  var catName='';
  if(isEdit&&product.category_id){
    var cat=menusState.categories.find(function(c){return c.id===product.category_id;});
    if(cat)catName=cat.name;
  }
  var sizes=isEdit?(menusState.productSizesMap[product.id]||[]):[];
  var currentImageUrl=isEdit?(product.image_url||''):'';
  var hasSize=sizes.length>0;
  var catOptions=menusState.categories.map(function(c){return '<option value="'+escHtml(c.name)+'">';}).join('');
  var previewStyle='width:100px;height:100px;border:1px solid var(--border);border-radius:8px;background-color:#f5f5f5;';
  if(currentImageUrl){
    previewStyle+='background-image:url('+JSON.stringify(currentImageUrl)+');background-size:cover;background-position:center';
  }else{
    previewStyle+='display:flex;align-items:center;justify-content:center;font-size:32px;color:#ccc';
  }
  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>'+title+'</h3>'+
    '<div class="form-grid">'+
      '<div class="form-group full"><label>商品名 <span style="color:var(--danger)">*</span></label><input type="text" id="menusProdName" value="'+escHtml(pname)+'" placeholder="例: 特選カルビ"></div>'+
      '<div class="form-group"><label>カテゴリ</label><input type="text" id="menusProdCategory" list="menusProdCatList" value="'+escHtml(catName)+'" placeholder="例: 焼肉（新規入力可）"><datalist id="menusProdCatList">'+catOptions+'</datalist></div>'+
      '<div class="form-group" id="menusProdPriceGroup"'+(hasSize?' style="display:none"':'')+'><label>価格 (サイズなし時) <span style="color:var(--danger)">*</span></label><input type="number" id="menusProdPrice" value="" placeholder="例: 1280" min="0"></div>'+
      '<div class="form-group full"><label>説明</label><textarea id="menusProdDesc" rows="2" placeholder="商品の説明...">'+escHtml(pdesc)+'</textarea></div>'+
      '<div class="form-group full"><label>商品画像</label>'+
        '<div style="display:flex;gap:12px;align-items:flex-start">'+
          '<div id="menusProdImgPreview" style="'+previewStyle+'">'+(currentImageUrl?'':'🍽')+'</div>'+
          '<div style="flex:1">'+
            '<input type="file" id="menusProdImgFile" accept="image/*" onchange="menusOnImageSelected(event)">'+
            '<p style="font-size:11px;color:var(--text-light);margin-top:6px">JPG / PNG / WebP、最大5MB</p>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="form-group full"><label>サイズ管理 <span style="font-size:10px;color:var(--text-light);font-weight:400">（サイズを1件以上追加すると「価格」欄は無視されます）</span></label>'+
        '<div id="menusProdSizes"></div>'+
        '<button type="button" class="btn-outline btn-sm" style="margin-top:8px" onclick="menusAddSizeRow()">＋ サイズを追加</button>'+
      '</div>'+
    '</div>'+
    '<div class="btn-group">'+
      '<button class="btn btn-primary" onclick="menusSaveProduct('+(isEdit?('\''+product.id+'\''):'null')+')">保存</button>'+
      '<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>'+
    '</div>'
  ,true);

function menusAddSizeRow(sizeName,sizePrice){
  var container=document.getElementById('menusProdSizes');
  if(!container)return;
  var rowId='menusSizeRow_'+Math.random().toString(36).slice(2,10);
  var row=document.createElement('div');
  row.id=rowId;
  row.className='menus-size-row';
  row.style.cssText='display:flex;gap:8px;margin-bottom:6px;align-items:center';
  var nameVal=typeof sizeName==='string'?sizeName:'';
  var priceVal=(typeof sizePrice==='number'||typeof sizePrice==='string')?sizePrice:'';
  row.innerHTML=
    '<input type="text" class="menus-size-name" placeholder="サイズ名 (例: S, M, L)" value="'+escHtml(String(nameVal))+'" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">'+
    '<input type="number" class="menus-size-price" placeholder="価格" value="'+escHtml(String(priceVal))+'" min="0" style="width:120px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">'+
    '<button type="button" class="btn btn-sm" style="background:#fab1a0;color:#d63031" onclick="menusRemoveSizeRow(\''+rowId+'\')">×</button>';
  container.appendChild(row);
  _menusUpdatePriceFieldVisibility();
}

function menusRemoveSizeRow(rowId){
  var row=document.getElementById(rowId);
  if(row&&row.parentNode)row.parentNode.removeChild(row);
  _menusUpdatePriceFieldVisibility();
}

function _menusUpdatePriceFieldVisibility(){
  var container=document.getElementById('menusProdSizes');
  var priceGroup=document.getElementById('menusProdPriceGroup');
  if(!container||!priceGroup)return;
  var hasSize=container.querySelectorAll('.menus-size-row').length>0;
  priceGroup.style.display=hasSize?'none':'';
}

function menusOnImageSelected(e){
  var file=e.target.files&&e.target.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){
    showToast('⚠️ 画像サイズは5MB以下にしてください');
    e.target.value='';
    return;
  }
  if(!/^image\//.test(file.type)){
    showToast('⚠️ 画像ファイルを選択してください');
    e.target.value='';
    return;
  }
  menusImageUploadState.file=file;
  var preview=document.getElementById('menusProdImgPreview');
  if(preview){
    var url=URL.createObjectURL(file);
    preview.style.backgroundImage='url('+JSON.stringify(url)+')';
    preview.style.backgroundSize='cover';
    preview.style.backgroundPosition='center';
    preview.innerHTML='';
  }
}

async function menusUploadProductImage(file,brandUuid){
  var ts=Date.now();
  var safeName=(file.name||'image').replace(/[^a-zA-Z0-9._-]/g,'_');
  var path=brandUuid+'/'+ts+'_'+safeName;
  var up=await sb.storage.from('menu-images').upload(path,file,{cacheControl:'3600',upsert:false});
  if(up.error)throw up.error;
  var pub=sb.storage.from('menu-images').getPublicUrl(path);
  return pub.data.publicUrl;
}

async function menusGetOrCreateCategory(catName,brandUuid){
  if(!catName||!catName.trim())return null;
  var trimmed=catName.trim();
  var existing=menusState.categories.find(function(c){return c.name===trimmed;});
  if(existing)return existing.id;
  var maxSort=menusState.categories.reduce(function(m,c){return Math.max(m,c.sort_order||0);},0);
  var r=await sb.from('categories').insert({brand_id:brandUuid,name:trimmed,sort_order:maxSort+1}).select().single();
  if(r.error)throw r.error;
  menusState.categories.push(r.data);
  return r.data.id;
}

async function menusSaveProduct(productId){
  if(!menusState.selectedBrandUuid||!menusState.selectedPatternId){
    showToast('⚠️ ブランドとパターンを選択してください');
    return;
  }
  var name=((document.getElementById('menusProdName')||{}).value||'').trim();
  var catName=((document.getElementById('menusProdCategory')||{}).value||'').trim();
  var desc=((document.getElementById('menusProdDesc')||{}).value||'').trim();
  if(!name){showToast('⚠️ 商品名は必須です');return;}
  var container=document.getElementById('menusProdSizes');
  var sizeRows=container?container.querySelectorAll('.menus-size-row'):[];
  var sizes=[];
  for(var i=0;i<sizeRows.length;i++){
    var nameEl=sizeRows[i].querySelector('.menus-size-name');
    var priceEl=sizeRows[i].querySelector('.menus-size-price');
    var sn=((nameEl&&nameEl.value)||'').trim();
    var sp=parseInt(priceEl&&priceEl.value,10);
    if(!sn){showToast('⚠️ サイズ名を入力してください');return;}
    if(isNaN(sp)||sp<0){showToast('⚠️ サイズ「'+sn+'」の価格を正しく入力してください');return;}
    sizes.push({name:sn,price:sp,sort_order:i+1});
  }
  if(sizes.length===0){
    var singlePriceStr=(document.getElementById('menusProdPrice')||{}).value;
    var singlePrice=parseInt(singlePriceStr,10);
    if(isNaN(singlePrice)||singlePrice<0){showToast('⚠️ 価格またはサイズを入力してください');return;}
    sizes.push({name:'通常',price:singlePrice,sort_order:1});
  }
  try{
    var imageUrl=null;
    if(menusImageUploadState.file){
      imageUrl=await menusUploadProductImage(menusImageUploadState.file,menusState.selectedBrandUuid);
    }else if(menusImageUploadState.currentUrl){
      imageUrl=menusImageUploadState.currentUrl;
    }
    var categoryId=await menusGetOrCreateCategory(catName,menusState.selectedBrandUuid);
    var payload={
      name:name,
      description:desc||null,
      category_id:categoryId,
      brand_id:menusState.selectedBrandUuid,
      menu_pattern_id:menusState.selectedPatternId
    };
    if(imageUrl!==null)payload.image_url=imageUrl;
    var savedProductId;
    if(productId){
      var u=await sb.from('products').update(payload).eq('id',productId).select().single();
      if(u.error)throw u.error;
      savedProductId=productId;
      var dRes=await sb.from('product_sizes').delete().eq('product_id',savedProductId);
      if(dRes.error)throw dRes.error;
      logAudit('update_product','products',savedProductId,{name:name,sizes:sizes.length});
    }else{
      var ins=await sb.from('products').insert(payload).select().single();
      if(ins.error)throw ins.error;
      savedProductId=ins.data.id;
      logAudit('create_product','products',savedProductId,{name:name,sizes:sizes.length});
    }
    var sizePayload=sizes.map(function(s){return {product_id:savedProductId,name:s.name,price:s.price,sort_order:s.sort_order};});
    var si=await sb.from('product_sizes').insert(sizePayload);
    if(si.error)throw si.error;
    closeModal();
    showToast(productId?'✅ 商品を更新しました':'✅ 商品を追加しました');
    await menusSelectPattern(menusState.selectedPatternId);
  }catch(e){
    showToast('❌ '+(productId?'更新':'保存')+'に失敗しました: '+(e.message||e));
  }
}

async function deleteMenusProduct(productId){
  var p=menusState.products.find(function(x){return x.id===productId;});
  if(!p){showToast('⚠️ 商品が見つかりません');return;}
  if(!confirm('商品「'+p.name+'」を削除します。よろしいですか？'))return;
  try{
    var s=await sb.from('product_sizes').delete().eq('product_id',productId);
    if(s.error)throw s.error;
    var d=await sb.from('products').delete().eq('id',productId).select();
    if(d.error)throw d.error;
    if(!d.data||!d.data.length)throw new Error('削除権限がないか対象が見つかりません');
    logAudit('delete_product','products',productId,{name:p.name});
    showToast('✅ 商品を削除しました');
    menusState.products=menusState.products.filter(function(x){return x.id!==productId;});
    delete menusState.productSizesMap[productId];
    menusRenderProductList();
  }catch(e){
    showToast('❌ 削除に失敗しました: '+(e.message||e));
  }
}

async function loadUsersData(){
  try{
    var [membersRes,guestsRes,bansRes]=await Promise.all([
      sb.from('members').select('id,display_id,full_name,email,phone,rank,points_balance,brand_id,created_at').order('created_at',{ascending:false}).limit(100),
      sb.from('orders').select('guest_email,guest_phone,order_type,created_at,store_id:venue_id').not('guest_email','is',null).order('created_at',{ascending:false}).limit(200),
      sb.from('user_bans').select('*').order('created_at',{ascending:false})
    ]);
    MEMBERS_DATA=(membersRes.data||[]).map(function(m){
      var brand=BRANDS.find(function(b){return b._uuid===m.brand_id;});
      return {id:m.display_id||m.id.substring(0,8),_uuid:m.id,name:m.full_name||'—',email:m.email||'',phone:m.phone||'',rank:m.rank||'レギュラー',points:m.points_balance||0,brandName:brand?brand.name:'—',joined:(m.created_at||'').split('T')[0]};
    });
    var guestMap={};
    (guestsRes.data||[]).forEach(function(o){
      var key=o.guest_email;if(!key)return;
      if(!guestMap[key])guestMap[key]={email:key,orderCount:0,lastOrder:'',brandNames:new Set()};
      guestMap[key].orderCount++;
      var d=(o.created_at||'').split('T')[0];
      if(d>guestMap[key].lastOrder)guestMap[key].lastOrder=d;
      var store=VENUES.find(function(s){return s._uuid===o.store_id;});
      if(store){var br=getBrandForVenue(store);if(br)guestMap[key].brandNames.add(br.name);}
    });
    GUESTS_DATA=Object.values(guestMap).map(function(g,i){
      return {id:'GST-'+String(i+1).padStart(5,'0'),orderCount:g.orderCount,lastOrder:g.lastOrder,brandName:Array.from(g.brandNames).join(', ')||'—'};
    });
    BANS=(bansRes.data||[]).map(function(b){
      return {_uuid:b.id,id:b.id.substring(0,12),email:b.target_email||'',ban_type:b.scope_type==='global'?'global':'store_specific',scope_type:b.scope_type,scope_id:b.scope_id,target_type:b.target_type,target_id:b.target_id,reason:b.reason||'',banned_services:b.banned_services||[],ban_effect:b.ban_type,banned_at:(b.created_at||'').split('T')[0],expires_at:b.expires_at,is_active:b.is_active!==false,unbanned_at:b.unbanned_at,unban_reason:b.unban_reason};
    });
  }catch(e){/* silently handle missing tables */}
}

function renderMembersList(){
  var searchEl=document.getElementById('memberSearchInput');
  var q=searchEl?searchEl.value.trim().toLowerCase():'';
  var filtered=MEMBERS_DATA.filter(function(m){
    if(!q)return true;
    return (m.id+' '+m.name+' '+m.email+' '+m.phone+' '+m.brandName).toLowerCase().indexOf(q)>=0;
  });
  // sort
  filtered.sort(function(a,b){
    var va=a[memberSort.col]||'';var vb=b[memberSort.col]||'';
    if(memberSort.col==='points'){va=a.points;vb=b.points;return memberSort.asc?va-vb:vb-va;}
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb)return memberSort.asc?-1:1;
    if(va>vb)return memberSort.asc?1:-1;
    return 0;
  });
  var countEl=document.getElementById('memberCount');
  if(countEl)countEl.textContent=filtered.length;
  var total=filtered.length;
  var start=userMemberPage*USER_PAGE_SIZE;
  var page=filtered.slice(start,start+USER_PAGE_SIZE);
  var container=document.getElementById('memberListContainer');
  if(!container)return;
  if(total===0){container.innerHTML='<div class="empty-state">会員データがありません</div>';return;}
  var sortIcon=function(col){return memberSort.col===col?(memberSort.asc?' ▲':' ▼'):'';};
  container.innerHTML='<table class="data-table"><thead><tr>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'id\')">ID'+sortIcon('id')+'</th>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'name\')">氏名'+sortIcon('name')+'</th>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'email\')">メール'+sortIcon('email')+'</th>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'phone\')">電話番号'+sortIcon('phone')+'</th>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'brandName\')">ブランド'+sortIcon('brandName')+'</th>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'rank\')">ランク'+sortIcon('rank')+'</th>'+
    '<th class="r" style="cursor:pointer" onclick="sortMembers(\'points\')">ポイント'+sortIcon('points')+'</th>'+
    '<th style="cursor:pointer" onclick="sortMembers(\'joined\')">登録日'+sortIcon('joined')+'</th>'+
  '</tr></thead><tbody>'+
  page.map(function(m){
    return '<tr><td><code style="font-size:11px;background:#f5f6fa;padding:2px 6px;border-radius:4px">'+escHtml(m.id)+'</code></td>'+
      '<td style="font-weight:600">'+escHtml(m.name)+'</td>'+
      '<td>'+escHtml(m.email)+'</td>'+
      '<td>'+escHtml(m.phone)+'</td>'+
      '<td>'+escHtml(m.brandName)+'</td>'+

      '<td class="r fw-800">'+m.points.toLocaleString()+'</td>'+
      '<td>'+escHtml(m.joined)+'</td></tr>';
  }).join('')+'</tbody></table>'+
  paginationHtml(total,userMemberPage,'userMemberPage','renderMembersList');
}

function sortMembers(col){
  if(memberSort.col===col){memberSort.asc=!memberSort.asc;}else{memberSort.col=col;memberSort.asc=true;}

}

    '<button class="btn btn-secondary btn-sm" onclick="'+pageVar+'=Math.max(0,'+pageVar+'-1);'+renderFn+'()" '+(page<=0?'disabled':'')+'>← 前へ</button>'+
    '<span>'+(page+1)+' / '+totalPages+'</span>'+
    '<button class="btn btn-secondary btn-sm" onclick="'+pageVar+'=Math.min('+(totalPages-1)+','+pageVar+'+1);'+renderFn+'()" '+(page>=totalPages-1?'disabled':'')+'>次へ →</button>'+

// ===== BAN MANAGEMENT =====
let banFilter={type:'all',status:'active',search:''};
const BAN_REASON_CATS={fraud:'不正注文',prank:'いたずら注文',payment_refusal:'支払い拒否',harassment:'迷惑行為',other:'その他'};

function getBanStatus(b){
  if(!b.is_active && b.unbanned_at) return 'unbanned';
  if(b.expires_at && new Date(b.expires_at)<new Date() && b.is_active) return 'expired';
  if(b.is_active) return 'active';
  return 'unbanned';
}
function banStatusBadge(s){
  if(s==='active') return '<span class="status status-active">有効</span>';
  if(s==='unbanned') return '<span class="status" style="background:#dfe6e9;color:#636e72">解除済み</span>';
  if(s==='expired') return '<span class="status" style="background:#ffeaa7;color:#d68910">期限切れ</span>';
  return '<span class="status">'+s+'</span>';
}
function banTypeBadge(t){
  if(t==='global') return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#d6303120;color:#d63031">グローバル</span>';
  if(t==='corporation') return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#6c5ce720;color:#6c5ce7">法人</span>';
  if(t==='brand') return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#e1705520;color:#e17055">ブランド</span>';
  return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#0984e320;color:#0984e3">店舗</span>';
}

function renderBanTab(){

      var filterType=b.scope_type==='global'?'global':'store_specific';
      if(banFilter.type!==filterType) return false;
    }
    var st=getBanStatus(b);
    if(banFilter.status==='active' && st!=='active') return false;
    if(banFilter.status==='unbanned' && st!=='unbanned') return false;
    if(banFilter.status==='expired' && st!=='expired') return false;
    if(banFilter.search){var q=banFilter.search.toLowerCase();if(!b.email.toLowerCase().includes(q)) return false;}
    return true;
  });
  var activeCount=BANS.filter(function(b){return getBanStatus(b)==='active';}).length;
  var globalCount=BANS.filter(function(b){return b.scope_type==='global'&&getBanStatus(b)==='active';}).length;

  '</div>'+

  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">'+
    '<input class="menu-search" placeholder="🔍 メールアドレスで検索..." style="width:240px" value="'+escHtml(banFilter.search)+'" oninput="banFilter.search=this.value;refreshBanTab()">'+
    '<select class="menu-search" style="width:auto;padding:7px 10px" onchange="banFilter.type=this.value;refreshBanTab()">'+
      '<option value="all"'+(banFilter.type==='all'?' selected':'')+'>種別: すべて</option>'+
      '<option value="global"'+(banFilter.type==='global'?' selected':'')+'>グローバル</option>'+
      '<option value="store_specific"'+(banFilter.type==='store_specific'?' selected':'')+'>店舗限定</option>'+
    '</select>'+
    '<select class="menu-search" style="width:auto;padding:7px 10px" onchange="banFilter.status=this.value;refreshBanTab()">'+
      '<option value="active"'+(banFilter.status==='active'?' selected':'')+'>ステータス: 有効</option>'+
      '<option value="unbanned"'+(banFilter.status==='unbanned'?' selected':'')+'>解除済み</option>'+
      '<option value="expired"'+(banFilter.status==='expired'?' selected':'')+'>期限切れ</option>'+
      '<option value="all"'+(banFilter.status==='all'?' selected':'')+'>すべて</option>'+
    '</select>'+
    '<span style="font-size:11px;color:var(--text-light);margin-left:auto">'+filtered.length+'件表示</span>'+
  '</div>'+
  (filtered.length===0?'<div class="empty-state">該当するBANレコードはありません</div>':
  '<table class="data-table"><thead><tr><th>メールアドレス</th><th>種別</th><th>対象</th><th>理由</th><th>登録日</th><th>期限</th><th>ステータス</th><th></th></tr></thead><tbody>'+
  filtered.map(function(b){
    var st=getBanStatus(b);
    var expStr=b.expires_at?b.expires_at:'無期限';
    var scopeStr='—';
    if(b.scope_type==='store'){var s=VENUES.find(function(x){return x._uuid===b.scope_id;});scopeStr=s?s.name:escHtml(b.scope_id||'');}
    else if(b.scope_type==='brand'){var br=BRANDS.find(function(x){return x._uuid===b.scope_id;});scopeStr=br?br.name:escHtml(b.scope_id||'');}
    else if(b.scope_type==='corporation'){var cp=MERCHANTS.find(function(x){return x._uuid===b.scope_id;});scopeStr=cp?cp.name:escHtml(b.scope_id||'');}
    return '<tr style="'+(st!=='active'?'opacity:.6':'')+'"><td style="font-weight:600">'+escHtml(b.email)+'</td><td>'+banTypeBadge(b.scope_type)+'</td><td>'+escHtml(scopeStr)+'</td><td><span style="font-size:11px">'+escHtml(b.reason)+'</span></td><td>'+escHtml(b.banned_at)+'</td><td>'+escHtml(expStr)+'</td><td>'+banStatusBadge(st)+'</td><td>'+
    (st==='active'?'<button class="btn btn-secondary btn-sm" onclick="openUnbanModal(\''+escHtml(b._uuid||b.id)+'\')">解除</button>':
     (st==='unbanned'?'<span style="font-size:10px;color:var(--text-light)" title="'+escHtml(b.unban_reason||'')+'">解除済</span>':'<span style="font-size:10px;color:var(--text-light)">期限切れ</span>'))+
    '</td></tr>';
  }).join('')+
  '</tbody></table>')+
  '</div>'+
  '<div class="card"><div class="card-title">📋 BAN種別について</div><div style="font-size:12px;line-height:1.8;color:var(--text-light)">'+
    '<p><strong style="color:var(--danger)">グローバルBAN</strong>：全加盟店でそのメールアドレスからの注文・会員登録をブロック</p>'+
    '<p><strong style="color:var(--info)">店舗限定BAN</strong>：指定した店舗のみでブロック（他店舗では注文可能）</p>'+

async function saveBan(){
  var email=document.getElementById('banEmail').value.trim();
  var reasonDetail=document.getElementById('banReasonDetail').value.trim();
  if(!email||!email.includes('@')){showToast('⚠️ 有効なメールアドレスを入力してください');return;}
  if(!reasonDetail){showToast('⚠️ 理由の詳細は必須です');return;}

  var banType=document.getElementById('banType').value;
  var reasonCat=document.getElementById('banReasonCat').value;
  var reason=(BAN_REASON_CATS[reasonCat]||'その他')+'：'+reasonDetail;
  var expiryVal=document.getElementById('banExpiry').value;
  var expiresAt=null;
  if(expiryVal==='custom'){
    expiresAt=document.getElementById('banCustomDate').value;
    if(!expiresAt){showToast('⚠️ 期限日を選択してください');return;}
  } else if(expiryVal!=='permanent'){
    var d=new Date();d.setDate(d.getDate()+parseInt(expiryVal));
    expiresAt=d.toISOString().split('T')[0];
  }

  try{
    if(banType==='store_specific'){
      var sel=document.getElementById('banStoreSelect');
      var selectedStores=Array.from(sel.selectedOptions);
      if(selectedStores.length===0){showToast('⚠️ 対象店舗を選択してください');return;}
      if(!confirm('以下のBANを実行します：\n\nメール: '+email+'\n種別: 店舗限定（'+selectedStores.length+'店舗）\n理由: '+reason+'\n\n実行しますか？')) return;
      var rows=selectedStores.map(function(opt){
        var store=VENUES.find(function(s){return s.id===opt.value;});
        return {target_type:'guest',target_email:email,scope_type:'store',scope_id:store?store._uuid:null,ban_type:'all_except_dinein',reason:reason,is_active:true,expires_at:expiresAt};
      });
      var {error}=await sb.from('user_bans').insert(rows);
      if(error)throw error;
      rows.forEach(function(r){logAudit('ban_user','user_bans',null,{email:email,scope_type:'store',scope_id:r.scope_id,reason:reason});});
    } else {
      if(!confirm('以下のBANを実行します：\n\nメール: '+email+'\n種別: グローバルBAN（全加盟店）\n理由: '+reason+'\n\n実行しますか？')) return;
      var {error}=await sb.from('user_bans').insert({target_type:'guest',target_email:email,scope_type:'global',scope_id:null,ban_type:'all_except_dinein',reason:reason,is_active:true,expires_at:expiresAt});
      if(error)throw error;
      logAudit('ban_user','user_bans',null,{email:email,scope_type:'global',reason:reason});
    }
    closeModal();showToast('⛔ BANを追加しました');
    await loadUsersData();refreshBanTab();
  }catch(e){showToast('⚠️ '+e.message);}
}

function openUnbanModal(banId){
  var b=BANS.find(function(x){return x._uuid===banId||x.id===banId;});if(!b) return;
  var scopeLabel=b.scope_type==='global'?'グローバル':banTypeBadge(b.scope_type);
  openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>🔓 BAN解除</h3>'+
    '<div style="background:#f5f6fa;border-radius:8px;padding:14px;margin-bottom:16px;font-size:12px">'+
      '<div style="margin-bottom:6px"><strong>メール:</strong> '+escHtml(b.email)+'</div>'+
      '<div style="margin-bottom:6px"><strong>種別:</strong> '+scopeLabel+'</div>'+
      '<div style="margin-bottom:6px"><strong>理由:</strong> '+escHtml(b.reason)+'</div>'+
      '<div><strong>登録日:</strong> '+escHtml(b.banned_at)+'</div>'+
    '</div>'+
    '<div class="form-group full"><label>解除理由 <span style="color:var(--danger)">*</span></label><textarea id="unbanReason" placeholder="BAN解除の理由を入力..."></textarea></div>'+

async function executeUnban(banId){
  var reason=document.getElementById('unbanReason').value.trim();
  if(!reason){showToast('⚠️ 解除理由は必須です');return;}
  var b=BANS.find(function(x){return x.id===banId||x._uuid===banId;});
  if(!b)return;
  try{
    var {error}=await sb.from('user_bans').update({is_active:false,unbanned_at:new Date().toISOString().split('T')[0],unban_reason:reason}).eq('id',b._uuid||banId);
    if(error)throw error;
    logAudit('unban','user_bans',b._uuid||banId,{reason:reason});
    closeModal();showToast('🔓 BANを解除しました');
    await loadUsersData();refreshBanTab();
  }catch(e){showToast('⚠️ '+e.message);}
}

// Platform settings cache (loaded from DB)
let PLATFORM_SETTINGS={};

async function loadPlatformSettings(){
  try{
    const{data,error}=await sb.from('platform_settings').select('key,value');
    if(error)throw error;
    PLATFORM_SETTINGS={};
    (data||[]).forEach(function(r){
      // value column is TEXT — try JSON.parse, fall back to raw string
      var v=r.value;
      if(typeof v==='string'){
        try{v=JSON.parse(r.value);}catch(_){/* plain text, keep as-is */}
      }
      PLATFORM_SETTINGS[r.key]=v;
    });
    return PLATFORM_SETTINGS;
  }catch(e){return{};}
}

function getPS(key,fallback){
  if(!(key in PLATFORM_SETTINGS))return fallback;
  var v=PLATFORM_SETTINGS[key];
  return v==null?fallback:v;
}

async function savePlatformSetting(key,value){
  try{
    // Always JSON-encode so booleans/objects/numbers round-trip through TEXT column
    var encoded=JSON.stringify(value);
    const{error}=await sb.from('platform_settings').upsert({key:key,value:encoded},{onConflict:'key'});
    if(error)throw error;
    PLATFORM_SETTINGS[key]=value;
    return true;
  }catch(e){return false;}
}

// Compute period range (from,to) for aiFilter
function getAiPeriodRange(){
  const now=new Date();
  let from,to=now;
  if(aiFilter.period==='thisMonth'){from=new Date(now.getFullYear(),now.getMonth(),1);}
  else if(aiFilter.period==='lastMonth'){from=new Date(now.getFullYear(),now.getMonth()-1,1);to=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);}
  else if(aiFilter.period==='3months'){from=new Date(now.getFullYear(),now.getMonth()-2,1);}
  else{from=new Date(now.getFullYear(),now.getMonth()-5,1);}// 6months
  return{from:from,to:to};
}

// Get previous period range (same length, shifted back)
function getAiPrevPeriodRange(){
  const r=getAiPeriodRange();
  const dur=r.to-r.from;
  return{from:new Date(r.from.getTime()-dur),to:new Date(r.from.getTime()-1)};
}

// Get store UUIDs matching current filter (for DB queries)
function getFilteredStoreUuids(){
  var stores=VENUES;
  if(aiFilter.storeId!=='all'){stores=stores.filter(function(s){return s.id===aiFilter.storeId;});}
  else if(aiFilter.brandId!=='all'){stores=stores.filter(function(s){return s.brandId===aiFilter.brandId;});}
  else if(aiFilter.corpId!=='all'){
    var brandIds=BRANDS.filter(function(b){return b.corpId===aiFilter.corpId;}).map(function(b){return b.id;});
    stores=stores.filter(function(s){return brandIds.indexOf(s.brandId)!==-1;});
  }
  return stores.map(function(s){return s._uuid;}).filter(Boolean);
}

async function renderAICharts(){
  const cardsEl=document.getElementById('aiUsageCards');
  const chartEl=document.getElementById('aiChart');
  // Update KPI cards (load platform_settings targets)
  await loadPlatformSettings();
  var targetAccuracy=getPS('ai_target_accuracy',95.0);
  var targetLatency=getPS('ai_target_latency',2.0);
  var tAccEl=document.getElementById('aiKpiAccuracyTarget');if(tAccEl)tAccEl.textContent=Number(targetAccuracy).toFixed(1)+'%';
  var tLatEl=document.getElementById('aiKpiLatencyTarget');if(tLatEl)tLatEl.textContent=Number(targetLatency).toFixed(1)+'秒';
  // Current + prev period usage counts
  const r=getAiPeriodRange();
  const pr=getAiPrevPeriodRange();
  const storeUuids=getFilteredStoreUuids();
  let curQuery=sb.from('ai_monthly_usage').select('*').gte('month',r.from.toISOString()).lte('month',r.to.toISOString());
  let prevQuery=sb.from('ai_monthly_usage').select('*').gte('month',pr.from.toISOString()).lte('month',pr.to.toISOString());
  if(storeUuids.length>0){curQuery=curQuery.in('venue_id',storeUuids);prevQuery=prevQuery.in('venue_id',storeUuids);}
  const[curRes,prevRes]=await Promise.all([curQuery,prevQuery]);
  const usage=curRes.data||[];
  const prevUsage=prevRes.data||[];
  const curTotal=usage.reduce(function(s,r){return s+(r.usage_count||0);},0);
  const prevTotal=prevUsage.reduce(function(s,r){return s+(r.usage_count||0);},0);
  const kpiCountEl=document.getElementById('aiKpiCount');if(kpiCountEl)kpiCountEl.textContent=curTotal.toLocaleString();
  const kpiDeltaEl=document.getElementById('aiKpiDelta');
  if(kpiDeltaEl){
    if(prevTotal===0){kpiDeltaEl.textContent=curTotal>0?'前期間: 0':'—';kpiDeltaEl.className='sc-change';}
    else{
      const pct=((curTotal-prevTotal)/prevTotal*100);
      const up=pct>=0;
      kpiDeltaEl.textContent=(up?'↑ ':'↓ ')+Math.abs(pct).toFixed(1)+'%';
      kpiDeltaEl.className='sc-change '+(up?'up':'down');
    }
  }
  // Quality/latency: no telemetry pipeline yet in POC — display "—"
  var kpiAcc=document.getElementById('aiKpiAccuracy');if(kpiAcc)kpiAcc.textContent='—';
  var kpiLat=document.getElementById('aiKpiLatency');if(kpiLat)kpiLat.textContent='—';
  // Aggregate by type for the current period
  const byType={};
  usage.forEach(function(rw){byType[rw.interaction_type]=(byType[rw.interaction_type]||0)+(rw.usage_count||0);});
  if(cardsEl){
    cardsEl.innerHTML=Object.entries(AI_FEATURES_P04).map(function(entry){
      var key=entry[0],cfg=entry[1];
      var used=byType[key]||0;
      if(cfg.todo){
        return '<div style="background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px dashed #e0d8fc">'+
          '<div style="font-size:12px;font-weight:700;margin-bottom:8px">'+escHtml(cfg.name)+' <span style="font-size:9px;color:#e17055">(無料枠TODO)</span></div>'+
          '<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:8px"><span style="font-size:24px;font-weight:800">'+used+'</span><span style="font-size:12px;color:var(--text-light)">回</span></div>'+
          '<div style="font-size:10px;color:var(--text-light)">P-04棚卸し完了後に無料枠を設定</div></div>';
      }
      var limit=cfg.limit||1;
      var pct=Math.min(100,Math.round(used/limit*100));
      var color=pct>=100?'#e94560':pct>=80?'#fdcb6e':'var(--accent)';
      return '<div style="background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">'+
        '<div style="font-size:12px;font-weight:700;margin-bottom:8px">'+escHtml(cfg.name)+'</div>'+
        '<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:8px"><span style="font-size:24px;font-weight:800">'+used+'</span><span style="font-size:12px;color:var(--text-light)">/ '+limit+'回</span></div>'+
        '<div style="background:#f0f0f0;border-radius:4px;height:6px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:4px;transition:width .3s"></div></div>'+
        '<div style="font-size:10px;color:var(--text-light);margin-top:4px">残り '+Math.max(0,limit-used)+'回</div></div>';
    }).join('');
  }
  // Trend chart (monthly) over the selected period
  if(chartEl){
    const monthly={};
    usage.forEach(function(rw){
      var m=(rw.month||'').substring(0,7);
      if(m)monthly[m]=(monthly[m]||0)+(rw.usage_count||0);
    });
    const months=Object.keys(monthly).sort();
    if(months.length===0){chartEl.innerHTML='<div class="empty-state" style="padding:20px;text-align:center;color:var(--text-light)">データなし</div>';return;}
    const mx=Math.max.apply(null,Object.values(monthly));
    chartEl.innerHTML=months.map(function(m){var v=monthly[m];return '<div class="chart-bar-row"><div class="chart-bar-label">'+m+'</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+(v/mx*100).toFixed(0)+'%;background:var(--accent)"><span class="chart-bar-val">'+v+'回</span></div></div></div>';}).join('');
  }
  // Load settings tab defaults
  initAiSettingsTab();
}

// ===== COMPENSATION (補償管理) =====
// 補償方法: ポイント付与 / 返金 / 決済キャンセル の3モードを1画面に統合 (D-44)
// 補填履歴はDB（point_transactions + orders.refund + audit_logs）から読み取り

// COMPENSATION_HISTORY: unified list of all compensation actions (point/refund/cancel)
// Shape: {createdAt, memberName, memberId, memberType, brandName, storeName, mode, detail, amount, points, orderId, executedBy}
let COMPENSATION_HISTORY=[];
let compHistoryLoaded=false;
let compFilter={from:'',to:'',brandId:'all',storeId:'all'};
let compModalMode='point'; // 'point' | 'refund' | 'cancel'
let compModalOrderId=null;
let compModalPiStatus=null; // 'authorized' | 'captured' | 'refunded' | 'unknown'

async function loadCompensationHistory(){
  COMPENSATION_HISTORY=[];
  // 1) ポイント補填 (point_transactions where source='aiden_compensation')
  try{
    const {data:pts}=await sb.from('point_transactions')
      .select('id,member_id,amount,reason,order_id,granted_by,created_at,source')
      .eq('source','aiden_compensation')
      .order('created_at',{ascending:false})
      .limit(200);
    (pts||[]).forEach(function(p){
      COMPENSATION_HISTORY.push({
        createdAt:p.created_at,
        memberId:p.member_id,memberName:'—',memberType:'member',
        brandName:'—',storeName:'—',
        mode:'point',detail:'ポイント付与',
        points:p.amount,amount:0,
        orderId:p.order_id||'',
        executedBy:p.granted_by||''
      });
    });
  }catch(e){/* DB読み込み失敗時は空のまま */}
  // 2) 返金 (orders where payment_status in refunded/partially_refunded)
  try{
    const {data:refs}=await sb.from('orders')
      .select('id,display_id,refund_amount,refund_reason,refunded_at,refunded_by,payment_status,total_amount,brand_id,store_id:venue_id')
      .in('payment_status',['refunded','partially_refunded'])
      .not('refunded_at','is',null)
      .order('refunded_at',{ascending:false})
      .limit(200);
    (refs||[]).forEach(function(r){
      const mode=(r.payment_status==='partially_refunded')?'refund':(r.refund_amount&&r.total_amount&&r.refund_amount<r.total_amount?'refund':'refund');
      COMPENSATION_HISTORY.push({
        createdAt:r.refunded_at,
        memberId:'',memberName:'—',memberType:'guest',
        brandName:'—',storeName:'—',
        mode:mode,detail:mode==='refund'?'返金':'決済キャンセル',
        points:0,amount:r.refund_amount||0,
        orderId:r.display_id||r.id,
        executedBy:r.refunded_by||''
      });
    });
  }catch(e){/* 同上 */}
  COMPENSATION_HISTORY.sort(function(a,b){return (b.createdAt||'').localeCompare(a.createdAt||'');});
}

function renderCompensation(){
  if(!compHistoryLoaded){
    compHistoryLoaded=true;
    loadCompensationHistory().then(function(){
      if(currentView&&currentView.type==='compensation')renderPage();
    });
  }
  const totalPoints=COMPENSATION_HISTORY.filter(function(h){return h.mode==='point';}).reduce(function(s,x){return s+(x.points||0);},0);
  const totalRefund=COMPENSATION_HISTORY.filter(function(h){return h.mode==='refund';}).reduce(function(s,x){return s+(x.amount||0);},0);
  const totalCancel=COMPENSATION_HISTORY.filter(function(h){return h.mode==='cancel';}).reduce(function(s,x){return s+(x.amount||0);},0);
  return '<div class="page-title">補償管理</div><div class="page-subtitle">AIden負担のポイント補填・返金・決済キャンセルを統合管理</div>'+
  '<div class="stat-row" style="grid-template-columns:repeat(4,1fr)">'+
    '<div class="stat-card purple"><div class="sc-label">補填ポイント（累計）</div><div class="sc-val">'+totalPoints.toLocaleString()+'pt</div></div>'+
    '<div class="stat-card orange"><div class="sc-label">返金総額</div><div class="sc-val">'+Y(totalRefund)+'</div></div>'+
    '<div class="stat-card blue"><div class="sc-label">決済キャンセル総額</div><div class="sc-val">'+Y(totalCancel)+'</div></div>'+
    '<div class="stat-card green"><div class="sc-label">補填件数</div><div class="sc-val">'+COMPENSATION_HISTORY.length+'</div></div>'+

  renderCompExecuteCard()+

function searchCompOrders(){
  var q=document.getElementById('compOrderSearch').value.trim().toLowerCase();

function paymentStatusBadge(s){
  var m={paid:{bg:'#e6f9f0',c:'#00b894',l:'決済済'},authorized:{bg:'#ffeaa7',c:'#d68910',l:'与信済'},refunded:{bg:'#fab1a0',c:'#d63031',l:'返金済'},partially_refunded:{bg:'#ffeaa7',c:'#d68910',l:'一部返金'}};
  var st=m[s]||{bg:'#dfe6e9',c:'#636e72',l:s};
  return '<span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;background:'+st.bg+';color:'+st.c+'">'+st.l+'</span>';
}

// --- 補填処理モーダル ---
// D-44: 0-60日=通常表示, 61-90日=CAUTION, 91+日=返金/キャンセル無効
function daysSinceOrder(o){
  if(!o||!o.date)return 0;
  const d=new Date(o.date);
  return Math.floor((Date.now()-d.getTime())/86400000);
}

// Stripe PI ステータスをリアルタイム取得（エンドポイント未実装時は order データにフォールバック）
async function fetchStripePiStatus(o){
  try{
    const res=await fetch(SUPABASE_URL+'/functions/v1/stripe-get-payment-intent',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(await getToken())},
      body:JSON.stringify({payment_intent_id:o.paymentIntentId})
    });
    if(res.ok){
      const data=await res.json();
      if(data&&data.status){
        // stripe status values: requires_capture=authorized未キャプチャ, succeeded=capture済
        if(data.status==='requires_capture')return 'authorized';
        if(data.status==='succeeded')return o.paymentStatus==='refunded'?'refunded':'captured';
        if(data.status==='canceled')return 'canceled';
      }
    }
  }catch(e){/* フォールバック */}
  // Fallback: 既存の order.paymentStatus を使用
  if(o.paymentStatus==='refunded'||o.paymentStatus==='partially_refunded')return 'refunded';
  if(o.paymentStatus==='authorized')return 'authorized';
  return 'captured';
}

async function openCompensationModal(orderId){
  const o=ADMIN_ORDERS.find(function(x){return x.id===orderId;});
  if(!o)return;
  compModalOrderId=orderId;
  compModalMode='point';
  compModalPiStatus='unknown';

  // 一旦ローディング表示
  openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>🎯 補填処理</h3><div style="padding:40px;text-align:center;color:var(--text-light)">Stripe決済状態を確認中...</div>');

  compModalPiStatus=await fetchStripePiStatus(o);
  if(compModalOrderId!==orderId)return; // ユーザーがモーダルを閉じた場合

  renderCompensationModal(o);
}

function renderCompensationModal(o){
  const days=daysSinceOrder(o);
  // D-44 期間別制約
  // 0-60: ok / 61-90: caution (refund/cancelはgray+warning) / 91+: refundは不可
  const stripeMaxDays=90;
  const policyMaxDays=60;
  const refundOver90=days>stripeMaxDays;
  const refundOver60=days>policyMaxDays;
  const canCancel=compModalPiStatus==='authorized';
  const isAlreadyRefunded=compModalPiStatus==='refunded';

  const memberName=o.customer||'ゲスト';
  const memberType=o.memberId?'会員':'ゲスト';
  const brandName=o.brandName||'—';

  // ユーザー情報カード
  const itemsHtml=(o.items||[]).map(function(it){
    return '<tr><td>'+escHtml(it.name)+'</td><td class="r">×'+it.qty+'</td><td class="r">'+Y(it.price*it.qty)+'</td></tr>';
  }).join('');

  // モード切替ボタン（禁止状態は視覚的にグレーアウト）
  const refundDisabled=isAlreadyRefunded||refundOver90;
  const cancelDisabled=isAlreadyRefunded||!canCancel;
  const btnStyle=function(mode,color,label,disabled){
    const active=compModalMode===mode;
    const base='padding:10px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:'+(disabled?'not-allowed':'pointer')+';border:2px solid '+color+';';
    const bg=active&&!disabled?color:'#fff';
    const fg=active&&!disabled?'#fff':color;
    const op=disabled?'opacity:0.4;':'';
    const onclick=disabled?'':'onclick="setCompModalMode(\''+mode+'\')"';
    return '<button '+onclick+' style="'+base+'background:'+bg+';color:'+fg+';'+op+'">'+label+'</button>';
  };

  const modeButtons='<div style="display:flex;gap:10px;margin-bottom:14px">'+
    btnStyle('point','#0984e3','🎁 ポイント付与',false)+
    btnStyle('refund','#d68910','💴 返金',refundDisabled)+
    btnStyle('cancel','#d63031','🚫 決済キャンセル',cancelDisabled)+
  '</div>';

  // CAUTION表示
  let caution='';
  if(compModalMode==='refund'&&refundOver90){
    caution='<div style="margin-bottom:12px;padding:12px;background:#ffe3e3;border:1px solid #d63031;border-radius:8px;font-size:11px;color:#d63031;font-weight:600">⚠️ Stripeの返金期限（90日）を超過しています</div>';
  }else if(compModalMode==='refund'&&refundOver60){
    caution='<div style="margin-bottom:12px;padding:12px;background:#fff3e0;border:1px solid #e17055;border-radius:8px;font-size:11px;color:#e17055;font-weight:600">⚠️ 対象期間外です（AIden↔顧客間の返金ポリシー 60日超過）。技術的には実行可能です。</div>';
  }else if(compModalMode==='cancel'&&!canCancel&&!isAlreadyRefunded){
    caution='<div style="margin-bottom:12px;padding:12px;background:#fff3e0;border:1px solid #e17055;border-radius:8px;font-size:11px;color:#e17055;font-weight:600">⚠️ 決済キャンセルはauthorize済み+未capture状態の注文のみ実行可能です</div>';
  }else if(isAlreadyRefunded){
    caution='<div style="margin-bottom:12px;padding:12px;background:#e6f9f0;border-radius:8px;font-size:11px;color:#00b894;font-weight:600">✅ この注文はすでに返金処理済みです</div>';
  }

  // モード別入力欄
  let inputPanel='';
  if(compModalMode==='point'){
    inputPanel='<div class="form-grid">'+
      '<div class="form-group full"><label>付与ポイント数 <span style="color:var(--danger)">*</span></label>'+
        '<input type="number" id="compPointAmount" min="1" placeholder="例: 500">'+
        '<div style="font-size:10px;color:var(--text-light);margin-top:4px">現在保有: <strong>'+((o.currentPoints||0).toLocaleString())+'pt</strong>（会員非紐付け時は—）</div>'+
      '</div>'+
      '<div class="form-group full"><label>関連注文（任意）</label>'+
        '<input type="text" id="compPointOrder" value="'+escHtml(o.id)+'" readonly style="background:#f5f6fa;color:var(--text-light)"></div>'+
      '<div class="form-group full"><label>補填理由 <span style="color:var(--danger)">*</span></label>'+
        '<textarea id="compReason" placeholder="補填理由を入力..."></textarea></div>'+
    '</div>';
  }else if(compModalMode==='refund'){
    inputPanel='<div class="form-grid">'+
      '<div class="form-group full"><label>返金金額（円） <span style="color:var(--danger)">*</span></label>'+
        '<input type="number" id="compRefundAmount" value="'+(o.total||0)+'" min="1" max="'+(o.total||0)+'">'+
        '<div style="font-size:10px;color:var(--text-light);margin-top:4px">対象注文: '+escHtml(o.id)+' / 上限: '+Y(o.total||0)+'</div>'+
      '</div>'+
      '<div class="form-group full"><label>補填理由 <span style="color:var(--danger)">*</span></label>'+
        '<textarea id="compReason" placeholder="返金理由を入力..."></textarea></div>'+
    '</div>';
  }else{
    inputPanel='<div class="form-grid">'+
      '<div class="form-group full"><label>キャンセル対象金額</label>'+
        '<input type="text" value="'+Y(o.total||0)+' (Stripe決済金額を自動適用)" readonly style="background:#f5f6fa;color:var(--text-light)"></div>'+
      '<div class="form-group full"><label>補填理由 <span style="color:var(--danger)">*</span></label>'+
        '<textarea id="compReason" placeholder="キャンセル理由を入力..."></textarea></div>'+
    '</div>';
  }

  // 実行ボタン（グレーアウト状態を反映）
  const canExecute=
    (compModalMode==='point')||
    (compModalMode==='refund'&&!refundDisabled)||
    (compModalMode==='cancel'&&!cancelDisabled);
  const executeBtnColor=compModalMode==='point'?'#0984e3':compModalMode==='refund'?'#d68910':'#d63031';
  const executeBtnLabel=compModalMode==='point'?'付与実行':compModalMode==='refund'?'返金実行':'キャンセル実行';
  const executeBtn=canExecute?
    '<button class="btn" style="background:'+executeBtnColor+';color:#fff" onclick="confirmAndExecuteCompensation()">'+executeBtnLabel+'</button>':
    '<button class="btn" style="background:#ddd;color:#999;cursor:not-allowed" disabled>'+executeBtnLabel+'</button>';

  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>🎯 補填処理</h3>'+
    '<div style="margin-bottom:14px;padding:14px;background:#f5f6fa;border-radius:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<div><div style="font-weight:700;font-size:14px">'+escHtml(memberName)+' <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:#dfe6e9;color:#636e72;margin-left:6px">'+memberType+'</span></div>'+
        '<div style="font-size:10px;color:var(--text-light);margin-top:2px">'+escHtml(o.id)+' / '+escHtml(brandName)+' / '+(days)+'日前</div></div>'+
        paymentStatusBadge(o.paymentStatus)+
      '</div>'+
      '<div style="font-size:11px;font-weight:700;margin:8px 0 4px">対象注文 合計: '+Y(o.total||0)+'</div>'+
      '<table class="dt" style="margin:4px 0"><thead><tr><th>商品</th><th class="r">数量</th><th class="r">小計</th></tr></thead><tbody>'+
        itemsHtml+
      '</tbody></table>'+
    '</div>'+
    modeButtons+
    caution+
    inputPanel+
    '<div style="margin-top:14px;padding:10px;background:#fff;border:1px dashed var(--border);border-radius:8px;font-size:11px;color:var(--text-light)">'+
      '実行者: <strong id="compExecutorEmail">'+escHtml(getCurrentExecutorEmail())+'</strong>'+
    '</div>'+
    '<div class="btn-group">'+
      executeBtn+
      '<button class="btn btn-s" onclick="closeModal()">キャンセル</button>'+
    '</div>'
  );
}

function setCompModalMode(mode){
  compModalMode=mode;
  const o=ADMIN_ORDERS.find(function(x){return x.id===compModalOrderId;});
  if(o)renderCompensationModal(o);
}

function getCurrentExecutorEmail(){
  try{
    const user=sb.auth&&sb.auth.user?sb.auth.user():null;
    if(user&&user.email)return user.email;
  }catch(e){}
  // フォールバック: sessionStorageから
  const cached=sessionStorage.getItem('adminEmail');
  return cached||'admin@aiden.local';
}

async function confirmAndExecuteCompensation(){
  if(confirmAndExecuteCompensation._p)return; confirmAndExecuteCompensation._p=true;
  try{
    const o=ADMIN_ORDERS.find(function(x){return x.id===compModalOrderId;});
    if(!o){showToast('⚠️ 注文が見つかりません');return;}
    const reason=(document.getElementById('compReason')||{}).value;
    if(!reason||!reason.trim()){showToast('⚠️ 補填理由は必須です');return;}
    const executor=getCurrentExecutorEmail();

    if(compModalMode==='point'){
      const amount=parseInt((document.getElementById('compPointAmount')||{}).value||'0');
      if(!amount||amount<=0){showToast('⚠️ 有効なポイント数を入力してください');return;}
      const summary='ポイント付与: '+amount+'pt\n対象会員: '+(o.customer||'—')+'\n実行者: '+executor;
      if(!confirm(summary+'\n\nよろしいですか？'))return;
      try{
        await fetch(SUPABASE_URL+'/functions/v1/compensation-point-grant',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+(await getToken())},
          body:JSON.stringify({member_id:o.memberId||null,brand_id:null,amount:amount,reason:reason.trim(),granted_by:executor,order_id:o.id})
        });
      }catch(e){}
      await writeAuditLog('compensation_point_grant',{order_id:o.id,amount:amount,reason:reason.trim(),executor:executor});
      COMPENSATION_HISTORY.unshift({createdAt:new Date().toISOString(),memberId:o.memberId||'',memberName:o.customer||'—',memberType:o.memberId?'member':'guest',brandName:o.brandName||'—',storeName:o.storeName||'—',mode:'point',detail:'ポイント付与',points:amount,amount:0,orderId:o.id,executedBy:executor});
      showToast('✅ '+amount+'pt を付与しました（AIden原資）');

    }else if(compModalMode==='refund'){
      const amount=parseInt((document.getElementById('compRefundAmount')||{}).value||'0');
      if(!amount||amount<=0||amount>(o.total||0)){showToast('⚠️ 返金額が不正です');return;}
      const summary='返金: '+Y(amount)+'\n対象注文: '+o.id+'\n実行者: '+executor;
      if(!confirm(summary+'\n\nよろしいですか？'))return;
      try{
        await fetch(SUPABASE_URL+'/functions/v1/stripe-create-refund',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+(await getToken())},
          body:JSON.stringify({payment_intent_id:o.paymentIntentId,amount:amount,reason:reason.trim(),order_id:o.id,refunded_by:executor})
        });
      }catch(e){}
      o.paymentStatus=amount>=(o.total||0)?'refunded':'partially_refunded';
      await writeAuditLog('compensation_refund',{order_id:o.id,amount:amount,reason:reason.trim(),executor:executor});
      COMPENSATION_HISTORY.unshift({createdAt:new Date().toISOString(),memberId:o.memberId||'',memberName:o.customer||'—',memberType:o.memberId?'member':'guest',brandName:o.brandName||'—',storeName:o.storeName||'—',mode:'refund',detail:'返金',points:0,amount:amount,orderId:o.id,executedBy:executor});
      showToast('✅ '+Y(amount)+' を返金しました');

    }else if(compModalMode==='cancel'){
      const amount=o.total||0;
      const summary='決済キャンセル: '+Y(amount)+'\n対象注文: '+o.id+'\n実行者: '+executor;
      if(!confirm(summary+'\n\nよろしいですか？'))return;
      try{
        await fetch(SUPABASE_URL+'/functions/v1/stripe-cancel-payment-intent',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+(await getToken())},
          body:JSON.stringify({payment_intent_id:o.paymentIntentId,reason:reason.trim(),order_id:o.id,canceled_by:executor})
        });
      }catch(e){}
      o.paymentStatus='refunded';
      await writeAuditLog('compensation_cancel',{order_id:o.id,amount:amount,reason:reason.trim(),executor:executor});
      COMPENSATION_HISTORY.unshift({createdAt:new Date().toISOString(),memberId:o.memberId||'',memberName:o.customer||'—',memberType:o.memberId?'member':'guest',brandName:o.brandName||'—',storeName:o.storeName||'—',mode:'cancel',detail:'決済キャンセル',points:0,amount:amount,orderId:o.id,executedBy:executor});
      showToast('✅ 決済をキャンセルしました');
    }

    closeModal();
    renderPage();
  }finally{confirmAndExecuteCompensation._p=false;}
}

async function writeAuditLog(action,meta){
  try{
    await sb.from('audit_logs').insert({
      action:action,
      actor_email:meta.executor||'',
      target_type:'order',
      target_id:meta.order_id||null,
      meta:meta,
      created_at:new Date().toISOString()
    });
  }catch(e){/* 監査ログ書き込み失敗は業務ブロックしない */}
}

function compHistoryFiltered(){
  let list=COMPENSATION_HISTORY.slice();
  if(compFilter.from)list=list.filter(function(h){return (h.createdAt||'').slice(0,10)>=compFilter.from;});
  if(compFilter.to)list=list.filter(function(h){return (h.createdAt||'').slice(0,10)<=compFilter.to;});
  if(compFilter.brandId!=='all')list=list.filter(function(h){return (h.brandId||'')===compFilter.brandId;});
  if(compFilter.storeId!=='all')list=list.filter(function(h){return (h.storeId||'')===compFilter.storeId;});
  return list;
}

  if(list.length===0)return '<div class="empty">補填履歴はありません</div>';
  // 10件表示+スクロール
  return '<div style="max-height:440px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">'+
    '<table class="dt" style="margin:0"><thead><tr>'+
      '<th>日時</th><th>会員</th><th>補填内容</th><th>補填詳細</th><th>実行者</th><th>対象注文</th>'+
    '</tr></thead><tbody>'+
    list.map(function(h){
      const detailLabel=h.mode==='point'?'+'+(h.points||0).toLocaleString()+'pt':Y(h.amount||0);
      const modeBadge=h.mode==='point'?
        '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;background:#0984e320;color:#0984e3">ポイント付与</span>':

        '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;background:#d6891020;color:#d68910">返金</span>':
        '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;background:#d6303120;color:#d63031">決済キャンセル</span>';
      const when=(h.createdAt||'').replace('T',' ').slice(0,16);
      return '<tr>'+
        '<td style="font-size:11px">'+escHtml(when)+'</td>'+
        '<td style="font-weight:600">'+escHtml(h.memberName||'—')+'<div style="font-size:10px;color:var(--text-light)">'+escHtml(h.memberType||'')+'</div></td>'+
        '<td>'+modeBadge+'</td>'+
        '<td style="font-weight:700">'+detailLabel+'</td>'+
        '<td style="font-size:11px">'+escHtml(h.executedBy||'')+'</td>'+
        '<td style="font-family:monospace;font-size:11px">'+escHtml(h.orderId||'—')+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
}

function refreshCompHistory(){
  const c=document.getElementById('compHistoryTableContainer');
  if(c)c.innerHTML=renderCompHistoryTable();
}

function openMerchantModal(corpDisplayId){
  const c=MERCHANTS.find(x=>x.id===corpDisplayId);
  if(!c)return;
  const html='<button class="modal-close" onclick="closeModal()">✕</button>'+renderCorpPage(c);
  openModal(html,true);
  // post hooks for corp tabs
  loadFeeSchedules(c._uuid,c.id);
}

async function saveBrandCancelPolicy(brandDisplayId){
  const b=BRANDS.find(x=>x.id===brandDisplayId);
  if(!b)return;
  const policy={
    no_show:parseInt(document.getElementById('cancelNoShow')?.value)||0,
    same_day:parseInt(document.getElementById('cancelSameDay')?.value)||0,
    '3_days_before':parseInt(document.getElementById('cancel3Days')?.value)||0
  };
  try{
    const {error}=await sb.from('brands').update({cancel_policy:policy}).eq('id',b._uuid);

    b.cancelPolicy=policy;
    logAudit('update_cancel_policy','brands',b._uuid,{policy});
    showToast('✅ キャンセルポリシーを保存しました');
  }catch(e){showToast('⚠️ '+e.message);}
}
