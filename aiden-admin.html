async function editStoreTable(tableId,storeId){
  try{
    const{data,error}=await sb.from('venue_tables').select('*').eq('id',tableId).single();
    if(error)throw error;
    showAddTableModal(storeId);
    document.getElementById('tableModalId').value=tableId;
    document.getElementById('tableModalNumber').value=data.table_number||'';
    document.getElementById('tableModalName').value=data.table_name||'';
    document.getElementById('tableModalCapacity').value=data.capacity||2;
    document.getElementById('tableModalFloor').value=data.floor||'1F';
    document.getElementById('tableModalActive').checked=data.is_active!==false;
    document.querySelector('#modalBody h3').textContent='テーブル編集';
  }catch(e){showToast('❌ 取得エラー: '+e.message);}
}
async function saveStoreTable(storeId){
  const tableId=document.getElementById('tableModalId').value;
  const table_number=document.getElementById('tableModalNumber').value.trim();
  const table_name=document.getElementById('tableModalName').value.trim();
  const capacity=parseInt(document.getElementById('tableModalCapacity').value)||2;
  const floor=document.getElementById('tableModalFloor').value;
  const is_active=document.getElementById('tableModalActive').checked;
  if(!table_number){showToast('⚠️ テーブル番号は必須です');return;}
  try{
    if(tableId){
      const{error}=await sb.from('venue_tables').update({table_number,table_name,capacity,floor,is_active,updated_at:new Date().toISOString()}).eq('id',tableId);
      if(error)throw error;
      showToast('✅ テーブルを更新しました');
    }else{
      const{error}=await sb.from('venue_tables').insert({venue_id:storeId,table_number,table_name,capacity,floor,is_active});
      if(error)throw error;
      showToast('✅ テーブルを追加しました');
    }
    closeModal();
    loadStoreTables(storeId);
  }catch(e){showToast('❌ 保存エラー: '+e.message);}
}
async function deleteVenueTable(tableId,storeId){
  if(!confirm('このテーブルを削除しますか？'))return;
  try{
    const{error}=await sb.from('venue_tables').delete().eq('id',tableId);
    if(error)throw error;
    showToast('🗑 テーブルを削除しました');
    loadStoreTables(storeId);
  }catch(e){showToast('❌ 削除エラー: '+e.message);}
}

// ===== Phase 6A-2: IMAGE MATCHING for bulk menu_product import =====
let _bulkDbImageFiles=[]; // [{file, baseName, matchedIdx|null, uploaded:false, publicUrl:null}]

function stripExt(n){return (n||'').replace(/\.[^.]+$/,'');}

function handleBulkImageFiles(fileList){
  if(!fileList||!fileList.length)return;
  for(var i=0;i<fileList.length;i++){
    var f=fileList[i];
    if(!f.type||f.type.indexOf('image/')!==0)continue;
    _bulkDbImageFiles.push({file:f,baseName:stripExt(f.name),matchedIdx:null,uploaded:false,publicUrl:null});
  }
  matchBulkImagesToRows();
  var el=document.getElementById('bulkImageFilesList');
  if(el)el.innerHTML=renderBulkImagesSummary();
  // Also refresh preview section if already on step 2
  if(_bulkDbStep===2&&_bulkDbItems){
    renderBulkPreviewResult(_bulkDbType,BULK_TEMPLATES[_bulkDbType],{items:_bulkDbItems,errors:_bulkDbErrors,summary:{total:_bulkDbItems.length,newCount:_bulkDbItems.filter(function(it){return it._action==='insert';}).length,updateCount:_bulkDbItems.filter(function(it){return it._action==='update';}).length,errorCount:_bulkDbErrors.length}},_bulkDbOriginalObjects);
  }
}

function matchBulkImagesToRows(){
  if(!_bulkDbImageFiles||!_bulkDbImageFiles.length)return;
  var rows=_bulkDbOriginalObjects||[];
  _bulkDbImageFiles.forEach(function(img){
    if(img.matchedIdx!=null)return;
    var base=(img.baseName||'').toLowerCase();
    for(var i=0;i<rows.length;i++){
      var name=(rows[i].name||'').toLowerCase();
      var code=(rows[i].product_code||'').toLowerCase();
      if(base&&(base===name||base===code)){img.matchedIdx=i;break;}
    }
  });
}

function renderBulkImagesSummary(){
  if(!_bulkDbImageFiles||!_bulkDbImageFiles.length)return '画像未選択';
  var matched=_bulkDbImageFiles.filter(function(f){return f.matchedIdx!=null;}).length;
  var unmatched=_bulkDbImageFiles.length-matched;
  return '合計 '+_bulkDbImageFiles.length+' 件 / ✅ マッチ '+matched+' 件 / ⚠️ 未マッチ '+unmatched+' 件 <button class="btn btn-s btn-sm" style="margin-left:8px" onclick="clearBulkImages()">クリア</button>';
}

function clearBulkImages(){
  _bulkDbImageFiles=[];
  var el=document.getElementById('bulkImageFilesList');
  if(el)el.innerHTML=renderBulkImagesSummary();
  var fi=document.getElementById('bulkImageFileInput');if(fi)fi.value='';
}

function renderBulkImageMatchTable(){
  if(_bulkDbType!=='menu_product'||!_bulkDbImageFiles||!_bulkDbImageFiles.length)return '';
  matchBulkImagesToRows();
  var rows=_bulkDbOriginalObjects||[];
  var h='<div class="card" style="margin-top:12px"><div class="card-title">🖼️ 画像マッチング</div>';
  h+='<div style="font-size:11px;color:var(--text-light);margin-bottom:8px">未マッチの画像は手動で商品を選択できます。マッチしなかった画像はアップロードされません。</div>';
  h+='<table class="data-table" style="font-size:11px"><thead><tr><th>#</th><th>ファイル名</th><th>状態</th><th>マッチ商品</th></tr></thead><tbody>';
  _bulkDbImageFiles.forEach(function(img,i){
    var status=img.matchedIdx!=null?'<span style="color:#00b894;font-weight:700">✅ マッチ</span>':'<span style="color:#d68910;font-weight:700">⚠️ 未マッチ</span>';
    var opts='<option value="">（紐づけない）</option>';
    rows.forEach(function(r,ri){
      var sel=img.matchedIdx===ri?' selected':'';
      opts+='<option value="'+ri+'"'+sel+'>'+esc(r.name||('行'+(ri+2)))+'</option>';
    });
    h+='<tr><td>'+(i+1)+'</td><td>'+esc(img.file.name)+'</td><td>'+status+'</td><td><select onchange="setBulkImageMatch('+i+',this.value)" style="font-size:11px;padding:4px">'+opts+'</select></td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function setBulkImageMatch(imgIdx,rowIdxStr){
  if(!_bulkDbImageFiles[imgIdx])return;
  _bulkDbImageFiles[imgIdx].matchedIdx=rowIdxStr===''?null:parseInt(rowIdxStr,10);
  var el=document.getElementById('bulkImageFilesList');
  if(el)el.innerHTML=renderBulkImagesSummary();
}

async function uploadMatchedBulkImages(){
  if(!_bulkDbImageFiles||!_bulkDbImageFiles.length)return;
  var bucket='menu-images';
  for(var i=0;i<_bulkDbImageFiles.length;i++){
    var img=_bulkDbImageFiles[i];
    if(img.matchedIdx==null||img.uploaded)continue;
    var item=_bulkDbItems[img.matchedIdx];
    if(!item)continue;
    var brandSlug=(item.brand_slug||'unknown').replace(/[^a-zA-Z0-9_-]/g,'_');
    var path=brandSlug+'/'+Date.now()+'_'+img.file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var up=await sb.storage.from(bucket).upload(path,img.file,{upsert:true,contentType:img.file.type});
    if(up.error)throw new Error(up.error.message+'（bucket "'+bucket+'" 未作成の可能性）');
    var pub=sb.storage.from(bucket).getPublicUrl(path);
    img.publicUrl=pub.data.publicUrl;img.uploaded=true;
    // Inject image_url into the row
    _bulkDbItems[img.matchedIdx].image_url=img.publicUrl;
  }
}

// ===== Phase 6A-2: WIZARD FRAMEWORK =====
// 共通ウィザード state & レンダラ。既存モーダル（openAddCorpModal等）はそのまま残す。
let _wiz=null; // {type, step, total, data, config}

function openWizardModal(config){
  _wiz={type:config.type,step:1,total:config.steps.length,data:{},config:config};
  renderWizardStep();
}

function renderWizardStep(){
  if(!_wiz)return;
  var cfg=_wiz.config;var step=_wiz.step;var total=_wiz.total;
  var stepDef=cfg.steps[step-1];
  var dots='';
  for(var i=1;i<=total;i++){
    var bg=i===step?'var(--primary)':(i<step?'#00b894':'#dfe6e9');
    var col=i<=step?'#fff':'#636e72';
    dots+='<div style="display:flex;align-items:center;gap:6px"><div style="width:24px;height:24px;border-radius:50%;background:'+bg+';color:'+col+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">'+(i<step?'✓':i)+'</div><span style="font-size:10px;color:'+(i===step?'var(--text)':'var(--text-light)')+'">'+esc(cfg.steps[i-1].label)+'</span></div>';
    if(i<total)dots+='<div style="flex:1;height:2px;background:#dfe6e9;min-width:8px"></div>';
  }
  var backBtn=step>1?'<button class="btn btn-secondary" onclick="wizardPrev()">← 戻る</button>':'';
  var nextLabel=step<total?'次へ →':'登録する';
  var h='<button class="modal-close" onclick="closeWizard()">✕</button>'+
    '<h3>'+esc(cfg.title)+' <span style="font-size:11px;color:var(--text-light);font-weight:500">（Step '+step+' / '+total+'）</span></h3>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 12px;background:#f8f9fa;border-radius:8px">'+dots+'</div>'+
    '<div style="font-size:12px;font-weight:700;margin-bottom:4px">'+esc(stepDef.label)+'</div>'+
    (stepDef.help?'<div style="font-size:10px;color:var(--text-light);margin-bottom:10px">💡 '+esc(stepDef.help)+'</div>':'')+
    '<div id="wizStepBody">'+stepDef.render(_wiz.data)+'</div>'+
    '<div class="btn-group" style="margin-top:16px">'+backBtn+'<button class="btn btn-primary" onclick="wizardNext()">'+nextLabel+'</button><button class="btn btn-secondary" onclick="closeWizard()">キャンセル</button></div>';
  openModal(h);
}

function wizardCollectStep(){
  if(!_wiz)return false;
  var stepDef=_wiz.config.steps[_wiz.step-1];
  if(stepDef.collect){
    var res=stepDef.collect(_wiz.data);
    if(res&&res.error){showToast('⚠️ '+res.error);return false;}
  }
  return true;
}

async function wizardNext(){
  if(!_wiz)return;
  if(!wizardCollectStep())return;
  if(_wiz.step<_wiz.total){
    _wiz.step++;
    renderWizardStep();
  }else{
    // submit
    try{
      await _wiz.config.submit(_wiz.data);
      closeWizard();
    }catch(e){showToast('⚠️ '+e.message);}
  }
}

function wizardPrev(){if(_wiz&&_wiz.step>1){_wiz.step--;renderWizardStep();}}
function closeWizard(){_wiz=null;closeModal();}

function wizVal(id){var el=document.getElementById(id);return el?(el.value||'').trim():'';}
function wizChecked(id){var el=document.getElementById(id);return !!(el&&el.checked);}

// ===== Phase 6A-2: SETUP COMPLETION CHECKLIST =====
function computeCorpSetupScore(corp){
  var items=[];
  // 法人基本情報
  items.push({key:'corp_name',label:'法人名',ok:!!corp.name,target:'corp'});
  items.push({key:'corp_rep',label:'代表者',ok:!!corp.rep,target:'corp'});
  items.push({key:'corp_email',label:'代表メール',ok:!!corp.rep_email,target:'corp'});
  items.push({key:'corp_stripe',label:'Stripe連携',ok:!!corp.stripe_account_id,target:'corp'});
  var brands=getBrandsForMerchant(corp);
  items.push({key:'has_brand',label:'ブランド登録（1件以上）',ok:brands.length>0,target:'corp'});
  var stores=getVenuesForMerchant(corp);
  items.push({key:'has_store',label:'店舗登録（1件以上）',ok:stores.length>0,target:'corp'});
  // 店舗ごとの詳細項目
  var storeChecks=stores.map(function(s){
    var sItems=[
      {key:'name',ok:!!s.name},
      {key:'addr',ok:!!s.addr},
      {key:'tel',ok:!!s.tel},
      {key:'prep',ok:(s.prepTime||0)>0}
    ];
    var done=sItems.filter(function(x){return x.ok;}).length;
    return {store:s,done:done,total:sItems.length};
  });
  var corpDone=items.filter(function(i){return i.ok;}).length;
  return {items:items,corpDone:corpDone,corpTotal:items.length,stores:storeChecks};
}

function renderSetupChecklist(){
  var el=document.getElementById('dashSetupChecklist');
  if(!el)return;
  if(!MERCHANTS||!MERCHANTS.length){el.innerHTML='<div style="color:var(--text-light)">法人が登録されていません</div>';return;}
  var h='';
  var incompleteMERCHANTS=MERCHANTS.filter(function(c){var s=computeCorpSetupScore(c);return Math.round((s.corpDone/s.corpTotal)*100)<100;});
  if(!incompleteMERCHANTS.length){el.innerHTML='<span style="color:#00b894;font-size:12px;font-weight:700">✅ 全法人のセットアップが完了しています</span>';return;}
  incompleteMERCHANTS.slice(0,10).forEach(function(c){
    var s=computeCorpSetupScore(c);
    var pct=Math.round((s.corpDone/s.corpTotal)*100);
    var color=pct>=100?'#00b894':(pct>=60?'#f39c12':'#d63031');
    var brands=getBrandsForMerchant(c);
    var storesHtml=brands.map(function(b){
      return '<span style="display:inline-block;margin:2px 6px 2px 0;padding:2px 8px;border-radius:4px;background:#e8f4fd;color:#0984e3;font-size:10px;cursor:pointer" onclick="openBrandModal(\''+esc(b.id)+'\')">🏷️ '+esc(b.name)+'</span>';
    }).join('') || '<span style="color:var(--text-light);font-size:11px">ブランド未登録</span>';
    var missingItems=s.items.filter(function(i){return !i.ok;});
    var missHtml=missingItems.length?missingItems.map(function(mi){
      return '<span style="display:inline-block;margin:2px 6px 2px 0;padding:2px 8px;border-radius:4px;background:#fab1a0;color:#b71c1c;font-size:10px;cursor:pointer" onclick="openMerchantModal(\''+esc(c.id)+'\')">❌ '+esc(mi.label)+'</span>';
    }).join(''):'<span style="color:#00b894;font-size:11px;font-weight:700">✅ 法人基本情報 完了</span>';
    h+='<div style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer" onclick="openMerchantModal(\''+esc(c.id)+'\')">'+
        '<span style="font-weight:700;font-size:12px">'+esc(c.name)+'</span>'+
        '<span style="font-size:10px;color:var(--text-light)">'+esc(c.id)+'</span>'+
        '<div style="flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+color+'"></div></div>'+
        '<span style="font-size:11px;font-weight:700;color:'+color+'">'+pct+'%</span>'+
      '</div>'+
      '<div>'+missHtml+'</div>'+
      (storesHtml?'<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #eee">'+storesHtml+'</div>':'<div style="margin-top:6px;color:#d63031;font-size:10px">❌ 店舗未登録</div>')+
    '</div>';
  });
  if(MERCHANTS.length>10)h+='<div style="font-size:10px;color:var(--text-light);text-align:center">他 '+(MERCHANTS.length-10)+' 法人</div>';
  el.innerHTML=h;
}

// HASH ROUTING
function handleHashNavigation(){
  var hash=window.location.hash.slice(1);
  if(!hash)return;
  var parts=hash.split('/');
  if(parts.length!==2)return;
  var type=parts[0],id=parts[1];
  if(!id)return;
  if(type==='merchants')openMerchantModal(id);
  else if(type==='brands')openBrandModal(id);
  else if(type==='venues')openVenueModal(id);
}
window.addEventListener('hashchange',function(){
  var hash=window.location.hash.slice(1);
  if(!hash||hash==='#')return;
  handleHashNavigation();
});
