async function checkUnverifiedCount() {
  try {
    const { count, error } = await sb.from('members')
      .select('id', { count: 'exact', head: true })
      .is('verification_grace_sent_at', null);
    const statusEl = document.getElementById('bulkVerifyStatus');
    if (statusEl) {
      statusEl.innerHTML = '未通知の未認証会員: <strong>' + (count || 0) + '件</strong>';
    }
  } catch (e) {}
}
async function sendBulkVerificationEmails() {
  const btn = document.getElementById('bulkVerifyBtn');
  const resultEl = document.getElementById('bulkVerifyResult');
  if (!btn) return;
  if (!confirm('未認証の既存会員に認証メールを一括送信します。よろしいですか？')) return;
  btn.disabled = true;
  btn.textContent = '送信中...';
  resultEl.style.display = 'none';
  try {
    const resp = await fetch('/api/members/bulk-send-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ batch_size: 100 }),
    });
    const data = await resp.json();
    resultEl.style.display = 'block';
    if (data.success) {
      resultEl.style.background = '#e8f5e9';
      resultEl.style.color = '#2e7d32';
      resultEl.innerHTML = '✅ ' + data.data.message + (data.data.total_remaining > 0 ? '<br>残り: ' + data.data.total_remaining + '件' : '');
      showToast('✅ 認証メール送信完了');
      checkUnverifiedCount();
    } else {
      resultEl.style.background = '#fce4ec';
      resultEl.style.color = '#c62828';
      resultEl.textContent = '❌ ' + (data.error || '送信に失敗しました');
    }
  } catch (e) {
    resultEl.style.display = 'block';
    resultEl.style.background = '#fce4ec';
    resultEl.style.color = '#c62828';
    resultEl.textContent = '❌ エラー: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '未認証会員に一括送信';
}

async function createStripeAccount(corpId){
  const c=CORPS.find(x=>x.id===corpId);
  if(!c){showToast('⚠️ 法人が見つかりません');return;}
  if(c.stripe_account_id){showToast('ℹ️ 既にStripe連携済みです');return;}

  // 確認ダイアログ
  if(!confirm('Stripe Connect Expressアカウントを作成します。\n\n法人名: '+c.name+'\nメール: '+c.rep_email+'\n\n続行しますか？')) return;

  var btn=document.querySelector('button[onclick*="createStripeAccount"]');
  if(btn){btn.disabled=true;btn.textContent='作成中...';}
  showToast('⏳ Stripe アカウント作成中...');

  try{
    // Supabase Edge Function を呼び出して Express アカウントを作成
    const res=await fetch(SUPABASE_URL+'/functions/v1/stripe-connect-create',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+SUPABASE_KEY
      },
      body:JSON.stringify({
        corp_id:corpId,
        business_name:c.name,
        email:c.rep_email
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:'不明なエラー'}));
      throw new Error(err.error||'アカウント作成に失敗しました');
    }

    const data=await res.json();
    // account_id をローカルデータに反映
    c.stripe_account_id=data.account_id;

    showToast('✅ Stripeアカウントを作成しました');
    renderPage();

    // オンボーディングURLがある場合は新しいタブで開く
    if(data.onboarding_url){
      if(confirm('Stripeのオンボーディング画面を開きますか？\n（テスト環境では本人確認はスキップ可能です）')){
        window.open(data.onboarding_url,'_blank');
      }
    }
  }catch(e){
    console.error('Stripe Connect error:',e);
    showToast('❌ '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Stripe Connect 連携';}
  }
}

function switchTab(prefix,el,tabId){
  el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const container=document.getElementById('content');
  container.querySelectorAll('.tab-content').forEach(tc=>{if(tc.id&&tc.id.startsWith(prefix+'-'))tc.classList.remove('active');});
  const tgt=document.getElementById(prefix+'-'+tabId);if(tgt)tgt.classList.add('active');
}

// ===== BAN MANAGEMENT =====
let banFilter={type:'all',status:'active',search:''};
const BAN_REASON_CATS={fraud:'不正注文',prank:'いたずら注文',payment_refusal:'支払い拒否',harassment:'迷惑行為',other:'その他'};

function getBanStatus(b){
  if(!b.is_active && b.unbanned_at) return 'unbanned';
  if(b.expires_at && new Date(b.expires_at)<new Date() && b.is_active) return 'expired';
  if(b.is_active) return 'active';
  return 'unbanned';
}
function banStatusBadge(s){
  if(s==='active') return '<span class="status status-active">有効</span>';
  if(s==='unbanned') return '<span class="status" style="background:#dfe6e9;color:#636e72">解除済み</span>';
  if(s==='expired') return '<span class="status" style="background:#ffeaa7;color:#d68910">期限切れ</span>';
  return '<span class="status">'+s+'</span>';
}
function banTypeBadge(t){
  if(t==='global') return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#d6303120;color:#d63031">グローバル</span>';
  return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#0984e320;color:#0984e3">店舗限定</span>';
}

function renderBanTab(){
  const filtered=BANS.filter(b=>{
    if(banFilter.type!=='all' && b.ban_type!==banFilter.type) return false;
    const st=getBanStatus(b);
    if(banFilter.status==='active' && st!=='active') return false;
    if(banFilter.status==='unbanned' && st!=='unbanned') return false;
    if(banFilter.status==='expired' && st!=='expired') return false;
    if(banFilter.search){const q=banFilter.search.toLowerCase();if(!b.email.toLowerCase().includes(q)) return false;}
    return true;
  });
  const activeCount=BANS.filter(b=>getBanStatus(b)==='active').length;
  const globalCount=BANS.filter(b=>b.ban_type==='global'&&getBanStatus(b)==='active').length;
  const storeCount=BANS.filter(b=>b.ban_type==='store_specific'&&getBanStatus(b)==='active').length;

  return '<div class="stat-row" style="grid-template-columns:repeat(3,1fr)">'+
    '<div class="stat-card purple"><div class="sc-label">有効BAN数</div><div class="sc-val">'+activeCount+'</div></div>'+
    '<div class="stat-card" style="border-left-color:var(--danger)"><div class="sc-label">グローバルBAN</div><div class="sc-val">'+globalCount+'</div></div>'+
    '<div class="stat-card blue"><div class="sc-label">店舗限定BAN</div><div class="sc-val">'+storeCount+'</div></div>'+
  '</div>'+
  '<div class="card"><div class="card-title">⛔ BAN一覧 <span class="ct-right"><button class="btn btn-danger btn-sm" onclick="openBanModal()">＋ BANを追加</button></span></div>'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">'+
    '<input class="menu-search" placeholder="🔍 メールアドレスで検索..." style="width:240px" value="'+banFilter.search+'" oninput="banFilter.search=this.value;refreshBanTab()">'+
    '<select class="menu-search" style="width:auto;padding:7px 10px" onchange="banFilter.type=this.value;refreshBanTab()">'+
      '<option value="all"'+(banFilter.type==='all'?' selected':'')+'>種別: すべて</option>'+
      '<option value="global"'+(banFilter.type==='global'?' selected':'')+'>グローバル</option>'+
      '<option value="store_specific"'+(banFilter.type==='store_specific'?' selected':'')+'>店舗限定</option>'+
    '</select>'+
    '<select class="menu-search" style="width:auto;padding:7px 10px" onchange="banFilter.status=this.value;refreshBanTab()">'+
      '<option value="active"'+(banFilter.status==='active'?' selected':'')+'>ステータス: 有効</option>'+
      '<option value="unbanned"'+(banFilter.status==='unbanned'?' selected':'')+'>解除済み</option>'+
      '<option value="expired"'+(banFilter.status==='expired'?' selected':'')+'>期限切れ</option>'+
      '<option value="all"'+(banFilter.status==='all'?' selected':'')+'>すべて</option>'+
    '</select>'+
    '<span style="font-size:11px;color:var(--text-light);margin-left:auto">'+filtered.length+'件表示</span>'+
  '</div>'+
  (filtered.length===0?'<div class="empty-state">該当するBANレコードはありません</div>':
  '<table class="data-table"><thead><tr><th>メールアドレス</th><th>種別</th><th>対象店舗</th><th>理由</th><th>登録日</th><th>期限</th><th>ステータス</th><th></th></tr></thead><tbody>'+
  filtered.map(b=>{
    const st=getBanStatus(b);
    const expStr=b.expires_at?b.expires_at:'無期限';
    const storeStr=b.ban_type==='store_specific'?(b.store_name||b.store_id):'—';
    return '<tr style="'+(st!=='active'?'opacity:.6':'')+'"><td style="font-weight:600">'+b.email+'</td><td>'+banTypeBadge(b.ban_type)+'</td><td>'+storeStr+'</td><td><span style="font-size:11px">'+b.reason+'</span></td><td>'+b.banned_at+'</td><td>'+expStr+'</td><td>'+banStatusBadge(st)+'</td><td>'+
    (st==='active'?'<button class="btn btn-secondary btn-sm" onclick="openUnbanModal(\''+b.id+'\')">解除</button>':
     (st==='unbanned'?'<span style="font-size:10px;color:var(--text-light)" title="'+(b.unban_reason||'')+'">解除済</span>':'<span style="font-size:10px;color:var(--text-light)">期限切れ</span>'))+
    '</td></tr>';
  }).join('')+
  '</tbody></table>')+
  '</div>'+
  '<div class="card"><div class="card-title">📋 BAN種別について</div><div style="font-size:12px;line-height:1.8;color:var(--text-light)">'+
    '<p><strong style="color:var(--danger)">グローバルBAN</strong>：全加盟店でそのメールアドレスからの注文・会員登録をブロック</p>'+
    '<p><strong style="color:var(--info)">店舗限定BAN</strong>：指定した店舗のみでブロック（他店舗では注文可能）</p>'+
  '</div></div>';
}

  const el=document.getElementById('user-ban');
  if(el) el.innerHTML=renderBanTab();
}

  const storeOpts=STORES.map(s=>{const br=getBrandForStore(s);return '<option value="'+s.id+'">'+(br?br.name+' ':'')+ s.name+'</option>';}).join('');

      '<div class="form-group full"><label>メールアドレス <span style="color:var(--danger)">*</span></label><input type="email" id="banEmail" placeholder="example@email.com"></div>'+
      '<div class="form-group"><label>BAN種別</label><select id="banType" onchange="toggleBanStoreSelect()"><option value="global">グローバルBAN</option><option value="store_specific">店舗限定BAN</option></select></div>'+
      '<div class="form-group" id="banStoreGroup" style="display:none"><label>対象店舗（複数選択可）</label><select id="banStoreSelect" multiple size="5" style="min-height:100px">'+storeOpts+'</select><div style="font-size:10px;color:var(--text-light);margin-top:4px">Ctrl/Cmd+クリックで複数選択</div></div>'+
      '<div class="form-group"><label>BAN理由 <span style="color:var(--danger)">*</span></label><select id="banReasonCat"><option value="fraud">不正注文</option><option value="prank">いたずら注文</option><option value="payment_refusal">支払い拒否</option><option value="harassment">迷惑行為</option><option value="other">その他</option></select></div>'+
      '<div class="form-group full"><label>理由の詳細 <span style="color:var(--danger)">*</span></label><textarea id="banReasonDetail" placeholder="BAN理由の詳細を入力..."></textarea></div>'+
      '<div class="form-group"><label>期限</label><select id="banExpiry" onchange="toggleBanCustomDate()"><option value="permanent">無期限</option><option value="7">7日間</option><option value="30">30日間</option><option value="90">90日間</option><option value="custom">カスタム日付</option></select></div>'+
      '<div class="form-group" id="banCustomDateGroup" style="display:none"><label>期限日</label><input type="date" id="banCustomDate"></div>'+
    '</div>'+
    '<div style="background:#fff0f0;border:1px solid #fab1a0;border-radius:8px;padding:12px;margin-top:16px;font-size:11px;color:#d63031"><strong>⚠️ 注意:</strong> BANを実行すると、該当メールアドレスからの注文がブロックされます。グローバルBANの場合、全加盟店で適用されます。</div>'+
    '<div class="btn-group"><button class="btn btn-danger" onclick="saveBan()">⛔ BANを実行</button><button class="btn btn-secondary" onclick="closeModal()">キャンセル</button></div>');
}

function toggleBanStoreSelect(){
  const g=document.getElementById('banStoreGroup');
  g.style.display=document.getElementById('banType').value==='store_specific'?'':'none';
}
function toggleBanCustomDate(){
  const g=document.getElementById('banCustomDateGroup');
  g.style.display=document.getElementById('banExpiry').value==='custom'?'':'none';
}

function saveBan(){
  const email=document.getElementById('banEmail').value.trim();
  const reasonDetail=document.getElementById('banReasonDetail').value.trim();
  if(!email||!email.includes('@')){showToast('⚠️ 有効なメールアドレスを入力してください');return;}
  if(!reasonDetail){showToast('⚠️ 理由の詳細は必須です');return;}

  const banType=document.getElementById('banType').value;
  const reasonCat=document.getElementById('banReasonCat').value;
  const reason=(BAN_REASON_CATS[reasonCat]||'その他')+'：'+reasonDetail;
  const expiryVal=document.getElementById('banExpiry').value;
  let expiresAt=null;
  if(expiryVal==='custom'){
    expiresAt=document.getElementById('banCustomDate').value;
    if(!expiresAt){showToast('⚠️ 期限日を選択してください');return;}
  } else if(expiryVal!=='permanent'){
    const d=new Date();d.setDate(d.getDate()+parseInt(expiryVal));
    expiresAt=d.toISOString().split('T')[0];
  }

  if(banType==='store_specific'){
    const sel=document.getElementById('banStoreSelect');
    const selectedStores=Array.from(sel.selectedOptions);
    if(selectedStores.length===0){showToast('⚠️ 対象店舗を選択してください');return;}
    // 確認ダイアログ
    if(!confirm('以下のBANを実行します：\n\nメール: '+email+'\n種別: 店舗限定（'+selectedStores.length+'店舗）\n理由: '+reason+'\n\n実行しますか？')) return;
    selectedStores.forEach(opt=>{
      const store=STORES.find(s=>s.id===opt.value);
      // 重複チェック
      const dup=BANS.find(b=>b.email===email&&b.ban_type==='store_specific'&&b.store_id===opt.value&&getBanStatus(b)==='active');
      if(dup){showToast('⚠️ '+email+' は既に '+(store?store.name:opt.value)+' でBAN済みです');return;}
      BANS.push({id:genId('BAN-'),email:email,ban_type:'store_specific',store_id:opt.value,store_name:store?(getBrandForStore(store)?getBrandForStore(store).name+' ':'')+store.name:opt.value,reason:reason,reason_cat:reasonCat,banned_by:'Taisei',banned_at:new Date().toISOString().split('T')[0],expires_at:expiresAt,is_active:true,unbanned_at:null,unban_reason:null});
    });
  } else {
    // 重複チェック
    const dup=BANS.find(b=>b.email===email&&b.ban_type==='global'&&getBanStatus(b)==='active');
    if(dup){showToast('⚠️ '+email+' は既にグローバルBANされています');closeModal();return;}
    if(!confirm('以下のBANを実行します：\n\nメール: '+email+'\n種別: グローバルBAN（全加盟店）\n理由: '+reason+'\n\n実行しますか？')) return;
    BANS.push({id:genId('BAN-'),email:email,ban_type:'global',store_id:null,store_name:null,reason:reason,reason_cat:reasonCat,banned_by:'Taisei',banned_at:new Date().toISOString().split('T')[0],expires_at:expiresAt,is_active:true,unbanned_at:null,unban_reason:null});
  }
  closeModal();showToast('⛔ BANを追加しました');refreshBanTab();
}

function openUnbanModal(banId){
  const b=BANS.find(x=>x.id===banId);if(!b) return;
  openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>🔓 BAN解除</h3>'+
    '<div style="background:#f5f6fa;border-radius:8px;padding:14px;margin-bottom:16px;font-size:12px">'+
      '<div style="margin-bottom:6px"><strong>メール:</strong> '+b.email+'</div>'+
      '<div style="margin-bottom:6px"><strong>種別:</strong> '+(b.ban_type==='global'?'グローバル':'店舗限定（'+(b.store_name||b.store_id)+'）')+'</div>'+
      '<div style="margin-bottom:6px"><strong>理由:</strong> '+b.reason+'</div>'+
      '<div><strong>登録日:</strong> '+b.banned_at+'</div>'+
    '</div>'+
    '<div class="form-group full"><label>解除理由 <span style="color:var(--danger)">*</span></label><textarea id="unbanReason" placeholder="BAN解除の理由を入力..."></textarea></div>'+
    '<div class="btn-group"><button class="btn btn-primary" onclick="executeUnban(\''+banId+'\')">🔓 解除を実行</button><button class="btn btn-secondary" onclick="closeModal()">キャンセル</button></div>');
}

function executeUnban(banId){
  const reason=document.getElementById('unbanReason').value.trim();
  if(!reason){showToast('⚠️ 解除理由は必須です');return;}
  const b=BANS.find(x=>x.id===banId);
  if(!b) return;
  b.is_active=false;
  b.unbanned_at=new Date().toISOString().split('T')[0];
  b.unban_reason=reason;
  closeModal();showToast('🔓 BANを解除しました');refreshBanTab();
}

// ===== AI SNS投稿生成 =====
async function aiGenerateSnsPost(){
  var storeId=document.getElementById('aiSnsStore').value;
  var platform=document.getElementById('aiSnsPlatform').value;
  var topic=document.getElementById('aiSnsTopic').value.trim();
  if(!storeId){alert('店舗を選択してください');return;}
  var btn=document.getElementById('aiSnsBtn');
  btn.disabled=true;btn.textContent='生成中...';
  document.getElementById('aiSnsResult').innerHTML='<div style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto 8px"></div><div style="font-size:12px;color:#888">AIが投稿文を生成中...</div></div>';
  try{
    var res=await fetch(SUPABASE_URL+'/functions/v1/generate-sns-post',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({store_id:storeId,platform:platform,topic:topic||null})
    });
    var data=await res.json();
    if(!res.ok||!data.success){
      document.getElementById('aiSnsResult').innerHTML='<div style="color:#e94560;padding:12px;background:#fff0f0;border-radius:8px;font-size:13px">⚠️ '+escHtml(data.error||'エラーが発生しました')+'</div>';
      return;
    }
    var variants=data.variants||[];
    var toneLabels={formal:'フォーマル',casual:'カジュアル',friendly:'フレンドリー'};
    var toneColors={formal:'#6c5ce7',casual:'#00b894',friendly:'#e17055'};
    var html='<div style="font-size:12px;color:#888;margin-bottom:8px">'+escHtml(data.platform.toUpperCase())+' | 文字数上限: '+data.char_limit+'文字</div>';
    variants.forEach(function(v){
      var label=toneLabels[v.tone]||v.tone;
      var color=toneColors[v.tone]||'#6c5ce7';
      var len=v.text.length;
      var over=len>(data.char_limit||9999);
      html+='<div style="border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
          '<span style="font-size:11px;font-weight:700;color:'+color+'">'+escHtml(label)+'</span>'+
          '<div style="display:flex;gap:6px;align-items:center">'+
            '<span style="font-size:10px;color:'+(over?'#e94560':'#888')+'">'+len+'文字</span>'+
            '<button class="btn btn-sm" style="background:'+color+';color:#fff;font-size:10px" onclick="aiCopyText(this)">📋 コピー</button>'+
          '</div>'+
        '</div>'+
        '<div class="ai-copy-text" style="font-size:13px;line-height:1.6;white-space:pre-wrap">'+escHtml(v.text)+'</div>'+
      '</div>';
    });
    if(data.quota&&data.quota.remaining>=0) html+='<div style="text-align:right;font-size:10px;color:#888">残り: '+data.quota.remaining+'回（'+data.quota.plan+'）</div>';
    document.getElementById('aiSnsResult').innerHTML=html;
  }catch(e){
    document.getElementById('aiSnsResult').innerHTML='<div style="color:#e94560;font-size:13px">⚠️ 通信エラー</div>';
  }finally{btn.disabled=false;btn.textContent='🤖 投稿を生成';}
}

function aiCopyText(btn){
  var text=btn.closest('div').parentElement.querySelector('.ai-copy-text').textContent;
  navigator.clipboard.writeText(text).then(function(){showToast('✅ コピーしました');}).catch(function(){showToast('✅ コピーしました');});
}

async function grantCompPoint(memberId){
  if(grantCompPoint._p)return; grantCompPoint._p=true;
  try{
  var amount=parseInt(document.getElementById('compPointAmount').value);
  var reasonSelect=document.getElementById('compPointReasonSelect').value;
  var reasonText=document.getElementById('compPointReason').value.trim();
  var reason=reasonSelect==='other'?reasonText:(reasonSelect||reasonText);
  if(!amount||amount<=0){showToast('⚠️ 有効なポイント数を入力してください');return;}
  if(!reason){showToast('⚠️ 理由は必須です');return;}
  var m=MEMBERS.find(function(x){return x.id===memberId;});
  if(!m)return;
  // インメモリ更新
  m.points+=amount;
  COMP_POINT_LOG.push({
    id:genId('CPT-'),memberId:m.id,memberName:m.name,
    amount:amount,reason:reason,source:'aiden_compensation',
    grantedBy:'Taisei',createdAt:new Date().toISOString().split('T')[0]
  });
  // Supabase Edge Function 呼び出し（接続時）
  try{
    await fetch(SUPABASE_URL+'/functions/v1/compensation-point-grant',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({member_id:memberId,brand_id:null,amount:amount,reason:reason,granted_by:'Taisei'})
    });
  }catch(e){console.warn('Edge Function call skipped:',e);}
  closeModal();
  showToast('✅ '+amount+'pt を '+m.name+' に付与しました（AIden原資）');
  renderPage();
  }finally{grantCompPoint._p=false;}
}

async function executeRefund(orderId){
  if(executeRefund._p)return; executeRefund._p=true;
  const refundBtn=document.querySelector('.btn-d[onclick*="executeRefund"]');
  if(refundBtn){refundBtn.disabled=true;refundBtn.textContent='処理中...';}
  try{
  var o=ADMIN_ORDERS.find(function(x){return x.id===orderId;});
  if(!o)return;
  var amount=parseInt(document.getElementById('refundAmount').value);
  var reasonSelect=document.getElementById('refundReasonSelect').value;
  var reasonText=document.getElementById('refundReasonText').value.trim();
  var reason=reasonSelect==='other'?reasonText:(reasonSelect||reasonText);
  if(!amount||amount<=0){showToast('⚠️ 有効な金額を入力してください');return;}
  if(!reason){showToast('⚠️ 理由は必須です');return;}
  if(amount>o.total){showToast('⚠️ 返金額は注文金額を超えられません');return;}
  if(!confirm('注文 '+o.id+' に対して '+Y(amount)+' の返金を実行します。\nこの操作は取り消せません。よろしいですか？'))return;
  // インメモリ更新
  o.paymentStatus=amount>=o.total?'refunded':'partially_refunded';
  REFUND_LOG.push({
    id:genId('RFD-'),orderId:o.id,amount:amount,reason:reason,
    refundedBy:'Taisei',createdAt:new Date().toISOString().split('T')[0]
  });
  // Supabase Edge Function 呼び出し（接続時）
  try{
    var res=await fetch(SUPABASE_URL+'/functions/v1/stripe-create-refund',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({
        payment_intent_id:o.paymentIntentId,
        amount:amount,reason:reason,
        order_id:orderId,refunded_by:'Taisei'
      })
    });
    if(res.ok){
      var data=await res.json();
    }
  }catch(e){console.warn('Edge Function call skipped:',e);}
  closeModal();
  showToast('✅ '+Y(amount)+' を返金しました（'+o.id+'）');
  renderPage();
  }finally{executeRefund._p=false;if(refundBtn){refundBtn.disabled=false;refundBtn.textContent='返金実行';}}
}

// ===== PII ACCESS SETTINGS =====
const PII_FIELDS=[
  {key:'member_name',label:'会員氏名の閲覧',desc:'会員登録された顧客の氏名を閲覧できます',editable:true},
  {key:'member_email',label:'会員メールアドレスの閲覧',desc:'会員登録された顧客のメールアドレスを閲覧できます',editable:true},
  {key:'member_phone',label:'会員電話番号の閲覧',desc:'会員登録された顧客の電話番号を閲覧できます',editable:true},
  {key:'member_address',label:'会員住所の閲覧',desc:'会員登録された顧客の住所を閲覧できます',editable:true},
  {key:'order_history',label:'注文履歴の閲覧',desc:'顧客の注文履歴は業務上常に閲覧可能です',editable:false,forcedOn:true},
  {key:'guest_info',label:'ゲスト注文者情報',desc:'',editable:false,forcedOn:false}
];
function renderPiiAccessToggles(b){
  const s=b.pii_access_settings||{...PII_ACCESS_DEFAULTS};
  return PII_FIELDS.map(f=>{
    if(f.key==='guest_info'){
      return '<div class="toggle-row" style="opacity:.6"><div><div style="font-size:12px;font-weight:600">'+f.label+'</div><div style="font-size:10px;color:var(--text-light)">常にOFF</div></div><label class="toggle-sw"><input type="checkbox" disabled><span class="slider" style="cursor:not-allowed"></span></label></div>'+
        '<div style="background:#fff3e0;border-radius:8px;padding:10px 14px;margin:8px 0 4px;font-size:11px;color:#e17055;display:flex;align-items:center;gap:8px"><span>⚠️</span>ゲスト注文者の個人情報はプラットフォームポリシーにより閲覧不可</div>';
    }
    const isOn=f.forcedOn?true:!!s[f.key];
    const disabled=!f.editable;
    return '<div class="toggle-row"><div><div style="font-size:12px;font-weight:600">'+f.label+(f.forcedOn?' <span style="font-size:9px;color:var(--accent);font-weight:700">常にON</span>':'')+'</div><div style="font-size:10px;color:var(--text-light)">'+f.desc+'</div></div><label class="toggle-sw"><input type="checkbox" '+(isOn?'checked ':'')+' '+(disabled?'disabled ':'')+' onchange="togglePiiAccess(\''+b.id+'\',\''+f.key+'\',this.checked)"><span class="slider"'+(disabled?' style="cursor:not-allowed"':'')+'></span></label></div>';
  }).join('');
}
function togglePiiAccess(brandId,key,val){
  const b=BRANDS.find(x=>x.id===brandId);
  if(!b)return;
  if(!b.pii_access_settings)b.pii_access_settings={...PII_ACCESS_DEFAULTS};
  b.pii_access_settings[key]=val;
}
async function savePiiAccessSettings(brandId){
  const b=BRANDS.find(x=>x.id===brandId);
  if(!b)return;
  const settings=b.pii_access_settings||{...PII_ACCESS_DEFAULTS};
  try{
    const{error}=await sb.from('brands').update({pii_access_settings:settings}).eq('id',brandId);
    if(error)throw error;
    showToast('✅ 個人情報アクセス設定を保存しました');
    logAudit('update_service_settings','brands',brandId,{type:'pii_access_settings',settings});
  }catch(e){
    console.error('PII save error:',e);
    showToast('⚠️ 保存に失敗しました（ローカル反映済み）');
  }
}

async function saveAdminDelivery(storeId){
  const s=STORES.find(x=>x.id===storeId);
  if(!s){showToast('❌ 店舗が見つかりません');return;}
  const deliveryFee=parseInt(document.getElementById('adminDeliveryFee').value)||0;
  const minOrder=parseInt(document.getElementById('adminMinOrderAmount').value)||0;
  const minOrderPolicy=document.getElementById('adminMinOrderPolicy').value||'surcharge';
  const surchargeMax=parseInt(document.getElementById('adminSmallOrderMax').value)||0;
  const prepTime=parseInt(document.getElementById('adminPrepTime').value)||30;
  const deliveryRadius=parseInt(document.getElementById('adminDeliveryRadius').value)||5;
  const minOrderApplyTypes={
    dinein:document.getElementById('adminMinOrderDinein').checked,
    takeout:document.getElementById('adminMinOrderTakeout').checked,
    delivery:document.getElementById('adminMinOrderDelivery').checked
  };
  s.deliveryFee=deliveryFee;s.minOrder=minOrder;s.minOrderPolicy=minOrderPolicy;
  s.surchargeMax=surchargeMax;s.prepTime=prepTime;s.deliveryRadius=deliveryRadius;
  s.minOrderApplyTypes=minOrderApplyTypes;
  try{
    const{error}=await sb.from('stores').update({
      delivery_fee:deliveryFee,min_order_amount:minOrder,min_order_policy:minOrderPolicy,
      small_order_surcharge_max:surchargeMax,prep_time_minutes:prepTime,
      delivery_radius_km:deliveryRadius,min_order_apply_types:minOrderApplyTypes
    }).eq('id',storeId);
    if(error)throw error;
    showToast('✅ 配達設定を保存しました');
    logAudit('update_store_settings','stores',storeId,{deliveryFee,minOrder,minOrderPolicy,surchargeMax,prepTime,deliveryRadius,minOrderApplyTypes});
  }catch(e){
    console.error('saveAdminDelivery error:',e);
    showToast('✅ 配達設定を保存しました（ローカル）');
    logAudit('update_store_settings','stores',storeId,{deliveryFee,minOrder,local_only:true});
  }
}

// ===== SERVICE CARDS RENDERER =====
function renderServiceCards(entityId, level, parentId){
  return SERVICES.map(s=>{
    const isOn=getSvc(entityId,s.key);
    let locked=false, lockMsg='';
    if(level==='brand'&&parentId&&!getSvc(parentId,s.key)){locked=true;lockMsg='法人でOFFのため選択不可';}
    if(level==='store'&&parentId&&!getSvc(parentId,s.key)){locked=true;lockMsg='ブランドでOFFのため選択不可';}
    const cls='svc-card'+(isOn?' enabled':'')+(locked?' locked':'');
    const costTag=s.cost==='free'?'<span class="svc-tag free">無料</span>':'<span class="svc-tag paid">追加課金</span>';
    const toggleId='svc_'+entityId+'_'+s.key;
    return '<div class="'+cls+'">'+
      '<div class="svc-head"><div class="svc-icon">'+s.icon+'</div><div class="svc-name">'+s.name+'</div>'+costTag+'</div>'+
      '<div class="svc-desc">'+s.desc+'</div>'+
      '<div class="svc-toggle"><span class="svc-status '+(isOn?'on':'off')+'">'+(isOn?'✅ 利用中':'OFF')+'</span>'+
      '<label class="toggle-sw"><input type="checkbox"'+(isOn?' checked':'')+' onchange="toggleSvc(\''+entityId+'\',\''+s.key+'\',\''+level+'\')"><span class="slider"></span></label></div>'+
      (locked?'<div class="svc-lock">🔒 '+lockMsg+'</div>':'')+
      '</div>';
  }).join('');
}

function toggleSvc(entityId,key,level){
  const cur=getSvc(entityId,key);
  setSvc(entityId,key,!cur);
  // If turning OFF at corp level, also turn OFF for all child brands and stores
  if(level==='corp'&&cur){
    const brands=getBrandsForCorp(CORPS.find(c=>c.id===entityId));
    brands.forEach(b=>{
      setSvc(b.id,key,false);
      getStoresForBrand(b).forEach(s=>setSvc(s.id,key,false));
    });
  }
  // If turning OFF at brand level, also turn OFF for all child stores
  if(level==='brand'&&cur){
    const stores=getStoresForBrand(BRANDS.find(b=>b.id===entityId));
    stores.forEach(s=>setSvc(s.id,key,false));
  }
  renderPage();
  const svcName=SERVICES.find(s=>s.key===key).name;
  showToast(cur?'❌ '+svcName+' をOFFにしました':'✅ '+svcName+' をONにしました');
  logAudit('update_service_settings','services',null,{entityId,service:key,level,enabled:!cur,serviceName:svcName});
}

function genId(prefix){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';let r='';for(let i=0;i<7;i++)r+=c[Math.floor(Math.random()*62)];return prefix+r;}

function readBulkFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const pv=document.getElementById('bulkPreview');
  pv.innerHTML='<div class="upload-result" style="background:#f5f6fa;color:var(--text)">⏳ 読み込み中...</div>';
  document.getElementById('bulkActions').style.display='none';
  if(ext==='csv'){
    const reader=new FileReader();
    reader.onload=function(e){showBulkPreview(parseCSV(e.target.result));};
    reader.readAsText(file,'UTF-8');
  }else if(ext==='xlsx'||ext==='xls'){
    const reader=new FileReader();
    reader.onload=function(e){
      try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];showBulkPreview(XLSX.utils.sheet_to_json(ws,{header:1}));}
      catch(err){pv.innerHTML='<div class="upload-result err">❌ Excel読み込み失敗: '+err.message+'</div>';}
    };
    reader.readAsArrayBuffer(file);
  }else{pv.innerHTML='<div class="upload-result err">❌ CSVまたはExcel(.xlsx)を選択してください</div>';}
}

function parseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  return lines.map(l=>{
    const result=[];let cur='';let inQ=false;
    for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){result.push(cur.trim());cur='';}else cur+=ch;}
    result.push(cur.trim());return result;
  });
}

function showBulkPreview(rows){
  const pv=document.getElementById('bulkPreview');
  if(rows.length<2){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}
  const headers=rows[0].map(h=>String(h||'').replace(/\*/g,'').trim());
  const dataRows=rows.slice(1).filter(r=>r.some(c=>c&&String(c).trim()));
  if(!dataRows.length){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}

  // Validate and build preview
  const validated=validateBulkRows(dataRows,_bulkType);
  _bulkParsed=validated.valid;

  let h='<div style="font-size:12px;font-weight:700;margin:12px 0 8px">📋 プレビュー（'+dataRows.length+'件）</div>';
  if(validated.errors.length){
    h+='<div class="upload-result err" style="margin-bottom:12px">⚠️ '+validated.errors.length+'件のエラー:<br>'+validated.errors.map(e=>'・'+e).join('<br>')+'</div>';
  }
  if(validated.valid.length){
    // Show max 5 display columns for readability
    const dispCols=getDisplayColumns(_bulkType);
    h+='<div style="overflow-x:auto;max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"><table class="data-table" style="font-size:11px"><thead><tr><th>#</th>'+dispCols.map(c=>'<th>'+c.label+'</th>').join('')+'<th>状態</th></tr></thead><tbody>';
    validated.valid.forEach((item,i)=>{
      h+='<tr><td>'+(i+1)+'</td>'+dispCols.map(c=>'<td>'+esc(item[c.key]||'—')+'</td>').join('')+'<td><span style="color:var(--success);font-weight:700;font-size:10px">✅ OK</span></td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:12px;margin-top:12px;color:var(--success);font-weight:700">✅ '+validated.valid.length+'件が登録可能です</div>';
    document.getElementById('bulkActions').style.display='flex';
  }else{
    document.getElementById('bulkActions').style.display='none';
  }
  pv.innerHTML=h;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getDisplayColumns(type){
  if(type==='corp')return [{key:'name',label:'法人名'},{key:'rep',label:'代表者'},{key:'status',label:'ステータス'},{key:'hp',label:'会社HP'}];
  if(type==='brand')return [{key:'name',label:'ブランド名'},{key:'slug',label:'スラッグ'},{key:'corpName',label:'法人'},{key:'mainColor',label:'カラー'},{key:'status',label:'ステータス'}];
  if(type==='store')return [{key:'name',label:'店舗名'},{key:'brandName',label:'ブランド'},{key:'addr',label:'住所'},{key:'tel',label:'電話'},{key:'status',label:'ステータス'}];
  if(type==='account')return [{key:'name',label:'氏名'},{key:'email',label:'メール'},{key:'role',label:'権限'},{key:'corpName',label:'法人'}];
  return [];
}

function validateBulkRows(dataRows,type){
  const valid=[],errors=[];
  dataRows.forEach((row,i)=>{
    const rn=i+2;const g=idx=>String(row[idx]||'').trim();
    try{
      if(type==='corp'){
        const name=g(0),rep=g(1);
        if(!name){errors.push('行'+rn+': 法人名が空');return;}
        valid.push({name,rep:rep||'—',status:g(2)||'active',hp:g(3),recruit:g(4),created:new Date().toISOString().split('T')[0]});
      }else if(type==='brand'){
        const name=g(0),slug=g(1),corpId=g(2);
        if(!name||!slug){errors.push('行'+rn+': ブランド名またはスラッグが空');return;}
        const corp=CORPS.find(c=>c.id===corpId);
        if(!corp){errors.push('行'+rn+': 法人ID「'+corpId+'」が存在しません');return;}
        valid.push({name,slug,corpId,corpName:corp.name,status:g(3)||'active',mainColor:g(4)||'#6c5ce7',subColor:g(5)||'#1A1A1A',hdrBg:g(6)||'',hdrTx:g(7)||'#FFFFFF',fontColor:g(8)||'#333333',font:g(9)||'Noto Sans JP'});
      }else if(type==='store'){
        const name=g(0),brandId=g(1);
        if(!name){errors.push('行'+rn+': 店舗名が空');return;}
        const brand=BRANDS.find(b=>b.id===brandId);
        if(!brand){errors.push('行'+rn+': ブランドID「'+brandId+'」が存在しません');return;}
        valid.push({name,brandId,brandName:brand.name,addr:g(2),tel:g(3),email:g(4),station:g(5),priceRange:g(6),seats:g(7),smoking:g(8)||'全席禁煙',children:g(9)||'同伴不可',pets:g(10)||'同伴不可',parking:g(11)||'なし',lat:g(12),lng:g(13),deliveryRadius:g(14),deliveryFee:g(15),minOrder:g(16),serviceCharge:g(17)||'0',status:g(18)||'active'});
      }else if(type==='account'){
        const name=g(0),email=g(1),role=g(2),corpId=g(3);
        if(!name||!email){errors.push('行'+rn+': 氏名またはメールが空');return;}
        if(!['owner','admin','staff'].includes(role)){errors.push('行'+rn+': 権限「'+role+'」が不正（owner/admin/staffのいずれか）');return;}
        const corp=CORPS.find(c=>c.id===corpId);
        if(!corp){errors.push('行'+rn+': 法人ID「'+corpId+'」が存在しません');return;}
        valid.push({name,email,role,corpId,corpName:corp.name,phone:g(4)});
      }
    }catch(e){errors.push('行'+rn+': '+e.message);}
  });
  return {valid,errors};
}

function generateCostDemoData(){
  const logs=[];

  for(let m=0;m<3;m++){
    const year=2026,month=2-m;// Mar=2, Feb=1, Jan=0
    const daysInMonth=new Date(year,month+1,0).getDate();
    COST_STORES.forEach(store=>{
      const planMultiplier=store.plan==='EXPERT'?3.5:store.plan==='PRO'?1.8:1;
      COST_CONTENT_TYPES.forEach(ct=>{
        // Random usage count weighted by plan
        let baseCount;
        if(ct.costPerUnit>=39)baseCount=Math.floor(Math.random()*3*planMultiplier)+1;
        else if(ct.costPerUnit>=15)baseCount=Math.floor(Math.random()*8*planMultiplier)+2;
        else baseCount=Math.floor(Math.random()*15*planMultiplier)+3;
        for(let i=0;i<baseCount;i++){
          const day=Math.floor(Math.random()*daysInMonth)+1;
          const d=new Date(year,month,day);
          if(d>now)continue;
          logs.push({
            store_id:store.id,brand_id:store.brandId,corp_id:store.corpId,
            content_type:ct.key,model:ct.model,
            estimated_cost_jpy:ct.costPerUnit,
            created_at:d.toISOString()
          });
        }
      });
    });
  }
  return logs;
}

  return COST_LOGS.filter(l=>{const d=new Date(l.created_at);return d>=from&&d<=to;});
}

function onCostPeriodChange(){
  const v=document.getElementById('costPeriod').value;
  costFilter.period=v;
  document.getElementById('costCustomRange').style.display=v==='custom'?'flex':'none';
  if(v==='custom'){
    costFilter.customFrom=document.getElementById('costFrom').value;
    costFilter.customTo=document.getElementById('costTo').value;
  }
  refreshCostData();
}

function refreshCostData(){
  if(costFilter.period==='custom'){
    costFilter.customFrom=document.getElementById('costFrom').value;
    costFilter.customTo=document.getElementById('costTo').value;
  }
  document.getElementById('costSummaryCards').innerHTML=renderCostSummaryCards();
  document.getElementById('costContentTable').innerHTML=renderCostContentTable();
  document.getElementById('costStoreTable').innerHTML=renderCostStoreTable();
  document.getElementById('costAlertSection').innerHTML=renderCostAlertSection();
  updateCostChart();
}

// (B) Summary cards
function renderCostSummaryCards(){
  const thisM=getThisMonthLogs();
  const lastM=getLastMonthLogs();
  const thisTotal=thisM.reduce((s,l)=>s+l.estimated_cost_jpy,0);
  const lastTotal=lastM.reduce((s,l)=>s+l.estimated_cost_jpy,0);
  const pctChange=lastTotal>0?((thisTotal-lastTotal)/lastTotal*100):0;
  const arrow=pctChange>=0?'↑':'↓';
  const pctColor=pctChange>=0?'var(--danger)':'var(--success)';

  // Most expensive store
  const storeMap={};
  thisM.forEach(l=>{storeMap[l.store_id]=(storeMap[l.store_id]||0)+l.estimated_cost_jpy;});
  let topStore={name:'—',cost:0};
  Object.entries(storeMap).forEach(([sid,cost])=>{
    if(cost>topStore.cost){const s=COST_STORES.find(x=>x.id===sid);topStore={name:s?s.name:'—',cost};}
  });

  // Most expensive content type
  const ctMap={};
  thisM.forEach(l=>{ctMap[l.content_type]=(ctMap[l.content_type]||0)+l.estimated_cost_jpy;});
  let topCt={name:'—',cost:0};
  Object.entries(ctMap).forEach(([key,cost])=>{
    if(cost>topCt.cost){const ct=COST_CONTENT_TYPES.find(x=>x.key===key);topCt={name:ct?ct.label:'—',cost};}
  });

  // Count real logs in this month
  var realCount=0;
  if(COST_REAL_LOGS.length>0){var mStart=new Date(2026,2,1).toISOString();COST_REAL_LOGS.forEach(function(l){if(l.created_at>=mStart)realCount++;});}
  var realSub=realCount>0?' (実データ '+realCount+'件含む)':'';

  return '<div class="stat-row" style="grid-template-columns:repeat(4,1fr)">'+
    '<div class="stat-card purple"><div class="sc-label">今月のAIコスト合計</div><div class="sc-val">'+Y(thisTotal)+'</div><div class="sc-sub">'+thisM.length+'回の利用'+realSub+'</div></div>'+
    '<div class="stat-card '+(pctChange>=0?'orange':'green')+'"><div class="sc-label">前月比</div><div class="sc-val" style="color:'+pctColor+'">'+arrow+' '+Math.abs(pctChange).toFixed(1)+'%</div><div class="sc-sub">先月: '+Y(lastTotal)+'</div></div>'+
    '<div class="stat-card blue"><div class="sc-label">最高コスト店舗</div><div class="sc-val" style="font-size:16px">'+topStore.name+'</div><div class="sc-sub">'+Y(topStore.cost)+'</div></div>'+
    '<div class="stat-card green"><div class="sc-label">最高コストAI機能</div><div class="sc-val" style="font-size:16px">'+topCt.name+'</div><div class="sc-sub">'+Y(topCt.cost)+'</div></div>'+
  '</div>';
}

// (D) Content type breakdown table
function renderCostContentTable(){
  const logs=getFilteredCostLogs();
  const map={};
  COST_CONTENT_TYPES.forEach(ct=>{map[ct.key]={count:0,total:0};});
  logs.forEach(l=>{if(map[l.content_type]){map[l.content_type].count++;map[l.content_type].total+=l.estimated_cost_jpy;}});

  const rows=COST_CONTENT_TYPES.map(ct=>{
    const d=map[ct.key];
    const avg=d.count>0?(d.total/d.count).toFixed(0):0;
    const limitCell=ct.hasLimit?'<span style="color:var(--accent);font-weight:600">上限あり</span>':'<span style="color:var(--text-light)">—</span>';
    return '<tr><td>'+ct.label+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:'+(ct.model.includes('Sonnet')?'var(--accent)20;color:var(--accent)':ct.model.includes('Haiku')?'#00b89420;color:#00b894':'#e1705520;color:#e17055')+'">'+ct.model+'</span></td><td class="r">'+d.count.toLocaleString()+'</td><td class="r">'+Y(d.total)+'</td><td class="r">'+Y(Number(avg))+'</td><td class="r">'+limitCell+'</td></tr>';
  });

  // Sort by total cost desc
  const sorted=COST_CONTENT_TYPES.map(ct=>({ct,total:map[ct.key].total})).sort((a,b)=>b.total-a.total);
  const sortedRows=sorted.map(({ct})=>{
    const d=map[ct.key];
    const avg=d.count>0?(d.total/d.count).toFixed(0):0;
    const limitCell=ct.hasLimit?'<span style="color:var(--accent);font-weight:600">上限あり</span>':'<span style="color:var(--text-light)">—</span>';
    return '<tr><td>'+ct.label+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:'+(ct.model.includes('Sonnet')?'rgba(108,92,231,.12);color:var(--accent)':ct.model.includes('Haiku')?'rgba(0,184,148,.12);color:#00b894':'rgba(225,112,85,.12);color:#e17055')+'">'+ct.model+'</span></td><td class="r">'+d.count.toLocaleString()+'</td><td class="r">'+Y(d.total)+'</td><td class="r">'+Y(Number(avg))+'</td><td class="r">'+limitCell+'</td></tr>';
  });

  // Count regenerates from real logs
  var regenMap={};
  COST_REAL_LOGS.forEach(function(l){if(l.action==='regenerate'){regenMap[l.content_type]=(regenMap[l.content_type]||0)+1;}});

  return '<div class="card"><div class="card-title">🤖 AI機能別コスト内訳</div>'+
    '<table class="dt"><thead><tr><th>AI機能</th><th>モデル</th><th class="r">利用回数</th><th class="r">再生成</th><th class="r">合計コスト</th><th class="r">平均コスト/回</th><th class="r">上限設定</th></tr></thead><tbody>'+
    sorted.map(function(item){var ct=item.ct;var d=map[ct.key];var avg=d.count>0?(d.total/d.count).toFixed(0):0;var regen=regenMap[ct.key]||0;var limitCell=ct.hasLimit?'<span style="color:var(--accent);font-weight:600">上限あり</span>':'<span style="color:var(--text-light)">—</span>';return '<tr><td>'+ct.label+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:'+(ct.model.includes('Sonnet')?'rgba(108,92,231,.12);color:var(--accent)':ct.model.includes('Haiku')?'rgba(0,184,148,.12);color:#00b894':'rgba(225,112,85,.12);color:#e17055')+'">'+ct.model+'</span></td><td class="r">'+d.count.toLocaleString()+'</td><td class="r" style="color:#888">'+(regen>0?regen+'回':'—')+'</td><td class="r">'+Y(d.total)+'</td><td class="r">'+Y(Number(avg))+'</td><td class="r">'+limitCell+'</td></tr>';}).join('')+
    '</tbody></table></div>';

// (E) Store cost table
function renderCostStoreTable(){
  const thisM=getThisMonthLogs();
  const storeMap={};
  thisM.forEach(l=>{storeMap[l.store_id]=(storeMap[l.store_id]||0)+l.estimated_cost_jpy;});

  const rows=COST_STORES.map(s=>{
    const cost=storeMap[s.id]||0;
    const planCost=PLAN_COSTS[s.plan]||0;
    const diff=cost-planCost;
    const isOver=diff>0;
    const alertLimit=costAlerts[s.id]||PLAN_ALERT_DEFAULTS[s.plan];
    const alertPct=cost/alertLimit*100;
    const alertColor=alertPct>=100?'var(--danger)':alertPct>=80?'#e17055':'var(--success)';
    const grossProfit=Math.round(s.moRevenue*0.0062);
    return {s,cost,planCost,diff,isOver,alertPct,alertColor,grossProfit};
  }).sort((a,b)=>b.cost-a.cost);

  // Count API calls per store for heavy user detection
  const storeCallMap={};
  thisM.forEach(l=>{storeCallMap[l.store_id]=(storeCallMap[l.store_id]||0)+1;});
  const callCounts=Object.values(storeCallMap).sort((a,b)=>b-a);
  const heavyThreshold=callCounts.length>=3?callCounts[2]:callCounts[0]||0; // top 3

  const trs=rows.map(r=>{
    const calls=storeCallMap[r.s.id]||0;
    const isHeavy=calls>=heavyThreshold&&calls>0;
    const rowStyle=r.isOver?'background:rgba(214,48,49,.05)':isHeavy?'background:rgba(108,92,231,.04)':'';
    const heavyBadge=isHeavy?'<span style="display:inline-block;margin-left:6px;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(108,92,231,.12);color:var(--accent)">🔥 ヘビーユーザー</span>':'';
    return '<tr style="'+rowStyle+'"><td>'+r.s.name+heavyBadge+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--accent-bg);color:var(--accent)">'+r.s.plan+'</span></td><td class="r" style="font-weight:700;color:'+(r.isOver?'var(--danger)':'var(--text)')+'">'+Y(r.cost)+'</td><td class="r">'+Y(r.planCost)+'</td><td class="r" style="font-weight:700;color:'+(r.isOver?'var(--danger)':'var(--success)')+'">'+
    (r.diff>=0?'+':'')+Y(r.diff)+'</td><td class="r">'+Y(r.s.moRevenue)+'</td><td class="r">'+Y(r.grossProfit)+'</td><td class="r" style="font-size:11px">'+calls+'回</td><td><div style="width:60px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="width:'+Math.min(r.alertPct,100)+'%;height:100%;background:'+r.alertColor+';border-radius:3px"></div></div></td></tr>';
  });

  const srcBadge=_costDataSource==='real'?'<span style="margin-left:8px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(0,184,148,.12);color:#00b894">🟢 実データ接続中</span>':'<span style="margin-left:8px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(225,112,85,.12);color:#e17055">デモデータ</span>';
  return '<div class="card"><div class="card-title">🏪 店舗別コスト一覧 '+srcBadge+' <span class="ct-right"><button class="btn btn-s btn-sm" onclick="downloadCostCSV()">📥 CSVダウンロード</button></span></div>'+
    '<table class="dt"><thead><tr><th>店舗名</th><th>プラン</th><th class="r">今月AIコスト</th><th class="r">プラン原価</th><th class="r">差額</th><th class="r">MO売上</th><th class="r">粗利</th><th class="r">API呼出</th><th>使用率</th></tr></thead><tbody>'+
    trs.join('')+
    '</tbody></table></div>';
}

// CSV download
function downloadCostCSV(){
  const thisM=getThisMonthLogs();
  const storeMap={};
  thisM.forEach(l=>{storeMap[l.store_id]=(storeMap[l.store_id]||0)+l.estimated_cost_jpy;});
  let csv='店舗名,プラン,今月AIコスト,プラン原価,差額,MO売上,粗利\n';
  COST_STORES.forEach(s=>{
    const cost=storeMap[s.id]||0;
    const planCost=PLAN_COSTS[s.plan]||0;
    const diff=cost-planCost;
    const gp=Math.round(s.moRevenue*0.0062);
    csv+=s.name+','+s.plan+','+cost+','+planCost+','+diff+','+s.moRevenue+','+gp+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='aiden_cost_report_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
  showToast('📥 CSVをダウンロードしました');
}

// (C) Chart.js cost trend chart
let costChartInstance=null;
function initCostManagement(){
  updateCostChart();
  loadRealCostLogs();
}

function updateCostChart(){
  const canvas=document.getElementById('costChart');
  if(!canvas)return;
  if(costChartInstance){costChartInstance.destroy();costChartInstance=null;}

  const scaleEl=document.getElementById('costChartScale');
  const scale=scaleEl?scaleEl.value:'monthly';
  const logs=getFilteredCostLogs();

  let labels=[],datasets=[];

  if(scale==='daily'){
    // Daily for current period
    const dayMap={};
    logs.forEach(l=>{
      const d=new Date(l.created_at);
      const key=(d.getMonth()+1)+'/'+d.getDate();
      dayMap[key]=(dayMap[key]||0)+l.estimated_cost_jpy;
    });
    // Sort by date
    const sortedKeys=Object.keys(dayMap).sort((a,b)=>{
      const [am,ad]=a.split('/').map(Number),[bm,bd]=b.split('/').map(Number);
      return am===bm?ad-bd:am-bm;
    });
    labels=sortedKeys;
    datasets=[{label:'AIコスト (¥)',data:sortedKeys.map(k=>dayMap[k]),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.1)',fill:true,tension:.3,pointRadius:2}];
  } else if(scale==='weekly'){
    // Group by week
    const weekMap={};
    logs.forEach(l=>{
      const d=new Date(l.created_at);
      const startOfYear=new Date(d.getFullYear(),0,1);
      const weekNum=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
      const key=d.getMonth()+1+'月W'+weekNum;
      weekMap[key]=(weekMap[key]||0)+l.estimated_cost_jpy;
    });
    const sortedKeys=Object.keys(weekMap);
    labels=sortedKeys;
    datasets=[{label:'AIコスト (¥)',data:sortedKeys.map(k=>weekMap[k]),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.1)',fill:true,tension:.3,pointRadius:3}];
  } else {
    // Monthly
    const monthMap={'1月':0,'2月':0,'3月':0};
    logs.forEach(l=>{
      const d=new Date(l.created_at);
      const key=(d.getMonth()+1)+'月';
      if(monthMap[key]!==undefined)monthMap[key]+=l.estimated_cost_jpy;
    });
    labels=Object.keys(monthMap);
    datasets=[{label:'AIコスト (¥)',data:Object.values(monthMap),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.15)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#6c5ce7'}];
  }

  // Plan cost reference lines (monthly totals for all stores)
  const storeCount=COST_STORES.length;
  const stdLine=PLAN_COSTS.STD*COST_STORES.filter(s=>s.plan==='STD').length;
  const proLine=PLAN_COSTS.PRO*COST_STORES.filter(s=>s.plan==='PRO').length;
  const expLine=PLAN_COSTS.EXPERT*COST_STORES.filter(s=>s.plan==='EXPERT').length;
  const totalPlanLine=stdLine+proLine+expLine;

  // Add plan lines only for monthly view
  if(scale==='monthly'){
    datasets.push({label:'想定原価ライン (全店合計)',data:labels.map(()=>totalPlanLine),borderColor:'rgba(214,48,49,.5)',borderDash:[6,4],pointRadius:0,fill:false,borderWidth:2});

    // Per-plan lines

// Deadline check: 調整登録の締切 = 翌月の3営業日前
function getAdjDeadline(targetMonth){
  const d=new Date(targetMonth);
  d.setMonth(d.getMonth()+1);// 翌月1日
  let bizDays=0;
  const deadline=new Date(d);
  // 翌月1日から3営業日前を算出 = 翌月1日の3営業日前
  // → 前月末から逆算して3営業日前
  deadline.setDate(deadline.getDate()-1);// 前月末日
  bizDays=0;
  while(bizDays<3){
    const dow=deadline.getDay();
    if(dow!==0&&dow!==6)bizDays++;
    if(bizDays<3)deadline.setDate(deadline.getDate()-1);
  }
  return deadline;
}

function isAdjDeadlinePassed(targetMonth){
  const deadline=getAdjDeadline(targetMonth);
  return new Date()>deadline;
}

function formatMonth(dateStr){
  const d=new Date(dateStr);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月';
}

// Recalculate invoice totals based on adjustments
function recalcInvoiceAdjustments(){
  INVOICES.forEach(inv=>{
    const adjs=INVOICE_ADJUSTMENTS.filter(a=>a.brandId===inv.brandId&&a.targetMonth===inv.month);
    let adjTotal=0;
    adjs.forEach(a=>{
      if(a.type==='credit')adjTotal-=a.amount;
      else adjTotal+=a.amount;
    });
    inv.adjustmentTotal=adjTotal;
    inv.total=inv.baseAmount+adjTotal;
  });
}
recalcInvoiceAdjustments();

function toLocalDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getAvailableMonths(){
  const months=new Set();
  INVOICES.forEach(i=>months.add(i.month));
  INVOICE_ADJUSTMENTS.forEach(a=>months.add(a.targetMonth));
  // Add current and next month
  const now=new Date();
  const cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
  const nxtD=new Date(now.getFullYear(),now.getMonth()+1,1);
  const nxt=nxtD.getFullYear()+'-'+String(nxtD.getMonth()+1).padStart(2,'0')+'-01';
  months.add(cur);months.add(nxt);
  return Array.from(months).sort().reverse();
}

function checkAdjDeadline(){
  const month=document.getElementById('adjTargetMonth').value;
  const warn=document.getElementById('adjDeadlineWarning');
  if(!warn)return;
  if(isAdjDeadlinePassed(month)){
    const dl=getAdjDeadline(month);
    warn.innerHTML='<div style="margin-top:14px;padding:12px;background:#fff3e0;border-radius:8px;font-size:11px;color:#e17055;line-height:1.6">'+
      '⚠️ <strong>'+formatMonth(month)+'</strong> の調整登録締切（'+dl.toLocaleDateString('ja-JP')+'）を過ぎています。登録は可能ですが、既に発行済みの請求書には自動反映されません。</div>';
  } else {
    warn.innerHTML='';
  }
}

function saveAdjustment(){
  const brandId=document.getElementById('adjBrand').value;
  const targetMonth=document.getElementById('adjTargetMonth').value;
  const type=document.getElementById('adjType').value;
  const category=document.getElementById('adjCategory').value;
  const amount=parseInt(document.getElementById('adjAmount').value);
  const reason=document.getElementById('adjReason').value.trim();

  if(!brandId||!targetMonth||!amount||amount<=0||!reason){
    showToast('⚠️ 必須項目をすべて入力してください');return;
  }

  const adj={
    id:genId('ADJ-'),
    invoiceId:null,
    brandId:brandId,
    type:type,
    amount:amount,
    reason:reason,
    category:category,
    targetMonth:targetMonth,
    createdBy:'Taisei',
    createdAt:new Date().toISOString().split('T')[0]
  };
  INVOICE_ADJUSTMENTS.push(adj);
  recalcInvoiceAdjustments();

  // Supabase保存（接続時）
  try{
    sb.from('invoice_adjustments').insert({
      brand_id:brandId,type:type,amount:amount,reason:reason,
      category:category,target_month:targetMonth,created_by:'Taisei'
    }).then(function(){});
  }catch(e){}

  closeModal();
  const brand=BRANDS.find(function(b){return b.id===brandId;});
  showToast('✅ 調整項目を追加しました（'+(brand?brand.name:'')+' / '+(type==='credit'?'-':'+')+Y(amount)+'）');
  renderPage();
}

function generateMonthlyInvoices(){
  // 当月の請求書を生成（調整項目を反映）
  const now=new Date();
  const curMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
  const drafts=INVOICES.filter(function(i){return i.month===curMonth&&i.status==='draft';});

  if(drafts.length===0){
    showToast('⚠️ 生成対象の下書き請求書がありません');return;
  }

  // 調整項目を反映して発行
  drafts.forEach(function(inv){
    const adjs=INVOICE_ADJUSTMENTS.filter(function(a){return a.brandId===inv.brandId&&a.targetMonth===inv.month;});
    let adjTotal=0;
    const adjLines=[];
    adjs.forEach(function(a){
      if(a.type==='credit'){adjTotal-=a.amount;adjLines.push(ADJ_CATEGORIES[a.category]+'：'+a.reason+' -'+Y(a.amount));}
      else{adjTotal+=a.amount;adjLines.push(ADJ_CATEGORIES[a.category]+'：'+a.reason+' +'+Y(a.amount));}
      a.invoiceId=inv.id;
    });
    inv.adjustmentTotal=adjTotal;
    inv.total=inv.baseAmount+adjTotal;
    inv.status='issued';
    inv.issuedAt=new Date().toISOString().split('T')[0];
  });

  showToast('✅ '+drafts.length+'件の請求書を発行しました（調整項目反映済み）');
  renderPage();
}

function getKPIDateRange(){
  const period=document.getElementById('kpiPeriod')?.value||'this_month';
  const now=new Date();
  let start,end;
  if(period==='this_month'){
    start=new Date(now.getFullYear(),now.getMonth(),1);
    end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
  }else if(period==='last_month'){
    start=new Date(now.getFullYear(),now.getMonth()-1,1);
    end=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);
  }else{
    start=new Date(now);start.setDate(start.getDate()-30);
    end=now;
  }
  return {start,end};
}

function onKPIStoreChange(v){kpiData.selectedStore=v;loadKPIData();}
function onKPIPeriodChange(){loadKPIData();}

async function loadKPIData(){
  try{
    const storeId=kpiData.selectedStore;
    const {start,end}=getKPIDateRange();
    const startISO=start.toISOString();
    const endISO=end.toISOString();

    // Fetch current period orders
    let q=sb.from('orders').select('id,store_id,total_amount,payment_status,customer_id,created_at,application_fee_amount').gte('created_at',startISO).lte('created_at',endISO);
    if(storeId!=='all')q=q.eq('store_id',storeId);
    const {data:orders,error}=await q;
    if(error)throw error;
    const currentOrders=orders||[];

    // Fetch previous period for comparison
    const periodMs=end.getTime()-start.getTime();
    const prevStart=new Date(start.getTime()-periodMs);
    const prevEnd=new Date(start.getTime()-1);
    let pq=sb.from('orders').select('id,total_amount,application_fee_amount').gte('created_at',prevStart.toISOString()).lte('created_at',prevEnd.toISOString());
    if(storeId!=='all')pq=pq.eq('store_id',storeId);
    const {data:prevOrders}=await pq;
    const prev=prevOrders||[];

    // Today's orders
    const todayStr=new Date().toISOString().slice(0,10);
    const todayOrders=currentOrders.filter(o=>o.created_at&&o.created_at.slice(0,10)===todayStr);

    // Calculations
    const todayCount=todayOrders.length;
    const gmv=currentOrders.reduce((s,o)=>s+(o.total_amount||0),0);
    const avgOrder=currentOrders.length>0?Math.round(gmv/currentOrders.length):0;
    const fee=currentOrders.reduce((s,o)=>s+(o.application_fee_amount||0),0);

    const prevGmv=prev.reduce((s,o)=>s+(o.total_amount||0),0);
    const prevFee=prev.reduce((s,o)=>s+(o.application_fee_amount||0),0);
    const prevAvg=prev.length>0?Math.round(prevGmv/prev.length):0;

    // Update summary cards
    updateKPICard(0,todayCount.toLocaleString(),'');
    updateKPICard(1,'¥'+gmv.toLocaleString(),pctChange(gmv,prevGmv));
    updateKPICard(2,'¥'+avgOrder.toLocaleString(),pctChange(avgOrder,prevAvg));
    updateKPICard(3,'¥'+fee.toLocaleString(),pctChange(fee,prevFee));

    // Charts: daily data for last 30 days
    await renderKPICharts(storeId);

    // Product KPIs
    await loadProductKPIs(currentOrders);

    // Tech KPIs
    loadTechKPIs(currentOrders);
  }catch(e){
    console.error('KPI load error:',e);
    showToast('KPIデータの取得に失敗しました');
  }
}

function pctChange(curr,prev){
  if(!prev||prev===0)return '';
  const pct=((curr-prev)/prev*100).toFixed(1);
  const up=pct>=0;
  return '<span style="color:'+(up?'var(--success)':'var(--danger)')+';font-size:10px;font-weight:700">'+(up?'↑':'↓')+Math.abs(pct)+'% 前月比</span>';
}

function updateKPICard(idx,val,sub){
  const vEl=document.getElementById('kpiCard'+idx);
  const sEl=document.getElementById('kpiCardSub'+idx);
  if(vEl)vEl.textContent=val;
  if(sEl)sEl.innerHTML=sub;
}

async function renderKPICharts(storeId){
  const now=new Date();
  const labels=[];const dailyCounts=[];const dailyGMV=[];
  for(let i=29;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    labels.push((d.getMonth()+1)+'/'+d.getDate());
    dailyCounts.push(0);dailyGMV.push(0);
  }
  // Fetch 30 days of orders
  const start30=new Date(now);start30.setDate(start30.getDate()-29);start30.setHours(0,0,0,0);
  let q=sb.from('orders').select('total_amount,created_at').gte('created_at',start30.toISOString());
  if(storeId!=='all')q=q.eq('store_id',storeId);
  const {data:orders30}=await q;
  (orders30||[]).forEach(o=>{
    if(!o.created_at)return;
    const ds=o.created_at.slice(0,10);
    const d=new Date(ds);
    const diff=Math.floor((d-start30)/(86400000));
    if(diff>=0&&diff<30){dailyCounts[diff]++;dailyGMV[diff]+=(o.total_amount||0);}
  });

  // Daily orders chart
  const ctx1=document.getElementById('kpiChartDaily');
  if(ctx1){
    if(kpiChartDaily)kpiChartDaily.destroy();
    kpiChartDaily=new Chart(ctx1,{type:'line',data:{labels,datasets:[{label:'注文数',data:dailyCounts,borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,0.1)',fill:true,tension:0.3,pointRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  }

  // Daily GMV chart
  const ctx2=document.getElementById('kpiChartGMV');
  if(ctx2){
    if(kpiChartGMV)kpiChartGMV.destroy();
    kpiChartGMV=new Chart(ctx2,{type:'bar',data:{labels,datasets:[{label:'GMV (¥)',data:dailyGMV,backgroundColor:'rgba(108,92,231,0.6)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'¥'+v.toLocaleString()}}}}});
  }
}

async function loadProductKPIs(currentOrders){
  // Repeat rate: customers who ordered 2+ times this month / total unique customers
  const custCounts={};
  currentOrders.forEach(o=>{if(o.customer_id){custCounts[o.customer_id]=(custCounts[o.customer_id]||0)+1;}});
  const uniqueCustomers=Object.keys(custCounts).length;
  const repeatCustomers=Object.values(custCounts).filter(c=>c>=2).length;
  const repeatRate=uniqueCustomers>0?(repeatCustomers/uniqueCustomers*100).toFixed(1)+'%':'—';
  const el=document.getElementById('kpiRepeatRate');
  if(el)el.textContent=repeatRate;

  // AI adoption rate
  try{
    const {data:aiAll}=await sb.from('ai_interactions').select('id',{count:'exact'});
    const {data:aiPub}=await sb.from('ai_interactions').select('id',{count:'exact'}).eq('status','published');
    const aiTotal=aiAll?.length||0;
    const aiPublished=aiPub?.length||0;
    const aiRate=aiTotal>0?(aiPublished/aiTotal*100).toFixed(1)+'%':'—';
    const aiEl=document.getElementById('kpiAIRate');
    if(aiEl)aiEl.textContent=aiRate;
  }catch(e){
    const aiEl=document.getElementById('kpiAIRate');
    if(aiEl)aiEl.innerHTML='<span style="color:var(--text-light)" title="テーブル未作成">—</span>';
  }
}

function loadTechKPIs(currentOrders){
  const total=currentOrders.length;
  const paid=currentOrders.filter(o=>o.payment_status==='paid').length;
  const rate=total>0?(paid/total*100).toFixed(1)+'%':'—';
  const el=document.getElementById('kpiPaymentRate');
  if(el)el.textContent=rate;
}

  }catch(e){el.innerHTML='<div style="color:#D32F2F">エラー: '+e.message+'</div>';}
}

async function showCSDetail(sessionId){
  try{
    const r=await fetch(CS_API+'/history?session_id='+sessionId);
    const d=await r.json();
    const msgs=d.messages||[];
    let h='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
      '<button class="btn btn-secondary btn-sm" onclick="loadCSEscalations()">← 戻る</button>'+
      '<span style="font-size:14px;font-weight:600">セッション: '+sessionId.substring(0,8)+'...</span>'+
      '<button class="btn btn-primary btn-sm" onclick="resolveCS(\''+sessionId+'\')">対応完了</button>'+
    '</div>';
    h+='<div style="max-height:500px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:16px;background:#fafafa">';
    for(const m of msgs){
      const isUser=m.role==='user';
      const bg=isUser?'#E3F2FD':'#fff';
      const label=isUser?'ユーザー':m.role==='assistant'?'AI':'システム';
      const time=new Date(m.created_at).toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'});
      const fb=m.feedback?(' | フィードバック: '+(m.feedback==='helpful'?'👍':'👎')):'';
      h+='<div style="background:'+bg+';border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin-bottom:8px">'+
        '<div style="font-size:11px;color:#888;margin-bottom:4px"><strong>'+label+'</strong> — '+time+fb+'</div>'+
        '<div style="font-size:14px;line-height:1.6;white-space:pre-wrap">'+escHtml(m.content)+'</div>'+
      '</div>';
    }
    h+='</div>';
    document.getElementById('csEscList').innerHTML=h;
  }catch(e){showToast('チャット履歴の取得に失敗しました');}
}

async function resolveCS(sessionId){
  try{
    await fetch(CS_API+'/resolve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})});
    showToast('対応完了にしました');
    loadCSEscalations();
  }catch(e){showToast('エラー: '+e.message);}
}

function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';};

// CS Analytics
async function loadCSAnalytics(){
  const el=document.getElementById('csAnalytics');
  try{
    const r=await fetch(CS_API+'/analytics?period=month');
    const d=await r.json();
    let h='<div class="stat-row">'+
      '<div class="stat-card purple"><div class="sc-label">総問い合わせ</div><div class="sc-val">'+(d.total_sessions||0)+'</div><div class="sc-sub">過去30日間</div></div>'+
      '<div class="stat-card orange"><div class="sc-label">エスカレ件数</div><div class="sc-val">'+(d.escalated_count||0)+'</div><div class="sc-sub">エスカレ率: '+(d.escalation_rate||'0')+'%</div></div>'+
      '<div class="stat-card green"><div class="sc-label">解決済み</div><div class="sc-val">'+(d.resolved_count||0)+'</div></div>'+
      '<div class="stat-card blue"><div class="sc-label">満足度</div><div class="sc-val">'+(d.feedback?.helpful_rate||'0')+'%</div><div class="sc-sub">👍 '+(d.feedback?.helpful||0)+' / 👎 '+(d.feedback?.not_helpful||0)+'</div></div>'+
    '</div>';
    // Daily chart
    h+='<div style="margin-top:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px">日別問い合わせ数</h3>';
    h+='<canvas id="csDailyChart" height="200"></canvas></div>';
    el.innerHTML=h;
    // Render chart
    const daily=d.daily||{};
    const labels=Object.keys(daily).sort();
    const values=labels.map(l=>daily[l]);
    if(labels.length>0&&typeof Chart!=='undefined'){
      new Chart(document.getElementById('csDailyChart'),{
        type:'bar',
        data:{labels:labels.map(l=>l.substring(5)),datasets:[{label:'問い合わせ数',data:values,backgroundColor:'rgba(211,47,47,0.6)',borderRadius:4}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
      });
    }
  }catch(e){el.innerHTML='<div style="color:#D32F2F;padding:24px">分析データの取得に失敗: '+e.message+'</div>';}
}

// CS Policies
async function loadCSPolicies(){
  const el=document.getElementById('csPolicies');
  try{
    const r=await fetch(CS_API+'/policies');
    const d=await r.json();
    const policies=d.policies||[];
    const typeLabels={refund:'返金ポリシー',allergen:'アレルギー対応',business_hours:'営業時間',takeout_delivery:'テイクアウト/デリバリー',points_coupons:'ポイント/クーポン',other:'その他'};
    let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<h3 style="font-size:15px;font-weight:700;margin:0">店舗運営方針</h3>'+
      '<button class="btn btn-primary btn-sm" onclick="showAddPolicyForm()">+ 新規追加</button>'+
    '</div>';
    h+='<div id="policyForm" style="display:none;background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:16px;margin-bottom:16px">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'+
        '<div><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">ポリシータイプ</label>'+
          '<select id="policyType" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px">'+
            Object.entries(typeLabels).map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join('')+
          '</select></div>'+
        '<div><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">適用範囲</label>'+
          '<select id="policyScope" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px">'+
            '<option value="brand">ブランド共通</option><option value="store">店舗固有</option>'+
          '</select></div>'+
      '</div>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">ブランド/店舗ID</label>'+
        '<input id="policyScopeId" type="text" placeholder="UUID" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box"></div>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">内容</label>'+
        '<textarea id="policyContent" rows="3" placeholder="ポリシーの内容を記述..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box"></textarea></div>'+
      '<div style="display:flex;gap:8px">'+
        '<button class="btn btn-primary btn-sm" onclick="savePolicy()">保存</button>'+
        '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'policyForm\').style.display=\'none\'">キャンセル</button>'+
      '</div>'+
      '<input type="hidden" id="policyEditId" value="">'+
    '</div>';
    if(!policies.length){h+='<div style="text-align:center;padding:40px;color:#888">運営方針はまだ登録されていません</div>';el.innerHTML=h;return;}
    for(const p of policies){
      h+='<div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:16px;margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
          '<div><span style="background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">'+(typeLabels[p.policy_type]||p.policy_type)+'</span>'+
            '<span style="font-size:11px;color:#888;margin-left:8px">'+(p.store_id?'店舗固有':'ブランド共通')+'</span></div>'+
          '<div style="display:flex;gap:4px">'+
            '<button class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 8px" onclick="editPolicy(\''+p.id+'\',\''+p.policy_type+'\',\''+(p.store_id?'store':'brand')+'\',\''+(p.store_id||p.brand_id)+'\')">編集</button>'+
            '<button class="btn btn-sm" style="font-size:11px;padding:2px 8px;background:#FFEBEE;color:#D32F2F;border:none;border-radius:4px;cursor:pointer" onclick="deletePolicy(\''+p.id+'\')">削除</button>'+
          '</div>'+
        '</div>'+
        '<div style="margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-wrap">'+escHtml(p.content)+'</div>'+
      '</div>';
    }
    el.innerHTML=h;
  }catch(e){el.innerHTML='<div style="color:#D32F2F;padding:24px">ポリシーの取得に失敗: '+e.message+'</div>';}
}

function showAddPolicyForm(){
  document.getElementById('policyEditId').value='';
  document.getElementById('policyContent').value='';
  document.getElementById('policyForm').style.display='block';
}

function editPolicy(id,type,scope,scopeId){
  document.getElementById('policyEditId').value=id;
  document.getElementById('policyType').value=type;
  document.getElementById('policyScope').value=scope;
  document.getElementById('policyScopeId').value=scopeId;
  // Load content
  fetch(CS_API+'/policies?'+(scope==='store'?'store_id=':'brand_id=')+scopeId).then(r=>r.json()).then(d=>{
    const p=(d.policies||[]).find(x=>x.id===id);
    if(p)document.getElementById('policyContent').value=p.content;
  });
  document.getElementById('policyForm').style.display='block';
}

async function savePolicy(){
  const id=document.getElementById('policyEditId').value;
  const type=document.getElementById('policyType').value;
  const scope=document.getElementById('policyScope').value;
  const scopeId=document.getElementById('policyScopeId').value;
  const content=document.getElementById('policyContent').value;
  if(!scopeId||!content){showToast('IDと内容を入力してください');return;}
  const body={policy_type:type,content:content};
  if(id)body.id=id;
  if(scope==='store')body.store_id=scopeId;else body.brand_id=scopeId;
  try{
    await fetch(CS_API+'/policies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    showToast('保存しました');
    document.getElementById('policyForm').style.display='none';
    loadCSPolicies();
  }catch(e){showToast('保存に失敗: '+e.message);}
}

async function deletePolicy(id){
  if(!confirm('このポリシーを削除しますか？'))return;
  try{
    await fetch(CS_API+'/policies',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})});
    showToast('削除しました');
    loadCSPolicies();
  }catch(e){showToast('削除に失敗: '+e.message);}
}

// Tab switch hooks for CS
const origSwitchTab=switchTab;
switchTab=function(prefix,el,tabId){
  origSwitchTab(prefix,el,tabId);
  if(prefix==='cs'&&tabId==='analytics')loadCSAnalytics();
  if(prefix==='cs'&&tabId==='policies')loadCSPolicies();
};
