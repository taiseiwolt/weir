// === LOAD DATA FROM SUPABASE ===
async function loadDataFromSupabase(){
  var results=await Promise.allSettled([
    sb.from('corps').select('*'),
    sb.from('brands').select('*'),
    sb.from('stores').select('*'),
    sb.from('accounts').select('*'),
    sb.from('members').select('*'),
    sb.from('rank_settings').select('id, rank_name').order('sort_order'),
    sb.from('orders').select('*, order_items(*)').order('created_at',{ascending:false}).limit(500),
    sb.from('point_transactions').select('*').eq('source','aiden_compensation').order('created_at',{ascending:false}),
    sb.from('service_subscriptions').select('*').eq('is_active',true)
  ]);
  var ok=function(i){return results[i].status==='fulfilled'&&results[i].value.data&&!results[i].value.error;};
  var d=function(i){return results[i].value.data||[];};

  // rank map
  var rankMap={};
  if(ok(5)) d(5).forEach(function(r){rankMap[r.id]=r.rank_name;});

  // corps
  if(ok(0)) CORPS=d(0).map(mapCorp);
  // brands
  if(ok(1)) BRANDS=d(1).map(mapBrand);
  // stores
  if(ok(2)) STORES=d(2).map(mapStore);
  // accounts
  if(ok(3)) ACCOUNTS=d(3).map(function(row){
    return {
      id:row.id, name:row.name||'', email:row.email||'',
      role:row.role||'staff', corpId:row.corp_id||'',
      brandId:row.brand_id||null, storeId:row.store_id||null,
      status:row.status||'active',
      lastLogin:row.last_login?row.last_login.split('T')[0]:'—',
      created_at:row.created_at||''
    };
  });
  // members
  if(ok(4)) MEMBERS=d(4).map(function(row){return mapMember(row,rankMap);});

  // build lookup maps
  var memberMap={};
  MEMBERS.forEach(function(m){memberMap[m.id]=m.name;});
  var storeMap={};
  STORES.forEach(function(s){storeMap[s.id]=s;});
  var brandMap={};
  BRANDS.forEach(function(b){brandMap[b.id]=b;});

  // orders + order_items
  if(ok(6)){
    var rawOrders=d(6);
    ADMIN_ORDERS=rawOrders.map(function(row){
      var o=mapOrder(row,storeMap,brandMap,memberMap);
      if(row.order_items&&row.order_items.length>0){
        o.items=row.order_items.map(function(it){
          return {name:it.product_name||it.name||'商品',qty:it.quantity||1,price:it.unit_price||0};
        });
      }
      return o;
    });
    // refund log
    var rl=buildRefundLog(rawOrders);
    if(rl.length>0) REFUND_LOG=rl;
    // aggregate orders/revenue per store
    var soc={},srv={};
    rawOrders.forEach(function(o){
      if(!soc[o.store_id])soc[o.store_id]=0;
      if(!srv[o.store_id])srv[o.store_id]=0;
      soc[o.store_id]++;
      srv[o.store_id]+=(o.total_amount||0);
    });
    STORES.forEach(function(s){s.orders=soc[s.id]||0;s.revenue=srv[s.id]||0;});
  }

  // compensation point log
  if(ok(7)) COMP_POINT_LOG=d(7).map(function(row){return mapCompPoint(row,memberMap);});

  // service subscriptions
  if(ok(8)){
    Object.keys(svcState).forEach(function(k){delete svcState[k];});
    d(8).forEach(function(row){setSvc(row.entity_id,row.service_key,true);});
  }

  // aggregate member points
  try{
    var ptRes=await sb.from('point_transactions').select('member_id, amount');
    if(ptRes.data&&ptRes.data.length>0){
      var pb={};
      ptRes.data.forEach(function(t){if(!pb[t.member_id])pb[t.member_id]=0;pb[t.member_id]+=t.amount;});
      MEMBERS.forEach(function(m){if(pb[m.id]!==undefined)m.points=Math.max(0,pb[m.id]);});
    }
  }catch(e){/* point aggregation failed */}
}

async function createStripeAccount(corpId){
  const c=CORPS.find(x=>x.id===corpId);
  if(!c){showToast('⚠️ 法人が見つかりません');return;}
  if(c.stripe_account_id){showToast('ℹ️ 既にStripe連携済みです');return;}

  // 確認ダイアログ
  if(!confirm('Stripe Connect Expressアカウントを作成します。\n\n法人名: '+c.name+'\nメール: '+c.rep_email+'\n\n続行しますか？')) return;

  showToast('⏳ Stripe アカウント作成中...');

  try{
    // Supabase Edge Function を呼び出して Express アカウントを作成
    const res=await fetch(SUPABASE_URL+'/functions/v1/stripe-connect-create',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+SUPABASE_KEY
      },
      body:JSON.stringify({
        corp_id:corpId,
        business_name:c.name,
        email:c.rep_email
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:'不明なエラー'}));
      throw new Error(err.error||'アカウント作成に失敗しました');
    }

    const data=await res.json();
    // account_id をローカルデータに反映
    c.stripe_account_id=data.account_id;

    showToast('✅ Stripeアカウントを作成しました');
    renderPage();

    // オンボーディングURLがある場合は新しいタブで開く
    if(data.onboarding_url){
      if(confirm('Stripeのオンボーディング画面を開きますか？\n（テスト環境では本人確認はスキップ可能です）')){
        window.open(data.onboarding_url,'_blank');
      }
    }
  }catch(e){
    console.error('Stripe Connect error:',e);
    showToast('❌ '+e.message);
  }
}

async function grantCompPoint(memberId){
  var amount=parseInt(document.getElementById('compPointAmount').value);
  var reasonSelect=document.getElementById('compPointReasonSelect').value;
  var reasonText=document.getElementById('compPointReason').value.trim();
  var reason=reasonSelect==='other'?reasonText:(reasonSelect||reasonText);
  if(!amount||amount<=0){showToast('⚠️ 有効なポイント数を入力してください');return;}
  if(!reason){showToast('⚠️ 理由は必須です');return;}
  var m=MEMBERS.find(function(x){return x.id===memberId;});
  if(!m)return;
  // インメモリ更新
  m.points+=amount;
  COMP_POINT_LOG.push({
    id:genId('CPT-'),memberId:m.id,memberName:m.name,
    amount:amount,reason:reason,source:'aiden_compensation',
    grantedBy:'Taisei',createdAt:new Date().toISOString().split('T')[0]
  });
  // Supabase: point_transactions に直接INSERT
  try{
    var ptRes=await sb.from('point_transactions').insert({
      member_id:memberId,brand_id:null,amount:amount,
      reason:reason,source:'aiden_compensation',granted_by:'Taisei'
    }).select().single();
    if(ptRes.data){
      // インメモリのCOMP_POINT_LOGを実データIDで更新
      COMP_POINT_LOG[COMP_POINT_LOG.length-1].id=ptRes.data.id;
    }
  }catch(e){console.warn('point_transactions insert skipped:',e);}
  // Edge Function呼び出し（追加処理がある場合）
  try{
    await fetch(SUPABASE_URL+'/functions/v1/compensation-point-grant',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({member_id:memberId,brand_id:null,amount:amount,reason:reason,granted_by:'Taisei'})
    });
  }catch(e){console.warn('Edge Function call skipped:',e);}
  closeModal();
  showToast('✅ '+amount+'pt を '+m.name+' に付与しました（AIden原資）');
  renderPage();
}

  return '<table class="dt"><thead><tr><th>注文ID</th><th>日付</th><th>店舗</th><th>顧客</th><th class="r">金額</th><th>決済</th><th>操作</th></tr></thead><tbody>'+
    orders.map(function(o){
      var canRefund=o.paymentStatus==='paid';
      return '<tr><td style="font-family:monospace;font-size:11px">'+o.id+'</td><td>'+o.date+'</td>'+
        '<td>'+o.storeName+'<div style="font-size:10px;color:var(--text-light)">'+o.brandName+'</div></td>'+
        '<td style="font-weight:600">'+o.customer+'</td>'+
        '<td class="r" style="font-weight:700">'+Y(o.total)+'</td>'+
        '<td>'+paymentStatusBadge(o.paymentStatus)+'</td>'+
        '<td><button class="btn '+(canRefund?'btn-d':'btn-s')+' btn-sm" onclick="openRefundModal(\''+o.id+'\')">'+(canRefund?'💳 返金':'詳細')+'</button></td></tr>';
    }).join('')+'</tbody></table>';
}

function searchRefundOrders(){
  var q=document.getElementById('refundOrderSearch').value.trim().toLowerCase();
  var box=document.getElementById('refundOrderResults');
  if(!q){box.innerHTML='<div class="empty">検索キーワードを入力してください</div>';return;}
  var results=ADMIN_ORDERS.filter(function(o){
    return o.id.toLowerCase().includes(q)||o.storeName.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||o.brandName.toLowerCase().includes(q);
  });
  box.innerHTML=renderOrderResultsTable(results);
}

function showAllOrders(){
  document.getElementById('refundOrderResults').innerHTML=renderOrderResultsTable(ADMIN_ORDERS);
}

function openRefundModal(orderId){
  var o=ADMIN_ORDERS.find(function(x){return x.id===orderId;});
  if(!o)return;
  var isRefunded=o.paymentStatus==='refunded'||o.paymentStatus==='partially_refunded';
  var itemsHtml=o.items.map(function(it){return '<tr><td>'+it.name+'</td><td class="r">×'+it.qty+'</td><td class="r">'+Y(it.price*it.qty)+'</td></tr>';}).join('');
  var pointInfo='';
  if(o.aidenPointsUsed>0||o.normalPointsUsed>0){
    pointInfo='<div style="margin-top:12px;padding:10px;background:#f5f6fa;border-radius:8px;font-size:11px">'+
      '<div style="font-weight:700;margin-bottom:4px">ポイント使用内訳</div>'+
      (o.normalPointsUsed>0?'<div>通常ポイント: <strong>'+o.normalPointsUsed.toLocaleString()+'pt</strong></div>':'')+
      (o.aidenPointsUsed>0?'<div style="color:#e17055">AIden原資: <strong>'+o.aidenPointsUsed.toLocaleString()+'pt</strong></div>':'')+
    '</div>';
  }
  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>💳 '+(isRefunded?'注文詳細（返金済）':'返金処理')+'</h3>'+
    '<div style="margin-bottom:16px;padding:14px;background:#f5f6fa;border-radius:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700;font-size:14px">'+o.id+'</span>'+paymentStatusBadge(o.paymentStatus)+
      '</div>'+
      '<div style="font-size:11px;color:var(--text-light)">'+o.date+' / '+o.storeName+' / '+o.customer+'</div>'+
      '<table class="dt" style="margin-top:10px"><thead><tr><th>商品</th><th class="r">数量</th><th class="r">小計</th></tr></thead><tbody>'+
        itemsHtml+
        '<tr style="font-weight:700"><td>合計</td><td></td><td class="r">'+Y(o.total)+'</td></tr>'+
      '</tbody></table>'+
      pointInfo+
      '<div style="margin-top:8px;font-size:10px;color:var(--text-light)">PaymentIntent: <code>'+o.paymentIntentId+'</code></div>'+
    '</div>'+
    (isRefunded?
      '<div style="padding:12px;background:#e6f9f0;border-radius:8px;font-size:12px;color:#00b894;font-weight:600">✅ この注文は返金処理済みです</div>':
      '<div class="form-grid">'+
        '<div class="form-group full"><label>返金金額（円）<span style="color:var(--danger)"> *</span></label>'+

          '<div style="font-size:10px;color:var(--text-light);margin-top:2px">全額: '+Y(o.total)+' / 部分返金の場合は金額を変更</div>'+
        '</div>'+
        '<div class="form-group full"><label>返金理由 <span style="color:var(--danger)">*</span></label>'+
          '<select id="refundReasonSelect" onchange="var o=this.value;document.getElementById(\'refundReasonText\').style.display=o===\'other\'?\'block\':\'none\'">'+
            '<option value="">-- 選択 --</option>'+
            '<option value="商品品質問題">商品品質問題</option>'+
            '<option value="配送遅延・未着">配送遅延・未着</option>'+
            '<option value="注文ミス（店舗側）">注文ミス（店舗側）</option>'+
            '<option value="お客さま都合">お客さま都合</option>'+
            '<option value="システム障害">システム障害</option>'+
            '<option value="other">その他（自由記述）</option>'+
          '</select>'+
          '<textarea id="refundReasonText" style="display:none;margin-top:8px" placeholder="返金理由を入力..."></textarea>'+
        '</div>'+

        '返金完了後、orders テーブルの payment_status が <code>refunded</code> に更新されます。'+
      '</div>'+

async function executeRefund(orderId){
  var o=ADMIN_ORDERS.find(function(x){return x.id===orderId;});
  if(!o)return;
  var amount=parseInt(document.getElementById('refundAmount').value);
  var reasonSelect=document.getElementById('refundReasonSelect').value;
  var reasonText=document.getElementById('refundReasonText').value.trim();
  var reason=reasonSelect==='other'?reasonText:(reasonSelect||reasonText);
  if(!amount||amount<=0){showToast('⚠️ 有効な金額を入力してください');return;}
  if(!reason){showToast('⚠️ 理由は必須です');return;}
  if(amount>o.total){showToast('⚠️ 返金額は注文金額を超えられません');return;}
  if(!confirm('注文 '+o.id+' に対して '+Y(amount)+' の返金を実行します。\nこの操作は取り消せません。よろしいですか？'))return;
  // インメモリ更新
  o.paymentStatus=amount>=o.total?'refunded':'partially_refunded';
  REFUND_LOG.push({
    id:genId('RFD-'),orderId:o.id,amount:amount,reason:reason,
    refundedBy:'Taisei',createdAt:new Date().toISOString().split('T')[0]
  });
  // Supabase Edge Function 呼び出し（接続時）
  try{
    var res=await fetch(SUPABASE_URL+'/functions/v1/stripe-create-refund',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({
        payment_intent_id:o.paymentIntentId,
        amount:amount,reason:reason,
        order_id:orderId,refunded_by:'Taisei'
      })
    });
    if(res.ok){
      var data=await res.json();
      console.log('Refund success:',data);
    }
  }catch(e){console.warn('Edge Function call skipped:',e);}
  closeModal();
  showToast('✅ '+Y(amount)+' を返金しました（'+o.id+'）');
  renderPage();
}

// ===== SERVICE CARDS RENDERER =====
function renderServiceCards(entityId, level, parentId){
  return SERVICES.map(s=>{
    const isOn=getSvc(entityId,s.key);
    let locked=false, lockMsg='';
    if(level==='brand'&&parentId&&!getSvc(parentId,s.key)){locked=true;lockMsg='法人でOFFのため選択不可';}
    if(level==='store'&&parentId&&!getSvc(parentId,s.key)){locked=true;lockMsg='ブランドでOFFのため選択不可';}
    const cls='svc-card'+(isOn?' enabled':'')+(locked?' locked':'');
    const costTag=s.cost==='free'?'<span class="svc-tag free">無料</span>':'<span class="svc-tag paid">追加課金</span>';
    const toggleId='svc_'+entityId+'_'+s.key;
    return '<div class="'+cls+'">'+
      '<div class="svc-head"><div class="svc-icon">'+s.icon+'</div><div class="svc-name">'+s.name+'</div>'+costTag+'</div>'+
      '<div class="svc-desc">'+s.desc+'</div>'+
      '<div class="svc-toggle"><span class="svc-status '+(isOn?'on':'off')+'">'+(isOn?'✅ 利用中':'OFF')+'</span>'+
      '<label class="toggle-sw"><input type="checkbox"'+(isOn?' checked':'')+' onchange="toggleSvc(\''+entityId+'\',\''+s.key+'\',\''+level+'\')"><span class="slider"></span></label></div>'+
      (locked?'<div class="svc-lock">🔒 '+lockMsg+'</div>':'')+
      '</div>';
  }).join('');
}

function toggleSvc(entityId,key,level){
  const cur=getSvc(entityId,key);
  setSvc(entityId,key,!cur);
  // If turning OFF at corp level, also turn OFF for all child brands and stores
  if(level==='corp'&&cur){
    const brands=getBrandsForCorp(CORPS.find(c=>c.id===entityId));
    brands.forEach(b=>{
      setSvc(b.id,key,false);
      getStoresForBrand(b).forEach(s=>setSvc(s.id,key,false));
    });
  }
  // If turning OFF at brand level, also turn OFF for all child stores
  if(level==='brand'&&cur){
    const stores=getStoresForBrand(BRANDS.find(b=>b.id===entityId));
    stores.forEach(s=>setSvc(s.id,key,false));
  }
  renderPage();
  showToast(cur?'❌ '+SERVICES.find(s=>s.key===key).name+' をOFFにしました':'✅ '+SERVICES.find(s=>s.key===key).name+' をONにしました');
}

function genId(prefix){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';let r='';for(let i=0;i<7;i++)r+=c[Math.floor(Math.random()*62)];return prefix+r;}

async function updateAccount(accId){
  var name=document.getElementById('editAccName').value.trim();
  var email=document.getElementById('editAccEmail').value.trim();
  if(!name||!email){showToast('⚠️ 氏名とメールは必須です');return;}
  var role=document.getElementById('editAccRole').value;
  var corpId=document.getElementById('editAccCorp').value;
  var brandId=document.getElementById('editAccBrand').value||null;
  var storeId=document.getElementById('editAccStore').value||null;
  var status=document.getElementById('editAccStatus').value;
  showToast('⏳ 保存中...');
  var res=await sb.from('accounts').update({name:name,email:email,role:role,corp_id:corpId,brand_id:brandId,store_id:storeId,status:status}).eq('id',accId);
  if(res.error){showToast('❌ '+res.error.message);return;}
  var a=ACCOUNTS.find(x=>x.id===accId);
  if(a){a.name=name;a.email=email;a.role=role;a.corpId=corpId;a.brandId=brandId;a.storeId=storeId;a.status=status;}
  closeModal();showToast('✅ アカウントを更新しました');renderPage();
}
async function deleteAccount(accId){
  var a=ACCOUNTS.find(x=>x.id===accId);if(!a)return;
  if(!confirm('アカウント「'+a.name+'」を削除しますか？\nこの操作は取り消せません。'))return;
  showToast('⏳ 削除中...');
  var res=await sb.from('accounts').delete().eq('id',accId);
  if(res.error){showToast('❌ '+res.error.message);return;}
  ACCOUNTS=ACCOUNTS.filter(x=>x.id!==accId);
  showToast('🗑 アカウントを削除しました');renderPage();
}

function readBulkFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const pv=document.getElementById('bulkPreview');
  pv.innerHTML='<div class="upload-result" style="background:#f5f6fa;color:var(--text)">⏳ 読み込み中...</div>';
  document.getElementById('bulkActions').style.display='none';
  if(ext==='csv'){
    const reader=new FileReader();
    reader.onload=function(e){showBulkPreview(parseCSV(e.target.result));};
    reader.readAsText(file,'UTF-8');
  }else if(ext==='xlsx'||ext==='xls'){
    const reader=new FileReader();
    reader.onload=function(e){
      try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];showBulkPreview(XLSX.utils.sheet_to_json(ws,{header:1}));}
      catch(err){pv.innerHTML='<div class="upload-result err">❌ Excel読み込み失敗: '+err.message+'</div>';}
    };
    reader.readAsArrayBuffer(file);
  }else{pv.innerHTML='<div class="upload-result err">❌ CSVまたはExcel(.xlsx)を選択してください</div>';}
}

function parseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  return lines.map(l=>{
    const result=[];let cur='';let inQ=false;
    for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){result.push(cur.trim());cur='';}else cur+=ch;}
    result.push(cur.trim());return result;
  });
}

function showBulkPreview(rows){
  const pv=document.getElementById('bulkPreview');
  if(rows.length<2){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}
  const headers=rows[0].map(h=>String(h||'').replace(/\*/g,'').trim());
  const dataRows=rows.slice(1).filter(r=>r.some(c=>c&&String(c).trim()));
  if(!dataRows.length){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}

  // Validate and build preview
  const validated=validateBulkRows(dataRows,_bulkType);
  _bulkParsed=validated.valid;

  let h='<div style="font-size:12px;font-weight:700;margin:12px 0 8px">📋 プレビュー（'+dataRows.length+'件）</div>';
  if(validated.errors.length){
    h+='<div class="upload-result err" style="margin-bottom:12px">⚠️ '+validated.errors.length+'件のエラー:<br>'+validated.errors.map(e=>'・'+e).join('<br>')+'</div>';
  }
  if(validated.valid.length){
    // Show max 5 display columns for readability
    const dispCols=getDisplayColumns(_bulkType);
    h+='<div style="overflow-x:auto;max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"><table class="data-table" style="font-size:11px"><thead><tr><th>#</th>'+dispCols.map(c=>'<th>'+c.label+'</th>').join('')+'<th>状態</th></tr></thead><tbody>';
    validated.valid.forEach((item,i)=>{
      h+='<tr><td>'+(i+1)+'</td>'+dispCols.map(c=>'<td>'+esc(item[c.key]||'—')+'</td>').join('')+'<td><span style="color:var(--success);font-weight:700;font-size:10px">✅ OK</span></td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:12px;margin-top:12px;color:var(--success);font-weight:700">✅ '+validated.valid.length+'件が登録可能です</div>';
    document.getElementById('bulkActions').style.display='flex';
  }else{
    document.getElementById('bulkActions').style.display='none';
  }
  pv.innerHTML=h;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getDisplayColumns(type){
  if(type==='corp')return [{key:'name',label:'法人名'},{key:'rep',label:'代表者'},{key:'status',label:'ステータス'},{key:'hp',label:'会社HP'}];
  if(type==='brand')return [{key:'name',label:'ブランド名'},{key:'slug',label:'スラッグ'},{key:'corpName',label:'法人'},{key:'mainColor',label:'カラー'},{key:'status',label:'ステータス'}];
  if(type==='store')return [{key:'name',label:'店舗名'},{key:'brandName',label:'ブランド'},{key:'addr',label:'住所'},{key:'tel',label:'電話'},{key:'status',label:'ステータス'}];
  if(type==='account')return [{key:'name',label:'氏名'},{key:'email',label:'メール'},{key:'role',label:'権限'},{key:'corpName',label:'法人'}];
  return [];
}

function validateBulkRows(dataRows,type){
  const valid=[],errors=[];
  dataRows.forEach((row,i)=>{
    const rn=i+2;const g=idx=>String(row[idx]||'').trim();
    try{
      if(type==='corp'){
        const name=g(0),rep=g(1);
        if(!name){errors.push('行'+rn+': 法人名が空');return;}
        valid.push({name,rep:rep||'—',status:g(2)||'active',hp:g(3),recruit:g(4),created:new Date().toISOString().split('T')[0]});
      }else if(type==='brand'){
        const name=g(0),slug=g(1),corpId=g(2);
        if(!name||!slug){errors.push('行'+rn+': ブランド名またはスラッグが空');return;}
        const corp=CORPS.find(c=>c.id===corpId);
        if(!corp){errors.push('行'+rn+': 法人ID「'+corpId+'」が存在しません');return;}
        valid.push({name,slug,corpId,corpName:corp.name,status:g(3)||'active',mainColor:g(4)||'#6c5ce7',subColor:g(5)||'#1A1A1A',hdrBg:g(6)||'',hdrTx:g(7)||'#FFFFFF',fontColor:g(8)||'#333333',font:g(9)||'Noto Sans JP'});
      }else if(type==='store'){
        const name=g(0),brandId=g(1);
        if(!name){errors.push('行'+rn+': 店舗名が空');return;}
        const brand=BRANDS.find(b=>b.id===brandId);
        if(!brand){errors.push('行'+rn+': ブランドID「'+brandId+'」が存在しません');return;}
        valid.push({name,brandId,brandName:brand.name,addr:g(2),tel:g(3),email:g(4),station:g(5),priceRange:g(6),seats:g(7),smoking:g(8)||'全席禁煙',children:g(9)||'同伴不可',pets:g(10)||'同伴不可',parking:g(11)||'なし',lat:g(12),lng:g(13),deliveryRadius:g(14),deliveryFee:g(15),minOrder:g(16),serviceCharge:g(17)||'0',status:g(18)||'active'});
      }else if(type==='account'){
        const name=g(0),email=g(1),role=g(2),corpId=g(3);
        if(!name||!email){errors.push('行'+rn+': 氏名またはメールが空');return;}
        if(!['owner','admin','staff'].includes(role)){errors.push('行'+rn+': 権限「'+role+'」が不正（owner/admin/staffのいずれか）');return;}
        const corp=CORPS.find(c=>c.id===corpId);
        if(!corp){errors.push('行'+rn+': 法人ID「'+corpId+'」が存在しません');return;}
        valid.push({name,email,role,corpId,corpName:corp.name,phone:g(4)});
      }
    }catch(e){errors.push('行'+rn+': '+e.message);}
  });
  return {valid,errors};
}

async function confirmBulkImport(){
  if(!_bulkParsed||!_bulkParsed.length){showToast('⚠️ 登録データがありません');return;}
  let added=0;
  for(var i=0;i<_bulkParsed.length;i++){
    var item=_bulkParsed[i];
    if(_bulkType==='corp'){
      CORPS.push({id:genId('CRP-'),name:item.name,rep:item.rep,status:item.status,created:item.created,hp:item.hp,recruit:item.recruit});added++;
    }else if(_bulkType==='brand'){
      BRANDS.push({id:genId('BRD-'),corpId:item.corpId,name:item.name,slug:item.slug,status:item.status,mainColor:item.mainColor,subColor:item.subColor,hdrBg:item.hdrBg,hdrTx:item.hdrTx,fontColor:item.fontColor,font:item.font});added++;
    }else if(_bulkType==='store'){
      STORES.push({id:genId('STR-'),brandId:item.brandId,name:item.name,status:item.status,addr:item.addr,tel:item.tel,email:item.email,station:item.station,priceRange:item.priceRange,seats:item.seats,smoking:item.smoking,children:item.children,pets:item.pets,parking:item.parking,lat:item.lat,lng:item.lng,deliveryRadius:item.deliveryRadius,deliveryFee:item.deliveryFee,minOrder:item.minOrder,serviceCharge:item.serviceCharge,orders:0,revenue:0});added++;
    }else if(_bulkType==='account'){
      var res=await sb.from('accounts').insert({name:item.name,email:item.email,role:item.role,corp_id:item.corpId,status:'active'}).select().single();
      if(res.data){ACCOUNTS.push({id:res.data.id,name:item.name,email:item.email,role:item.role,corpId:item.corpId,brandId:null,storeId:null,status:'active',lastLogin:'—'});added++;}
    }
  }
  closeModal();
  showToast('✅ '+added+'件を登録しました');
  _bulkParsed=null;_bulkType=null;
  renderPage();
}

    if(pf&&inv.billingPeriod!==pf)return false;
    if(sf&&inv.status!==sf)return false;
    return true;
  });
  document.getElementById('billingTableBody').innerHTML=renderBillingRows(filtered);
}

function updateInvoiceStatus(invId,newStatus){
  var inv=INVOICES.find(function(i){return i.id===invId;});
  if(!inv)return;
  var labels={sent:'送付済',paid:'入金済'};
  if(!confirm('請求書 '+inv.id+' のステータスを「'+labels[newStatus]+'」に変更しますか？'))return;
  inv.status=newStatus;
  // Supabase更新
  sb.from('invoices').update({status:newStatus}).eq('id',invId).then(function(){}).catch(function(e){console.warn('Invoice status update failed:',e);});
  showToast('✅ ステータスを「'+labels[newStatus]+'」に変更しました');
  renderPage();
}

function openInvoiceDetail(invId){
  var inv=INVOICES.find(function(i){return i.id===invId;});
  if(!inv)return;
  var adjHtml='';
  if(inv.adjustmentDetails&&inv.adjustmentDetails.length>0){
    adjHtml='<div style="margin-top:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">調整項目内訳</div>'+
      '<table class="dt"><thead><tr><th>理由</th><th class="r">金額</th></tr></thead><tbody>'+
      inv.adjustmentDetails.map(function(a){
        return '<tr><td style="font-size:11px">'+a.reason+'</td><td class="r" style="color:var(--danger);font-weight:700">'+Y(a.amount)+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  }
  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>💰 請求書詳細</h3>'+
    '<div style="margin-bottom:16px;padding:14px;background:#f5f6fa;border-radius:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700;font-size:14px">'+inv.corpName+'</span>'+billingStatusBadge(inv.status)+
      '</div>'+
      '<div style="font-size:11px;color:var(--text-light)">対象月: '+inv.billingPeriod+' / 期日: '+inv.dueDate+'</div>'+
    '</div>'+
    '<table class="dt" style="margin-bottom:0"><tbody>'+
      '<tr><td>手数料小計（税抜）</td><td class="r" style="font-weight:700">'+Y(inv.subtotal)+'</td></tr>'+
      '<tr><td>調整額</td><td class="r" style="color:'+(inv.adjustments<0?'var(--danger)':'var(--text)')+';font-weight:700">'+Y(inv.adjustments)+'</td></tr>'+
      '<tr><td>消費税（10%）</td><td class="r">'+Y(inv.tax)+'</td></tr>'+
      '<tr style="font-size:14px;font-weight:800"><td>請求合計</td><td class="r" style="color:var(--accent)">'+Y(inv.total)+'</td></tr>'+
    '</tbody></table>'+
    adjHtml+
    '<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">調整項目を手動追加</div>'+
      '<div class="form-grid"><div class="form-group"><label>理由</label><input type="text" id="adjReason" placeholder="例: 追加手数料"></div>'+
      '<div class="form-group"><label>金額（円）</label><input type="number" id="adjAmount" placeholder="例: -500"></div></div>'+
      '<button class="btn btn-p btn-sm" style="margin-top:8px" onclick="addAdjustment(\''+inv.id+'\')">追加</button>'+
    '</div>'+
    '<div class="btn-group" style="margin-top:16px"><button class="btn btn-s" onclick="closeModal()">閉じる</button></div>'
  );
}

function addAdjustment(invId){
  var inv=INVOICES.find(function(i){return i.id===invId;});
  if(!inv)return;
  var reason=document.getElementById('adjReason').value.trim();
  var amount=parseInt(document.getElementById('adjAmount').value);
  if(!reason||isNaN(amount)){showToast('⚠️ 理由と金額を入力してください');return;}
  inv.adjustmentDetails.push({reason:reason,amount:amount});
  inv.adjustments+=amount;
  var taxable=inv.subtotal+inv.adjustments;
  inv.tax=Math.round(Math.max(0,taxable)*0.10);
  inv.total=taxable+inv.tax;
  // Supabase更新
  sb.from('invoices').update({adjustments:inv.adjustments,adjustment_details:inv.adjustmentDetails,tax:inv.tax,total:inv.total}).eq('id',invId).then(function(){}).catch(function(e){console.warn('Adjustment update failed:',e);});
  closeModal();
  showToast('✅ 調整項目を追加しました');
  renderPage();
}

function renderBillingGenerate(){
  return '<div class="card"><div class="card-title">📄 月次請求書の一括生成</div>'+
    '<p style="font-size:12px;color:var(--text-light);margin-bottom:16px">指定した対象月の注文を集計し、法人別に請求書を自動生成します。</p>'+
    '<div class="form-grid">'+
      '<div class="form-group"><label>対象月</label><select id="genBillingPeriod">'+
        '<option value="2026-02">2026年2月</option><option value="2026-01">2026年1月</option><option value="2025-12">2025年12月</option></select></div>'+
    '</div>'+
    '<div style="margin-top:12px;padding:12px;background:#fff3e0;border-radius:8px;font-size:11px;color:#e17055;line-height:1.6">'+
      '⚠️ この操作で以下が実行されます:<br>'+
      '1. 対象期間の全注文から手数料（application_fee_amount）を法人別に集計<br>'+
      '2. 返金済み注文の手数料を控除<br>'+
      '3. AIden原資ポイント消費分を控除<br>'+
      '4. 消費税10%を加算<br>'+
      '5. invoicesテーブルにステータス「下書き」で保存'+
    '</div>'+
    '<div class="btn-group"><button class="btn btn-p" onclick="generateMonthlyInvoices()">請求書を生成</button></div>'+
    '<div id="genBillingResult" style="margin-top:16px"></div>'+
  '</div>';
}

async function generateMonthlyInvoices(){
  var period=document.getElementById('genBillingPeriod').value;
  if(!confirm(period+' の月次請求書を生成しますか？'))return;
  showToast('⏳ 請求書を生成中...');
  try{
    var res=await fetch(SUPABASE_URL+'/functions/v1/generate-monthly-invoice',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({billing_period:period})
    });
    var data=await res.json();
    if(data.error){
      document.getElementById('genBillingResult').innerHTML='<div style="padding:12px;background:#fab1a0;border-radius:8px;color:#d63031;font-size:12px">エラー: '+data.error+'</div>';
      return;
    }
    document.getElementById('genBillingResult').innerHTML='<div style="padding:12px;background:#e6f9f0;border-radius:8px;color:#00b894;font-size:12px">✅ '+data.invoices_created+'件の請求書を生成しました（'+data.billing_period+'）</div>';
    // リロード
    await loadInvoicesFromSupabase();
    renderPage();
  }catch(e){
    document.getElementById('genBillingResult').innerHTML='<div style="padding:12px;background:#fab1a0;border-radius:8px;color:#d63031;font-size:12px">エラー: '+e.message+'</div>';
  }
}

async function loadInvoicesFromSupabase(){
  try{
    var res=await sb.from('invoices').select('*').order('created_at',{ascending:false});
    if(res.data&&res.data.length>0){
      var corpMap={};
      CORPS.forEach(function(c){corpMap[c.id]=c.name;});
      INVOICES=res.data.map(function(row){
        return {
          id:row.id,corpId:row.corp_id,corpName:corpMap[row.corp_id]||'不明',
          billingPeriod:row.billing_period||(row.billing_period_start?row.billing_period_start.substring(0,7):''),
          subtotal:row.subtotal||0,adjustments:row.adjustments||0,tax:row.tax||0,total:row.total||0,
          status:row.status||'draft',dueDate:row.due_date||'',pdfUrl:row.pdf_url||null,
          adjustmentDetails:row.adjustment_details||[]
        };
      });
    }
  }catch(e){console.warn('Invoice load failed:',e);}
}

// INIT
(async function(){
  try{await loadDataFromSupabase();}catch(e){console.warn('Supabase load failed, using defaults:',e);}
  var ov=document.getElementById('loadingOverlay');
  if(ov){ov.classList.add('hide');setTimeout(function(){ov.remove();},400);}
  renderPage();
})();
</script>
