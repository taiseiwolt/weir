const PII_FIELDS=[
  {key:'member_name',label:'会員氏名の閲覧',desc:'会員登録された顧客の氏名を閲覧できます',editable:true},
  {key:'member_email',label:'会員メールアドレスの閲覧',desc:'会員登録された顧客のメールアドレスを閲覧できます',editable:true},
  {key:'member_phone',label:'会員電話番号の閲覧',desc:'会員登録された顧客の電話番号を閲覧できます',editable:true},
  {key:'member_address',label:'会員住所の閲覧',desc:'会員登録された顧客の住所を閲覧できます',editable:true},
  {key:'order_history',label:'注文履歴の閲覧',desc:'顧客の注文履歴は業務上常に閲覧可能です',editable:false,forcedOn:true},
  {key:'guest_info',label:'ゲスト注文者情報',desc:'',editable:false,forcedOn:false}
];
function renderPiiAccessToggles(b){
  const s=b.pii_access_settings||{...PII_ACCESS_DEFAULTS};
  return PII_FIELDS.map(f=>{
    if(f.key==='guest_info'){
      return '<div class="toggle-row" style="opacity:.6"><div><div style="font-size:12px;font-weight:600">'+f.label+'</div><div style="font-size:10px;color:var(--text-light)">常にOFF</div></div><label class="toggle-sw"><input type="checkbox" disabled><span class="slider" style="cursor:not-allowed"></span></label></div>'+
        '<div style="background:#fff3e0;border-radius:8px;padding:10px 14px;margin:8px 0 4px;font-size:11px;color:#e17055;display:flex;align-items:center;gap:8px"><span>⚠️</span>ゲスト注文者の個人情報はプラットフォームポリシーにより閲覧不可</div>';
    }
    const isOn=f.forcedOn?true:!!s[f.key];
    const disabled=!f.editable;
    return '<div class="toggle-row"><div><div style="font-size:12px;font-weight:600">'+f.label+(f.forcedOn?' <span style="font-size:9px;color:var(--accent);font-weight:700">常にON</span>':'')+'</div><div style="font-size:10px;color:var(--text-light)">'+f.desc+'</div></div><label class="toggle-sw"><input type="checkbox" '+(isOn?'checked ':'')+' '+(disabled?'disabled ':'')+' onchange="togglePiiAccess(\''+b.id+'\',\''+f.key+'\',this.checked)"><span class="slider"'+(disabled?' style="cursor:not-allowed"':'')+'></span></label></div>';
  }).join('');
}
function togglePiiAccess(brandId,key,val){
  const b=BRANDS.find(x=>x.id===brandId);
  if(!b)return;
  if(!b.pii_access_settings)b.pii_access_settings={...PII_ACCESS_DEFAULTS};
  b.pii_access_settings[key]=val;
}
async function savePiiAccessSettings(brandId){
  const b=BRANDS.find(x=>x.id===brandId);
  if(!b)return;
  const settings=b.pii_access_settings||{...PII_ACCESS_DEFAULTS};
  try{
    const{error}=await sb.from('brands').update({pii_access_settings:settings}).eq('id',b._uuid||brandId);
    if(error)throw error;
    showToast('✅ 個人情報アクセス設定を保存しました');
    logAudit('update_service_settings','brands',brandId,{type:'pii_access_settings',settings});
  }catch(e){
    console.error('PII save error:',e);
    showToast('⚠️ 保存に失敗しました（ローカル反映済み）');
  }
}

// ===== FEE SCHEDULES =====
async function loadFeeSchedules(corpUuid,corpDisplayId){
  var el=document.getElementById('feeScheduleList-'+corpDisplayId);
  if(!el)return;
  try{
    var {data:fees,error}=await sb.from('fee_schedules').select('*').eq('merchant_id',corpUuid).order('fee_type').order('effective_from',{ascending:true});
    if(error)throw error;
    if(!fees||!fees.length){el.innerHTML='<div class="empty-state">手数料スケジュールが設定されていません</div>';return;}
    var typeLabels={dinein:'店内注文',takeout:'テイクアウト',delivery:'デリバリー'};
    var today=new Date().toISOString().slice(0,10);
    var h='<table class="data-table"><thead><tr><th>チャネル</th><th class="r">料率</th><th>種別</th><th>開始日</th><th>終了日</th><th>ステータス</th><th></th></tr></thead><tbody>';
    for(var i=0;i<fees.length;i++){
      var f=fees[i];
      var label=typeLabels[f.fee_type]||f.fee_type;
      var rate=(f.rate*100).toFixed(2)+'%';
      var kind=f.is_base?'<span style="font-size:10px;background:#e6f9f0;color:#00b894;padding:2px 6px;border-radius:4px;font-weight:700">ベース</span>':'<span style="font-size:10px;background:#fff3e0;color:#e17055;padding:2px 6px;border-radius:4px;font-weight:700">期間限定</span>';
      var from=f.effective_from||'—';
      var to=f.effective_to||'永久';
      var status,statusStyle;
      if(f.effective_to&&f.effective_to<today){status='過去';statusStyle='background:#dfe6e9;color:#636e72';}
      else if(f.effective_from<=today&&(!f.effective_to||f.effective_to>=today)){status='現在';statusStyle='background:#0984e315;color:#0984e3';}
      else{status='未来';statusStyle='background:#6c5ce715;color:#6c5ce7';}
      var actions=f.is_base?
        '<button class="btn btn-secondary btn-sm" onclick="openEditFeeModal(\''+f.id+'\',\''+corpUuid+'\',\''+corpDisplayId+'\')">編集</button>':
        '<button class="btn btn-secondary btn-sm" style="margin-right:4px" onclick="openEditFeeModal(\''+f.id+'\',\''+corpUuid+'\',\''+corpDisplayId+'\')">編集</button><button class="btn btn-secondary btn-sm" style="color:var(--danger)" onclick="deleteFeeSchedule(\''+f.id+'\',\''+corpUuid+'\',\''+corpDisplayId+'\')">削除</button>';
      h+='<tr><td>'+escHtml(label)+'</td><td class="r" style="font-weight:800">'+rate+'</td><td>'+kind+'</td><td>'+from+'</td><td>'+to+'</td><td><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;'+statusStyle+'">'+status+'</span></td><td>'+actions+'</td></tr>';
    }
    h+='</tbody></table>';
    el.innerHTML=h;
  }catch(e){el.innerHTML='<div style="color:var(--danger)">読み込みエラー: '+escHtml(e.message)+'</div>';}
}

}

function openEditFeeModal(feeId,corpUuid,corpDisplayId){
  sb.from('fee_schedules').select('*').eq('id',feeId).single().then(function(res){
    var f=res.data;
    if(res.error||!f){showToast('⚠️ データ取得エラー');return;}
    var typeLabel=f.fee_type==='dinein'?'店内注文':f.fee_type==='takeout'?'テイクアウト':'デリバリー';
    openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>💰 料率編集</h3>'+
    '<div class="form-grid">'+
      '<div class="form-group"><label>チャネル</label><input type="text" value="'+typeLabel+'" readonly style="background:#f5f6fa;color:var(--text-light)"></div>'+
      '<div class="form-group"><label>料率（%）<span style="color:var(--danger)">*</span></label><input type="number" id="editFeeRate" step="0.01" min="0" max="100" value="'+(f.rate*100).toFixed(2)+'"></div>'+
      '<div class="form-group"><label>開始日</label><input type="date" id="editFeeFrom" value="'+(f.effective_from||'')+'"'+(f.is_base?' readonly style="background:#f5f6fa"':'')+'></div>'+
      '<div class="form-group"><label>終了日</label><input type="date" id="editFeeTo" value="'+(f.effective_to||'')+'"'+(f.is_base?' readonly style="background:#f5f6fa"':'')+'></div>'+
    '</div>'+
    '<div class="btn-group"><button class="btn btn-primary" onclick="updateFeeSchedule(\''+feeId+'\',\''+corpUuid+'\',\''+corpDisplayId+'\')">保存</button><button class="btn btn-secondary" onclick="closeModal()">キャンセル</button></div>');
  });
}

async function saveFeeSchedule(corpUuid,corpDisplayId){
  var feeType=document.getElementById('feeType').value;
  var rate=parseFloat(document.getElementById('feeRate').value);
  var from=document.getElementById('feeFrom').value;
  var to=document.getElementById('feeTo').value;
  if(!feeType||isNaN(rate)||!from||!to){showToast('⚠️ 全項目を入力してください');return;}
  try{
    var {error}=await sb.from('fee_schedules').insert({
      merchant_id:corpUuid, fee_type:feeType, rate:rate/100,
      is_base:false, effective_from:from, effective_to:to
    });
    if(error)throw error;
    logAudit('add_fee_schedule','fee_schedules',null,{corpId:corpDisplayId,feeType:feeType,rate:rate});
    closeModal();showToast('✅ 期間限定料率を追加しました');
    loadFeeSchedules(corpUuid,corpDisplayId);
  }catch(e){showToast('⚠️ '+e.message);}
}

async function updateFeeSchedule(feeId,corpUuid,corpDisplayId){
  var rate=parseFloat(document.getElementById('editFeeRate').value);
  var from=document.getElementById('editFeeFrom')?.value;
  var to=document.getElementById('editFeeTo')?.value;
  if(isNaN(rate)){showToast('⚠️ 料率を入力してください');return;}
  try{
    var update={rate:rate/100};
    if(from)update.effective_from=from;
    if(to)update.effective_to=to;
    var {error}=await sb.from('fee_schedules').update(update).eq('id',feeId);
    if(error)throw error;
    logAudit('update_fee_schedule','fee_schedules',feeId,{rate:rate});
    closeModal();showToast('✅ 料率を更新しました');
    loadFeeSchedules(corpUuid,corpDisplayId);
  }catch(e){showToast('⚠️ '+e.message);}
}

async function deleteFeeSchedule(feeId,corpUuid,corpDisplayId){
  if(!confirm('この期間限定料率を削除しますか？'))return;
  try{
    var {error}=await sb.from('fee_schedules').delete().eq('id',feeId);
    if(error)throw error;
    logAudit('delete_fee_schedule','fee_schedules',feeId,{});
    showToast('✅ 期間限定料率を削除しました');
    loadFeeSchedules(corpUuid,corpDisplayId);
  }catch(e){showToast('⚠️ '+e.message);}
}

async function saveAdminDelivery(storeId){
  const s=VENUES.find(x=>x.id===storeId);
  if(!s){showToast('❌ 店舗が見つかりません');return;}
  const deliveryFee=parseInt(document.getElementById('adminDeliveryFee').value)||0;
  const minOrder=parseInt(document.getElementById('adminMinOrderAmount').value)||0;
  const minOrderPolicy=document.getElementById('adminMinOrderPolicy').value||'surcharge';
  const surchargeMax=parseInt(document.getElementById('adminSmallOrderMax').value)||0;
  const prepTime=parseInt(document.getElementById('adminPrepTime').value)||30;
  const deliveryRadius=parseInt(document.getElementById('adminDeliveryRadius').value)||5;
  const minOrderApplyTypes={
    dinein:document.getElementById('adminMinOrderDinein').checked,
    takeout:document.getElementById('adminMinOrderTakeout').checked,
    delivery:document.getElementById('adminMinOrderDelivery').checked
  };
  s.deliveryFee=deliveryFee;s.minOrder=minOrder;s.minOrderPolicy=minOrderPolicy;
  s.surchargeMax=surchargeMax;s.prepTime=prepTime;s.deliveryRadius=deliveryRadius;
  s.minOrderApplyTypes=minOrderApplyTypes;
  try{
    const{error}=await sb.from('venues').update({
      delivery_fee:deliveryFee,min_order_amount:minOrder,min_order_policy:minOrderPolicy,
      small_order_surcharge_max:surchargeMax,prep_time_minutes:prepTime,
      delivery_radius_km:deliveryRadius,min_order_apply_types:minOrderApplyTypes
    }).eq('id',s._uuid||storeId);
    if(error)throw error;
    showToast('✅ 配達設定を保存しました');
    logAudit('update_store_settings','stores',storeId,{deliveryFee,minOrder,minOrderPolicy,surchargeMax,prepTime,deliveryRadius,minOrderApplyTypes});
  }catch(e){
    console.error('saveAdminDelivery error:',e);
    showToast('✅ 配達設定を保存しました（ローカル）');
    logAudit('update_store_settings','stores',storeId,{deliveryFee,minOrder,local_only:true});
  }
}

const DAYS_MAP={0:'日曜',1:'月曜',2:'火曜',3:'水曜',4:'木曜',5:'金曜',6:'土曜'};
const DAYS_ORDER=[1,2,3,4,5,6,0];

async function initStoreTabs(){
  var s=VENUES.find(x=>x.id===currentView.id);
  if(!s)return;
  await loadStoreHours(s._uuid);
  var ae=document.getElementById('storeAIChart');
  if(ae){var d=[{n:'SNS投稿文',v:85},{n:'AI画像',v:62},{n:'口コミ返信',v:48},{n:'POP作成',v:21}];var mx=Math.max(...d.map(x=>x.v));ae.innerHTML=d.map(x=>'<div class="chart-bar-row"><div class="chart-bar-label">'+x.n+'</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+(x.v/mx*100).toFixed(0)+'%;background:var(--accent)"><span class="chart-bar-val">'+x.v+'回</span></div></div></div>').join('');}
}

async function loadStoreHours(storeUuid){
  var hg=document.getElementById('storeHoursGrid');
  if(!hg)return;
  var rows=[];
  try{
    var {data}=await sb.from('venue_hours').select('*').eq('venue_id',storeUuid);
    if(data)rows=data;
  }catch(e){}
  var hoursByDay={};
  rows.forEach(function(r){hoursByDay[r.day_of_week]=r;});
  hg.innerHTML=DAYS_ORDER.map(function(day){
    var h=hoursByDay[day]||{open_time:'11:00',close_time:'22:00',is_closed:false,hours_type:'through'};
    var openVal=(h.open_time||'11:00').substring(0,5);
    var closeVal=(h.close_time||'22:00').substring(0,5);
    var open2Val=(h.open_time2||'17:00').substring(0,5);
    var close2Val=(h.close_time2||'22:00').substring(0,5);
    var type=h.hours_type||'through';
    var closed=!!h.is_closed;
    var opStyle=closed?' style="opacity:0.4;pointer-events:none"':'';
    var op2Style=(type!=='split'||closed)?' style="opacity:0.4;pointer-events:none"':'';
    return '<div class="day-label">'+DAYS_MAP[day]+'</div>'+
      '<label class="closed-check"><input type="checkbox" id="storeHour_'+day+'_closed"'+(closed?' checked':'')+' onchange="toggleDayClosed('+day+')"> 定休</label>'+
      '<select id="storeHour_'+day+'_type" onchange="toggleDayType('+day+')"'+opStyle+'><option value="through"'+(type!=='split'?' selected':'')+'>通し</option><option value="split"'+(type==='split'?' selected':'')+'>中休みあり</option></select>'+
      '<input type="time" id="storeHour_'+day+'_open" value="'+openVal+'"'+opStyle+'>'+
      '<input type="time" id="storeHour_'+day+'_close" value="'+closeVal+'"'+opStyle+'>'+
      '<input type="time" id="storeHour_'+day+'_open2" value="'+open2Val+'"'+op2Style+'>'+
      '<input type="time" id="storeHour_'+day+'_close2" value="'+close2Val+'"'+op2Style+'>';
  }).join('');
}

function toggleDayClosed(day){
  var cb=document.getElementById('storeHour_'+day+'_closed');
  if(!cb)return;
  var els=['_type','_open','_close','_open2','_close2'].map(function(s){return document.getElementById('storeHour_'+day+s);});
  els.forEach(function(el){if(el){el.style.opacity=cb.checked?'0.4':'';el.style.pointerEvents=cb.checked?'none':'';}});
  if(!cb.checked)toggleDayType(day);
}

function toggleDayType(day){
  var sel=document.getElementById('storeHour_'+day+'_type');
  var open2=document.getElementById('storeHour_'+day+'_open2');
  var close2=document.getElementById('storeHour_'+day+'_close2');
  if(!sel||!open2||!close2)return;
  var isSplit=sel.value==='split';
  open2.style.opacity=isSplit?'':'0.4';open2.style.pointerEvents=isSplit?'':'none';
  close2.style.opacity=isSplit?'':'0.4';close2.style.pointerEvents=isSplit?'':'none';
}

function applyAllStoreHours(storeUuid){
  var typeVal=document.getElementById('storeHour_1_type').value;
  var openVal=document.getElementById('storeHour_1_open').value;
  var closeVal=document.getElementById('storeHour_1_close').value;
  var open2Val=document.getElementById('storeHour_1_open2').value;
  var close2Val=document.getElementById('storeHour_1_close2').value;
  var closed=document.getElementById('storeHour_1_closed').checked;
  DAYS_ORDER.forEach(function(day){
    if(day===1)return;
    document.getElementById('storeHour_'+day+'_type').value=typeVal;
    document.getElementById('storeHour_'+day+'_open').value=openVal;
    document.getElementById('storeHour_'+day+'_close').value=closeVal;
    document.getElementById('storeHour_'+day+'_open2').value=open2Val;
    document.getElementById('storeHour_'+day+'_close2').value=close2Val;
    document.getElementById('storeHour_'+day+'_closed').checked=closed;
    toggleDayClosed(day);toggleDayType(day);
  });
  showToast('✅ 月曜の設定を全日に適用しました');
}

async function saveStoreHours(storeUuid){
  var rows=DAYS_ORDER.map(function(day){
    var type=document.getElementById('storeHour_'+day+'_type')?.value||'through';
    var open2=document.getElementById('storeHour_'+day+'_open2')?.value;
    var close2=document.getElementById('storeHour_'+day+'_close2')?.value;
    return {
      venue_id:storeUuid,
      day_of_week:day,
      open_time:document.getElementById('storeHour_'+day+'_open').value+':00',
      close_time:document.getElementById('storeHour_'+day+'_close').value+':00',
      open_time2:type==='split'&&open2?(open2+':00'):null,
      close_time2:type==='split'&&close2?(close2+':00'):null,
      hours_type:type,
      is_closed:document.getElementById('storeHour_'+day+'_closed').checked
    };
  });
  try{
    await sb.from('venue_hours').delete().eq('venue_id',storeUuid);
    var {error}=await sb.from('venue_hours').insert(rows);
    if(error)throw error;
    showToast('✅ 営業時間を保存しました');
    logAudit('update_store_hours','store_hours',storeUuid,{days:7});
  }catch(e){
    showToast('❌ 営業時間の保存に失敗しました');
  }
}

async function saveStoreFacility(storeUuid,storeId){
  var seats=parseInt(document.getElementById('facilitySeats').value)||6;
  var smoking=document.getElementById('facilitySmoking').value;
  var children=document.getElementById('facilityChildren').value;
  var chargeType=document.getElementById('facilityChargeType').value;
  var chargeValue=parseInt(document.getElementById('facilityChargeValue').value)||0;
  var s=VENUES.find(x=>x._uuid===storeUuid);
  if(s){s.seats=seats;s.smoking=smoking;s.children=children;s.serviceChargeType=chargeType;s.serviceChargeValue=chargeValue;}
  try{
    var {error}=await sb.from('venues').update({
      seats:seats,smoking_policy:smoking,children_policy:children,
      service_charge_type:chargeType,service_charge_value:chargeValue
    }).eq('id',storeUuid);
    if(error)throw error;
    showToast('✅ 施設情報を保存しました');
    logAudit('update_store_facility','stores',storeId,{seats,smoking,children,chargeType,chargeValue});
  }catch(e){
    showToast('❌ 施設情報の保存に失敗しました');
  }
}

function renderServiceCards(entityId, level, parentId){
  return SERVICES.map(s=>{
    const isOn=getSvc(entityId,s.key);
    let locked=false, lockMsg='';
    if(s.comingSoon){
      return '<div class="svc-card" style="opacity:0.45;pointer-events:none">'+
        '<div class="svc-head"><div class="svc-icon">'+s.icon+'</div><div class="svc-name">'+s.name+' <span style="font-size:9px;background:#dfe6e9;color:#636e72;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:4px">Coming Soon</span></div>'+(s.cost==='free'?'<span class="svc-tag free">無料</span>':'<span class="svc-tag paid">追加課金</span>')+'</div>'+
        '<div class="svc-desc">'+s.desc+'</div>'+
        '<div class="svc-toggle"><span class="svc-status off">OFF</span>'+
        '<label class="toggle-sw"><input type="checkbox" disabled><span class="slider" style="cursor:not-allowed"></span></label></div>'+
        '</div>';
    }
    if(level==='brand'&&parentId&&!getSvc(parentId,s.key)){locked=true;lockMsg='法人でOFFのため選択不可';}
    if(level==='store'&&parentId&&!getSvc(parentId,s.key)){locked=true;lockMsg='ブランドでOFFのため選択不可';}
    const cls='svc-card'+(isOn?' enabled':'')+(locked?' locked':'');
    const costTag=s.cost==='free'?'<span class="svc-tag free">無料</span>':'<span class="svc-tag paid">追加課金</span>';
    return '<div class="'+cls+'">'+
      '<div class="svc-head"><div class="svc-icon">'+s.icon+'</div><div class="svc-name">'+s.name+'</div>'+costTag+'</div>'+
      '<div class="svc-desc">'+s.desc+'</div>'+
      '<div class="svc-toggle"><span class="svc-status '+(isOn?'on':'off')+'">'+(isOn?'✅ 利用中':'OFF')+'</span>'+
      '<label class="toggle-sw"><input type="checkbox"'+(isOn?' checked':'')+' onchange="toggleSvc(\''+entityId+'\',\''+s.key+'\',\''+level+'\')"><span class="slider"></span></label></div>'+
      (locked?'<div class="svc-lock">🔒 '+lockMsg+'</div>':'')+
      '</div>';
  }).join('');
}

const SVC_PRICES={ai_pro:4980,ai_expert:9800,crm_pro:4980,crm_expert:9800};
function getEntityUuid(displayId,level){
  if(level==='corp')return MERCHANTS.find(c=>c.id===displayId)?._uuid;
  if(level==='brand')return BRANDS.find(b=>b.id===displayId)?._uuid;
  if(level==='store')return VENUES.find(s=>s.id===displayId)?._uuid;
}
function nextMonth1st(){const d=new Date();d.setMonth(d.getMonth()+1);d.setDate(1);return d.toISOString().split('T')[0];}

async function toggleSvc(entityId,key,level){
  const cur=getSvc(entityId,key);
  const newVal=!cur;
  const svc=SERVICES.find(s=>s.key===key);
  const svcName=svc.name;
  // Paid service confirmations
  if(svc.cost==='paid'&&newVal){
    const price=SVC_PRICES[key]||0;
    if(!confirm('月額¥'+price.toLocaleString()+'が発生します。'+svcName+'を有効化しますか？'))return;
  }
  if(svc.cost==='paid'&&!newVal){
    if(!confirm(svcName+'を無効化します。翌月1日からダウングレードされます。'))return;
  }
  // DB write
  const uuid=getEntityUuid(entityId,level);
  const entityType=level;
  const downgradeAt=(!newVal&&svc.cost==='paid')?nextMonth1st():null;
  try{
    await fetch('/api/admin/service-subscriptions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await getToken()},body:JSON.stringify({entity_type:entityType,entity_id:uuid,service_key:key,is_active:newVal,plan_price:SVC_PRICES[key]||0,downgrade_at:downgradeAt})});
  }catch(e){/* continue with local update */}
  // Update in-memory
  setSvc(entityId,key,newVal);
  // Cascade OFF to children
  if(level==='corp'&&!newVal){
    const brands=getBrandsForMerchant(MERCHANTS.find(c=>c.id===entityId));
    for(const b of brands){
      setSvc(b.id,key,false);
      const bu=b._uuid;if(bu)fetch('/api/admin/service-subscriptions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await getToken()},body:JSON.stringify({entity_type:'brand',entity_id:bu,service_key:key,is_active:false})}).catch(()=>{});
      for(const s of getVenuesForBrand(b)){
        setSvc(s.id,key,false);
        const su=s._uuid;if(su)fetch('/api/admin/service-subscriptions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await getToken()},body:JSON.stringify({entity_type:'store',entity_id:su,service_key:key,is_active:false})}).catch(()=>{});
      }
    }
  }
  if(level==='brand'&&!newVal){
    const stores=getVenuesForBrand(BRANDS.find(b=>b.id===entityId));
    for(const s of stores){
      setSvc(s.id,key,false);
      const su=s._uuid;if(su)fetch('/api/admin/service-subscriptions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await getToken()},body:JSON.stringify({entity_type:'store',entity_id:su,service_key:key,is_active:false})}).catch(()=>{});
    }
  }
  renderPage();
  showToast(newVal?'✅ '+svcName+' をONにしました':'❌ '+svcName+' をOFFにしました');
  logAudit('update_service_settings','services',null,{entityId,service:key,level,enabled:newVal,serviceName:svcName});
}

function initGenreTagInput(containerId,genreList,selected){
  var el=document.getElementById(containerId);if(!el)return;
  var sel=selected?selected.slice():[];
  function render(){
    var tags=sel.map(function(g){return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#dbeafe;color:#1e40af;border-radius:14px;font-size:11px;font-weight:600">'+escHtml(g)+'<span style="cursor:pointer;font-size:13px;line-height:1;color:#1e40af;opacity:.7" onclick="event.stopPropagation();_genreTagRemove(\''+containerId+'\',\''+g+'\')">&times;</span></span>';}).join('');
    el.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px" id="'+containerId+'_tags">'+tags+'</div>'+
    '<div style="position:relative"><input type="text" id="'+containerId+'_input" placeholder="ジャンルを検索..." style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px" onclick="_genreTagShowDrop(\''+containerId+'\')" oninput="_genreTagFilter(\''+containerId+'\')"><div id="'+containerId+'_drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div></div>';
    el._selected=sel;el._genreList=genreList;
    var inp=document.getElementById(containerId+'_input');
    inp.addEventListener('focus',function(){_genreTagShowDrop(containerId);});
    document.addEventListener('click',function handler(e){if(!el.contains(e.target)){document.getElementById(containerId+'_drop').style.display='none';}});
  }
  render();
}

async function toggleMerchantStatus(uuid,currentStatus){
  var isOwner=await checkOwnerRole();
  if(!isOwner){showToast('⚠️ この操作はオーナー権限が必要です');return;}
  var isSuspending=currentStatus==='active';
  var newCorpStatus=isSuspending?'suspended':'active';
  var label=isSuspending?'停止':'再開';
  var detail=isSuspending?'この法人を停止すると、配下の全ブランド・店舗が非公開になり、全機能が使えなくなります。':'この法人を再開します。配下のブランド・店舗が再び公開されます。';
  if(!confirm(detail+'\n\nよろしいですか？'))return;
  try{
    var token=await getToken();
    var res=await fetch('/api/admin/corporations/'+uuid,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({status:newCorpStatus})});
    var d=await res.json();if(!res.ok)throw new Error(d.error);
    var corp=MERCHANTS.find(function(c){return c._uuid===uuid;});
    if(corp){
      var brandUuids=BRANDS.filter(function(b){return b.corpId===corp.id;}).map(function(b){return b._uuid;});
      if(brandUuids.length){await sb.from('brands').update({status:isSuspending?'suspended':'active'}).in('id',brandUuids);BRANDS.filter(function(b){return b.corpId===corp.id;}).forEach(function(b){b.status=isSuspending?'suspended':'active';});}
      var storeUuids=VENUES.filter(function(s){var br=getBrandForVenue(s);return br&&br.corpId===corp.id;}).map(function(s){return s._uuid;});
      if(storeUuids.length){await sb.from('venues').update({is_active:!isSuspending}).in('id',storeUuids);VENUES.filter(function(s){var br=getBrandForVenue(s);return br&&br.corpId===corp.id;}).forEach(function(s){s.status=isSuspending?'suspended':'active';});}
      corp.status=newCorpStatus;
    }
    showToast('✅ 法人を'+label+'しました');renderPage();
  }catch(e){showToast('⚠️ '+e.message);}
}

async function uploadBrandLogo(brandUuid,brandDisplayId,input){
  const file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){showToast('⚠️ 2MB以下のファイルを選択してください');return;}
  showToast('⏳ アップロード中...');
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    const path='brands/'+brandUuid+'/logo.'+ext;
    const {error:upErr}=await sb.storage.from('brand-assets').upload(path,file,{upsert:true,contentType:file.type});
    if(upErr)throw upErr;
    const {data}=sb.storage.from('brand-assets').getPublicUrl(path);
    const logoUrl=data.publicUrl;
    const {error:dbErr}=await sb.from('brands').update({logo_url:logoUrl}).eq('id',brandUuid);
    if(dbErr)throw dbErr;
    const b=BRANDS.find(x=>x._uuid===brandUuid);if(b)b.logo_url=logoUrl;
    const prev=document.getElementById('brandLogoPreview_'+brandUuid);
    if(prev)prev.innerHTML='<img src="'+logoUrl+'" style="max-height:80px;max-width:200px;border-radius:6px">';
    showToast('✅ ロゴをアップロードしました');
  }catch(e){showToast('⚠️ '+e.message);}
}

async function saveStoreBasic(storeDisplayId){
  const s=VENUES.find(x=>x.id===storeDisplayId);
  if(!s)return;
  const inputs=document.querySelectorAll('#store-basic input');
  const name=inputs[0]?.value.trim()||s.name;
  const addr=inputs[2]?.value.trim()||s.addr;
  const tel=inputs[3]?.value.trim()||s.tel;
  var newCorpUuid=document.getElementById('storeCorpUuid')?.value||null;
  try{
    // corp_id 変更時のみ history を挿入
    if(newCorpUuid!==(s.corpUuid||null)){
      if(s.corpUuid){
        await sb.from('venue_merchant_history').update({ended_at:new Date().toISOString()}).eq('venue_id',s._uuid).is('ended_at',null);
      }
      if(newCorpUuid){
        var newCorp=MERCHANTS.find(function(c){return c._uuid===newCorpUuid;});
        await sb.from('venue_merchant_history').insert({venue_id:s._uuid,merchant_id:newCorpUuid,corp_name_snapshot:newCorp?.name||'',started_at:new Date().toISOString()});
      }
    }
    const res=await fetch('/api/admin/stores/'+s._uuid,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await getToken()},body:JSON.stringify({name:name,address:addr,phone:tel,corp_id:newCorpUuid||null})});
    if(!res.ok){const d=await res.json();throw new Error(d.error||'保存に失敗');}
    s.name=name;s.addr=addr;s.tel=tel;
    s.corpUuid=newCorpUuid||'';s.corpId=newCorpUuid?(MERCHANTS.find(c=>c._uuid===newCorpUuid)?.id||''):'';
    showToast('✅ 店舗情報を保存しました');

}

function readBulkFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const pv=document.getElementById('bulkPreview');
  pv.innerHTML='<div class="upload-result" style="background:#f5f6fa;color:var(--text)">⏳ 読み込み中...</div>';
  document.getElementById('bulkActions').style.display='none';
  if(ext==='csv'){
    const reader=new FileReader();
    reader.onload=function(e){showBulkPreview(parseCSV(e.target.result));};
    reader.readAsText(file,'UTF-8');
  }else if(ext==='xlsx'||ext==='xls'){
    const reader=new FileReader();
    reader.onload=function(e){
      try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];showBulkPreview(XLSX.utils.sheet_to_json(ws,{header:1}));}
      catch(err){pv.innerHTML='<div class="upload-result err">❌ Excel読み込み失敗: '+err.message+'</div>';}
    };
    reader.readAsArrayBuffer(file);
  }else{pv.innerHTML='<div class="upload-result err">❌ CSVまたはExcel(.xlsx)を選択してください</div>';}
}

function parseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  return lines.map(l=>{
    const result=[];let cur='';let inQ=false;
    for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){result.push(cur.trim());cur='';}else cur+=ch;}
    result.push(cur.trim());return result;
  });
}

function showBulkPreview(rows){
  const pv=document.getElementById('bulkPreview');
  // Filter out comment rows (starting with #)
  rows=rows.filter(r=>!String(r[0]||'').trim().startsWith('#'));
  if(rows.length<2){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}
  const headers=rows[0].map(h=>String(h||'').replace(/\*/g,'').trim());
  const dataRows=rows.slice(1).filter(r=>r.some(c=>c&&String(c).trim()));
  if(!dataRows.length){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}

  // Validate and build preview
  const validated=validateBulkRows(dataRows,_bulkType);
  _bulkParsed=validated.valid;

  let h='<div style="font-size:12px;font-weight:700;margin:12px 0 8px">📋 プレビュー（'+dataRows.length+'件）</div>';
  if(validated.errors.length){
    h+='<div class="upload-result err" style="margin-bottom:12px">⚠️ '+validated.errors.length+'件のエラー:<br>'+validated.errors.map(e=>'・'+e).join('<br>')+'</div>';
  }
  const totalWarnings=validated.valid.reduce((s,v)=>s+(v._warnings||[]).length,0);
  if(totalWarnings>0){
    h+='<div class="upload-result" style="background:#fff3cd;color:#856404;margin-bottom:12px;padding:10px;border-radius:8px;font-size:12px">⚠️ '+totalWarnings+'件の自動補正があります（内容は各行の「⚠️」にマウスを当ててご確認ください）</div>';
  }
  if(validated.valid.length){
    // Show max 5 display columns for readability
    const dispCols=getDisplayColumns(_bulkType);
    h+='<div style="overflow-x:auto;max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"><table class="data-table" style="font-size:11px"><thead><tr><th>#</th>'+dispCols.map(c=>'<th>'+c.label+'</th>').join('')+'<th>状態</th></tr></thead><tbody>';
    validated.valid.forEach((item,i)=>{
      h+='<tr><td>'+(i+1)+'</td>'+dispCols.map(c=>'<td>'+esc(item[c.key]||'—')+'</td>').join('')+'<td>'+(item._warnings&&item._warnings.length?'<span style="color:#e17055;font-weight:700;font-size:10px" title="'+esc(item._warnings.join('\n'))+'">⚠️ '+item._warnings.length+'件補正</span>':'<span style="color:var(--success);font-weight:700;font-size:10px">✅ OK</span>')+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:12px;margin-top:12px;color:var(--success);font-weight:700">✅ '+validated.valid.length+'件が登録可能です</div>';
    document.getElementById('bulkActions').style.display='flex';
  }else{
    document.getElementById('bulkActions').style.display='none';
  }
  pv.innerHTML=h;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function xlsxTimeToHHMM(val){if(typeof val==='number'&&val>=0&&val<1){var totalMins=Math.round(val*24*60);var h=Math.floor(totalMins/60)%24;var m=totalMins%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}return String(val!=null?val:'').trim();}

function getDisplayColumns(type){
  if(type==='corp')return [{key:'name',label:'法人名'},{key:'rep',label:'代表者'},{key:'hqAddress',label:'本部住所'},{key:'contactName',label:'担当者'},{key:'contactEmail',label:'担当者メール'}];
  if(type==='brand')return [{key:'name',label:'ブランド名'},{key:'slug',label:'スラッグ'},{key:'corpName',label:'法人'},{key:'mainColor',label:'カラー'},{key:'status',label:'ステータス'}];
  if(type==='store')return [{key:'name',label:'店舗名'},{key:'brandName',label:'ブランド'},{key:'addr',label:'住所'},{key:'tel',label:'電話'},{key:'hoursType',label:'営業形態'}];
  if(type==='account')return [{key:'name',label:'氏名'},{key:'email',label:'メール'},{key:'role',label:'権限'},{key:'corpName',label:'法人'}];
  return [];
}

function normalizeRow(row){
  const g=idx=>{let v=row[idx];if(v==null)return '';v=String(v).trim();v=v.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));v=v.replace(/　/g,' ').trim();return v;};
  const normalize=v=>{if(/^(-+|—+|なし|N\/A|NA|none|ー+)$/i.test(v))return '';return v;};
  const normalizeOnOff=v=>{if(/^(on|yes|true|1|あり|有)$/i.test(v))return 'ON';if(/^(off|no|false|0|なし|無)$/i.test(v))return 'OFF';return v.toUpperCase();};
  const normalizeRole=v=>v.toLowerCase();
  const normalizeGenres=v=>v.replace(/[・／｜/、]/g,',');
  return {g,normalize,normalizeOnOff,normalizeRole,normalizeGenres};
}

function validateBulkRows(dataRows,type){
  const valid=[],errors=[];
  dataRows.forEach((row,i)=>{
    const rn=i+2;const g=idx=>String(row[idx]!=null?row[idx]:'').trim();
    try{
      if(type==='corp'){
        const EXPECTED_CORP_COLS=14;
        if(row.length>EXPECTED_CORP_COLS&&row[EXPECTED_CORP_COLS]!=null&&String(row[EXPECTED_CORP_COLS]).trim()!==''){errors.push('行'+rn+': テンプレート形式が古い可能性があります。最新テンプレートをDLして再試行してください（14列形式）');return;}
        const nr=normalizeRow(row);
        const name=nr.g(0);
        if(!name){errors.push('行'+rn+': 法人名が空');return;}
        const warnings=[];
        const hp=nr.normalize(nr.g(3));
        const recruit=nr.normalize(nr.g(4));
        valid.push({name,rep:nr.g(1),corpEmail:nr.g(2),hp,recruit,
          corpNumber:nr.g(5),bankName:nr.g(6),bankBranch:nr.g(7),bankAccount:nr.g(8),
          hqAddress:nr.g(9),hqPhone:nr.g(10),repEmail:nr.g(11),
          contactName:nr.g(12),contactEmail:nr.g(13),_warnings:warnings});
      }else if(type==='brand'){
        const nr=normalizeRow(row);
        const name=nr.g(0),slug=nr.g(1),corpId=nr.g(2);
        if(!name){errors.push('行'+rn+': ブランド名が空');return;}
        if(!slug){errors.push('行'+rn+': スラッグが空');return;}
        if(!corpId){errors.push('行'+rn+': 所属法人IDが空');return;}
        const corp=MERCHANTS.find(c=>c.id===corpId);
        if(!corp){errors.push('行'+rn+': 法人ID「'+corpId+'」が存在しません');return;}
        const warnings=[];
        const genresRaw=nr.normalizeGenres(nr.g(13));
        const allGenres=genresRaw?genresRaw.split(',').map(s=>s.trim()).filter(Boolean):[];
        const validGenres=allGenres.filter(gn=>GENRE_LIST.includes(gn));
        const invalidGenres=allGenres.filter(gn=>!GENRE_LIST.includes(gn));
        if(invalidGenres.length)warnings.push('ジャンル「'+invalidGenres.join('、')+'」は認識できないためスキップ');
        valid.push({name,slug,corpId,corpName:corp.name,
          mainColor:nr.g(3)||'',subColor:nr.g(4)||'',hdrBg:nr.g(5)||'',hdrTx:nr.g(6)||'',fontColor:nr.g(7)||'',font:nr.g(8)||'Noto Sans JP',
          takeout:nr.normalizeOnOff(nr.g(9))||'OFF',delivery:nr.normalizeOnOff(nr.g(10))||'OFF',reserv:nr.normalizeOnOff(nr.g(11))||'OFF',
          smoking:nr.g(12)||'全席禁煙',genres:validGenres,
          hpUrl:nr.normalize(nr.g(14)),contactName:nr.g(15),contactEmail:nr.g(16),_warnings:warnings});
      }else if(type==='store'){
        var nr=normalizeRow(row);
        var sName=nr.g(0),brandId=nr.g(2);
        if(!sName){errors.push('行'+rn+': 店舗名が空');return;}
        if(!brandId){errors.push('行'+rn+': 所属ブランドIDが空');return;}
        var brand=BRANDS.find(function(b){return b.id===brandId;});
        if(!brand){errors.push('行'+rn+': ブランドID「'+brandId+'」が存在しません');return;}
        var sWarnings=[];
        var sHoursType=nr.g(16)||'通し営業';
        var sPriceLunchRaw=nr.g(22),sPriceDinnerRaw=nr.g(23);
        var sPriceLunch=PRICE_RANGES.includes(sPriceLunchRaw)?sPriceLunchRaw:'';
        var sPriceDinner=PRICE_RANGES.includes(sPriceDinnerRaw)?sPriceDinnerRaw:'';
        if(sPriceLunchRaw&&!sPriceLunch)sWarnings.push('昼の価格帯「'+sPriceLunchRaw+'」は認識できないため空白で登録');
        if(sPriceDinnerRaw&&!sPriceDinner)sWarnings.push('夜の価格帯「'+sPriceDinnerRaw+'」は認識できないため空白で登録');
        var sSmokingRaw=nr.g(27)||nr.g(9);
        var sSmoking=_SMOKING_OPTS.includes(sSmokingRaw)?sSmokingRaw:'全席禁煙';
        if(sSmokingRaw&&!_SMOKING_OPTS.includes(sSmokingRaw))sWarnings.push('喫煙「'+sSmokingRaw+'」は認識できないため「全席禁煙」で登録');
        valid.push({name:sName,brandId:brandId,brandName:brand.name,corpId:brand.corpId,addr:nr.g(3),tel:nr.g(4),email:nr.g(5),station:nr.g(6),priceRange:nr.g(7),seats:nr.g(15)||nr.g(8),smoking:sSmoking,children:nr.g(10)||'同伴不可',pets:nr.g(11)||'同伴不可',parking:nr.g(12)||'なし',contactEmail:nr.g(13),contactPhone:nr.g(14),hoursType:sHoursType,lunchOpen:xlsxTimeToHHMM(row[17]),lunchClose:xlsxTimeToHHMM(row[18]),dinnerOpen:xlsxTimeToHHMM(row[19]),dinnerClose:xlsxTimeToHHMM(row[20]),holiday:nr.g(21),priceLunch:sPriceLunch,priceDinner:sPriceDinner,takeout:(nr.normalizeOnOff(nr.g(24))||'OFF'),delivery:(nr.normalizeOnOff(nr.g(25))||'OFF'),reserv:(nr.normalizeOnOff(nr.g(26))||'OFF'),_warnings:sWarnings});
      }else if(type==='account'){
        const name=g(0),email=g(1),role=g(2),corpId=g(3);
        if(!name||!email){errors.push('行'+rn+': 氏名またはメールが空');return;}
        if(!['owner','admin','staff'].includes(role)){errors.push('行'+rn+': 権限「'+role+'」が不正（owner/admin/staffのいずれか）');return;}
        const corp=MERCHANTS.find(c=>c.id===corpId);
        if(!corp){errors.push('行'+rn+': 法人ID「'+corpId+'」が存在しません');return;}
        valid.push({name,email,role,corpId,corpName:corp.name,phone:g(4)});
      }
    }catch(e){errors.push('行'+rn+': '+e.message);}
  });
  return {valid,errors};
}

        added++;
      }catch(e){var msg=item.name+': '+e.message;showToast('⚠️ '+msg);var pv=document.getElementById('bulkPreview');if(pv)pv.innerHTML+='<div class="upload-result err" style="margin-top:8px">❌ '+esc(msg)+'</div>';continue;}
    }else if(_bulkType==='store'){
      try{
        var token=await getToken();
        var sBrand=BRANDS.find(function(b){return b.id===item.brandId;});
        var sSmokingMap={'全席禁煙':'no_smoking','全席喫煙':'allowed','喫煙可':'allowed','分煙':'separated'};
        var sStoreRes=await fetch('/api/admin/stores',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name:item.name,brand_id:sBrand?._uuid,address:item.addr||undefined,phone:item.tel||undefined,email:item.email||undefined,nearest_station:item.station||undefined,price_range_lunch:item.priceLunch||undefined,price_range_dinner:item.priceDinner||undefined,seats:item.seats?parseInt(item.seats):undefined,smoking_policy:sSmokingMap[item.smoking]||'no_smoking',children_policy:item.children==='同伴可'?'allowed':item.children==='要相談'?'consultation':'not_allowed',regular_holiday:item.holiday||undefined,takeout_enabled:item.takeout==='ON',delivery_enabled:item.delivery==='ON',reservation_enabled:item.reserv==='ON',is_active:true})});
        var sStoreD=await sStoreRes.json();if(!sStoreRes.ok)throw new Error(sStoreD.error||'店舗保存失敗');
        var sStoreUuid=sStoreD.data.id;
        var allDows=[0,1,2,3,4,5,6];var sHoursRows=[];
        var sIsSplit=(item.hoursType||'').indexOf('中休み')>=0&&item.lunchOpen&&item.dinnerOpen;
        allDows.forEach(function(dow){
          if(sIsSplit){sHoursRows.push({venue_id:sStoreUuid,day_of_week:dow,open_time:item.lunchOpen+':00',close_time:item.lunchClose+':00',open_time2:item.dinnerOpen+':00',close_time2:item.dinnerClose+':00',hours_type:'split',is_closed:false});}

        });
        if(sHoursRows.length)await sb.from('venue_hours').insert(sHoursRows);
        VENUES.push({_uuid:sStoreUuid,id:sStoreD.data.display_id,brandId:item.brandId,name:item.name,status:'active',addr:item.addr||'',tel:item.tel||'',orders:0,revenue:0});

      }catch(e){var sMsg=item.name+': '+e.message;showToast('⚠️ '+sMsg);var sPv=document.getElementById('bulkPreview');if(sPv)sPv.innerHTML+='<div class="upload-result err" style="margin-top:8px">❌ '+esc(sMsg)+'</div>';continue;}
    }else if(_bulkType==='account'){
      ACCOUNTS.push({id:genId('ACC-'),name:item.name,email:item.email,role:item.role,corpId:item.corpId,phone:item.phone,status:'active',lastLogin:'—'});added++;
    }
  }
  closeModal();
  showToast('✅ '+added+'件を登録しました');
  _bulkParsed=null;_bulkType=null;
  confirmBulkImport._p=false;
  renderPage();
}

}

let _auditDebounce=null;
function debounceAuditSearch(){clearTimeout(_auditDebounce);_auditDebounce=setTimeout(function(){auditLogPage=1;loadAuditLogs();},400);}

async function loadAuditLogs(){
  var el=document.getElementById('auditLogBody');
  if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:24px;color:#888">読み込み中...</div>';
  try{
    var level=document.getElementById('auditLogLevel')?document.getElementById('auditLogLevel').value:'';
    var dateFrom=document.getElementById('auditDateFrom')?document.getElementById('auditDateFrom').value:'';
    var dateTo=document.getElementById('auditDateTo')?document.getElementById('auditDateTo').value:'';
    var keyword=(document.getElementById('auditKeyword')?document.getElementById('auditKeyword').value:'').trim();

    var q=sb.from('audit_logs').select('*',{count:'exact'}).order('created_at',{ascending:false});
    if(level)q=q.eq('log_level',level);
    if(dateFrom)q=q.gte('created_at',dateFrom+'T00:00:00');
    if(dateTo)q=q.lte('created_at',dateTo+'T23:59:59');
    if(keyword)q=q.or('action.ilike.%'+keyword+'%,actor_email.ilike.%'+keyword+'%,entity_type.ilike.%'+keyword+'%');
    var from=(auditLogPage-1)*AUDIT_PAGE_SIZE;
    q=q.range(from,from+AUDIT_PAGE_SIZE-1);

    var res=await q;
    var logs=res.data;var count=res.count;var error=res.error;
    if(error)throw error;
    if(!logs||!logs.length){el.innerHTML='<div class="empty-state">該当するログはありません</div>';renderAuditPager(0);return;}

    var levelColors={INFO:'background:#e6f9f0;color:#00b894',WARN:'background:#ffeaa7;color:#d68910',ERR:'background:#fab1a0;color:#d63031'};
    var h='<table class="data-table"><thead><tr><th>日時</th><th>レベル</th><th>操作</th><th>対象</th><th>実行者</th><th>詳細</th></tr></thead><tbody>';
    for(var i=0;i<logs.length;i++){
      var log=logs[i];
      var dt=log.created_at?new Date(log.created_at).toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'}):'—';
      var lv=log.log_level||'INFO';
      var lvStyle=levelColors[lv]||levelColors.INFO;
      var details=log.details?JSON.stringify(log.details).substring(0,80):'—';
      h+='<tr>'+
        '<td style="font-size:11px;color:var(--text-light);white-space:nowrap">'+escHtml(dt)+'</td>'+
        '<td><span class="log-badge" style="'+lvStyle+'">'+escHtml(lv)+'</span></td>'+
        '<td style="font-weight:600">'+escHtml(log.action||'')+'</td>'+
        '<td>'+escHtml((log.entity_type||'')+(log.entity_id?' / '+log.entity_id.substring(0,8):''))+'</td>'+
        '<td>'+escHtml(log.actor_email||log.user_email||'—')+'</td>'+
        '<td style="font-size:11px;color:var(--text-light);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escHtml(details)+'">'+escHtml(details)+'</td>'+
      '</tr>';
    }
    h+='</tbody></table>';
    el.innerHTML=h;
    renderAuditPager(count||0);
  }catch(e){el.innerHTML='<div style="color:var(--danger);padding:24px">読み込みエラー: '+escHtml(e.message)+'</div>';}
}

function renderAuditPager(total){
  var pager=document.getElementById('auditLogPager');
  if(!pager)return;
  var pages=Math.ceil(total/AUDIT_PAGE_SIZE);
  if(pages<=1){pager.innerHTML='';return;}
  var h='';
  for(var i=1;i<=Math.min(pages,10);i++){
    h+='<button class="btn btn-sm '+(i===auditLogPage?'btn-primary':'btn-secondary')+'" onclick="auditLogPage='+i+';loadAuditLogs()">'+i+'</button>';
  }
  if(pages>10)h+='<span style="padding:8px;color:var(--text-light)">... '+pages+'ページ</span>';
  pager.innerHTML=h;
}

  _bulkDbType=null;_bulkDbMode='upsert';_bulkDbStep=1;
  _bulkDbItems=null;_bulkDbErrors=[];_bulkDbOriginalObjects=null;
  _bulkDbDeleteSelected=null;_bulkDbFuzzyWarnings=[];
  _bulkDbImageFiles=[];

  if(el)el.innerHTML=renderBulkPage();
}

function onBulkModeChange(mode){

  }

function onBulkTypeChange(){

  _bulkDbType=sel||null;_bulkDbItems=null;_bulkDbErrors=[];_bulkDbOriginalObjects=null;_bulkDbFuzzyWarnings=[];

function downloadBulkTemplate(includeData){
  var type=_bulkDbType;if(!type)return;
  var tmpl=BULK_TEMPLATES[type];
  if(includeData){downloadTemplateWithData(type,tmpl);return;}
  if(tmpl.format==='xlsx'){
    var wb=XLSX.utils.book_new();
    var wsData=[tmpl.headers].concat(tmpl.sample);
    var ws=XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb,ws,'Sheet1');
    XLSX.writeFile(wb,tmpl.filename);
  }else{
    var bom='\uFEFF';var csv=bom+tmpl.headers.join(',')+'\n'+tmpl.sample.map(function(r){return r.join(',');}).join('\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=tmpl.filename;a.click();
  }
  showToast('📋 テンプレートをダウンロードしました');
}

async function downloadTemplateWithData(type,tmpl){
  showToast('⏳ データを取得中...');
  try{
    var token=(await sb.auth.getSession()).data.session?.access_token;
    var res=await fetch('/api/bulk-import/export?type='+encodeURIComponent(type),{headers:{'Authorization':'Bearer '+token}});
    var json=await res.json();
    if(!json.success){showToast('❌ '+json.error);return;}
    var rows=json.data||[];
    if(!rows.length){showToast('ℹ️ データがありません。空テンプレートをダウンロードします');downloadBulkTemplate(false);return;}
    var dataRows=rows.map(function(row){return tmpl.keys.map(function(k){return row[k]!==undefined&&row[k]!==null?String(row[k]):'';});});
    if(tmpl.format==='xlsx'){
      var wb=XLSX.utils.book_new();
      var wsData=[tmpl.headers].concat(dataRows);
      var ws=XLSX.utils.aoa_to_sheet(wsData);
      XLSX.utils.book_append_sheet(wb,ws,'Sheet1');
      XLSX.writeFile(wb,tmpl.filename.replace('.xlsx','_data.xlsx'));
    }else{
      var bom='\uFEFF';var csv=bom+tmpl.headers.join(',')+'\n'+dataRows.map(function(r){return r.map(function(c){return c.indexOf(',')>=0||c.indexOf('"')>=0?'"'+c.replace(/"/g,'""')+'"':c;}).join(',');}).join('\n');
      var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=tmpl.filename.replace('.csv','_data.csv');a.click();
    }
    showToast('📥 '+rows.length+'件のデータを含むテンプレートをダウンロードしました');
  }catch(e){showToast('❌ エクスポートエラー: '+e.message);}
}

function handleBulkFile(file){
  if(!file||!_bulkDbType)return;
  var type=_bulkDbType;var tmpl=BULK_TEMPLATES[type];
  var ext=file.name.split('.').pop().toLowerCase();
  // Move to step 2 with loading state
  _bulkDbStep=2;
  var step2=document.getElementById('bulkStep2Card');
  if(step2){
    step2.style.display='';
    step2.innerHTML='<div class="card"><div style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto 12px"></div><div style="font-size:12px;color:var(--text-light)">ファイルを読み込み中...</div></div></div>';
  }
  var el=document.getElementById('content');if(el)el.innerHTML=renderBulkPage();
  // After re-render, set loader in step2
  step2=document.getElementById('bulkStep2Card');
  if(step2)step2.innerHTML='<div class="card"><div style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto 12px"></div><div style="font-size:12px;color:var(--text-light)">ファイルを読み込み中...</div></div></div>';
  if(ext==='csv'){
    var reader=new FileReader();
    reader.onload=function(e){var rawRows=parseCSVRows(e.target.result);parsedToPreview(type,tmpl,rawRows);};
    reader.readAsText(file,'UTF-8');
  }else if(ext==='xlsx'||ext==='xls'){
    var reader2=new FileReader();
    reader2.onload=function(e){
      try{var wb=XLSX.read(e.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rawRows=XLSX.utils.sheet_to_json(ws,{header:1});parsedToPreview(type,tmpl,rawRows);}
      catch(err){var s=document.getElementById('bulkStep2Card');if(s)s.innerHTML='<div class="upload-result err">❌ Excel読み込み失敗: '+esc(err.message)+'</div>';}
    };
    reader2.readAsArrayBuffer(file);
  }else{
    var s2=document.getElementById('bulkStep2Card');if(s2)s2.innerHTML='<div class="upload-result err">❌ CSVまたはExcel(.xlsx)を選択してください</div>';
  }
}

function parseCSVRows(text){
  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(function(l){return l.trim();});
  return lines.map(function(l){
    var result=[];var cur='';var inQ=false;
    for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){result.push(cur.trim());cur='';}else cur+=ch;}
    result.push(cur.trim());return result;
  });
}

async function parsedToPreview(type,tmpl,rawRows){
  var pv=document.getElementById('bulkStep2Card');
  if(!pv)return;
  if(rawRows.length<2){pv.innerHTML='<div class="upload-result err">❌ ヘッダー行+データ行が必要です</div>';return;}
  var dataRows=rawRows.slice(1).filter(function(r){return r.some(function(c){return c&&String(c).trim();});});
  if(!dataRows.length){pv.innerHTML='<div class="upload-result err">❌ データ行がありません</div>';return;}
  // Convert to objects using template keys
  var objects=dataRows.map(function(row){
    var obj={};
    tmpl.keys.forEach(function(k,idx){
      var val=row[idx]!==undefined&&row[idx]!==null?String(row[idx]).trim():'';
      // ON/OFF → boolean conversion
      if(val==='ON')val=true;else if(val==='OFF')val=false;
      obj[k]=val;
    });
    return obj;
  });
  _bulkDbOriginalObjects=objects.slice();
  pv.innerHTML='<div class="card"><div style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto 12px"></div><div style="font-size:12px;color:var(--text-light)">APIプレビュー中... ('+objects.length+'件)</div></div></div>';
  try{
    var token=(await sb.auth.getSession()).data.session?.access_token;
    var endpoint=_bulkDbMode==='delete'?'/api/bulk-import/delete-preview':'/api/bulk-import/preview';
    var res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({type:type,rows:objects})});
    var json=await res.json();
    if(!json.success){pv.innerHTML='<div class="upload-result err">❌ '+esc(json.error)+'</div>';return;}
    // Brand fuzzy check for upsert mode when type=brand
    if(_bulkDbMode==='upsert'&&type==='brand'){
      _bulkDbFuzzyWarnings=await runBrandFuzzyCheck(json.data.items||[]);
    }else{
      _bulkDbFuzzyWarnings=[];
    }
    renderBulkPreviewResult(type,tmpl,json.data,objects);
  }catch(e){pv.innerHTML='<div class="upload-result err">❌ APIエラー: '+esc(e.message)+'</div>';}
}

// Check each inserted brand row for similar existing brand names
async function runBrandFuzzyCheck(items){
  var warnings=[];
  var token=(await sb.auth.getSession()).data.session?.access_token;
  for(var i=0;i<items.length;i++){
    var it=items[i];
    if(it._action!=='insert'||!it.name)continue;
    try{
      var res=await fetch('/api/bulk-import/fuzzy-brand',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name:it.name})});
      var json=await res.json();
      if(json.success&&json.data.matches&&json.data.matches.length){
        warnings.push({row:i,name:it.name,matches:json.data.matches});
      }
    }catch(_e){}
  }
  return warnings;
}

// Build a "before → after" diff for an update row using existing DB value vs new value
function renderDiffForItem(tmpl,item,originalObj){
  var diffs=[];
  tmpl.keys.forEach(function(k){
    if(k==='corp_name'||k==='brand_slug'||k==='category_name'||k==='product_name')return;
    var newVal=originalObj?originalObj[k]:undefined;
    if(newVal===undefined||newVal===''||newVal===null)return; // blank = no change
    diffs.push({key:k,value:newVal});
  });
  return diffs;
}

function renderBulkPreviewResult(type,tmpl,result,objects){
  var pv=document.getElementById('bulkStep2Card');
  if(!pv)return;
  _bulkDbItems=result.items;_bulkDbErrors=result.errors||[];
  var s=result.summary;
  var isDelete=_bulkDbMode==='delete';
  if(isDelete&&!_bulkDbDeleteSelected){
    _bulkDbDeleteSelected=new Set();
    (result.items||[]).forEach(function(_it,i){_bulkDbDeleteSelected.add(i);});
  }
  var h='<div class="card"><div class="card-title">📋 Step 2: プレビュー・検証'+(isDelete?' <span style="color:var(--danger);font-size:12px">（削除モード）</span>':'')+'</div>';

  h+='<div class="stat-row" style="margin-bottom:16px"><div class="stat-card purple"><div class="sc-label">合計</div><div class="sc-val">'+s.total+'</div></div>';
  if(isDelete){
    h+='<div class="stat-card" style="border-left-color:var(--danger)"><div class="sc-label">削除対象</div><div class="sc-val" style="color:var(--danger)">'+(s.deleteCount||0)+'</div></div>';
  }else{
    h+='<div class="stat-card green"><div class="sc-label">新規登録</div><div class="sc-val">'+(s.newCount||0)+'</div></div>';
    h+='<div class="stat-card blue"><div class="sc-label">更新</div><div class="sc-val">'+(s.updateCount||0)+'</div></div>';
  }
  h+='<div class="stat-card" style="border-left-color:'+(s.errorCount>0?'var(--danger)':'var(--border)')+'"><div class="sc-label">エラー</div><div class="sc-val" style="'+(s.errorCount>0?'color:var(--danger)':'')+'">'+(s.errorCount||0)+'</div></div></div>';

  // Error details
  if(_bulkDbErrors.length){
    h+='<div class="upload-result err" style="margin-bottom:12px">⚠️ '+_bulkDbErrors.length+'件のエラー:<br>';
    _bulkDbErrors.forEach(function(e){h+='・行'+((e.row!=null?e.row:0)+2)+': '+esc(e.message)+'<br>';});
    h+='</div>';
  }

  // Brand fuzzy warnings
  if(_bulkDbFuzzyWarnings&&_bulkDbFuzzyWarnings.length){
    h+='<div class="upload-result" style="margin-bottom:12px;background:#fff7e6;border:1px solid #f59f00;color:#8a5a00">'+
      '⚠️ ブランド表記揺れの可能性があります:<br>';
    _bulkDbFuzzyWarnings.forEach(function(w){
      var cands=w.matches.map(function(m){return esc(m.name)+'（slug: '+esc(m.slug)+'）';}).join(', ');
      h+='・行'+(w.row+2)+' 「'+esc(w.name)+'」 → '+cands+' の可能性<br>';
    });
    h+='<div style="font-size:10px;margin-top:6px;color:var(--text-light)">※新規ブランドとして追加される予定です。既存ブランドを更新したい場合はCSVを修正してください。</div>';
    h+='</div>';
  }

  // Preview table
  if(result.items&&result.items.length){
    var dispKeys=tmpl.keys.slice(0,6);
    var dispHeaders=tmpl.headers.slice(0,6);
    h+='<div style="overflow-x:auto;max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">'+
      '<table class="data-table" style="font-size:11px"><thead><tr>';
    if(isDelete){
      h+='<th style="width:40px"><input type="checkbox" id="bulkDeleteAll" checked onchange="toggleBulkDeleteAll(this.checked)"></th>';
    }
    h+='<th>#</th><th>操作</th>';
    dispHeaders.forEach(function(hdr){h+='<th>'+esc(hdr.replace(/\*$/,''))+'</th>';});
    if(!isDelete)h+='<th>変更内容</th>';
    h+='</tr></thead><tbody>';
    result.items.forEach(function(item,i){
      var badge;
      if(isDelete){badge='<span style="background:#fab1a0;color:#b71c1c;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">🗑️ 削除</span>';}
      else if(item._action==='insert'){badge='<span style="background:#e6f9f0;color:#00b894;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">🆕 新規</span>';}
      else{badge='<span style="background:#dfe6e9;color:#0984e3;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">🔄 更新</span>';}
      h+='<tr>';
      if(isDelete){
        var checked=_bulkDbDeleteSelected.has(i)?' checked':'';
        h+='<td><input type="checkbox" class="bulkDeleteRow" data-idx="'+i+'"'+checked+' onchange="toggleBulkDeleteRow('+i+',this.checked)"></td>';
      }
      h+='<td>'+(i+1)+'</td><td>'+badge+'</td>';
      dispKeys.forEach(function(k){
        var val=item[k]!==undefined&&item[k]!==null?String(item[k]):'—';
        if(val==='true')val='ON';if(val==='false')val='OFF';
        if(k==='tags'&&Array.isArray(item[k]))val=item[k].join('|');
        h+='<td>'+esc(val)+'</td>';
      });
      if(!isDelete){
        // Build change summary for update rows
        if(item._action==='update'&&_bulkDbOriginalObjects&&_bulkDbOriginalObjects[i]){
          var diffs=renderDiffForItem(tmpl,item,_bulkDbOriginalObjects[i]);
          if(diffs.length){
            var dh=diffs.slice(0,3).map(function(d){
              var label=(tmpl.headers[tmpl.keys.indexOf(d.key)]||d.key).replace(/\*$/,'');
              var v=d.value;if(v===true)v='ON';if(v===false)v='OFF';if(Array.isArray(v))v=v.join('|');
              return esc(label)+': → '+esc(String(v));
            }).join('<br>');
            if(diffs.length>3)dh+='<br>…他'+(diffs.length-3)+'項目';
            h+='<td style="font-size:10px;color:var(--text-light);max-width:220px">'+dh+'</td>';
          }else{
            h+='<td style="font-size:10px;color:var(--text-light)">—</td>';
          }
        }else{
          h+='<td style="font-size:10px;color:#00b894">新規作成</td>';
        }
      }
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }

  // Image matching UI (menu_product only)
  if(type==='menu_product'){h+=renderBulkImageMatchTable();}
  // Action buttons
  h+='<div class="btn-group" style="margin-top:16px">';
  h+='<button class="btn btn-s" onclick="resetBulkWizard()">← Step 1 に戻る</button>';
  if(isDelete){
    var delCount=_bulkDbDeleteSelected?_bulkDbDeleteSelected.size:0;
    if(delCount>0){
      h+='<button class="btn btn-p" style="background:var(--danger);color:#fff" onclick="executeBulkDelete()">🗑️ 選択した'+delCount+'件を削除する</button>';
    }else{
      h+='<button class="btn btn-p" disabled style="opacity:.5;cursor:not-allowed">対象を選択してください</button>';
    }

    var doCount=(s.newCount||0)+(s.updateCount||0);
    if(s.errorCount>0&&doCount===0){
      h+='<button class="btn btn-p" disabled style="opacity:.5;cursor:not-allowed">実行不可（全件エラー）</button>';
    }else if(doCount>0){
      h+='<button class="btn btn-p" onclick="executeBulkImport()">✅ '+esc(BULK_TYPE_LABELS[type])+'を登録・更新する（'+doCount+'件）</button>';
    }
  }
  if(_bulkDbErrors&&_bulkDbErrors.length){
    h+='<button class="btn btn-s" onclick="downloadErrorRows()">📥 エラー行をダウンロード</button>';
  }
  h+='</div></div>';
  pv.innerHTML=h;

function toggleBulkDeleteAll(checked){
  if(!_bulkDbItems)return;
  _bulkDbDeleteSelected=new Set();
  if(checked){_bulkDbItems.forEach(function(_it,i){_bulkDbDeleteSelected.add(i);});}
  // Refresh preview to update button count
  renderBulkPreviewResult(_bulkDbType,BULK_TEMPLATES[_bulkDbType],{items:_bulkDbItems,errors:_bulkDbErrors,summary:{total:_bulkDbItems.length,deleteCount:_bulkDbDeleteSelected.size,errorCount:_bulkDbErrors.length}},_bulkDbOriginalObjects);
}

function toggleBulkDeleteRow(idx,checked){
  if(!_bulkDbDeleteSelected)_bulkDbDeleteSelected=new Set();
  if(checked)_bulkDbDeleteSelected.add(idx);else _bulkDbDeleteSelected.delete(idx);
  // Refresh button label only
  renderBulkPreviewResult(_bulkDbType,BULK_TEMPLATES[_bulkDbType],{items:_bulkDbItems,errors:_bulkDbErrors,summary:{total:_bulkDbItems.length,deleteCount:_bulkDbDeleteSelected.size,errorCount:_bulkDbErrors.length}},_bulkDbOriginalObjects);
}

async function executeBulkImport(){
  if(executeBulkImport._running){showToast('⚠️ 処理中です');return;}
  executeBulkImport._running=true;
  var type=_bulkDbType;
  if(!type||!_bulkDbItems||!_bulkDbItems.length){executeBulkImport._running=false;showToast('⚠️ 登録データがありません');return;}
  // Upload matched product images (menu_product only) and inject image_url before execute
  if(type==='menu_product'&&_bulkDbImageFiles&&_bulkDbImageFiles.length){
    try{await uploadMatchedBulkImages();}
    catch(e){showToast('⚠️ 画像アップロードに失敗: '+e.message);executeBulkImport._running=false;return;}
  }
  var rows=_bulkDbItems.map(function(item){var o={};Object.keys(item).forEach(function(k){if(k[0]!=='_')o[k]=item[k];});return o;});
  var prog=document.getElementById('bulkDbProgress');
  var bar=document.getElementById('bulkDbProgressBar');
  var txt=document.getElementById('bulkDbProgressText');
  if(prog){prog.style.display='';bar.style.width='30%';bar.textContent='送信中...';txt.textContent=rows.length+'件を送信中...';}
  try{
    var token=(await sb.auth.getSession()).data.session?.access_token;
    if(bar){bar.style.width='50%';bar.textContent='処理中...';}

function downloadErrorRows(){
  if(!_bulkDbErrors||!_bulkDbErrors.length){showToast('ℹ️ エラー行はありません');return;}
  var tmpl=BULK_TEMPLATES[_bulkDbType];if(!tmpl)return;
  var bom='\uFEFF';
  var csv=bom+tmpl.headers.join(',')+',エラー内容\n';
  _bulkDbErrors.forEach(function(e){
    csv+=tmpl.keys.map(function(){return '';}).join(',')+','+'"'+esc(e.message).replace(/"/g,'""')+'"'+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bulk_errors_'+_bulkDbType+'.csv';a.click();
  showToast('📥 エラー行をダウンロードしました');
}

// --- Generate 3 months of demo cost logs ---
function generateCostDemoData(){
  const logs=[];
  const now=new Date(2026,2,18);// 2026-03-18
  for(let m=0;m<3;m++){
    const year=2026,month=2-m;// Mar=2, Feb=1, Jan=0
    const daysInMonth=new Date(year,month+1,0).getDate();
    COST_VENUES.forEach(store=>{
      const planMultiplier=store.plan==='EXPERT'?3.5:store.plan==='PRO'?1.8:1;
      COST_CONTENT_TYPES.forEach(ct=>{
        // Random usage count weighted by plan
        let baseCount;
        if(ct.costPerUnit>=39)baseCount=Math.floor(Math.random()*3*planMultiplier)+1;
        else if(ct.costPerUnit>=15)baseCount=Math.floor(Math.random()*8*planMultiplier)+2;
        else baseCount=Math.floor(Math.random()*15*planMultiplier)+3;
        for(let i=0;i<baseCount;i++){
          const day=Math.floor(Math.random()*daysInMonth)+1;
          const d=new Date(year,month,day);
          if(d>now)continue;
          logs.push({
            store_id:store.id,brand_id:store.brandId,corp_id:store.corpId,
            content_type:ct.key,model:ct.model,
            estimated_cost_jpy:ct.costPerUnit,
            created_at:d.toISOString()
          });
        }
      });
    });
  }
  return logs;
}

// --- Load real data from ai_usage_logs ---
async function loadRealCostLogs(){
  try{
    const from=new Date(2026,0,1).toISOString();

    if(error){console.warn('ai_usage_logs load error:',error.message);return;}
    if(!data||data.length===0){return;}
    // Map feature_type to content_type keys & find matching cost info
    const ftMap={sales_analysis:'sales_analysis',review_reply:'review_reply',sns_content:'sns_content',pop_image:'pop_image',monthly_comment:'monthly_ai_comment'};
    COST_REAL_LOGS=data.map(function(r){
      const ctKey=ftMap[r.feature_type]||r.feature_type;
      const ct=COST_CONTENT_TYPES.find(function(c){return c.key===ctKey;});
      // Try to find store/brand info from COST_VENUES
      const store=COST_VENUES.find(function(s){return s.id===r.store_id;});
      return{
        store_id:r.store_id,
        brand_id:r.brand_id,
        corp_id:store?store.corpId:(r.corp_id||''),
        content_type:ctKey,
        model:ct?ct.model:'Sonnet',
        estimated_cost_jpy:r.api_cost_yen||( ct?ct.costPerUnit:0),
        created_at:r.created_at,
        action:r.action||'generate'
      };
    });
    if(COST_REAL_LOGS.length>0){
      _costDataSource='real';
      // Merge: keep demo data as base, append real data

}

// Helper: filter logs by period
function getFilteredCostLogs(){
  const now=new Date(2026,2,18);
  let from,to;
  if(costFilter.period==='thisMonth'){from=new Date(2026,2,1);to=now;}
  else if(costFilter.period==='lastMonth'){from=new Date(2026,1,1);to=new Date(2026,1,28);}
  else if(costFilter.period==='3months'){from=new Date(2026,0,1);to=now;}
  else if(costFilter.period==='custom'&&costFilter.customFrom&&costFilter.customTo){from=new Date(costFilter.customFrom);to=new Date(costFilter.customTo);to.setHours(23,59,59);}
  else{from=new Date(2026,2,1);to=now;}

  return COST_LOGS.filter(l=>{
    const d=new Date(l.created_at);
    if(d<from||d>to)return false;
    if(costFilter.corpId!=='all'&&l.corp_id!==costFilter.corpId)return false;
    if(costFilter.brandId!=='all'&&l.brand_id!==costFilter.brandId)return false;
    if(costFilter.storeId!=='all'&&l.store_id!==costFilter.storeId)return false;
    return true;
  });
}

// Heavy user detection: 直近2ヶ月以上連続でAIden全店舗のトップ10に入っている
// Returns Set<storeId> of stores that qualify.
function computeHeavyUserStores(){
  // Build month→store→cost map for the most recent 2 complete months
  const now=new Date(2026,2,18);// demo "now"
  const months=[];
  // This month and last month (top10 per month requires presence in both)
  months.push({year:now.getFullYear(),month:now.getMonth()});
  var prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  months.push({year:prev.getFullYear(),month:prev.getMonth()});
  var top10Sets=months.map(function(m){
    var from=new Date(m.year,m.month,1);
    var to=new Date(m.year,m.month+1,0,23,59,59);
    var acc={};
    COST_LOGS.forEach(function(l){
      var d=new Date(l.created_at);
      if(d>=from&&d<=to){acc[l.store_id]=(acc[l.store_id]||0)+l.estimated_cost_jpy;}
    });
    var sorted=Object.entries(acc).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
    return new Set(sorted.map(function(e){return e[0];}));
  });
  // Intersection = stores in top10 for both months
  var heavy=new Set();
  top10Sets[0].forEach(function(id){if(top10Sets[1].has(id))heavy.add(id);});
  return heavy;
}

// CSV download
function downloadCostCSV(){
  const thisM=getThisMonthLogs();
  const storeMap={};
  thisM.forEach(l=>{storeMap[l.store_id]=(storeMap[l.store_id]||0)+l.estimated_cost_jpy;});
  let csv='店舗名,プラン,今月AIコスト,プラン原価,差額,MO売上,粗利\n';
  COST_VENUES.forEach(s=>{
    const cost=storeMap[s.id]||0;
    const planCost=PLAN_COSTS[s.plan]||0;
    const diff=cost-planCost;
    const gp=Math.round(s.moRevenue*0.0062);
    csv+=s.name+','+s.plan+','+cost+','+planCost+','+diff+','+s.moRevenue+','+gp+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='aiden_cost_report_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
  showToast('📥 CSVをダウンロードしました');
}

function updateCostChart(){
  const canvas=document.getElementById('costChart');
  if(!canvas)return;
  if(costChartInstance){costChartInstance.destroy();costChartInstance=null;}

  const scaleEl=document.getElementById('costChartScale');
  const scale=scaleEl?scaleEl.value:'monthly';
  const logs=getFilteredCostLogs();

  let labels=[],datasets=[];

  if(scale==='daily'){
    // Daily for current period
    const dayMap={};
    logs.forEach(l=>{
      const d=new Date(l.created_at);
      const key=(d.getMonth()+1)+'/'+d.getDate();
      dayMap[key]=(dayMap[key]||0)+l.estimated_cost_jpy;
    });
    // Sort by date
    const sortedKeys=Object.keys(dayMap).sort((a,b)=>{
      const [am,ad]=a.split('/').map(Number),[bm,bd]=b.split('/').map(Number);
      return am===bm?ad-bd:am-bm;
    });
    labels=sortedKeys;
    datasets=[{label:'AIコスト (¥)',data:sortedKeys.map(k=>dayMap[k]),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.1)',fill:true,tension:.3,pointRadius:2}];
  } else if(scale==='weekly'){
    // Group by week
    const weekMap={};
    logs.forEach(l=>{
      const d=new Date(l.created_at);
      const startOfYear=new Date(d.getFullYear(),0,1);
      const weekNum=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
      const key=d.getMonth()+1+'月W'+weekNum;
      weekMap[key]=(weekMap[key]||0)+l.estimated_cost_jpy;
    });
    const sortedKeys=Object.keys(weekMap);
    labels=sortedKeys;
    datasets=[{label:'AIコスト (¥)',data:sortedKeys.map(k=>weekMap[k]),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.1)',fill:true,tension:.3,pointRadius:3}];
  } else {
    // Monthly
    const monthMap={'1月':0,'2月':0,'3月':0};
    logs.forEach(l=>{
      const d=new Date(l.created_at);
      const key=(d.getMonth()+1)+'月';
      if(monthMap[key]!==undefined)monthMap[key]+=l.estimated_cost_jpy;
    });
    labels=Object.keys(monthMap);
    datasets=[{label:'AIコスト (¥)',data:Object.values(monthMap),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.15)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#6c5ce7'}];

  // Plan cost reference lines (monthly totals for all stores)
  const storeCount=COST_VENUES.length;
  const stdLine=PLAN_COSTS.STD*COST_VENUES.filter(s=>s.plan==='STD').length;
  const proLine=PLAN_COSTS.PRO*COST_VENUES.filter(s=>s.plan==='PRO').length;
  const expLine=PLAN_COSTS.EXPERT*COST_VENUES.filter(s=>s.plan==='EXPERT').length;
  const totalPlanLine=stdLine+proLine+expLine;

  // Add plan lines only for monthly view
  if(scale==='monthly'){
    datasets.push({label:'想定原価ライン (全店合計)',data:labels.map(()=>totalPlanLine),borderColor:'rgba(214,48,49,.5)',borderDash:[6,4],pointRadius:0,fill:false,borderWidth:2});

    // Per-plan lines
    datasets.push({label:'STD原価 (¥'+PLAN_COSTS.STD+' × '+COST_VENUES.filter(s=>s.plan==='STD').length+'店)',data:labels.map(()=>stdLine),borderColor:'rgba(9,132,227,.4)',borderDash:[4,4],pointRadius:0,fill:false,borderWidth:1});
    datasets.push({label:'PRO原価 (¥'+PLAN_COSTS.PRO+' × '+COST_VENUES.filter(s=>s.plan==='PRO').length+'店)',data:labels.map(()=>proLine),borderColor:'rgba(0,184,148,.4)',borderDash:[4,4],pointRadius:0,fill:false,borderWidth:1});

  }

// Stripe-backed invoice data. Populated via loadStripeBillingData().
// Shape: {id, corpId, corpName, month, baseAmount, adjustmentTotal, total, status, issuedAt, paidAt, orderLines:[{orderId, orderTotal, feeRate, feeAmount}]}
// Status domain (D-36): 'unsent' | 'sent' | 'collected' (legacy 'draft'/'issued'/'paid' mapped via mapInvoiceStatus)
let INVOICES=[];
let INVOICE_ADJUSTMENTS=[];
let billingDataLoaded=false;

// Adjustment filter state
let adjFilter={targetMonth:'',category:'all',brandId:'all'};

// Category labels
const ADJ_CATEGORIES={compensation:'障害補填',fee_refund:'手数料返還',point_settlement:'AIden原資ポイント精算',other:'その他'};
const ADJ_CAT_COLORS={compensation:'#d63031',fee_refund:'#0984e3',point_settlement:'#e17055',other:'#636e72'};

// Deadline check: 調整登録の締切 = 翌月の3営業日前
function getAdjDeadline(targetMonth){
  const d=new Date(targetMonth);
  d.setMonth(d.getMonth()+1);// 翌月1日
  let bizDays=0;
  const deadline=new Date(d);
  // 翌月1日から3営業日前を算出 = 翌月1日の3営業日前
  // → 前月末から逆算して3営業日前
  deadline.setDate(deadline.getDate()-1);// 前月末日
  bizDays=0;
  while(bizDays<3){
    const dow=deadline.getDay();
    if(dow!==0&&dow!==6)bizDays++;
    if(bizDays<3)deadline.setDate(deadline.getDate()-1);
  }
  return deadline;
}

function isAdjDeadlinePassed(targetMonth){
  const deadline=getAdjDeadline(targetMonth);
  return new Date()>deadline;
}

function formatMonth(dateStr){
  const d=new Date(dateStr);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月';
}

// Fetch Stripe Billing data. Falls back to empty arrays when Stripe Billing is
// not configured or the listing endpoint is unavailable — the UI then renders
// "データなし" / "0件" states per spec (D-36).
async function loadStripeBillingData(){
  try{
    const res=await fetch(SUPABASE_URL+'/functions/v1/stripe-list-invoices',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(await getToken())},
      body:JSON.stringify({})
    });
    if(!res.ok)throw new Error('stripe-list-invoices '+res.status);
    const data=await res.json();
    if(data&&Array.isArray(data.invoices)){
      INVOICES=data.invoices;
      recalcInvoiceAdjustments();
      return;
    }
  }catch(e){/* Stripe Billing未設定時は空配列のまま */}
  INVOICES=[];
}

// Map legacy/new status codes to display label and color
function mapInvoiceStatus(s){
  if(s==='collected'||s==='paid')return {label:'収納済',bg:'#e6f9f0',c:'#00b894'};
  if(s==='sent'||s==='issued')return {label:'送信済み(未収納)',bg:'#dfe6e9',c:'#636e72'};
  return {label:'未送信(未収納)',bg:'#ffeaa7',c:'#d68910'};
}

// Recalculate invoice totals based on adjustments
function recalcInvoiceAdjustments(){
  INVOICES.forEach(inv=>{
    const adjs=INVOICE_ADJUSTMENTS.filter(a=>(a.corpId===inv.corpId||a.brandId===inv.brandId)&&a.targetMonth===inv.month);
    let adjTotal=0;
    adjs.forEach(a=>{
      if(a.type==='credit')adjTotal-=a.amount;
      else adjTotal+=a.amount;
    });
    inv.adjustmentTotal=adjTotal;
    inv.total=(inv.baseAmount||0)+adjTotal;
  });
}

// Available target months for filter/form
function toLocalDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getAvailableMonths(){
  const months=new Set();
  INVOICES.forEach(i=>months.add(i.month));
  INVOICE_ADJUSTMENTS.forEach(a=>months.add(a.targetMonth));
  // Add current and next month
  const now=new Date();
  const cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
  const nxtD=new Date(now.getFullYear(),now.getMonth()+1,1);
  const nxt=nxtD.getFullYear()+'-'+String(nxtD.getMonth()+1).padStart(2,'0')+'-01';
  months.add(cur);months.add(nxt);
  return Array.from(months).sort().reverse();
}

function renderBilling(){
  // Trigger async Stripe data load on first visit; re-render when done.
  if(!billingDataLoaded){
    billingDataLoaded=true;
    loadStripeBillingData().then(function(){
      if(currentView&&currentView.type==='billing')renderPage();
    });
  }

// CSV export for all invoices (D-36: Stripe dashboard閲覧 + 簡易エクスポート)
function exportInvoicesCsv(){
  if(!INVOICES||INVOICES.length===0){showToast('⚠️ エクスポートするデータがありません');return;}
  const header=['請求書ID','対象月','法人名','合計金額','基本金額','調整額','ステータス','発行日'];
  const lines=[header.join(',')];
  INVOICES.forEach(function(inv){
    const m=mapInvoiceStatus(inv.status);
    lines.push([
      '"'+(inv.id||'')+'"','"'+(inv.month||'')+'"','"'+((inv.corpName||'').replace(/"/g,'""'))+'"',
      (inv.total||0),(inv.baseAmount||0),(inv.adjustmentTotal||0),'"'+m.label+'"','"'+(inv.issuedAt||'')+'"'
    ].join(','));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='invoices_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSVをダウンロードしました');
}
function exportSingleInvoiceCsv(invId){
  const inv=INVOICES.find(function(i){return i.id===invId;});
  if(!inv){showToast('⚠️ 請求書が見つかりません');return;}
  const header=['項目','値'];
  const lines=[header.join(',')];
  const m=mapInvoiceStatus(inv.status);
  lines.push(['請求書ID','"'+inv.id+'"'].join(','));
  lines.push(['対象月','"'+inv.month+'"'].join(','));
  lines.push(['法人名','"'+((inv.corpName||'').replace(/"/g,'""'))+'"'].join(','));
  lines.push(['合計金額',(inv.total||0)].join(','));
  lines.push(['基本金額',(inv.baseAmount||0)].join(','));
  lines.push(['調整額',(inv.adjustmentTotal||0)].join(','));
  lines.push(['ステータス','"'+m.label+'"'].join(','));
  lines.push(['発行日','"'+(inv.issuedAt||'')+'"'].join(','));
  if(inv.orderLines&&inv.orderLines.length){
    lines.push('');
    lines.push(['注文ID','注文金額','手数料率','AIden手数料'].join(','));
    inv.orderLines.forEach(function(ol){
      lines.push(['"'+ol.orderId+'"',(ol.orderTotal||0),(ol.feeRate||0)+'%',(ol.feeAmount||0)].join(','));
    });
  }
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=inv.id+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ '+inv.id+' のCSVをダウンロードしました');
}

  let brandOpts=BRANDS.map(function(b){return '<option value="'+b.id+'">'+b.name+'</option>';}).join('');

    return '<option value="'+m+'"'+(m===curMonth?' selected':'')+'>'+formatMonth(m)+(isPast?' ⚠️ 締切超過':'')+'</option>';
  }).join('');

  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<h3>📝 請求書調整の追加</h3>'+

      '<div class="form-group"><label>種別 <span style="color:var(--danger)">*</span></label>'+
        '<select id="adjType"><option value="credit">控除（値引き・補填）</option><option value="debit">付加（追加請求）</option></select></div>'+
      '<div class="form-group"><label>カテゴリ <span style="color:var(--danger)">*</span></label>'+
        '<select id="adjCategory"><option value="compensation">障害補填</option><option value="fee_refund">手数料返還</option><option value="point_settlement">AIden原資ポイント精算</option><option value="other">その他</option></select></div>'+
      '<div class="form-group"><label>金額（円） <span style="color:var(--danger)">*</span></label>'+
        '<input type="number" id="adjAmount" min="1" placeholder="例: 500"></div>'+
      '<div class="form-group full"><label>理由 <span style="color:var(--danger)">*</span></label>'+
        '<textarea id="adjReason" placeholder="調整の理由を入力..."></textarea></div>'+
    '</div>'+
    '<div id="adjDeadlineWarning"></div>'+
    '<div class="btn-group">'+
      '<button class="btn btn-p" onclick="saveAdjustment()">登録</button>'+
      '<button class="btn btn-s" onclick="closeModal()">キャンセル</button>'+
    '</div>'
  );
  checkAdjDeadline();
}

function checkAdjDeadline(){
  const month=document.getElementById('adjTargetMonth').value;
  const warn=document.getElementById('adjDeadlineWarning');
  if(!warn)return;
  if(isAdjDeadlinePassed(month)){
    const dl=getAdjDeadline(month);
    warn.innerHTML='<div style="margin-top:14px;padding:12px;background:#fff3e0;border-radius:8px;font-size:11px;color:#e17055;line-height:1.6">'+
      '⚠️ <strong>'+formatMonth(month)+'</strong> の調整登録締切（'+dl.toLocaleDateString('ja-JP')+'）を過ぎています。登録は可能ですが、既に発行済みの請求書には自動反映されません。</div>';
  } else {
    warn.innerHTML='';
  }
}

function saveAdjustment(){
  const brandId=document.getElementById('adjBrand').value;
  const targetMonth=document.getElementById('adjTargetMonth').value;
  const type=document.getElementById('adjType').value;
  const category=document.getElementById('adjCategory').value;
  const amount=parseInt(document.getElementById('adjAmount').value);
  const reason=document.getElementById('adjReason').value.trim();

  if(!brandId||!targetMonth||!amount||amount<=0||!reason){
    showToast('⚠️ 必須項目をすべて入力してください');return;
  }

  const adj={
    id:genId('ADJ-'),
    invoiceId:null,
    brandId:brandId,
    type:type,
    amount:amount,
    reason:reason,
    category:category,
    targetMonth:targetMonth,
    createdBy:'Taisei',
    createdAt:new Date().toISOString().split('T')[0]
  };
  INVOICE_ADJUSTMENTS.push(adj);
  recalcInvoiceAdjustments();

  // Supabase保存（接続時）
  try{
    sb.from('invoice_adjustments').insert({
      brand_id:brandId,type:type,amount:amount,reason:reason,
      category:category,target_month:targetMonth,created_by:'Taisei'
    }).then(function(){});
  }catch(e){}

  closeModal();
  const brand=BRANDS.find(function(b){return b.id===brandId;});
  showToast('✅ 調整項目を追加しました（'+(brand?brand.name:'')+' / '+(type==='credit'?'-':'+')+Y(amount)+'）');
  renderPage();
}
