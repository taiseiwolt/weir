<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証メール送信完了 | AIden</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --brand: #D32F2F;
  --brand-dark: #B71C1C;
  --text: #212121;
  --text-sub: #757575;
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --border: #E0E0E0;
  --font: 'Noto Sans JP', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.container{max-width:440px;width:100%;padding:24px;text-align:center}
.icon{font-size:64px;margin-bottom:16px}
.title{font-size:22px;font-weight:800;margin-bottom:12px}
.desc{font-size:14px;color:var(--text-sub);line-height:1.8;margin-bottom:8px}
.email-display{font-size:15px;font-weight:700;color:var(--brand);margin:12px 0 24px;word-break:break-all}
.info-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;text-align:left}
.info-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;font-size:13px;color:var(--text-sub);line-height:1.6}
.info-item:last-child{margin-bottom:0}
.info-item-icon{flex-shrink:0;font-size:16px}
.resend-btn{display:inline-block;padding:14px 36px;border-radius:12px;font-size:15px;font-weight:700;color:var(--brand);background:transparent;border:2px solid var(--brand);cursor:pointer;transition:all .2s}
.resend-btn:hover{background:var(--brand);color:#fff}
.resend-btn:disabled{opacity:.5;cursor:not-allowed;border-color:var(--border);color:var(--text-sub)}
.resend-btn:disabled:hover{background:transparent;color:var(--text-sub)}
.resend-msg{font-size:12px;color:var(--text-sub);margin-top:12px;min-height:20px}
.resend-msg.success{color:#2E7D32}
.resend-msg.error{color:#E53935}
.cooldown-text{font-size:13px;color:var(--text-sub);margin-top:8px}
.home-link{display:inline-block;margin-top:20px;font-size:13px;color:var(--text-sub)}
</style>
</head>
<body>
<div class="container">
  <div class="icon">📧</div>
  <div class="title">認証メールを送信しました</div>
  <div class="desc">以下のメールアドレスに認証メールをお送りしました。</div>
  <div class="email-display" id="emailDisplay">-</div>
  <div class="info-box">
    <div class="info-item">
      <span class="info-item-icon">⏰</span>
      <span>60分以内にメール内のURLをクリックして登録を完了してください</span>
    </div>
    <div class="info-item">
      <span class="info-item-icon">📁</span>
      <span>メールが届かない場合は迷惑メールフォルダをご確認ください</span>
    </div>
    <div class="info-item">
      <span class="info-item-icon">🔒</span>
      <span>認証完了後にログインが可能になります</span>
    </div>
  </div>
  <button class="resend-btn" id="resendBtn" onclick="resendEmail()">認証メールを再送する</button>
  <div class="cooldown-text" id="cooldownText"></div>
  <div class="resend-msg" id="resendMsg"></div>
  <div><a href="./" class="home-link">トップページへ戻る</a></div>
</div>
<script>
var API_BASE = 'https://aiden-jp.net';
var email = '';
var resendCount = 0;
var MAX_RESEND = 5;
var COOLDOWN_SECONDS = 60;
var cooldownTimer = null;
var cooldownRemaining = 0;
var limitReached = false;

(function init() {
  var params = new URLSearchParams(window.location.search);
  email = params.get('email') || '';
  if (email) {
    var parts = email.split('@');
    var local = parts[0];
    var masked = local.length > 2 ? local[0] + '***' + local[local.length - 1] : local[0] + '***';
    document.getElementById('emailDisplay').textContent = masked + '@' + parts[1];
  }
})();

function startCooldown(seconds) {
  cooldownRemaining = seconds;
  var btn = document.getElementById('resendBtn');
  var cooldownEl = document.getElementById('cooldownText');
  btn.disabled = true;

  function tick() {
    if (cooldownRemaining <= 0) {
      clearInterval(cooldownTimer);
      cooldownTimer = null;
      cooldownEl.textContent = '';
      if (!limitReached) {
        btn.disabled = false;
        btn.textContent = '認証メールを再送する';
      }
      return;
    }
    cooldownEl.textContent = cooldownRemaining + '秒後に再送できます';
    btn.textContent = '再送まで ' + cooldownRemaining + '秒';
    cooldownRemaining--;
  }

  tick();
  cooldownTimer = setInterval(tick, 1000);
}

async function resendEmail() {
  if (!email) {
    showMsg('メールアドレスが不明です。再度会員登録をお試しください。', 'error');
    return;
  }
  if (limitReached) return;

  var btn = document.getElementById('resendBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    var resp = await fetch(API_BASE + '/api/members/resend-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    var data = await resp.json();

    if (resp.ok) {
      resendCount = data.data && data.data.resend_count ? data.data.resend_count : resendCount + 1;
      var maxResend = data.data && data.data.max_resend ? data.data.max_resend : MAX_RESEND;
      showMsg('認証メールを再送しました。受信トレイを確認してください。（' + resendCount + '/' + maxResend + '回）', 'success');

      if (resendCount >= maxResend) {
        limitReached = true;
        btn.disabled = true;
        btn.textContent = '再送上限に達しました';
        showMsg('再送上限に達しました。support@aiden-jp.net までお問い合わせください。', 'error');
      } else {
        startCooldown(COOLDOWN_SECONDS);
      }
    } else {
      if (data.code === 'RESEND_LIMIT_EXCEEDED') {
        limitReached = true;
        btn.disabled = true;
        btn.textContent = '再送上限に達しました';
        showMsg('再送上限に達しました。support@aiden-jp.net までお問い合わせください。', 'error');
      } else if (data.code === 'COOLDOWN_ACTIVE') {
        var match = (data.error || '').match(/(\d+)秒/);
        var remaining = match ? parseInt(match[1]) : COOLDOWN_SECONDS;
        startCooldown(remaining);
        showMsg('', '');
      } else if (data.code === 'VERIFICATION_EXPIRED') {
        showMsg('認証期限が切れています。再度会員登録をお願いします。', 'error');
        btn.disabled = true;
        btn.textContent = '認証メールを再送する';
      } else {
        showMsg(data.error || '再送に失敗しました', 'error');
        btn.disabled = false;
        btn.textContent = '認証メールを再送する';
      }
    }
  } catch (e) {
    showMsg('通信エラーが発生しました', 'error');
    btn.disabled = false;
    btn.textContent = '認証メールを再送する';
  }
}

function showMsg(text, type) {
  var el = document.getElementById('resendMsg');
  el.textContent = text;
  el.className = 'resend-msg ' + (type || '');
}
</script>
</body>
</html>
