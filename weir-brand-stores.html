<!DOCTYPE html>
<html lang="ja" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">店舗を探す | Weir</title>
    <!-- OGP / SNS Meta Tags (brand-specific values are set in onBrandLoaded) -->
    <meta property="og:title" content="店舗を探す | Weir">
    <meta property="og:description" content="">
    <meta property="og:image" content="https://xorder.co.jp/ogp.png">
    <meta property="og:url" content="https://xorder.co.jp/weir-brand-stores.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Weir">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="店舗を探す | Weir">
    <meta name="twitter:description" content="">
    <meta name="twitter:image" content="https://xorder.co.jp/ogp.png">
    <meta name="description" content="">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="./weir-common.css">
<script src="./weir-common.js"></script>
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--brand-font);color:var(--brand-font-color);background:var(--bg);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none} button{cursor:pointer}

/* PAGE HERO */
.page-hero{background:var(--brand-primary);padding:28px 20px;text-align:center;color:white}
.page-hero h1{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif}
.page-hero p{font-size:13px;opacity:.85;margin-top:6px}

/* SEARCH AREA */
.search-area{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px}
.search-area-inner{max-width:1060px;margin:0 auto}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:4px;font-family:var(--brand-font);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--brand-primary)}
.search-btn{padding:12px 24px;background:var(--brand-primary);color:white;border:none;border-radius:4px;font-family:var(--brand-font);font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.search-btn:hover{background:var(--brand-primary-dark)}

/* 都道府県エリア */
.area-section{margin-bottom:16px}
.area-section-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.area-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.area-btn{padding:7px 4px;font-size:12px;border:1px solid var(--border);border-radius:3px;background:white;color:var(--brand-font-color);font-family:var(--brand-font);cursor:pointer;text-align:center;transition:all .15s}
.area-btn:hover,.area-btn.active{background:var(--brand-primary);color:white;border-color:var(--brand-primary)}

/* サービス属性フィルター */
.attr-section{margin-top:12px}
.attr-section-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.attr-chips{display:flex;flex-wrap:wrap;gap:6px}
.attr-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:white;cursor:pointer;transition:all .15s;font-family:var(--brand-font)}
.attr-chip:hover{border-color:var(--brand-primary);color:var(--brand-primary)}
.attr-chip.active{background:var(--brand-primary);color:white;border-color:var(--brand-primary)}
.attr-chip input{display:none}

/* RESULTS */
.results-area{max-width:1060px;margin:0 auto;padding:24px 20px 60px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.results-count{font-size:14px;font-weight:700}
.results-count span{color:var(--brand-primary);font-size:18px}
.results-sort{font-size:12px;color:var(--text2);border:1px solid var(--border);padding:5px 10px;border-radius:3px;background:white;font-family:var(--brand-font);cursor:pointer}

/* 都道府県セクション */
.pref-section{margin-bottom:36px}
.pref-header{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:2px solid var(--brand-primary);margin-bottom:12px}
.pref-header h2{font-size:18px;font-weight:700}
.pref-header .pref-count{font-size:12px;color:var(--text3);margin-left:auto}

/* 店舗カード */
.store-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.store-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .2s;background:white;text-decoration:none;display:block}
.store-card:hover{border-color:var(--brand-primary);box-shadow:0 4px 16px rgba(211,47,47,.15);transform:translateY(-2px)}
.store-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#1a0000,#5a1a1a);position:relative}
.store-card-body{padding:12px 14px 14px}
.store-card-name{font-size:14px;font-weight:700;margin-bottom:4px}
.store-card-addr{font-size:12px;color:var(--text2);margin-bottom:6px}
.store-card-station{font-size:12px;color:var(--text3);margin-top:4px}
.store-card-attrs{display:flex;flex-wrap:wrap;gap:4px}
.store-attr-tag{font-size:10px;padding:2px 7px;border:1px solid var(--border);border-radius:10px;color:var(--text2);background:var(--bg2)}
.store-attr-tag.on{border-color:var(--brand-primary);color:var(--brand-primary);background:var(--brand-primary-light)}
.store-card-hours{font-size:11px;color:var(--text3);margin-top:6px}
.store-card-genres{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.store-genre-tag{font-size:10px;padding:2px 8px;border-radius:12px;background:var(--brand-primary-light,#f0ecff);color:var(--brand-primary,#6c5ce7);font-weight:600}
.store-card-price{font-size:11px;color:var(--text2);margin-top:4px}
.store-card-holiday{font-size:11px;color:#c62828;margin-top:4px}
/* 空き状況バッジ */
.store-avail{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.avail-ok{background:#E8F5E9;color:#2E7D32}
.avail-few{background:#FFF3E0;color:#E65100}
.avail-full{background:#FFEBEE;color:#C62828}

/* NO RESULT */
.no-result{text-align:center;padding:60px 20px;color:var(--text3)}
.no-result p{font-size:14px;margin-top:12px}

@media(max-width:800px){
  .area-grid{grid-template-columns:repeat(5,1fr)}
  .store-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:540px){
  .area-grid{grid-template-columns:repeat(4,1fr)}
  .store-grid{grid-template-columns:1fr}
}
/* ===== 来店予約モーダル ===== */
.res-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center}
.res-modal-bg.open{display:flex}
.res-modal{background:white;border-radius:12px;width:92%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.res-modal-header{padding:18px 22px;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;border-radius:12px 12px 0 0;z-index:1}
.res-modal-title{font-size:16px;font-weight:700}
.res-modal-close{background:none;border:none;font-size:22px;color:#999;line-height:1;padding:4px;cursor:pointer}
.res-modal-body{padding:22px}
.rm-steps{display:flex;margin-bottom:24px}
.rm-step{flex:1;text-align:center;position:relative}
.rm-step::after{content:'';position:absolute;top:13px;left:50%;right:-50%;height:1px;background:#e8e8e8}
.rm-step:last-child::after{display:none}
.rm-step-dot{width:26px;height:26px;border-radius:50%;background:#f5f5f5;border:1px solid #ddd;color:#999;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;position:relative;z-index:1;transition:all .2s}
.rm-step.active .rm-step-dot{background:#1a1a1a;border-color:#1a1a1a;color:white}
.rm-step.done .rm-step-dot{background:#27ae60;border-color:#27ae60;color:white}
.rm-step-label{font-size:10px;color:#999}
.rm-step.active .rm-step-label{color:#1a1a1a;font-weight:600}
.rf-field{margin-bottom:16px}
.rf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rf-label{font-size:11px;font-weight:700;color:#666;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.rf-req{color:var(--brand-primary)}
.rf-input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;color:#1a1a1a;outline:none;transition:border-color .15s;background:white;font-family:inherit}
.rf-input:focus{border-color:#888}
.rf-input.error{border-color:var(--brand-primary);background:#FFF8F8}
.rf-error{font-size:11px;color:var(--brand-primary);margin-top:4px;display:none}
.rf-error.show{display:block}
.rm-slot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rm-slot-title{font-size:12px;font-weight:700;color:#666}
.rm-slot-note{font-size:11px;color:#999}
.rm-slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:16px}
.rm-slot-b{padding:9px 4px;text-align:center;border:1px solid #e0e0e0;border-radius:5px;font-size:12px;cursor:pointer;transition:all .12s;background:white;width:100%;font-family:inherit}
.rm-slot-b:hover{border-color:#333}
.rm-slot-b.on{background:#1a1a1a;color:white;border-color:#1a1a1a}
.rm-slot-b.slot-full{background:#f5f5f5;color:#bbb;cursor:default}
.rm-slot-b.slot-full:hover{border-color:var(--brand-primary);background:#fff5f5}
.rm-cap-alert{padding:10px 14px;border-radius:5px;margin-bottom:14px;font-size:13px;display:none}
.rm-cap-alert.ok{background:#f0faf5;border:1px solid rgba(39,174,96,.3);color:#27ae60;display:block}
.rm-cap-alert.err{background:#fff5f5;border:1px solid rgba(211,47,47,.25);color:var(--brand-primary);display:block}
.rm-btn{width:100%;padding:13px;border:none;border-radius:6px;font-size:14px;font-weight:700;background:var(--brand-primary);color:white;cursor:pointer;font-family:inherit;transition:opacity .15s}
.rm-btn:hover{opacity:.88}
.rm-btn:disabled{opacity:.35;cursor:not-allowed}
.rm-btn-back{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:14px;background:none;color:#666;cursor:pointer;font-family:inherit}
.rm-confirm-box{background:#f8f8f8;border-radius:8px;padding:16px;margin-bottom:16px}
.rm-confirm-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:13px}
.rm-confirm-row:last-child{border-bottom:none}
.rm-confirm-label{color:#666}
.rm-complete-box{text-align:center;padding:28px 10px}
.rm-store-preset{padding:10px 12px;border:1px solid #ddd;border-radius:6px;background:#f8f8f8;font-size:14px;color:#333;font-weight:600}
@media(max-width:480px){.rf-row{grid-template-columns:1fr}.rm-slot-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div id="weir-header"></div>

<div class="page-hero">
  <h1 data-i18n="page_title">店舗を探す</h1>
  <p id="stores-subtitle"></p>
</div>

<!-- 検索エリア -->
<div class="search-area">
  <div class="search-area-inner">
    <!-- フリーワード検索 -->
    <div class="search-bar">
      <input type="text" class="search-input" id="search-q" placeholder="エリア・駅名・店舗名で検索" oninput="filterStores()">
      <button class="search-btn" onclick="filterStores()">🔍 検索</button>
    </div>

    <!-- 都道府県 -->
    <div class="area-section">
      <div class="area-section-title">都道府県から探す</div>
      <div class="area-grid" id="area-grid"><!-- JS生成 --></div>
    </div>

    <!-- 店舗属性フィルター -->
    <div class="attr-section">
      <div class="attr-section-title">サービス・設備から絞り込む</div>
      <div class="attr-chips" id="attr-chips"><!-- JS生成 --></div>
    </div>
  </div>
</div>

<!-- 結果 -->
<div class="results-area">
  <div class="results-header">
    <div class="results-count" id="results-count"></div>
  </div>
  <div id="results-body"><!-- JS生成 --></div>
</div>

<script>
var escH = AidenCommon.escH;
var sb = AidenCommon.getSb();
var SUPABASE_URL = 'https://iikwusprydaogzeslgdz.supabase.co';

/* =====================================================
   Page-specific i18n
   ===================================================== */
AidenCommon.addTranslations({
  ja:{ page_title:'店舗を探す' },
  en:{ page_title:'Find a Store' },
  zh:{ page_title:'查找门店' },
  ko:{ page_title:'매장 찾기' },
  fr:{ page_title:'Trouver un restaurant' },
  it:{ page_title:'Trova un ristorante' },
  id:{ page_title:'Cari Restoran' }
});

/* =====================================================
   店舗属性定義（Weirが保持する標準属性）
   管理画面の「店舗情報作成」時にチェックボックスで設定
   ===================================================== */
var STORE_ATTRS = [
  { key:'parking',         label:'駐車場あり',       icon:'🅿️' },
  { key:'handicap_parking', label:'身障者用駐車場',   icon:'♿' },
  { key:'elevator',        label:'エレベーター',      icon:'🔼' },
  { key:'multi_toilet',    label:'多目的トイレ',      icon:'🚻' },
  { key:'diaper',          label:'おむつ替えシート',  icon:'👶' },
  { key:'credit',          label:'クレジット可',      icon:'💳' },
  { key:'qrpay',           label:'二次元コード決済可', icon:'📲' },
  { key:'cash',            label:'現金決済可',        icon:'💴' },
  { key:'smoking',         label:'喫煙可',            icon:'🚬' }
];

/* =====================================================
   STORE DATA（Supabase venues テーブルから動的取得 D-83）
   各店舗のattrsはチェックボックスで設定した属性キーの配列
   storeUrl: 個店ページのURL（weir-store.html等）
   ===================================================== */
let STORES = [];

/* =====================================================
   State
   ===================================================== */
var activePrefs = [];
var activeAttrs = [];

/* =====================================================
   Build UI
   ===================================================== */
var PREFS = ['北海道','宮城県','東京都','神奈川県','愛知県','大阪府','福岡県'];

function buildAreaGrid() {
  var el = document.getElementById('area-grid');
  el.innerHTML = ['全て'].concat(PREFS).map(function(p) {
    return '<button class="area-btn'+(p==='全て'?' active':'')+'" onclick="togglePref(\''+p+'\',this)">'+p+'</button>';
  }).join('');
}

function buildAttrChips() {
  var el = document.getElementById('attr-chips');
  el.innerHTML = STORE_ATTRS.map(function(a) {
    return '<label class="attr-chip" id="chip-'+a.key+'">'
      + '<input type="checkbox" value="'+a.key+'" onchange="toggleAttr(\''+a.key+'\',this)">'
      + a.icon + ' ' + a.label + '</label>';
  }).join('');
}

function togglePref(pref, btn) {
  if (pref === '全て') {
    activePrefs = [];
    document.querySelectorAll('.area-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  } else {
    // 「全て」を外す
    document.querySelectorAll('.area-btn').forEach(function(b){ if(b.textContent==='全て') b.classList.remove('active'); });
    btn.classList.toggle('active');
    var idx = activePrefs.indexOf(pref);
    if (idx > -1) activePrefs.splice(idx,1); else activePrefs.push(pref);
    if (activePrefs.length === 0) document.querySelector('.area-btn').classList.add('active');
  }
  filterStores();
}

function toggleAttr(key, checkbox) {
  var chip = document.getElementById('chip-'+key);
  if (checkbox.checked) { activeAttrs.push(key); chip.classList.add('active'); }
  else { activeAttrs = activeAttrs.filter(function(k){ return k!==key; }); chip.classList.remove('active'); }
  filterStores();
}

function filterStores() {
  var q = (document.getElementById('search-q').value || '').trim();
  var filtered = STORES.filter(function(s) {
    var matchQ = !q || s.name.includes(q) || s.addr.includes(q) || s.station.includes(q) || s.pref.includes(q) || s.city.includes(q);
    var matchPref = activePrefs.length === 0 || activePrefs.indexOf(s.pref) > -1;
    var matchAttr = activeAttrs.length === 0 || activeAttrs.every(function(a){ return s.attrs.indexOf(a) > -1; });
    return matchQ && matchPref && matchAttr;
  });
  renderResults(filtered);
}

function renderResults(stores) {
  var body = document.getElementById('results-body');
  document.getElementById('results-count').innerHTML = '検索結果：<span>'+stores.length+'</span> 件';
  if (stores.length === 0) {
    body.innerHTML = '<div class="no-result"><div style="font-size:48px">🔍</div><p>条件に合う店舗が見つかりませんでした。<br>絞り込み条件を変更してみてください。</p></div>';
    return;
  }
  // 都道府県別にグルーピング
  var grouped = {};
  stores.forEach(function(s) { (grouped[s.pref] = grouped[s.pref]||[]).push(s); });
  var html = '';
  Object.keys(grouped).forEach(function(pref) {
    var list = grouped[pref];
    html += '<div class="pref-section">'
      + '<div class="pref-header"><h2>'+escH(pref)+'</h2><span class="pref-count">'+list.length+'店舗</span></div>'
      + '<div class="store-grid">';
    list.forEach(function(s) {
      var availHtml = '';
      if (s.reservationEnabled) {
        var availLabel = s.avail==='ok' ? '空あり' : s.avail==='few' ? '残りわずか' : '満席';
        var availCls   = s.avail==='ok' ? 'avail-ok' : s.avail==='few' ? 'avail-few' : 'avail-full';
        availHtml = '<span class="store-avail '+availCls+'">'+availLabel+'</span>';
      }
      var attrTags = STORE_ATTRS.map(function(a){
        var on = s.attrs.indexOf(a.key) > -1;
        return on ? '<span class="store-attr-tag on">'+a.icon+' '+a.label+'</span>' : '';
      }).join('');
      html += '<a class="store-card" href="'+escH(s.storeUrl)+'">'
        + '<div class="store-card-img" style="background:'+escH(s.bg)+'">'+(s.thumbUrl ? '' : '🏪')+availHtml+'</div>'
        + '<div class="store-card-body">'
        + '<div class="store-card-name">'+escH(s.name)+'</div>'
        + '<div class="store-card-addr">'+escH(s.addr)+'</div>'
        + '<div class="store-card-station">'+escH(s.station)+'</div>'
        + (s.genres&&s.genres.length?'<div class="store-card-genres">'+s.genres.map(function(g){return '<span class="store-genre-tag">'+escH(g)+'</span>';}).join('')+'</div>':'')
        + '<div class="store-card-hours">営業時間：'+escH(s.hours)+'</div>'
        + (s.holiday?'<div class="store-card-holiday">定休日：'+escH(s.holiday)+'</div>':'')
        + (s.priceText?'<div class="store-card-price">予算：'+escH(s.priceText)+'</div>':'')
        + '<div class="store-card-attrs">'+attrTags+'</div>'
        + '</div></a>';
    });
    html += '</div></div>';
  });
  body.innerHTML = html;
}

// URLパラメータから初期検索ワード取得
function getUrlParam(key) {
  return new URLSearchParams(window.location.search).get(key) || '';
}

var BRAND_ID = null;

async function loadStoresFromSupabase() {
  var {data: stores} = await sb.from('venues').select('id, display_id, name, slug, brand_id, address, phone, lat, lng, status, is_paused, has_takeout, has_delivery, reservation_enabled, genres, regular_holiday, price_range_lunch, price_range_dinner').eq('brand_id', BRAND_ID).order('name');
  if (!stores || stores.length === 0) return;

  // Fetch thumbnails
  var storeIds = stores.map(function(s){ return s.id; });
  var {data: thumbs} = await sb.from('media').select('entity_id, url').eq('entity_type', 'store').eq('media_type', 'store_thumbnail').in('entity_id', storeIds);
  var thumbMap = {};
  if (thumbs) thumbs.forEach(function(t){ thumbMap[t.entity_id] = t.url; });

  // Load store hours (multiple per day for split hours)
  var {data: hoursData} = await sb.from('venue_hours')
    .select('store_id:venue_id, day_of_week, open_time, close_time, is_closed')
    .in('venue_id', storeIds)
    .order('day_of_week').order('open_time');

  var today = new Date().getDay(); // 0=Sunday
  var hoursMap = {};
  if (hoursData) {
    hoursData.forEach(function(h) {
      if (!hoursMap[h.store_id]) hoursMap[h.store_id] = {};
      if (!hoursMap[h.store_id][h.day_of_week]) hoursMap[h.store_id][h.day_of_week] = [];
      hoursMap[h.store_id][h.day_of_week].push(h);
    });
  }

  function formatHoursForDay(entries) {
    if (!entries || !entries.length) return '';
    var open = entries.filter(function(e){ return !e.is_closed; });
    if (!open.length) return '本日定休日';
    return open.map(function(e){ return e.open_time.slice(0,5) + '〜' + e.close_time.slice(0,5); }).join(' / ');
  }

  function formatPriceRange(s) {
    if (s.price_range_lunch && s.price_range_dinner && s.price_range_lunch !== s.price_range_dinner) {
      return 'ランチ: ' + s.price_range_lunch + ' / ディナー: ' + s.price_range_dinner;
    }
    return s.price_range_dinner || s.price_range_lunch || '';
  }

  var bgs = ['linear-gradient(135deg,#1a0000,#5a1a1a)','linear-gradient(135deg,#1a1a00,#5a5a00)','linear-gradient(135deg,#001a00,#005a00)','linear-gradient(135deg,#001a1a,#005a5a)','linear-gradient(135deg,#1a001a,#5a005a)','linear-gradient(135deg,#001a2a,#005a7a)','linear-gradient(135deg,#2a1a00,#7a5000)'];
  STORES = stores.map(function(s, i) {
    var prefCity = (s.address || '').substring(0, 3);
    var todayEntries = hoursMap[s.id] && hoursMap[s.id][today];
    var hoursText = formatHoursForDay(todayEntries);
    return {
      id: s.slug || s.id, uuid: s.id, displayId: s.display_id || '', name: s.name, pref: prefCity, city: '',
      addr: s.address || '', station: '', hours: hoursText,
      genres: s.genres || [], holiday: s.regular_holiday || '', priceText: formatPriceRange(s),
      bg: thumbMap[s.id] ? 'url('+thumbMap[s.id]+') center/cover no-repeat' : bgs[i % bgs.length],
      thumbUrl: thumbMap[s.id] || null,
      avail: s.is_paused ? 'full' : (s.status === 'closed' ? 'full' : 'ok'),
      hasTakeout: !!s.has_takeout,
      hasDelivery: !!s.has_delivery,
      reservationEnabled: !!s.reservation_enabled,
      attrs: [],
      storeUrl: './weir-store.html' + (s.slug ? '?slug=' + encodeURIComponent(s.slug) : '')
    };
  });
}

/* =====================================================
   Init via AidenCommon
   ===================================================== */
document.addEventListener('DOMContentLoaded', async function() {
  await AidenCommon.init({
    header: 'brand',
    footer: true,
    onBrandLoaded: async function(brand) {
      var bname = brand.name || 'Weir';
      document.title = '店舗を探す | ' + bname;
      var ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute('content', '店舗を探す | ' + bname);
      var twTitle = document.querySelector('meta[name="twitter:title"]');
      if (twTitle) twTitle.setAttribute('content', '店舗を探す | ' + bname);
      if (brand.name) {
        var ogSite = document.querySelector('meta[property="og:site_name"]');
        if (ogSite) ogSite.setAttribute('content', bname);
        var desc = bname + 'の店舗一覧。お近くの店舗をお探しいただけます。';
        var ogDesc = document.querySelector('meta[property="og:description"]');
        if (ogDesc) ogDesc.setAttribute('content', desc);
        var twDesc = document.querySelector('meta[name="twitter:description"]');
        if (twDesc) twDesc.setAttribute('content', desc);
        var metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', desc);
      }
      var sub = document.getElementById('stores-subtitle');
      if (sub) sub.textContent = (brand.name || '') + 'の全店舗一覧';
      BRAND_ID = brand.id;
      try { await loadStoresFromSupabase(); } catch(e) { /* ignored */ }
      // Re-initialize reservation store dropdown with DB-loaded STORES
      var sel = document.getElementById('rm-store');
      if (sel) {
        sel.innerHTML = '<option value="">店舗を選択してください</option>';
        STORES.forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s.uuid || s.id;
          opt.textContent = s.name;
          opt.dataset.name = s.name;
          sel.appendChild(opt);
        });
      }
      buildAreaGrid();
      buildAttrChips();
      var q = getUrlParam('q');
      if (q) document.getElementById('search-q').value = q;
      filterStores();
    }
  });
});
</script>

<div id="weir-footer"></div>

<!-- ===== 来店予約モーダル ===== -->
<div class="res-modal-bg" id="res-modal-bg">
  <div class="res-modal">
    <div class="res-modal-header">
      <div class="res-modal-title">ご予約</div>
      <button class="res-modal-close" onclick="closeResModal()">×</button>
    </div>
    <div class="res-modal-body">
      <div class="rm-steps">
        <div class="rm-step active" id="rms1"><div class="rm-step-dot">1</div><div class="rm-step-label">日時・人数</div></div>
        <div class="rm-step" id="rms2"><div class="rm-step-dot">2</div><div class="rm-step-label">お客様情報</div></div>
        <div class="rm-step" id="rms3"><div class="rm-step-dot">3</div><div class="rm-step-label">確認</div></div>
      </div>
      <!-- Step 1 -->
      <div id="rmstep-1">
        <div class="rf-field" id="rm-store-field">
          <div class="rf-label">予約店舗 <span class="rf-req">*</span></div>
          <select id="rm-store" class="rf-input" onchange="rmOnStoreChange()">
            <option value="">店舗を選択してください</option>
          </select>
          <div class="rf-error" id="err-rm-store">店舗を選択してください</div>
        </div>
        <div class="rf-field" id="rm-store-preset-field" style="display:none">
          <div class="rf-label">予約店舗</div>
          <div class="rm-store-preset" id="rm-store-preset-text"></div>
        </div>
        <div class="rf-row" style="margin-bottom:16px">
          <div class="rf-field" style="margin-bottom:0">
            <div class="rf-label">日付 <span class="rf-req">*</span></div>
            <input type="date" id="rm-date" class="rf-input">
          </div>
          <div class="rf-field" style="margin-bottom:0">
            <div class="rf-label">人数 <span class="rf-req">*</span></div>
            <select id="rm-guests" class="rf-input" onchange="rmCheckCap()">
              <option value="1">1名</option><option value="2">2名</option>
              <option value="3" selected>3名</option><option value="4">4名</option>
              <option value="5">5名</option><option value="6">6名</option><option value="8">8名</option>
            </select>
          </div>
        </div>
        <div class="rm-slot-header">
          <div class="rm-slot-title">時間を選択</div>
          <div class="rm-slot-note">🔔 から空席通知が可能</div>
        </div>
        <div class="rm-slot-grid">
          <button class="rm-slot-b" onclick="rmSelSlot(this,'17:00')">17:00</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'17:15')">17:15</button>
          <button class="rm-slot-b slot-full" onclick="rmOpenVacancy('17:30')">17:30<br><span style="font-size:9px">満席🔔</span></button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'17:45')">17:45</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'18:00')">18:00</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'18:15')">18:15</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'18:30')">18:30</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'18:45')">18:45</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'19:00')">19:00</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'19:30')">19:30</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'20:00')">20:00</button>
          <button class="rm-slot-b" onclick="rmSelSlot(this,'20:30')">20:30</button>
        </div>
        <div class="rm-cap-alert" id="rm-cap-alert"></div>
        <button id="rm-step1-btn" class="rm-btn" onclick="rmGoStep(2)" disabled style="opacity:.35">次へ：お客様情報を入力</button>
      </div>
      <!-- Step 2 -->
      <div id="rmstep-2" style="display:none">
        <div class="rf-row">
          <div class="rf-field">
            <div class="rf-label">お名前 <span class="rf-req">*</span></div>
            <input id="rm-name" type="text" placeholder="山田 花子" class="rf-input" oninput="rmClearErr('rm-name')">
            <div class="rf-error" id="err-rm-name"></div>
          </div>
          <div class="rf-field">
            <div class="rf-label">電話番号 <span class="rf-req">*</span></div>
            <input id="rm-phone" type="tel" placeholder="09012345678" class="rf-input" oninput="rmClearErr('rm-phone')">
            <div class="rf-error" id="err-rm-phone"></div>
          </div>
        </div>
        <div class="rf-field">
          <div class="rf-label">メールアドレス <span class="rf-req">*</span></div>
          <input id="rm-email" type="email" placeholder="example@email.com" class="rf-input" oninput="rmClearErr('rm-email')">
          <div class="rf-error" id="err-rm-email"></div>
        </div>
        <div class="rf-field">
          <div class="rf-label">ご要望・アレルギー</div>
          <textarea id="rm-notes" rows="3" placeholder="アレルギー情報、記念日の演出ご希望などご自由にお書きください。" class="rf-input" style="resize:vertical"></textarea>
        </div>
        <div style="display:flex;gap:10px">
          <button class="rm-btn-back" onclick="rmGoStep(1)" style="flex:1">← 戻る</button>
          <button class="rm-btn" onclick="rmValidateStep2()" style="flex:2">確認へ進む</button>
        </div>
      </div>
      <!-- Step 3 -->
      <div id="rmstep-3" style="display:none">
        <div class="rm-confirm-box" id="rm-confirm-box"></div>
        <div style="font-size:12px;color:#666;margin-bottom:14px;line-height:1.9">上記内容でご予約を確定します。確定後、ご登録のメールアドレス宛に確認メールをお送りします。</div>
        <div style="display:flex;gap:10px">
          <button class="rm-btn-back" onclick="rmGoStep(2)" style="flex:1">← 戻る</button>
          <button class="rm-btn" onclick="rmSubmit()" style="flex:2">予約を確定する</button>
        </div>
      </div>
      <!-- Complete -->
      <div id="rmstep-complete" style="display:none">
        <div class="rm-complete-box">
          <div style="font-size:52px;margin-bottom:14px">✅</div>
          <div id="rm-res-id" style="font-size:22px;font-weight:700;margin-bottom:10px;color:var(--brand-primary)">RES-000000</div>
          <div style="font-size:13px;color:#666;line-height:1.9">ご予約ありがとうございます。<br>確認メールをお送りしました。</div>
          <button class="rm-btn" onclick="closeResModal()" style="margin-top:22px;max-width:200px">閉じる</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===== 来店予約モーダル ===== */
var rmSelTime = null;
var rmPresetStore = null;

function initResStoreOptions() {
  var sel = document.getElementById('rm-store');
  STORES.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.uuid || s.id;
    opt.textContent = s.name;
    opt.dataset.name = s.name;
    sel.appendChild(opt);
  });
}
initResStoreOptions();

function openResModal(storeValue) {
  rmSelTime = null;
  rmPresetStore = storeValue || null;
  var dropdown = document.getElementById('rm-store-field');
  var preset   = document.getElementById('rm-store-preset-field');
  if (rmPresetStore) {
    dropdown.style.display = 'none';
    preset.style.display   = 'block';
    document.getElementById('rm-store-preset-text').textContent = rmPresetStore;
  } else {
    dropdown.style.display = 'block';
    preset.style.display   = 'none';
    document.getElementById('rm-store').selectedIndex = 0;
  }
  document.getElementById('rm-date').value = new Date().toISOString().split('T')[0];
  document.querySelectorAll('.rm-slot-b').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('rm-cap-alert').className = 'rm-cap-alert';
  document.getElementById('rm-step1-btn').disabled = true;
  document.getElementById('rm-step1-btn').style.opacity = '.35';
  rmGoStep(1);
  document.getElementById('res-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeResModal() {
  document.getElementById('res-modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function rmOnStoreChange() { rmCheckCap(); }

function rmSelSlot(el, t) {
  if (!rmPresetStore && !document.getElementById('rm-store').value) {
    document.getElementById('err-rm-store').classList.add('show');
    document.getElementById('rm-store').focus();
    return;
  }
  rmSelTime = t;
  document.querySelectorAll('.rm-slot-b:not(.slot-full)').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  var btn = document.getElementById('rm-step1-btn');
  btn.disabled = false; btn.style.opacity = '1';
  rmCheckCap();
}

function rmCheckCap() {
  if (!rmSelTime) return;
  var g  = parseInt(document.getElementById('rm-guests').value);
  var ok = [{s:2,n:4},{s:4,n:3},{s:6,n:2},{s:8,n:1}].some(function(t){ return t.s>=g&&t.n>0; });
  var el = document.getElementById('rm-cap-alert');
  el.className = 'rm-cap-alert ' + (ok ? 'ok' : 'err');
  el.textContent = ok ? '✅ ' + g + '名様のご予約が可能です' : '⚠️ 満席です。時間帯を変更してください。';
  document.getElementById('rm-step1-btn').disabled = !ok;
  document.getElementById('rm-step1-btn').style.opacity = ok ? '1' : '.4';
}

function rmOpenVacancy(time) {
  alert('🔔 ' + time + ' の空席通知は近日対応予定です');
}

function rmGoStep(n) {
  [1,2,3,'complete'].forEach(function(s){
    var el = document.getElementById('rmstep-' + s);
    if (el) el.style.display = (s === n) ? 'block' : 'none';
  });
  ['rms1','rms2','rms3'].forEach(function(id, i){
    var el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i+1 < n) el.classList.add('done');
    else if (i+1 === n) el.classList.add('active');
  });
  if (n === 3) {
    var storeEl = document.getElementById('rm-store');
    var storeName = rmPresetStore
      ? rmPresetStore
      : (storeEl.options[storeEl.selectedIndex]?.text || '—');
    var rows = [
      ['店舗',  storeName],
      ['日時',  (document.getElementById('rm-date').value || '—') + ' ' + (rmSelTime || '—')],
      ['人数',  document.getElementById('rm-guests').value + '名'],
      ['お名前', document.getElementById('rm-name').value || '—'],
      ['電話',  document.getElementById('rm-phone').value || '—'],
      ['メール', document.getElementById('rm-email').value || '—'],
      ['ご要望', document.getElementById('rm-notes').value || 'なし']
    ];
    document.getElementById('rm-confirm-box').innerHTML = rows.map(function(r){
      return '<div class="rm-confirm-row"><span class="rm-confirm-label">'+r[0]+'</span><span>'+r[1]+'</span></div>';
    }).join('');
  }
}

function rmValidateStep2() {
  var ok = true;
  var name  = document.getElementById('rm-name').value.trim();
  var phone = document.getElementById('rm-phone').value.trim();
  var email = document.getElementById('rm-email').value.trim();
  if (!name)  { rmShowErr('rm-name',  'お名前を入力してください'); ok=false; }
  if (!phone || !/^[0-9\-+]{7,15}$/.test(phone)) { rmShowErr('rm-phone', '正しい電話番号を入力してください'); ok=false; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { rmShowErr('rm-email', '正しいメールアドレスを入力してください'); ok=false; }
  if (ok) rmGoStep(3);
}

function rmShowErr(id, msg) {
  var el = document.getElementById('err-' + id);
  el.textContent = msg; el.classList.add('show');
}
function rmClearErr(id) {
  var el = document.getElementById('err-' + id);
  if (el) el.classList.remove('show');
}

async function rmSubmit() {
  var submitBtn = document.querySelector('#rmstep-3 .rm-submit-btn');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '送信中...'; }
  try {
    var storeSelect = document.getElementById('rm-store');
    var storeId = storeSelect.value;
    var storeName = storeSelect.options[storeSelect.selectedIndex]?.text || '';
    if (rmPresetStore) {
      var found = STORES.find(function(s){ return s.name === rmPresetStore; });
      storeId = found ? (found.uuid || found.id) : '';
      storeName = rmPresetStore;
    }
    var res = await fetch(SUPABASE_URL + '/functions/v1/create-reservation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        store_id: storeId,
        date: document.getElementById('rm-date').value,
        time: rmSelTime,
        guest_count: parseInt(document.getElementById('rm-guests').value, 10),
        name: document.getElementById('rm-name').value.trim(),
        phone: document.getElementById('rm-phone').value.trim(),
        email: document.getElementById('rm-email').value.trim(),
        notes: document.getElementById('rm-notes').value.trim() || undefined
      })
    });
    var json = await res.json();
    if (!res.ok || !json.success) {
      alert('予約の送信に失敗しました: ' + (json.error || '不明なエラー'));
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '予約を確定する'; }
      return;
    }
    document.getElementById('rmstep-3').style.display = 'none';
    document.getElementById('rm-res-id').textContent = json.reservation.display_id;
    document.getElementById('rmstep-complete').style.display = 'block';
  } catch (e) {
    alert('予約の送信に失敗しました。通信状況をご確認ください。');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '予約を確定する'; }
  }
}

document.getElementById('res-modal-bg').addEventListener('click', function(e){
  if (e.target === this) closeResModal();
});
</script>
