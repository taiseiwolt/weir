<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット | Weir</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --brand: #D32F2F;
  --brand-dark: #B71C1C;
  --text: #212121;
  --text-sub: #757575;
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --border: #E0E0E0;
  --font: 'Noto Sans JP', sans-serif;
  --green: #2E7D32;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.container{max-width:440px;width:100%;padding:24px}
.card{background:var(--card);border-radius:16px;padding:32px 24px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.icon{font-size:48px;text-align:center;margin-bottom:16px}
.title{font-size:20px;font-weight:800;text-align:center;margin-bottom:8px}
.desc{font-size:13px;color:var(--text-sub);text-align:center;line-height:1.8;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--brand)}
.form-hint{font-size:11px;color:var(--text-sub);margin-top:4px}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;color:#fff;background:var(--brand);border:none;cursor:pointer;font-family:var(--font);transition:background .2s}
.btn:hover{background:var(--brand-dark)}
.btn:disabled{background:#ccc;cursor:not-allowed}
.msg{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.msg-error{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2}
.msg-success{background:#E8F5E9;color:var(--green);border:1px solid #C8E6C9}
.home-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--text-sub);text-decoration:none}
.home-link:hover{text-decoration:underline}
.pwd-strength{height:4px;border-radius:2px;background:#eee;margin-top:6px;overflow:hidden}
.pwd-strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
</style>
</head>
<body>
<div class="container">

  <!-- Step 1: Request Reset Email -->
  <div class="card" id="requestForm">
    <div class="icon">🔑</div>
    <div class="title">パスワードリセット</div>
    <div class="desc">
      ご登録のメールアドレスを入力してください。<br>
      パスワードリセット用のメールをお送りします。
    </div>
    <div class="msg msg-error" id="requestError"></div>
    <div class="msg msg-success" id="requestSuccess"></div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input type="email" class="form-input" id="resetEmail" placeholder="example@mail.com">
    </div>
    <button class="btn" id="requestBtn" onclick="sendResetEmail()">リセットメールを送信</button>
    <a href="./aiden-order-checkout.html" class="home-link">ログイン画面に戻る</a>
  </div>

  <!-- Step 2: Set New Password (shown after clicking email link) -->
  <div class="card" id="resetFormCard" style="display:none">
    <div class="icon">🔐</div>
    <div class="title">新しいパスワードを設定</div>
    <div class="desc">
      新しいパスワードを入力してください。<br>
      8文字以上で設定してください。
    </div>
    <div class="msg msg-error" id="resetError"></div>
    <div class="msg msg-success" id="resetSuccess"></div>
    <div class="form-group">
      <label class="form-label">新しいパスワード</label>
      <input type="password" class="form-input" id="newPassword" placeholder="8文字以上" oninput="checkStrength()">
      <div class="pwd-strength"><div class="pwd-strength-bar" id="pwdBar"></div></div>
    </div>
    <div class="form-group">
      <label class="form-label">パスワード（確認）</label>
      <input type="password" class="form-input" id="confirmPassword" placeholder="もう一度入力">
    </div>
    <button class="btn" id="resetBtn" onclick="updatePassword()">パスワードを更新</button>
  </div>

  <!-- Step 3: Complete -->
  <div class="card" id="completeCard" style="display:none">
    <div class="icon">✅</div>
    <div class="title">パスワードを更新しました</div>
    <div class="desc">
      新しいパスワードでログインできます。
    </div>
    <a href="./aiden-order-checkout.html#login" class="btn" style="text-align:center;text-decoration:none;display:block">ログインする</a>
  </div>

  <!-- Error: Invalid/Expired Link -->
  <div class="card" id="errorCard" style="display:none">
    <div class="icon">⚠️</div>
    <div class="title" style="color:#E53935">リンクが無効です</div>
    <div class="desc">
      パスワードリセットリンクが無効か、<br>有効期限が切れています。<br>
      再度リセットメールをリクエストしてください。
    </div>
    <button class="btn" onclick="showRequestForm()">もう一度リセットする</button>
  </div>
</div>

<script>
var API_BASE = '/api/members';
var accessToken = null;
var refreshToken = null;

(function init() {
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);

  // Check for error in hash (e.g., expired link)
  if (params.get('error') || params.get('error_description')) {
    document.getElementById('requestForm').style.display = 'none';
    document.getElementById('errorCard').style.display = '';
    if (window.history.replaceState) {
      window.history.replaceState(null, '', window.location.pathname);
    }
    return;
  }

  // Check for recovery tokens in hash
  accessToken = params.get('access_token');
  refreshToken = params.get('refresh_token');
  var type = params.get('type');

  if (accessToken && type === 'recovery') {
    // Show new password form
    document.getElementById('requestForm').style.display = 'none';
    document.getElementById('resetFormCard').style.display = '';
    if (window.history.replaceState) {
      window.history.replaceState(null, '', window.location.pathname);
    }
  }
  // Otherwise show the request form (default)
})();

function showRequestForm() {
  document.getElementById('errorCard').style.display = 'none';
  document.getElementById('requestForm').style.display = '';
}

async function sendResetEmail() {
  var email = document.getElementById('resetEmail').value.trim();
  var errEl = document.getElementById('requestError');
  var successEl = document.getElementById('requestSuccess');
  var btn = document.getElementById('requestBtn');

  errEl.style.display = 'none';
  successEl.style.display = 'none';

  if (!email) {
    errEl.textContent = 'メールアドレスを入力してください';
    errEl.style.display = '';
    return;
  }

  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    var resp = await fetch(API_BASE + '/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    var data = await resp.json();

    if (data.success) {
      successEl.textContent = data.data.message;
      successEl.style.display = '';
      btn.textContent = '送信完了';
    } else {
      errEl.textContent = data.error || 'エラーが発生しました';
      errEl.style.display = '';
      btn.disabled = false;
      btn.textContent = 'リセットメールを送信';
    }
  } catch (e) {
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = 'リセットメールを送信';
  }
}

function checkStrength() {
  var pw = document.getElementById('newPassword').value;
  var bar = document.getElementById('pwdBar');
  var score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  var pct = Math.min(100, score * 25);
  var color = score <= 1 ? '#E53935' : score <= 2 ? '#FB8C00' : score <= 3 ? '#FDD835' : '#43A047';
  bar.style.width = pct + '%';
  bar.style.background = color;
}

async function updatePassword() {
  var pw = document.getElementById('newPassword').value;
  var pw2 = document.getElementById('confirmPassword').value;
  var errEl = document.getElementById('resetError');
  var btn = document.getElementById('resetBtn');

  errEl.style.display = 'none';

  if (!pw || pw.length < 8) {
    errEl.textContent = 'パスワードは8文字以上で入力してください';
    errEl.style.display = '';
    return;
  }
  if (pw !== pw2) {
    errEl.textContent = 'パスワードが一致しません';
    errEl.style.display = '';
    return;
  }

  btn.disabled = true;
  btn.textContent = '更新中...';

  try {
    var resp = await fetch(API_BASE + '/update-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: accessToken,
        refresh_token: refreshToken,
        password: pw,
      }),
    });
    var data = await resp.json();

    if (data.success) {
      document.getElementById('resetFormCard').style.display = 'none';
      document.getElementById('completeCard').style.display = '';
    } else {
      errEl.textContent = data.error || 'エラーが発生しました';
      errEl.style.display = '';
      btn.disabled = false;
      btn.textContent = 'パスワードを更新';
    }
  } catch (e) {
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = 'パスワードを更新';
  }
}
</script>
</body>
</html>
