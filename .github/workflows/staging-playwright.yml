# GHA-02: Staging Playwright e2e
# Fires on every push to `staging`. After Vercel auto-deploys to
# https://dev.xorder.co.jp, this waits and runs the Playwright suite
# against the deployed STG environment.
#
# Cost: ~10-15 min per run.
name: staging-playwright

on:
  push:
    branches: [staging]

concurrency:
  # Only one e2e run at a time on staging. New pushes cancel the in-flight run
  # so the latest code gets priority.
  group: staging-playwright
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Vercel 自動デプロイ完了までは GitHub push と非同期。
      # Deployment API 経由で完了を待つ代わりに、固定スリープで 2 分待ち。
      # (Phase C で Vercel Deployments Watcher Action 導入を検討)
      - name: Wait for Vercel staging deployment
        run: sleep 120

      - name: Run Playwright against dev.xorder.co.jp
        run: npx playwright test --config=playwright.config.cjs
        env:
          BASE_URL: https://dev.xorder.co.jp
          # NOTE: playwright.config.cjs は現状 baseURL を読んでいない。
          # テスト側で process.env.BASE_URL を参照する実装が前提。
          # 未対応の場合、Phase C で playwright.config.cjs に `use.baseURL` を追加。

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Email notification on failure
        if: failure()
        uses: ./.github/actions/notify-email
        with:
          subject: '[Weir GHA] Staging Playwright FAILED'
          body: |
            Staging Playwright e2e failed.
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
