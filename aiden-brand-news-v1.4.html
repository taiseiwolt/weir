<!DOCTYPE html>
<html lang="ja" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース・キャンペーン | 炭火亭</title>

<style>
:root{--brand-primary:#D32F2F;--brand-primary-dark:#B71C1C;--brand-primary-light:#FFEBEE;--brand-header-bg:#D32F2F;--brand-header-text:#FFFFFF;--brand-font:'Noto Sans JP',sans-serif;--brand-font-color:#333;--text2:#666;--text3:#999;--bg:#fff;--bg2:#F8F8F8;--border:#E0E0E0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--brand-font);color:var(--brand-font-color);background:var(--bg);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}
.header{background:var(--brand-header-bg);position:sticky;top:0;z-index:1000}
.header-main{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 20px}
.header-logo a{display:flex;align-items:center;gap:10px;margin-right:32px}
.header-logo-mark{width:44px;height:44px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-logo-text{color:var(--brand-header-text);font-size:20px;font-weight:700;font-family:'Noto Serif JP',serif;white-space:nowrap}
.header-nav{display:flex;align-items:center;flex:1}
.header-nav-link{color:var(--brand-header-text);font-size:13px;font-weight:500;padding:0 14px;height:56px;display:flex;align-items:center;white-space:nowrap;transition:background .15s;border:none;background:none;font-family:var(--brand-font);cursor:pointer;text-decoration:none}
.header-nav-link:hover{background:rgba(0,0,0,.15)}
.header-nav-link.cta{background:rgba(0,0,0,.25);border-radius:3px;margin:0 3px;height:38px;font-weight:700;font-size:12px;padding:0 12px}
.lang-select-wrap{margin-left:auto;position:relative;flex-shrink:0}
.lang-select{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:var(--brand-header-text);font-size:11px;padding:4px 22px 4px 8px;border-radius:3px;cursor:pointer;font-family:var(--brand-font);outline:none}
.lang-select option{background:#333;color:#fff}
.lang-select-arrow{position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--brand-header-text);font-size:9px}
.header-hamburger{display:none;background:none;border:none;color:var(--brand-header-text);font-size:26px;margin-left:12px;padding:8px;cursor:pointer}
.page-hero{background:var(--brand-primary);padding:24px 20px;text-align:center;color:white}
.page-hero h1{font-size:26px;font-weight:700;font-family:'Noto Serif JP',serif}
.news-page{max-width:860px;margin:0 auto;padding:32px 20px 80px}
/* フィルター */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:6px 16px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:white;cursor:pointer;font-family:var(--brand-font);color:var(--text2);transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--brand-primary);color:white;border-color:var(--brand-primary)}
/* ニュースリスト */
.news-list{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:32px}
.news-item{display:flex;align-items:flex-start;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:var(--bg2)}
.news-date{font-size:12px;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:2px}
.news-cat{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0}
.news-cat.store{background:#FFEBEE;color:#D32F2F}
.news-cat.corp{background:#E3F2FD;color:#1565C0}
.news-cat.menu{background:#E8F5E9;color:#2E7D32}
.news-cat.campaign{background:#FFF8E1;color:#F57F17}
.news-title-text{font-size:13px;line-height:1.6;color:var(--brand-font-color)}
.news-title-text a:hover{color:var(--brand-primary);text-decoration:underline}
/* ページネーション */
.pagination{display:flex;justify-content:center;gap:6px}
.page-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:4px;background:white;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--brand-font)}
.page-btn.active{background:var(--brand-primary);color:white;border-color:var(--brand-primary)}
.page-btn:hover:not(.active){background:var(--bg2)}
/* フッター */
footer{background:#1a1a1a;color:rgba(255,255,255,.7);padding:32px 20px 16px}
.footer-inner{max-width:860px;margin:0 auto;text-align:center}
.footer-logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.footer-logo-mark-sm{width:36px;height:36px;background:var(--brand-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.footer-brand-name{font-size:18px;font-weight:700;color:white;font-family:'Noto Serif JP',serif}
.footer-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;font-size:12px;margin-bottom:16px}
.footer-links a:hover{color:white}
.footer-copy{font-size:11px;opacity:.5}
@media(max-width:600px){.header-nav{display:none}.header-hamburger{display:block}}
</style>

var I18N = {
  ja:{nav_top:'トップ', nav_menu:'メニュー', nav_stores:'お店を探す', nav_reserve:'📅 来店予約', nav_order:'🥡 テイクアウト・デリバリー', page_title:'ニュース・キャンペーン', f_all:'すべて', f_store:'お店情報', f_corp:'会社情報', f_menu:'メニュー', f_campaign:'キャンペーン', f_privacy:'プライバシーポリシー', f_terms:'利用規約', f_sitemap:'サイトマップ'},
  en:{nav_top:'Top', nav_menu:'Menu', nav_stores:'Find a Store', nav_reserve:'📅 Reservation', nav_order:'🥡 Takeout / Delivery', page_title:'News & Campaigns', f_all:'All', f_store:'Store Info', f_corp:'Company', f_menu:'Menu', f_campaign:'Campaign', f_privacy:'Privacy Policy', f_terms:'Terms of Use', f_sitemap:'Sitemap'},
  zh:{nav_top:'首页', nav_menu:'菜单', nav_stores:'查找门店', nav_reserve:'📅 预约', nav_order:'🥡 外带·外送', page_title:'新闻・活动', f_all:'全部', f_store:'门店信息', f_corp:'公司信息', f_menu:'菜单', f_campaign:'活动', f_privacy:'隐私政策', f_terms:'使用条款', f_sitemap:'网站地图'},
  ko:{nav_top:'홈', nav_menu:'메뉴', nav_stores:'매장 찾기', nav_reserve:'📅 예약', nav_order:'🥡 포장·배달', page_title:'뉴스・캠페인', f_all:'전체', f_store:'매장 정보', f_corp:'회사 정보', f_menu:'메뉴', f_campaign:'캠페인', f_privacy:'개인정보 처리방침', f_terms:'이용약관', f_sitemap:'사이트맵'},
  fr:{nav_top:'Accueil', nav_menu:'Menu', nav_stores:'Trouver un restaurant', nav_reserve:'📅 Réservation', nav_order:'🥡 À emporter / Livraison', page_title:'Actualités & Campagnes', f_all:'Tout', f_store:'Info magasin', f_corp:'Entreprise', f_menu:'Menu', f_campaign:'Campagne', f_privacy:'Politique de confidentialité', f_terms:'Conditions d\'utilisation', f_sitemap:'Plan du site'},
  it:{nav_top:'Home', nav_menu:'Menu', nav_stores:'Trova un ristorante', nav_reserve:'📅 Prenotazione', nav_order:'🥡 Asporto / Consegna', page_title:'Notizie & Campagne', f_all:'Tutto', f_store:'Info negozio', f_corp:'Azienda', f_menu:'Menu', f_campaign:'Campagna', f_privacy:'Privacy Policy', f_terms:'Termini di utilizzo', f_sitemap:'Mappa del sito'},
  id:{nav_top:'Beranda', nav_menu:'Menu', nav_stores:'Cari Restoran', nav_reserve:'📅 Reservasi', nav_order:'🥡 Bawa Pulang / Pesan Antar', page_title:'Berita & Kampanye', f_all:'Semua', f_store:'Info Toko', f_corp:'Perusahaan', f_menu:'Menu', f_campaign:'Kampanye', f_privacy:'Kebijakan Privasi', f_terms:'Syarat Penggunaan', f_sitemap:'Peta Situs'}
};

var currentLang = 'ja';
var currentFilter = 'all';
var PER_PAGE = 10;
var currentPage = 1;

function t(k){ return (I18N[currentLang]&&I18N[currentLang][k]!==undefined)?I18N[currentLang][k]:(I18N.ja[k]||k); }

var CAT_KEYS = {store:'f_store', corp:'f_corp', menu:'f_menu', campaign:'f_campaign'};

function renderFilters() {
  var filters = ['all','store','corp','menu','campaign'];
  var html = '';
  filters.forEach(function(f) {
    var label = f==='all' ? t('f_all') : t(CAT_KEYS[f]);
    html += '<button class="filter-btn'+(currentFilter===f?' active':'')+'" onclick="setFilter(\''+f+'\')">' + label + '</button>';
  });
  document.getElementById('filter-bar').innerHTML = html;
}

function setFilter(f) { currentFilter = f; currentPage = 1; render(); }

function render() {
  var filtered = NEWS_DATA.filter(function(n){ return currentFilter==='all' || n.cat===currentFilter; });
  var total = filtered.length;
  var pages = Math.ceil(total / PER_PAGE);
  var start = (currentPage-1)*PER_PAGE;
  var items = filtered.slice(start, start+PER_PAGE);
  var html = '';
  items.forEach(function(n) {
    var catKey = CAT_KEYS[n.cat];
    var title = (n.title[currentLang] || n.title['ja']);
    html += '<div class="news-item">'
      +'<span class="news-date">'+n.date+'</span>'
      +'<span class="news-cat '+n.cat+'">'+t(catKey)+'</span>'
      +'<span class="news-title-text"><a href="#">'+title+'</a></span>'
      +'</div>';
  });
  document.getElementById('news-list').innerHTML = html || '<div style="padding:24px;text-align:center;color:var(--text3)">—</div>';
  // ページネーション
  var pHtml = '';
  if (pages > 1) {
    for (var p=1; p<=pages; p++) {
      pHtml += '<button class="page-btn'+(p===currentPage?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
    }
  }
  document.getElementById('pagination').innerHTML = pHtml;
  renderFilters();
}

function goPage(p){ currentPage=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function changeLang(lang) {
  if (!I18N[lang]) return;
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n');
    if(I18N[lang][k]!==undefined) el.textContent=I18N[lang][k];
  });
  render();
}

function applyBrand() {
  var c = BRAND_CONFIG, r = document.documentElement;
  r.style.setProperty('--brand-primary', c.primaryColor);
  r.style.setProperty('--brand-primary-dark', c.primaryDark);
  r.style.setProperty('--brand-header-bg', c.headerBg);
  r.style.setProperty('--brand-header-text', c.headerTextColor);
  r.style.setProperty('--brand-font-color', c.fontColor);
  r.style.setProperty('--brand-font', "'"+c.fontFamily+"',sans-serif");
  var mark = document.getElementById('logo-mark');
  mark.textContent = c.logoMarkEmoji || '🔥';
  document.getElementById('logo-text').textContent = c.logoTextValue;
  document.getElementById('footer-mark').textContent = c.logoMarkEmoji || '🔥';
  document.getElementById('footer-name').textContent = c.logoTextValue;
}

// ===== SUPABASE =====
const SUPABASE_URL = 'https://iikwusprydaogzeslgdz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oiOC8uI-wOTexg-02toAOQ_3MXBt8lC';
const BRAND_ID = '22222222-0000-0000-0000-000000000001';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadNewsFromSupabase() {
  var {data: news} = await sb.from('brand_news').select('*').eq('brand_id', BRAND_ID).order('published_at', {ascending: false});
  if (!news || news.length === 0) return;
  NEWS_DATA = news.map(function(n, i) {
    var d = new Date(n.published_at);
    var ds = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    return { id: i+1, date: ds, cat: n.category, title: {ja: n.title, en: n.title, zh: n.title, ko: n.title, fr: n.title, it: n.title, id: n.title} };
  });

}

document.addEventListener('DOMContentLoaded', async function(){
  try { await loadNewsFromSupabase(); } catch(e) { console.warn('Supabase news load failed:', e); }
  applyBrand(); render();
});
</script>
