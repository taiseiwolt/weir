<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注文状況 | Weir</title>
    <!-- OGP / SNS Meta Tags -->
    <meta property="og:title" content="注文状況 | Weir">
    <meta property="og:description" content="ご注文の準備状況をリアルタイムで確認できます。">
    <meta property="og:image" content="https://weir.co.jp/ogp.png">
    <meta property="og:url" content="https://weir.co.jp/weir-order-tracking.html">

    <meta name="description" content="ご注文の準備状況をリアルタイムで確認できます。">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{touch-action:manipulation}
input,select,textarea{font-size:16px!important}
:root{
  --brand:#D32F2F;
  --progress:#4CAF50;
  --cancel:#E53935;
  --complete:#43A047;
  --bg:#FAFAFA;
  --text:#1A1A2E;
  --text-light:#6B7280;
  --card:#FFFFFF;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

/* === MAP === */
#map{width:100%;height:45vh;min-height:240px;z-index:1}

/* === MAIN CONTENT === */
.tracking-content{position:relative;margin-top:-40px;z-index:2;background:var(--card);border-radius:24px 24px 0 0;flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 20px 100px;box-shadow:0 -4px 20px rgba(0,0,0,.06)}

/* === PROGRESS CIRCLE === */
.progress-wrap{position:relative;width:180px;height:180px;margin-bottom:20px}
.progress-svg{width:100%;height:100%;transform:rotate(-90deg)}
.progress-track{fill:none;stroke:#E8E8E8;stroke-width:8}
.progress-fill{fill:none;stroke:var(--progress);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .4s ease}
.progress-spinner{fill:none;stroke:var(--progress);stroke-width:10;stroke-linecap:round;stroke-dasharray:60 400;animation:spin 2s linear infinite;opacity:.35}
@keyframes spin{to{stroke-dashoffset:-460}}
.progress-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.progress-time{font-size:48px;font-weight:800;line-height:1;letter-spacing:-2px}
.progress-unit{font-size:14px;color:var(--text-light);font-weight:600;margin-top:2px}
.progress-label{font-size:12px;color:var(--text-light);margin-top:2px}
.progress-icon{font-size:56px;line-height:1}

/* === STATUS TEXT === */
.order-type-label{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:10px;letter-spacing:.5px}
.order-type-label.delivery{background:#E3F2FD;color:#1565C0}
.order-type-label.takeout{background:#FFF3E0;color:#E65100}
.order-type-label.dine_in{background:#E8F5E9;color:#2E7D32}
.store-name{font-size:14px;color:var(--text-light);font-weight:600;margin-bottom:4px;letter-spacing:.5px}
.status-text{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1.4}
.status-sub{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:8px}
.status-disclaimer{font-size:11px;color:#999;text-align:center;max-width:300px;line-height:1.5;margin-top:4px}

/* === STEP BAR === */
.step-bar{display:flex;align-items:center;justify-content:center;gap:4px;margin:16px 0 8px;width:100%;max-width:340px}
.step-dot{width:10px;height:10px;border-radius:50%;background:#E0E0E0;transition:background .4s,transform .3s}
.step-dot.active{background:var(--progress);transform:scale(1.3)}
.step-dot.done{background:var(--progress)}
.step-line{width:24px;height:3px;background:#E0E0E0;border-radius:2px;transition:background .4s}
.step-line.done{background:var(--progress)}

/* === FLOATING BUTTONS === */
.float-btn{position:fixed;bottom:28px;width:52px;height:52px;border-radius:50%;background:var(--card);box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:10;border:none;transition:transform .15s}
.float-btn:active{transform:scale(.92)}
.btn-chat{left:20px}
.btn-receipt{right:20px}

/* === REVIEW BUTTON === */
.review-btn{display:none;margin-top:16px;padding:12px 28px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:transform .15s}
.review-btn:active{transform:scale(.96)}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#DDD;border-radius:4px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F3F3;font-size:13px}
.modal-row:last-child{border-bottom:none}
.modal-row .label{color:var(--text-light)}
.modal-row .value{font-weight:600;text-align:right;max-width:60%}
.modal-section{font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding-top:8px;border-top:2px solid #F0F0F0}
.modal-item{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.modal-item .qty{color:var(--text-light);margin-right:6px}
.modal-total{display:flex;justify-content:space-between;padding:12px 0 0;font-size:15px;font-weight:700;border-top:2px solid #EEE;margin-top:8px}
.modal-close{width:100%;padding:14px;background:#F5F5F5;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;font-family:'Poppins',sans-serif}

/* === ERROR / EXPIRED === */
.error-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 20px;text-align:center}
.error-screen.show{display:flex}
.error-icon{font-size:64px;margin-bottom:16px}
.error-title{font-size:20px;font-weight:700;margin-bottom:8px}
.error-sub{font-size:14px;color:var(--text-light);line-height:1.6;white-space:pre-line}

/* === CANCELLED STATE === */
.cancelled .progress-fill,.cancelled .progress-spinner{stroke:var(--cancel)}
.cancelled .step-dot.active,.cancelled .step-dot.done,.cancelled .step-line.done{background:var(--cancel)}
.cancelled .status-text{color:var(--cancel)}

/* === LOADING === */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:16px}
.loading-screen .spinner{width:40px;height:40px;border:4px solid #E8E8E8;border-top:4px solid var(--brand);border-radius:50%;animation:spin-load .8s linear infinite}
@keyframes spin-load{to{transform:rotate(360deg)}}
.loading-screen p{font-size:14px;color:var(--text-light)}

/* === SCHEDULED ORDER STATIC VIEW === */
.scheduled-static{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;text-align:center;animation:fadeInScheduled .4s ease}
@keyframes fadeInScheduled{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scheduled-icon{font-size:72px;margin-bottom:16px;line-height:1}
.scheduled-label{font-size:13px;color:var(--text-light);font-weight:600;letter-spacing:.5px;margin-bottom:4px}
.scheduled-datetime{font-size:28px;font-weight:800;line-height:1.3;margin-bottom:8px;letter-spacing:-1px}
.scheduled-remaining{font-size:14px;color:var(--text-light);margin-bottom:16px}
.scheduled-hint{font-size:12px;color:#999;max-width:280px;line-height:1.6}
.view-fade-out{opacity:0;transition:opacity .3s ease}
.view-fade-in{opacity:1;transition:opacity .3s ease}

/* === RESPONSIVE === */
@media(min-width:480px){
  .tracking-content{max-width:480px;margin-left:auto;margin-right:auto}
  .float-btn.btn-chat{left:calc(50% - 240px + 20px)}
  .float-btn.btn-receipt{right:calc(50% - 240px + 20px)}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>注文情報を読み込み中...</p>
</div>

<!-- ERROR -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">🔍</div>
  <div class="error-title" id="errorTitle">注文が見つかりません</div>
  <div class="error-sub" id="errorSub">URLが正しいかご確認ください。</div>
</div>

<!-- MAIN TRACKING VIEW -->
<div id="trackingView" style="display:none">
  <div id="map"></div>
  <div class="tracking-content" id="trackingContent">
    <!-- SCHEDULED ORDER: STATIC VIEW (60min+ before scheduled_at) -->
    <div class="scheduled-static" id="scheduledStatic" style="display:none">
      <div class="scheduled-icon">📅</div>
      <div class="scheduled-label">ご予約日時</div>
      <div class="scheduled-datetime" id="scheduledDatetime">---</div>
      <div class="scheduled-remaining" id="scheduledRemaining"></div>
      <div class="scheduled-hint">ご予約の時間が近づくと、準備状況をリアルタイムでお知らせします</div>
    </div>
    <!-- NORMAL TRACKING VIEW (non-scheduled or within 60min) -->
    <div id="normalTrackingView">
    <div class="progress-wrap">
      <svg class="progress-svg" viewBox="0 0 160 160">
        <circle class="progress-track" cx="80" cy="80" r="73"/>
        <circle class="progress-fill" id="progressFill" cx="80" cy="80" r="73"/>
        <circle class="progress-spinner" id="progressSpinner" cx="80" cy="80" r="73"/>
      </svg>
      <div class="progress-center" id="progressCenter">
        <div class="progress-time" id="progressTime">--</div>
        <div class="progress-unit" id="progressUnit">分</div>
        <div class="progress-label" id="progressLabel">でお届け</div>
      </div>
    </div>
    <div class="order-type-label" id="orderTypeLabel"></div>
    <div class="store-name" id="storeName">---</div>
    <div class="status-text" id="statusText">読み込み中...</div>
    <div class="status-sub" id="statusSub"></div>
    <div class="step-bar" id="stepBar"></div>
    <div class="status-disclaimer" id="deliveryDisclaimer" style="display:none"></div>
    <button class="review-btn" id="reviewBtn" onclick="openReview()">⭐ 口コミを書く</button>
    </div><!-- /normalTrackingView -->
  </div>
  <button class="float-btn btn-chat" onclick="openChat()" title="チャットサポート">💬</button>
  <button class="float-btn btn-receipt" onclick="openReceipt()" title="注文概要">🧾</button>
</div>

<!-- FAQ MODAL (CS-3) -->
<div class="modal-overlay" id="faqModal" onclick="if(event.target===this)closeFaqModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">よくある質問</div>
    <div style="font-size:13px;color:var(--text-light);margin-bottom:16px">お問い合わせの前にFAQをご確認ください</div>
    <div id="faqContent" style="margin-bottom:16px">
      <div style="text-align:center;padding:20px;color:var(--text-light)">読み込み中...</div>
    </div>
    <button style="width:100%;padding:14px;background:var(--brand,#D32F2F);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif" onclick="closeFaqModal();startChat()">解決しない場合はチャットで問い合わせ</button>
    <button class="modal-close" onclick="closeFaqModal()">閉じる</button>
  </div>
</div>

<!-- CHAT MODAL (CS-2) -->
<div class="modal-overlay" id="chatModal" onclick="if(event.target===this)closeChatModal()">
  <div class="modal-sheet" style="display:flex;flex-direction:column;max-height:85vh">
    <div class="modal-handle"></div>
    <div class="modal-title">💬 チャットサポート</div>
    <div id="chatMessages" style="flex:1;overflow-y:auto;min-height:200px;max-height:50vh;padding:8px 0;margin-bottom:12px">
      <div style="text-align:center;padding:20px;color:var(--text-light);font-size:13px">メッセージを入力して送信してください</div>
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" id="chatInput" placeholder="メッセージを入力..." style="flex:1;padding:12px;border:1px solid #E0E0E0;border-radius:12px;font-size:14px;font-family:'Poppins',sans-serif" onkeydown="if(event.key==='Enter')sendChatMessage()">
      <button onclick="sendChatMessage()" style="padding:12px 20px;background:var(--brand,#D32F2F);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif">送信</button>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="receiptModal" onclick="if(event.target===this)closeReceipt()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🧾 注文概要</div>
    <div class="modal-row"><span class="label">注文番号</span><span class="value" id="modalOrderId">---</span></div>
    <div class="modal-row"><span class="label">注文日時</span><span class="value" id="modalOrderDate">---</span></div>
    <div class="modal-row"><span class="label">注文タイプ</span><span class="value" id="modalOrderType">---</span></div>
    <div class="modal-row" id="modalAddressRow" style="display:none"><span class="label">配達先</span><span class="value" id="modalAddress">---</span></div>
    <div class="modal-section">注文内容</div>
    <div id="modalItems"></div>
    <div class="modal-total"><span>合計</span><span id="modalTotal">---</span></div>
    <div class="modal-section">店舗情報</div>
    <div class="modal-row"><span class="label">店舗名</span><span class="value" id="modalStoreName">---</span></div>
    <div class="modal-row"><span class="label">住所</span><span class="value" id="modalStoreAddr">---</span></div>
    <div class="modal-row"><span class="label">電話</span><span class="value" id="modalStorePhone">---</span></div>
    <button class="modal-close" onclick="closeReceipt()">閉じる</button>
  </div>
</div>

<script>
// ===================================================================
// API CONFIG
// ===================================================================
const API_BASE = 'https://weir.co.jp'; // Production domain

async function apiFetch(path, options = {}) {
  const token = localStorage.getItem('weir_token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, { ...options, headers });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// Supabase
const SUPABASE_URL = 'https://iikwusprydaogzeslgdz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oiOC8uI-wOTexg-02toAOQ_3MXBt8lC';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===================================================================
// STATUS DEFINITIONS
// ===================================================================
const STATUS_MAP = {
  delivery: [
    { key:'placed',     text:'ご注文を受け付けました',                icon:'📝' },
    { key:'confirmed',  text:'お店が注文を確認しました',              icon:'✅' },
    { key:'preparing',  text:'調理中です',                            icon:'🍳' },
    { key:'prepared',   text:'調理が完了しました',                    icon:'✨' },
    { key:'delivering', text:'配達パートナーがお届けに向かっています', icon:'🛵' },
    { key:'delivered',  text:'配達が完了しました',                    icon:'🎉' },
  ],
  takeout: [
    { key:'placed',    text:'ご注文を受け付けました',   icon:'📝' },
    { key:'confirmed', text:'お店が注文を確認しました', icon:'✅' },
    { key:'preparing', text:'調理中です',               icon:'🍳' },
    { key:'prepared',  text:'調理が完了しました',       icon:'✨' },
    { key:'picked_up', text:'お受け取りが完了しました', icon:'🎉' },
  ],
  dine_in: [
    { key:'placed', text:'ご注文を受け付けました', icon:'📝' },
  ]
};
const CHANNEL_LABELS = { delivery:'デリバリー', takeout:'テイクアウト', dine_in:'店内注文' };
const FINAL_STATUSES = ['delivered','picked_up','cancelled'];

// ===================================================================
// STATE
// ===================================================================
let orderData = null;
let storeData = null;
let brandData = null;
let map = null;
let storeMarker = null;
let driverMarker = null;
let pollInterval = null;
let etaInterval = null;
let scheduledCheckInterval = null;
let currentScheduledView = null; // 'static' | 'countdown' | null

// ===================================================================
// INIT
// ===================================================================
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const orderId = params.get('order'); // optional legacy param
  const piParam = params.get('pi'); // payment_intent_id fallback

  // Demo mode: no params
  if (!token && !orderId && !piParam) { initDemo(); return; }

  if (!token && !piParam) {
    showError('URLが無効です', 'token パラメータが必要です。\nThanksメール内のリンクからアクセスしてください。');
    return;
  }

  try {
    let order = null;

    // 1. tracking_token で RPC 経由検索（SECURITY DEFINER で delivery PII にアクセス）
    if (token) {
      const { data, error } = await sb.rpc('get_order_by_tracking_token', { p_token: token });
      if (!error && data) {
        order = data;
      }
    }

    // 2. payment_intent_id フォールバック（checkout.htmlからtoken取得できなかった場合）
    if (!order && piParam) {
      const orderSelect = `
        id, display_id, store_id, order_type, total_amount, delivery_fee, service_fee,
        tracking_status, tracking_token, tracking_expires_at,
        estimated_minutes, estimated_delivery_at, scheduled_at, created_at,
        order_items(id, quantity, unit_price, subtotal, products(id, name, image_url)),
        stores!inner(id, name, address, phone, lat, lng, brands(id, name, primary_color))
      `;
      const { data: piOrder, error: piErr } = await sb
        .from('orders')
        .select(orderSelect)
        .eq('payment_intent_id', piParam)
        .single();
      if (!piErr && piOrder) order = piOrder;
    }

    if (!order) {
      showError('注文が見つかりません', 'URLが正しいかご確認ください。');
      return;
    }

    // 有効期限チェック
    if (order.tracking_expires_at && new Date(order.tracking_expires_at) < new Date()) {
      showError('表示期間が終了しました', 'この注文のトラッキングページは\n有効期限（7日間）を過ぎています。');
      return;
    }

    orderData = order;

    // store / brand を JOIN 結果から取得
    if (order.stores) {
      storeData = order.stores;
      brandData = storeData.brands || null;
      if (brandData && brandData.primary_color) {
        document.documentElement.style.setProperty('--brand', brandData.primary_color);
      }
    }

    // order_items 内の product 情報を展開（product_name フォールバック）
    if (order.order_items) {
      order.order_items = order.order_items.map(item => ({
        ...item,
        product_name: item.product_name || item.products?.name || '商品',
        unit_price: item.unit_price || item.products?.price || 0,
      }));
    }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('trackingView').style.display = '';
    initMap();
    renderTracking();
    startScheduledCheck();
    startRealtime();
    startDeliveryTracking();
    startPolling();
    startEtaCountdown();

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) { startRealtime(); if (typeof startDeliveryTracking === 'function') startDeliveryTracking(); }
    });
    window.addEventListener('online', () => { startRealtime(); });

  } catch (e) {
    console.error(e);
    showError('読み込みエラー', '注文情報の取得に失敗しました。\nしばらくしてから再度お試しください。');
  }
});

// ===================================================================
// ERROR SCREEN
// ===================================================================
function showError(title, sub) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').classList.add('show');
  document.getElementById('errorTitle').textContent = title;
  document.getElementById('errorSub').textContent = sub;
}

// ===================================================================
// MAP
// ===================================================================
function initMap() {
  const lat = storeData?.lat || 35.6595;
  const lng = storeData?.lng || 139.7004;

  map = L.map('map', { center:[lat,lng], zoom:15, zoomControl:false, attributionControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);

  const storeIcon = L.divIcon({
    html:'<div style="width:36px;height:36px;background:'+getComputedStyle(document.documentElement).getPropertyValue('--brand').trim()+';border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.3);border:3px solid #fff">🏪</div>',
    iconSize:[36,36], iconAnchor:[18,18], className:''
  });
  storeMarker = L.marker([lat,lng], { icon:storeIcon }).addTo(map);
  storeMarker.bindPopup('<b>'+(storeData?.name||'店舗')+'</b>');

  if (getChannel()==='delivery' && orderData.delivery_lat && orderData.delivery_lng) {
    updateDriverMarker(orderData.delivery_lat, orderData.delivery_lng);
  }
}

function updateDriverMarker(lat, lng) {
  if (!map) return;
  const icon = L.divIcon({
    html:'<div style="width:40px;height:40px;background:#1976D2;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 2px 12px rgba(25,118,210,.4);border:3px solid #fff">🛵</div>',
    iconSize:[40,40], iconAnchor:[20,20], className:''
  });
  if (driverMarker) { driverMarker.setLatLng([lat,lng]); }
  else { driverMarker = L.marker([lat,lng], { icon:icon }).addTo(map); }
  const bounds = L.latLngBounds([[storeData?.lat||35.6595, storeData?.lng||139.7004],[lat,lng]]);
  map.fitBounds(bounds, { padding:[50,50] });
}

// ===================================================================
// HELPERS
// ===================================================================
function getChannel() {
  const t = orderData?.order_type || orderData?.channel || 'delivery';
  if (t==='dine_in'||t==='dinein') return 'dine_in';
  if (t==='takeout'||t==='pickup') return 'takeout';
  return 'delivery';
}

function calcETA() {
  if (!orderData.estimated_delivery_at) return null;
  return Math.max(0, Math.round((new Date(orderData.estimated_delivery_at) - new Date()) / 60000));
}

function calcETAText() {
  const ch = getChannel(), eta = calcETA();
  if (eta===null) {
    // #3: ETA不明時のフォールバック
    if (ch==='delivery') return 'お届け時間を確認中です';
    if (ch==='takeout') return 'お受け取り時間を確認中です';
    if (ch==='dine_in') return 'ご提供時間を確認中です';
    return '';
  }
  if (eta<=0) {
    // #1: チャネル別の「まもなく」テキスト
    if (ch==='delivery') return 'まもなく到着予定です';
    if (ch==='takeout') return 'まもなくお受け取りいただけます';
    if (ch==='dine_in') return 'まもなくご提供いたします';
    return 'まもなくご用意できます';
  }
  if (ch==='delivery') return 'お届けまでの所要時間：約'+eta+'分';
  if (ch==='dine_in') return 'ご提供までの所要時間：約'+eta+'分';
  return 'お受け取りまでの所要時間：約'+eta+'分';
}

function escHtml(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function formatDate(iso) {
  if (!iso) return '';
  const d=new Date(iso), p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}

// ===================================================================
// SCHEDULED ORDER LOGIC (Pattern B)
// ===================================================================
function isScheduledOrder() {
  return orderData && orderData.scheduled_at != null;
}

function calcScheduledRemaining() {
  if (!orderData || !orderData.scheduled_at) return null;
  return (new Date(orderData.scheduled_at) - new Date()) / 60000;
}

function formatScheduledDatetime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const y = d.getFullYear();
  const mo = d.getMonth() + 1;
  const day = d.getDate();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const weekdays = ['日','月','火','水','木','金','土'];
  return y + '年' + mo + '月' + day + '日（' + weekdays[d.getDay()] + '）' + h + ':' + m;
}

function formatRemainingText(minutes) {
  if (minutes <= 0) return '';
  const h = Math.floor(minutes / 60);
  const m = Math.round(minutes % 60);
  if (h > 0 && m > 0) return 'あと約' + h + '時間' + m + '分';
  if (h > 0) return 'あと約' + h + '時間';
  return 'あと約' + m + '分';
}

function renderScheduledStatic() {
  document.getElementById('scheduledDatetime').textContent = formatScheduledDatetime(orderData.scheduled_at);
  const remaining = calcScheduledRemaining();
  document.getElementById('scheduledRemaining').textContent = remaining > 0 ? formatRemainingText(remaining) : '';
}

function switchScheduledView(targetView) {
  if (currentScheduledView === targetView) return;
  const staticEl = document.getElementById('scheduledStatic');
  const normalEl = document.getElementById('normalTrackingView');

  if (targetView === 'static') {
    normalEl.classList.add('view-fade-out');
    setTimeout(() => {
      normalEl.style.display = 'none';
      normalEl.classList.remove('view-fade-out');
      staticEl.style.display = '';
      renderScheduledStatic();
    }, 300);
  } else {
    staticEl.classList.add('view-fade-out');
    setTimeout(() => {
      staticEl.style.display = 'none';
      staticEl.classList.remove('view-fade-out');
      normalEl.style.display = '';
      renderTracking();
    }, 300);
  }
  currentScheduledView = targetView;
}

function checkScheduledSwitch() {
  if (!isScheduledOrder()) return;
  const remaining = calcScheduledRemaining();
  const cur = orderData.tracking_status || 'placed';
  const isFinal = FINAL_STATUSES.includes(cur) || cur === 'cancelled';

  if (isFinal) {
    // Final status: always show normal tracking
    if (currentScheduledView !== 'countdown') switchScheduledView('countdown');
    if (scheduledCheckInterval) { clearInterval(scheduledCheckInterval); scheduledCheckInterval = null; }
    return;
  }

  if (remaining > 60) {
    if (currentScheduledView !== 'static') switchScheduledView('static');
  } else {
    if (currentScheduledView !== 'countdown') switchScheduledView('countdown');
    if (scheduledCheckInterval) { clearInterval(scheduledCheckInterval); scheduledCheckInterval = null; }
  }
}

function startScheduledCheck() {
  if (!isScheduledOrder()) return;
  // Initial check (immediate, no transition)
  const remaining = calcScheduledRemaining();
  const cur = orderData.tracking_status || 'placed';
  const isFinal = FINAL_STATUSES.includes(cur) || cur === 'cancelled';
  const staticEl = document.getElementById('scheduledStatic');
  const normalEl = document.getElementById('normalTrackingView');

  if (!isFinal && remaining > 60) {
    staticEl.style.display = '';
    normalEl.style.display = 'none';
    currentScheduledView = 'static';
    renderScheduledStatic();
  } else {
    staticEl.style.display = 'none';
    normalEl.style.display = '';
    currentScheduledView = 'countdown';
  }

  // Periodic check every 60s
  if (!isFinal && remaining > 60) {
    scheduledCheckInterval = setInterval(() => {
      checkScheduledSwitch();
      if (currentScheduledView === 'static') renderScheduledStatic();
    }, 60000);
  }
}

// ===================================================================
// RENDER
// ===================================================================
function renderTracking() {
  const ch = getChannel();
  const statuses = STATUS_MAP[ch];
  const cur = orderData.tracking_status || 'placed';
  const isCancelled = cur === 'cancelled';
  const idx = statuses.findIndex(s=>s.key===cur);
  const isFinal = FINAL_STATUSES.includes(cur);
  const circ = 2 * Math.PI * 73;

  document.title = '注文状況 - '+(storeData?.name||'')+' | Weir';
  document.getElementById('storeName').textContent = storeData?.name || '';
  document.getElementById('trackingContent').classList.toggle('cancelled', isCancelled);

  const fill = document.getElementById('progressFill');
  const spinner = document.getElementById('progressSpinner');
  fill.style.strokeDasharray = circ;

  if (isCancelled) {
    fill.style.strokeDashoffset = circ;
    spinner.style.display = 'none';
    document.getElementById('progressCenter').innerHTML = '<div class="progress-icon" style="color:var(--cancel)">✕</div>';
  } else if (isFinal) {
    fill.style.strokeDashoffset = 0;
    spinner.style.display = 'none';
    fill.style.stroke = 'var(--complete)';
    document.getElementById('progressCenter').innerHTML = '<div class="progress-icon" style="color:var(--complete)">✓</div>';
  } else {
    const pct = statuses.length > 1 ? (idx / (statuses.length - 1)) : 0;
    fill.style.strokeDashoffset = circ * (1 - pct);
    spinner.style.display = '';
    const eta = calcETA();
    const center = document.getElementById('progressCenter');
    if (eta !== null && eta > 0) {
      center.innerHTML = '<div class="progress-time">'+eta+'</div><div class="progress-unit">分</div><div class="progress-label">'+(ch==='delivery'?'でお届け':'でご用意')+'</div>';
    } else {
      // #4: ETA=null時は⏳を表示（📝は文具に見えるため回避）
      center.innerHTML = '<div class="progress-icon">⏳</div>';
    }
  }

  // #5: 注文タイプラベル表示
  const TYPE_LABELS = { delivery:{ emoji:'🚗', label:'デリバリー' }, takeout:{ emoji:'🛍', label:'テイクアウト' }, dine_in:{ emoji:'🍽', label:'店内注文' } };
  const typeInfo = TYPE_LABELS[ch] || TYPE_LABELS.delivery;
  const typeLabelEl = document.getElementById('orderTypeLabel');
  typeLabelEl.className = 'order-type-label ' + ch;
  typeLabelEl.textContent = typeInfo.emoji + ' ' + typeInfo.label;

  if (isCancelled) {
    document.getElementById('statusText').textContent = 'ご注文がキャンセルになりました';
    document.getElementById('statusSub').textContent = 'ご不明点はチャットサポートまでお問い合わせください';
  } else {
    document.getElementById('statusText').textContent = (statuses[idx]||statuses[0]).text;
    document.getElementById('statusSub').textContent = calcETAText();
  }

  const bar = document.getElementById('stepBar');
  bar.innerHTML = '';
  statuses.forEach((s,i) => {
    if (i>0) { const l=document.createElement('div'); l.className='step-line'+(i<=idx&&!isCancelled?' done':''); bar.appendChild(l); }
    const d=document.createElement('div'); d.className='step-dot';
    if (!isCancelled) { if(i<idx)d.classList.add('done'); if(i===idx)d.classList.add('active'); }
    d.title=s.text; bar.appendChild(d);
  });

  if ((ch==='delivery' || ch==='takeout') && !isFinal && !isCancelled) {
    document.getElementById('deliveryDisclaimer').style.display = '';
    document.getElementById('deliveryDisclaimer').textContent = ch==='delivery'
      ? '配達時間は状況によって15分程度前後する可能性があります、予めご了承ください'
      : '準備時間は状況によって前後する可能性があります、予めご了承ください';
  } else {
    document.getElementById('deliveryDisclaimer').style.display = 'none';
  }
  document.getElementById('reviewBtn').style.display = isFinal&&!isCancelled ? '' : 'none';
  if (isFinal||isCancelled) spinner.style.display = 'none';
}

// ===================================================================
// SUPABASE REALTIME
// ===================================================================
let realtimeChannel = null;

function startRealtime() {
  if (!orderData || !orderData.id) return;
  const cur = orderData.tracking_status || 'placed';
  if (FINAL_STATUSES.includes(cur) || cur === 'cancelled') return;

  if (realtimeChannel) {
    sb.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }

  realtimeChannel = sb.channel('order-tracking-' + orderData.id)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'orders', filter: 'id=eq.' + orderData.id },
      (payload) => {
        const data = payload.new;
        if (data) {
          const changed = data.tracking_status !== orderData.tracking_status;
          Object.assign(orderData, data);
          if (changed) renderTracking();
          if (getChannel() === 'delivery' && data.delivery_lat && data.delivery_lng) {
            updateDriverMarker(data.delivery_lat, data.delivery_lng);
          }
          if (FINAL_STATUSES.includes(data.tracking_status) || data.tracking_status === 'cancelled') {
            sb.removeChannel(realtimeChannel);
            realtimeChannel = null;
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            if (etaInterval) { clearInterval(etaInterval); etaInterval = null; }
            if (scheduledCheckInterval) { clearInterval(scheduledCheckInterval); scheduledCheckInterval = null; }
            if (deliveryChannel) { sb.removeChannel(deliveryChannel); deliveryChannel = null; }
          }
        }
      }
    )
    .subscribe();
}

// ===================================================================
// DELIVERY TRACKING (配達パートナー位置のリアルタイム購読)
// ===================================================================
let deliveryChannel = null;

function startDeliveryTracking() {
  if (!orderData || !orderData.id) return;
  if (getChannel() !== 'delivery') return;
  const cur = orderData.tracking_status || 'placed';
  if (FINAL_STATUSES.includes(cur) || cur === 'cancelled') return;

  if (deliveryChannel) {
    sb.removeChannel(deliveryChannel);
    deliveryChannel = null;
  }

  // 最新の配達パートナー位置を取得
  sb.from('delivery_tracking')
    .select('partner_name, partner_latitude, partner_longitude, updated_at')
    .eq('order_id', orderData.id)
    .order('updated_at', { ascending: false })
    .limit(1)
    .then(({ data }) => {
      if (data && data[0] && data[0].partner_latitude && data[0].partner_longitude) {
        updateDriverMarker(data[0].partner_latitude, data[0].partner_longitude);
      }
    });

  // リアルタイム購読
  deliveryChannel = sb.channel('delivery-tracking-' + orderData.id)
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'delivery_tracking', filter: 'order_id=eq.' + orderData.id },
      (payload) => {
        const d = payload.new;
        if (d && d.partner_latitude && d.partner_longitude) {
          updateDriverMarker(d.partner_latitude, d.partner_longitude);
        }
      }
    )
    .subscribe();
}

// ===================================================================
// POLLING (fallback)
// ===================================================================
function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  const cur = orderData.tracking_status || 'placed';
  if (FINAL_STATUSES.includes(cur) || cur==='cancelled') return;

  pollInterval = setInterval(async () => {
    try {
      const { data } = await sb.from('orders')
        .select('tracking_status, estimated_delivery_at')
        .eq('id', orderData.id).single();

      if (data) {
        const changed = data.tracking_status !== orderData.tracking_status;
        Object.assign(orderData, data);
        if (changed) renderTracking();
        if (FINAL_STATUSES.includes(data.tracking_status) || data.tracking_status==='cancelled') {
          clearInterval(pollInterval); pollInterval=null;
          if (etaInterval) { clearInterval(etaInterval); etaInterval=null; }
          if (scheduledCheckInterval) { clearInterval(scheduledCheckInterval); scheduledCheckInterval=null; }
          if (deliveryChannel) { sb.removeChannel(deliveryChannel); deliveryChannel=null; }
        }
      }
    } catch(e) { console.error('Poll error:', e); }
  }, 60000);
}

// ===================================================================
// ETA COUNTDOWN (BUG-4: リアルタイムカウントダウン)
// ===================================================================
function startEtaCountdown() {
  if (etaInterval) clearInterval(etaInterval);
  const cur = orderData.tracking_status || 'placed';
  if (FINAL_STATUSES.includes(cur) || cur === 'cancelled') return;

  etaInterval = setInterval(() => {
    const cur = orderData.tracking_status || 'placed';
    if (FINAL_STATUSES.includes(cur) || cur === 'cancelled') {
      clearInterval(etaInterval); etaInterval = null; return;
    }
    renderTracking();
  }, 60000);
}

async function loadFaqContent() {
  const container = document.getElementById('faqContent');
  try {
    // Load common FAQs + brand-specific FAQs
    let query = sb.from('faqs').select('id, brand_id, category, question, answer, is_active, is_common, sort_order').eq('is_active', true).order('sort_order', { ascending: true });
    const { data, error } = await query;
    if (error) throw error;

    // Filter: common FAQs + brand FAQs matching current brand
    const brandId = brandData?.id || null;
    const faqs = (data || []).filter(f => f.is_common || (brandId && f.brand_id === brandId));

    if (faqs.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light)">FAQがありません</div>';
      return;
    }

    // Group by category
    const catLabels = { order:'注文について', delivery:'配達について', payment:'支払について', other:'その他' };
    const groups = {};
    faqs.forEach(f => {
      const cat = f.category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(f);
    });

    let html = '';
    Object.keys(catLabels).forEach(cat => {
      if (!groups[cat] || groups[cat].length === 0) return;
      html += '<div style="margin-bottom:12px">';
      html += '<div style="font-size:13px;font-weight:700;color:var(--text);padding:8px 0;border-bottom:1px solid #F0F0F0">' + catLabels[cat] + '</div>';
      groups[cat].forEach((f, i) => {
        const fid = 'faq-' + cat + '-' + i;
        html += '<div style="border-bottom:1px solid #F5F5F5">';
        html += '<div onclick="toggleFaq(\'' + fid + '\')" style="padding:12px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500">';
        html += '<span>' + escHtml(f.question) + '</span>';
        html += '<span style="font-size:18px;color:#999;transition:transform 0.2s" id="' + fid + '-arrow">＋</span>';
        html += '</div>';
        html += '<div id="' + fid + '" style="display:none;padding:0 0 12px;font-size:13px;color:var(--text-light);line-height:1.6">' + escHtml(f.answer) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    });

    container.innerHTML = html;
  } catch (e) {
    console.error('loadFaqContent error:', e);
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light)">FAQの読み込みに失敗しました</div>';
  }
}

function toggleFaq(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!el) return;
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : '';
  if (arrow) arrow.textContent = showing ? '＋' : '－';
}

async function initChat() {
  try {
    // Determine user identity
    const memberId = orderData?.member_id || null;
    const guestId = (!memberId && orderData?.customer_email)
      ? btoa(orderData.customer_email).substring(0, 20)
      : null;

    // Create chat record
    const { data, error } = await sb.from('customer_chats').insert({
      order_id: orderData?.id || null,
      store_id: orderData?.store_id || storeData?.id || null,
      member_id: memberId,
      guest_identifier: guestId,
      status: 'active'
    }).select().single();

    if (error) throw error;
    chatId = data.id;

    // Subscribe to realtime
    chatRealtimeChannel = sb.channel('chat-' + chatId)
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'customer_chat_messages', filter: 'chat_id=eq.' + chatId },
        (payload) => { appendChatMsg(payload.new); }
      ).subscribe();

    document.getElementById('chatMessages').innerHTML =
      '<div style="text-align:center;padding:12px;font-size:12px;color:var(--text-light)">チャットが開始されました。お気軽にお問い合わせください。</div>';
  } catch (e) {
    console.error('initChat error:', e);
    document.getElementById('chatMessages').innerHTML =
      '<div style="text-align:center;padding:20px;color:#E53935;font-size:13px">チャットの開始に失敗しました</div>';
  }
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !chatId) return;
  input.value = '';

  try {
    const { error } = await sb.from('customer_chat_messages').insert({
      chat_id: chatId,
      sender_type: 'user',
      message: msg
    });
    if (error) throw error;
  } catch (e) {
    console.error('sendChatMessage error:', e);
    input.value = msg;
  }
}

function appendChatMsg(m) {
  const container = document.getElementById('chatMessages');
  if (!container) return;
  // Remove placeholder
  const placeholder = container.querySelector('div[style*="text-align:center"]');
  if (placeholder && placeholder.textContent.includes('入力して')) placeholder.remove();

  const isUser = m.sender_type === 'user';
  const d = new Date(m.created_at);
  const time = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const div = document.createElement('div');
  div.style.cssText = 'display:flex;justify-content:' + (isUser ? 'flex-end' : 'flex-start') + ';margin-bottom:8px;padding:0 4px';
  div.innerHTML = '<div style="max-width:80%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;background:' +
    (isUser ? 'var(--brand,#D32F2F)' : '#F0F0F0') + ';color:' + (isUser ? '#fff' : '#333') + '">' +
    '<div>' + escHtml(m.message) + '</div>' +
    '<div style="font-size:10px;opacity:0.7;margin-top:4px;text-align:right">' + time + '</div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

    estimated_delivery_at: isScheduledDemo ? null : new Date(Date.now() + 25*60000).toISOString(),
    created_at: new Date().toISOString(),
    delivery_lat: isScheduledDemo ? null : 35.6612,
    delivery_lng: isScheduledDemo ? null : 139.6987,
    order_items: [
      { product_name:'特選カルビセット', quantity:1, unit_price:1980 },
      { product_name:'石焼ビビンバ', quantity:1, unit_price:980 },
      { product_name:'ナムル盛り合わせ', quantity:1, unit_price:620 },
    ]
  };
  if (!isScheduledDemo) orderData.tracking_status = 'preparing';
  storeData = { name:'', address:'', phone:'', lat:35.6595, lng:139.7004 };
  brandData = { name:'', primary_color:'#D32F2F' };

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('trackingView').style.display = '';
  initMap();
  renderTracking();
  startScheduledCheck();

  if (isScheduledDemo) {
    // Scheduled demo: after 10s, simulate crossing the 60min threshold
    setTimeout(() => {
      orderData.scheduled_at = new Date(Date.now() + 55*60000).toISOString();
      orderData.estimated_delivery_at = new Date(Date.now() + 55*60000).toISOString();
      orderData.tracking_status = 'confirmed';
      checkScheduledSwitch();
    }, 10000);
  } else {
    const demoStatuses = ['placed','confirmed','preparing','prepared','delivering','delivered'];
    let di = 2;
    setInterval(() => {
      di = (di+1) % demoStatuses.length;
      orderData.tracking_status = demoStatuses[di];
      if (di < demoStatuses.length-1) orderData.estimated_delivery_at = new Date(Date.now()+(25-di*5)*60000).toISOString();
      if (demoStatuses[di]==='delivering') updateDriverMarker(35.6612, 139.6987);
      renderTracking();
    }, 5000);
  }
}
</script>
