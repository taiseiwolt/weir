/* ===== Page-level CSS variable aliases ===== */
:root {
  --tag-recommend:var(--brand-primary); --tag-limited:#F57C00; --tag-season:#2E7D32;
  --tag-sale:#7B1FA2; --tag-rank1:#C9A227; --tag-rank2:#78909C; --tag-rank3:#8D6E63;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--brand-font);color:var(--brand-font-color);background:var(--bg);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none} button{cursor:pointer}

.page-hero{background:var(--brand-primary);padding:28px 20px;text-align:center;color:white}
.page-hero h1{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif}
.page-hero p{font-size:13px;opacity:.85;margin-top:6px}

.menu-page{max-width:1060px;margin:0 auto;padding:24px 20px 80px}
.menu-layout{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}

.category-sidebar{position:sticky;top:72px;background:white;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.cat-sidebar-title{padding:12px 16px;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.1em;background:var(--bg2);border-bottom:1px solid var(--border)}
.cat-sidebar-item{display:flex;align-items:center;padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;color:var(--brand-font-color);background:none;border-left:none;border-right:none;border-top:none;width:100%;font-family:var(--brand-font);text-align:left;gap:8px}
.cat-sidebar-item:last-child{border-bottom:none}
.cat-sidebar-item:hover{background:var(--brand-primary-light);color:var(--brand-primary)}
.cat-sidebar-item.active{background:var(--brand-primary);color:white;font-weight:700}

.tax-note{font-size:12px;color:var(--text3);margin-bottom:20px}
.menu-category-section{margin-bottom:40px;scroll-margin-top:80px}
.menu-category-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--brand-primary)}
.menu-category-header h2{font-size:20px;font-weight:700;font-family:'Noto Serif JP',serif}

.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.menu-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .2s;background:white}
.menu-card:hover{border-color:var(--brand-primary);box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px)}
.menu-card-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:52px}
.menu-card-body{padding:10px 12px 12px}
.menu-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.menu-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;color:white}
.tag-recommend{background:var(--tag-recommend)} .tag-limited{background:var(--tag-limited)}
.tag-season{background:var(--tag-season)} .tag-sale{background:var(--tag-sale)}
.tag-rank1{background:var(--tag-rank1)} .tag-rank2{background:var(--tag-rank2)} .tag-rank3{background:var(--tag-rank3)}
.menu-card-name{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:4px}
.menu-card-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.menu-card-price{font-size:15px;font-weight:700;color:var(--brand-primary)}
.menu-card-price .original{font-size:12px;color:var(--text3);text-decoration:line-through;margin-right:4px;font-weight:400}
.menu-card-price .unit{font-size:11px;font-weight:400;color:var(--text3)}

/* モーダル */
.item-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center;padding:20px}
.item-modal-overlay.open{display:flex}
.item-modal-wrap{position:relative;width:100%;max-width:540px}
.item-modal{background:white;border-radius:10px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.item-modal-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:80px;border-radius:10px 10px 0 0}
.item-modal-body{padding:20px 24px 28px}
.item-modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.item-modal-name{font-size:20px;font-weight:700;line-height:1.4;margin-bottom:6px;font-family:'Noto Serif JP',serif}
.item-modal-outline{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.item-modal-desc{font-size:13px;line-height:1.7;margin-bottom:16px;padding:12px;background:var(--bg2);border-radius:4px;border-left:3px solid var(--brand-primary)}
.item-modal-price{font-size:22px;font-weight:700;color:var(--brand-primary);margin-bottom:12px}
.item-modal-price .original{font-size:15px;color:var(--text3);text-decoration:line-through;margin-right:6px;font-weight:400}
.item-modal-price .unit{font-size:13px;font-weight:400;color:var(--text3)}
.item-modal-allergen{font-size:12px;color:var(--text3);padding:10px 12px;border:1px solid var(--border);border-radius:4px}
.item-modal-allergen strong{color:var(--text2)}
.item-modal-close{position:absolute;top:-14px;right:-14px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10;cursor:pointer}
.item-modal-close:hover{background:rgba(0,0,0,.75)}

@media(max-width:800px){
  .menu-layout{grid-template-columns:1fr}
  .category-sidebar{position:static;display:flex;overflow-x:auto;border-radius:4px}
  .cat-sidebar-title{display:none}
  .cat-sidebar-item{flex-shrink:0;border-bottom:none;border-right:1px solid var(--border);padding:10px 14px;width:auto}
  .menu-grid{grid-template-columns:repeat(2,1fr)}
}
.price-notes{max-width:1100px;margin:0 auto;padding:8px 20px 16px;font-size:11px;color:var(--text3);line-height:1.8}
@media(max-width:480px){.menu-grid{grid-template-columns:1fr}}

/* =====================================================
   MENU_DATA — 商品データ（Supabase categories/productsから取得）
   D-83: ハードコード禁止。DB取得失敗時は空配列
   ===================================================== */
let MENU_DATA = [];

function t(key){ return AidenCommon.t(key); }

function calcDiscount(price, discount) {
  if (!discount) return null;
  if (discount.type==='fixed')   return Math.max(0, price - discount.amount);
  if (discount.type==='percent') return Math.round(price * (1 - discount.rate/100));
  return null;
}
function buildTagsHtml(tags, discount) {
  var all = tags ? tags.slice() : [];
  if (discount) all.unshift('sale');
  return all.map(function(k){ return '<span class="menu-tag tag-'+k+'">'+t('tag_'+k)+'</span>'; }).join('');
}
function buildPriceHtml(item) {
  var d = calcDiscount(item.price, item.discount);
  var unit = item.priceUnit ? '<span class="unit">'+item.priceUnit+'</span>' : '<span class="unit">'+t('price_unit_tax')+'</span>';
  if (d!==null) return '<span class="original">'+item.price.toLocaleString()+'円</span>'+d.toLocaleString()+'円'+unit;
  return item.price.toLocaleString()+'円'+unit;
}

function buildMenu() {
  var cats = MENU_DATA.slice().sort(function(a,b){return a.order-b.order;});
  var sideHtml = '<div class="cat-sidebar-title">'+t('cat_label')+'</div>';
  var mainHtml = '<p class="tax-note">'+t('tax_note')+'</p>';
  cats.forEach(function(cat, ci) {
    var label = t(cat.labelKey);
    sideHtml += '<button class="cat-sidebar-item'+(ci===0?' active':'')+'" onclick="scrollToCategory(\''+cat.id+'\')" id="cat-btn-'+cat.id+'">'+cat.icon+' '+label+'</button>';
    mainHtml += '<section class="menu-category-section" id="cat-'+cat.id+'">';
    mainHtml += '<div class="menu-category-header"><span>'+cat.icon+'</span><h2>'+label+'</h2></div>';
    mainHtml += '<div class="menu-grid">';
    cat.items.forEach(function(item, idx) {
      mainHtml += '<div class="menu-card" onclick="openModal(\''+cat.id+'\','+idx+')">'
        +'<div class="menu-card-img" style="background:'+escH(item.bg)+'">'+escH(item.emoji)+'</div>'
        +'<div class="menu-card-body">'
        +'<div class="menu-card-tags">'+buildTagsHtml(item.tags,item.discount)+'</div>'
        +'<div class="menu-card-name">'+escH(t(item.nameKey))+'</div>'
        +'<div class="menu-card-desc">'+escH(t(item.outlineKey))+'</div>'
        +'<div class="menu-card-price">'+buildPriceHtml(item)+'</div>'
        +'</div></div>';
    });
    mainHtml += '</div></section>';
  });
  document.getElementById('category-sidebar').innerHTML = sideHtml;
  document.getElementById('menu-content').innerHTML = mainHtml;
}

function openModal(catId, idx) {
  var cat = MENU_DATA.find(function(c){return c.id===catId;});
  var item = cat.items[idx];
  var priceHtml = buildPriceHtml(item);
  var allergens = item.allergens && item.allergens.length ? item.allergens.join('・') : t('allergen_none');
  var courseNote = item.isCourse
    ? '<p style="font-size:12px;color:var(--text3);margin-top:10px">'+t('reserve_note')+' <a href="javascript:void(0)" onclick="openResModal()" style="color:var(--brand-primary)">'+t('reserve_link')+'</a></p>' : '';
  document.getElementById('item-modal-inner').innerHTML =
    '<div class="item-modal-img" style="background:'+escH(item.bg)+'">'+escH(item.emoji)+'</div>'
    +'<div class="item-modal-body">'
    +'<div class="item-modal-tags">'+buildTagsHtml(item.tags,item.discount)+'</div>'
    +'<div class="item-modal-name">'+escH(t(item.nameKey))+'</div>'
    +'<div class="item-modal-outline">'+escH(t(item.outlineKey))+'</div>'
    +'<div class="item-modal-desc"'+(t(item.detailKey)?'':' style="display:none"')+'>'+escH(t(item.detailKey))+'</div>'
    +'<div class="item-modal-price">'+priceHtml+'</div>'
    +'<div class="item-modal-allergen"><strong>'+escH(t('allergen_label'))+'：</strong>'+escH(allergens)+'</div>'
    +courseNote+'</div>';
  document.getElementById('item-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeItemModal(e) {
  if (e && e.target !== document.getElementById('item-modal')) return;
  document.getElementById('item-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function scrollToCategory(id) {
  var el = document.getElementById('cat-'+id);
  if (!el) return;
  var top = el.getBoundingClientRect().top + window.scrollY - 80;
  window.scrollTo({top:top, behavior:'smooth'});
  setActive(id);
}
function setActive(id) {
  document.querySelectorAll('.cat-sidebar-item').forEach(function(b){b.classList.remove('active');});
  var btn = document.getElementById('cat-btn-'+id);
  if (btn) btn.classList.add('active');
}
window.addEventListener('scroll', function() {
  var scroll = window.scrollY + 100;
  var activeId = null;
  MENU_DATA.slice().sort(function(a,b){return a.order-b.order;}).forEach(function(cat) {
    var el = document.getElementById('cat-'+cat.id);
    if (el && el.offsetTop <= scroll) activeId = cat.id;
  });
  if (activeId) setActive(activeId);
});

// ===== API CONFIG =====
const API_BASE = 'https://xorder.co.jp'; // Production domain
var BRAND_ID = null;

async function apiFetch(path) {
  var res = await fetch(API_BASE + path, { headers: { 'Content-Type': 'application/json' } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadMenuFromSupabase() {
  // Try API first
  if (API_BASE) {
    try {
      var data = await apiFetch('/api/menu/products?brand_id=' + BRAND_ID);
      if (data && data.categories && data.categories.length > 0 && data.products && data.products.length > 0) {
        MENU_DATA = data.categories.map(function(c, ci) {
          var catProds = data.products.filter(function(p) { return p.category_id === c.id; });
          return {
            id: c.id, labelKey: c.name, icon: '🥩', order: c.sort_order || ci + 1,
            items: catProds.map(function(p) {
              var sz = (p.product_sizes || []).sort(function(a,b) { return (a.sort_order||0) - (b.sort_order||0); });
              var price = sz.length > 0 ? sz[0].price : (p.price || 0);
              return { nameKey: p.name, outlineKey: p.description || '', detailKey: '', price: price, tags: [], allergens: [], emoji: '🍽️', bg: 'linear-gradient(135deg,#f5f5f5,#e8e8e8)', _directName: true };
            })
          };
        });
        return;
      }
    } catch(e) { /* fall through */ }
  }

  // Supabase fallback
  var {data: cats} = await sb.from('categories').select('id, brand_id, name, sort_order').eq('brand_id', BRAND_ID).order('sort_order');
  var {data: products} = await sb.from('products').select('id, brand_id, category_id, name, description, image_url, sale_status').eq('brand_id', BRAND_ID);
  var {data: sizes} = await sb.from('product_sizes').select('id, product_id, name, price, sort_order');
  if (!cats || !cats.length || !products || !products.length) return;
  MENU_DATA = cats.map(function(c, ci) {
    var catProducts = products.filter(function(p) { return p.category_id === c.id; });
    return {
      id: c.id, labelKey: c.name, icon: '🥩', order: c.sort_order || ci + 1,
      items: catProducts.map(function(p) {
        var sz = (sizes || []).filter(function(s) { return s.product_id === p.id; }).sort(function(a,b) { return a.sort_order - b.sort_order; });
        var price = sz.length > 0 ? sz[0].price : 0;
        return { nameKey: p.name, outlineKey: p.description || '', detailKey: '', price: price, tags: [], allergens: [], emoji: '🍽️', bg: 'linear-gradient(135deg,#f5f5f5,#e8e8e8)', _directName: true };
      })
    };
  });
}

// Override changeLang to also rebuild menu
var _origChangeLang = AidenCommon.changeLang;
AidenCommon.changeLang = function(lang) {
  _origChangeLang(lang);
  buildMenu();
};

document.addEventListener('DOMContentLoaded', async function(){
  await AidenCommon.init({
    header: 'brand',
    footer: true,
    onBrandLoaded: function(brand) {
      BRAND_ID = brand.id;
      document.title = escH(brand.name) + ' | メニュー';
      // Update page hero subtitle with brand name
      var heroSub = document.querySelector('.page-hero p');
      if (heroSub) heroSub.textContent = (brand.name || '') + 'のグランドメニュー';
      // Price notes: brand.memo display removed (memo column excluded from brands_public for privacy)
      // Load menu data from DB, then rebuild
      Promise.all([
        loadMenuFromSupabase().catch(function(){})
      ]).then(function() {
        buildMenu();
      });
    }
  });
});
